body:
  text: 儀禮集釋卷二十一宋李如圭撰士喪禮重木刋鑿之甸人置重于中庭參分庭一在南鄭注木也縣物焉曰重刋斵治鑿之為縣簪孔也士重木長三尺釋曰重者相重累也豎者三尺横者宜半之士三尺則重其約銘旌之杠與夏祝鬻餘飯用二鬲于西牆下鄭注夏祝祝習夏禮者也夏人教以忠其于養宜鬻餘飯以飯尸餘米為鬻也重主道也士二鬲則大夫四諸侯六天子八與簋同差釋曰凡奠皆夏祝為之饋食禮特牲二敦少牢四敦此二鬲與特牲數同人所嗜者飲食始死未作主故以飲食依之幂用疏布案幂今注疏本訛作冪久之繫用靲縣于重幂用葦席北面左袵帶用靲賀之結于後鄭注久讀為灸謂以葢塞鬲口也靲竹䈼也以席覆重辟屈而反兩端交于後左袵西端在上賀加也今文幂皆作宻案今文注疏本作古文釋曰北面以南為後以葦席覆重乃以䈼束加之祝取銘置于重鄭注祝習周禮者也釋曰重主道故置銘于重荀子曰喪禮者以生者飾死者也大象其生以送其死也始卒沐浴鬠體飯含象生執也不沐則濡櫛三律而止不浴則濡巾三式而止充耳而設瑱飯以生稻琀以槁骨反生術矣說䙝衣襲三稱搢紳而無鉤帶矣設掩面儇目鬠而不笄矣書其名置于其重則名不見而柩獨明矣厥明陳衣于房南領西上綪絞横三縮一廣終幅析其末鄭注綪屈也絞所以收束衣服為堅急者也以布為之縮從也横者三幅從者一幅析其末者令可結也喪大記曰絞一幅為三釋曰謂析其末為三也喪大記又曰大斂布絞縮者三則一幅通皆三析之矣小斂之絞析其末以為堅之强也大斂之絞皆三析之以為堅之急也凡陳衣斂時在外者先陳之布衣亦然緇衾赬裏無紞鄭注紞被識也斂衣或倒被無别于前後可也案今注疏本脫可字凡衾制同皆五幅也釋曰被生時有紞以組𩔖為之以識被之前後喪大記云紟五幅無紞衾亦紟𩔖故其制同内則曰六十歲制七十時制八十月制九十日修惟絞紟衾冒死而後制祭服次鄭注爵弁服皮弁服釋曰小斂祭服在中而次絞衾先陳祭服尊也與陳襲衣之序同散衣次鄭注褖衣以下袍襺之屬凡十有九稱鄭注祭服與散衣陳衣繼之鄭注庶襚不必盡用鄭注取稱而已不務多釋曰喪大記曰小斂布絞縮者一横者三君錦衾大夫縞衾士緇衾皆一衣十有九稱君陳衣于序東大夫士陳衣于房中皆西領北上絞紟不在列不在列者不成稱不連數也西領北上葢亦天子之士又曰凡陳衣者實之篋凡陳衣不詘饌于東堂下脯醢醴酒幂奠用功布實于簟在饌東鄭注功布鍛濯灰治之布也凡在東西堂下者南齊坫古文奠為尊釋曰鬲幂用疏布布之不灰治者也下記曰設棜于東堂下南順齊于坫饌于其上東堂下在堂之東堂隅曰坫設盆盥于饌東有巾鄭注為奠設盥也喪事略故無洗也釋曰凡設洗篚者不言巾巾在篚可知也喪禮無洗篚故見其巾饋食禮尸盥亦然苴絰大鬲下本在左要絰小焉散帶垂長三尺牡麻絰右本在上亦散帶垂皆饌于東方鄭注苴絰斬衰之絰也苴麻者其貌苴以為絰服重者尚麤惡絰之言實也鬲搤也中人之手搤圍九寸絰帶之差自此出焉下本在左重服統于内而本陽也要絰小焉五分去一牡麻絰者齊衰以下之絰也牡麻絰者其貌易服輕者宜差好也右本在上輕服本于隂而統于外散帶之垂者男子之道文多變也饌于東方東坫之南苴絰為上釋曰帶即要絰也雜記曰大功以上散帶散帶者小斂後垂其帶至成服而絞之婦人則初而絞之與小功緦之男子同饌于東方不繼前饌而言則非東堂下矣下牀笫夷衾饌于西坫南則東方之饌亦然婦人之帶牡麻結本在房鄭注婦人亦有苴絰但言帶者記其異此齊衰婦人斬衰婦人亦苴絰也案亦字下今注疏本衍有字釋曰絰本不散帶也與男子異故著之牀笫夷衾饌于西坫南鄭注笫簀也夷衾覆尸之衾喪大記曰自小斂以往用夷衾夷衾質殺之裁猶冒也釋曰用夷衾者大斂之衾當陳西方盥如東方鄭注為舉者設盥也如東方者亦用盆布巾饌于西堂下陳一鼎于寢門外當東塾少南西面其實特豚四鬄去蹄兩胉脊肺設扃鼏鼏西末素俎在鼎西西順覆匕東柄鄭注鬄解也四解之殊肩髀而已喪事略去蹄去其甲為不絜清也胉脅也素俎喪尚質既饌將小斂則辟襲奠今文鬄為剔胉為迫古文鼏為宻釋曰孔叢曰豕子曰豚殊左右肩髀為四并兩脅與脊而七體是謂豚解鼏以茅為之其本在東凡物無飾曰素檀弓曰奠以素器以生者有哀素之心也士盥二人以竝東面立于西階下鄭注立俟舉尸也今文竝為併布席于户内下莞上簟鄭注有司布斂席也釋曰不牀者斂衣多布之于地喪大記曰小斂于户内大斂于阼君以簟席大夫以蒲席士以葦席簟細席也商祝布絞衾散衣祭服祭服不倒案倒唐石經作到美者在中鄭注斂者趨方或傎倒衣裳祭服尊不倒之也美善也善衣後布于斂則在中也既後布祭服而又言善者在中明每服非一稱也釋曰喪大記曰小斂之衣祭服不倒君無禭大夫士畢主人之祭服親戚之衣受之不以即陳小斂君大夫士皆用複衣複衾士舉遷尸反位鄭注遷尸于服上釋曰扶君卜人師扶右射人師扶左君薨以是舉周禮射人大喪與僕人遷尸喪大記曰凡斂者袒遷尸者襲君之喪大胥是斂衆胥佐之大夫之喪大胥侍之衆胥是斂士之喪胥為侍士是斂小斂大斂祭服不倒皆左袵結絞不紐斂者既斂必哭設牀笫于兩楹之間袵如初有枕鄭注袵寢卧之席也亦下莞上簟卒斂徹帷鄭注尸已飾釋曰喪大記曰鋪絞紟踊鋪衾踊鋪衣踊遷尸踊斂衣踊斂衾踊斂絞紟踊檀弓曰周人大事斂用日出周禮王崩小宗伯及執事涖小斂帥異族而佐大祝贊斂主人西面馮尸踊無算主婦東面馮亦如之鄭注馮服膺之釋曰踊無算為動尸也問喪曰在牀曰尸在棺曰柩動尸舉柩辟踊無數馮音憑後同主人髺髮袒衆主人免于房鄭注始死將斬衰者雞斯將齊衰者素冠今至小斂變又將初變服也案變原本及今注疏本皆訛作喪張淳儀禮識誤云監本喪作變從監本髺髮者去笄纚而紒衆主人免者齊衰將袒以免代冠冠服之尤尊不以袒也免之制未聞舊說以為如冠狀廣一寸喪服小記曰斬衰髺髮以麻免而以布此用麻布為之狀如今著幧頭矣案原本及今注疏本著上有之字張淳儀禮識誤云釋文今著中無之字從釋文自項中而前交于額上卻繞紒也于房于室釋髺髮宜于隠者今文免皆作絻古文髺作括釋曰檀弓曰袒括髮變也去飾去美也袒括髮去飾之甚也有所袒有所襲哀之節也凡袒必免古者冠加于武有罪免冠而武獨存喪服之免以布象而為之以其與冕弁之冕音相亂故讀如問括髮之狀與免同用麻為異耳案喪服小記及奔喪為父母皆括髮則此云衆主人免者謂將齊衰者也下記云既馮尸主人袒髺髮絞帶衆主人布帶布帶者齊衰之服明此衆主人謂齊衰以下婦人髽于室鄭注始死婦人將斬衰者去笄而纚將齊衰者骨笄而纚今言髽者亦去笄纚而紒也齊衰以上至笄猶髽髽之異于髺髮者既去纚而以髮為大紒如今婦人露紒其象也檀弓曰南宫韜之妻之姑之喪夫子誨之髽曰爾毋縱縱爾爾毋扈扈爾其用麻布亦如著幧頭然釋曰未成服之髽無笄至成服有笄猶髽不改士舉男女奉尸侇于堂幠用夷衾男女如室位踊無算鄭注侇之言尸也夷衾覆尸柩之衾也堂謂楹間牀笫上也今文侇作夷釋曰牀曰夷牀衾曰夷衾槃曰夷槃尸曰侇皆依尸而為言檀弓曰叔孫武叔之母死既小斂舉者出尸出户袒且投其冠括髮子游曰知禮袒括髮為奉尸尸出户乃袒括髮故子游嗤之主人出于足降自西階衆主人東即位婦人阼階上西面主人拜賓大夫特拜士旅之即位踊襲絰于序東復位鄭注拜賓鄉賓位拜之也即位踊東方位襲絰于序東東夾前釋曰主人位在阼階下衆主人亦降自西階位繼主人而南序東堂下當東序之東絰在東方取之便喪大記曰小斂主人即位于户内主婦東面乃斂卒斂主人馮之踊主婦亦如之主人袒說髦括髮以麻婦人髽帶麻于房中徹帷男女奉尸夷于堂降拜君拜寄公國賓大夫士拜卿大夫于位于士旁三拜夫人亦拜寄公夫人于堂上大夫内子士妻持拜命婦汜拜衆賓于堂上主人即位襲帶絰踊母之喪即位而免乃奠弔者襲裘加武帶絰于主人拾踊奔喪曰奔親喪至于家入門左升自西階殯東西面坐哭盡哀括髮袒降堂東即位西鄉哭成踊襲絰于序東絞帶反位拜賓成踊送賓反位又曰奔母之喪西面哭盡哀括髮袒降堂東即位西鄉哭成踊襲免絰于序東拜賓送賓皆如奔父之禮免終事奔喪禮亦與在家者同惟不散帶為母異于父者于又哭不括髮而免耳乃奠鄭注祝與執事為之釋曰曽子問曰天子諸侯之喪斬衰者奠大夫齊衰奠士則朋友奠不足則取于大功以下者不足則反之舉者盥右執匕卻之左執俎横攝之入阼階前西面錯錯俎北面鄭注舉者盥出門舉鼎者右人以右手執匕左人以左手執俎因其便也攝持也西面錯錯鼎于此宜西面錯俎北面俎宜西順之釋曰舉鼎者兼執匕俎喪禮略也鼎北上凡陳鼎于外者北面阼階下者西面喪禮陳鼎門外西面者變于吉在東方者未忍異于生至虞反吉乃設鼎于西階前右人左執匕抽扃予左手兼執之取鼏委于鼎北加扃不坐鄭注抽扃取鼏加扃于鼏上皆右手今文扃為鉉古文予為于鼏為宻乃朼載載兩髀于兩端案重一載字應屬衍文兩肩亞兩胉亞脊肺在于中皆覆進柢執而俟鄭注乃朼以朼次出牲體右人也載受而載于俎左人也亞次也凡七體皆覆為塵柢本也進本者未異于生也骨有本末古文朼為匕髀為脾今文胉為迫柢皆為胝釋曰體覆之無尸不食也夏祝及執事盥執醴先酒脯醢俎從升自阼階丈夫踊甸人徹鼎巾待于阼階下鄭注執事者諸執奠事者巾功布也執者不升己不設祝既錯醴將受之釋曰執者執巾者奠于尸東執醴酒北面西上鄭注執醴酒者先升尊也立而俟後錯要成也釋曰檀弓曰小斂之奠子游曰于東方曽子曰于西方斂斯席矣小斂之奠在西方魯禮之末失也豆錯俎錯于豆東立于俎北西上醴酒錯于豆南祝受巾巾之由足降自西階婦人踊奠者由重南東丈夫踊鄭注巾之為塵也東反其位釋曰言豆不言籩省文設俎者南面辟執醴酒者也巾之為牲肉之剥露也檀弓曰喪不剥奠也與祭肉也與丈夫婦人以奠者之升降為踊節重主道故奠者由之丈夫又踊也奠者位葢在盆盥之東南賓出主人拜送于門外鄭注庿門外也釋曰不送于外門外降于君使乃代哭不以官鄭注代更也孝子始有親喪悲哀憔悴禮防其以死傷生案防今注疏本作坊使之更哭不絶聲而已人君以官尊卑士賤以親疏為之三日之後哭無時周禮挈壺氏凡喪縣壺以代哭釋曰喪大記曰君喪虞人出木角狄人出壺雍人出鼎司馬縣之乃官代哭大夫官代哭不縣壺士代哭不以官有襚者則將命擯者出請入告主人待于位鄭注喪禮略于威儀既小斂擯者乃用辭出請之辭曰孤某使某請事擯者出告須以賓入鄭注須亦待也出告之辭曰孤某須矣賓入中庭北面致命主人拜稽顙賓升自西階出于足西面委衣如于室禮降出主人出拜送朋友親襚如初儀西階東北面哭踊三降主人不踊鄭注朋友既委衣又還哭于西階上不背主人釋曰拜君弔襚賵踊朋友襚不踊辟君也襚者以褶則必有裳執衣如初徹衣者亦如之升降自西階以東鄭注帛謂褶無絮雖複與襌同有裳乃成稱不用表也以東藏以待事也古文褶為襲釋曰如初左執領右執要雜記諸侯弔含襚賵之禮曰凡將命卿殯將命子拜稽顙西面而坐委之宰舉璧與圭宰夫舉襚升自西階西面坐取之降自西階以東雜記言西面坐委則亦于殯東委之宵為燎于中庭鄭注宵夜也燎大燋釋曰古者以荆燋為燭其在地者曰燎或曰庭燎以布纏葦以臘灌之厥明滅燎陳衣于房南領西上綪絞紟衾二君襚祭服散衣庶襚凡三十稱案三十唐石經作卅紟不在算不必盡用鄭注紟單被也衾二者始死斂衾今又復制也小斂衣數自天子達大斂則異矣喪大記曰大斂布絞縮者三横者三釋曰紟不在算以其單也不盡用者守祧職所謂其遺衣服藏焉是也喪大記曰大斂布絞縮者三横者五布紟二衾君大夫士一也君陳衣于庭百稱北領西上大夫陳衣于序東五十稱西領南上士陳衣于序東三十稱西領南上絞紟如朝服絞一幅為三不辟紟五幅無紞小斂君大夫士皆用複衣複衾大斂君大夫士祭服無算君褶衣褶衾大夫士猶小斂也士陳衣與大夫同葢亦天子之士東方之饌兩瓦甒其實醴酒角觶木柶毼豆兩其實葵菹芋蠃醢兩籩無縢布巾其實栗不擇脯四脡鄭注此饌但言東方則亦在東堂下也毼白也齊人或名全菹為芋縢縁也詩云竹柲緄縢案柲詩作閉布巾籩巾也籩豆具而有巾盛之也特牲饋食禮有籩巾今文蠃為蝸古文縢為甸釋曰細切為韲全物為菹長于四寸者亦切之喪菹葵雖長而不切故得芋名下記設棜于東堂下饌豆二即此東方之饌奠席在饌北斂席在其東鄭注大斂奠而有席彌神之掘肂見袵鄭注肂埋棺之坎也掘之于西階上袵小要也喪大記曰君殯用輴攢至于上畢塗屋大夫擯以幬欑置于西序塗不暨于棺士殯見袵塗上帷之又曰君葢用漆三袵三束大夫葢用漆二袵二束士葢不用漆二袵二束釋曰古者棺不釘鑿棺葢之際以袵連之其形兩端大而中小所謂小要也每袵上以皮束之見袵者袵出見于平地肂深淺之節也君擯居棺以輴車以木欑其四面至于棺上盡塗之如屋然大夫廢楯置棺西牆下覆以棺衣欑其三面欑中狹小裁使塗不及棺士掘地下棺以木覆上而塗之耳檀弓曰棺束縮二横三袵毎束一天子之殯也菆塗龍輴以椁加斧于椁上畢塗屋天子之禮也禮與君殯同惟輴車畫轅為龍欑木如椁加斧文以覆棺為異耳檀弓曰夏后氏殯于東階之上殷人殯于兩楹之間周人殯于西階之上棺入主人不哭升棺用軸葢在下鄭注軸輁軸也輁狀如牀軸其輪輓而行釋曰檀弓曰天子之棺四重水兕革棺被之其厚三寸杝棺一梓棺二喪大記曰君大棺八寸屬六寸椑四寸上大夫棺八寸屬六寸下大夫棺六寸屬四寸士棺六寸被猶合也杝棺椑也梓棺屬與大棺也上公棺四重革棺不被諸侯再重無革棺大夫一重無椑士不重惟有大棺耳熬黍稷各二筐有魚腊饌于西坫南鄭注熬所以惑蚍蜉令不至棺旁也為舉者設盆盥于西釋曰周官舍人喪紀共飯米熬穀陳三鼎于門外北上豚合升魚鱄鮒九腊左胖髀不升其他皆如初鄭注合升合左右體升于鼎其他皆如初謂豚體及匕俎之陳如小斂時合升四鬄亦相互耳釋曰凡言合升者皆并髀升體解則否凡腊用全此及虞禮用左胖者喪禮略周禮喪紀䱷人共其魚之鱻薧腊人共其脯腊燭俟于饌東鄭注燭燋也饌東方之饌有燭者堂雖明室猶闇火在地曰燎執之曰燭釋曰喪大記曰君堂上二燭下二燭大夫堂上一燭下二燭士堂上一燭下一燭祝徹盥于門外入升自阼階丈夫踊鄭注祝徹祝與有司當徹小斂之奠者小斂設盥于饌東有巾大斂設盥于門外彌有威儀釋曰盥當亦于饌奠後設之祝徹巾授執事者以待鄭注授執巾者于尸東使先待于阼階下為大斂奠又將巾之祝還徹醴也釋曰周禮大祝大喪徹奠徹饌案敖繼公云饌字誤當作奠先取醴酒北面鄭注北面立相待俱降其餘取先設者出于足降自西階婦人踊設于序西南當西榮如設于堂鄭注為求神于庭孝子不忍使其親須㬰無所馮依也堂謂尸東也凡奠設于序西南者畢事而去之釋曰畢事後奠事畢也不知神之所在故復設于庭以依之不巾不久設故也醴酒位如初執事豆北南面東上鄭注如初者如其醴酒北面西上也執醴尊不為便事變位釋曰下徹設大斂奠醴酒北面西上豆西面錯立于豆北南面籩俎既錯立于執豆之西東上酒錯復位醴錯于西與此同奠時執事俎北西上今變位東上便其東適饌也乃適饌鄭注東方之新饌帷堂鄭注徹事畢
