body:
  text: 儀禮集釋卷九宋李如圭撰大射儀第七鄭目録云名曰大射者諸侯將有祭祀之事與其羣臣射以觀其禮也案今注疏本脱也字據宋夲補數中者得與于祭不數中者不得與于祭大射儀于五禮屬嘉禮大戴此第十三小戴及别錄皆第七大射之儀君有命戒射鄭注將有祭祀之事當射宰告于君君乃命之言君有命政教宜由尊者宰戒百官有事于射者鄭注宰于天子冢宰治官卿也作大事則掌以君命戒于百官射人戒諸公卿大夫射司士戒士射與贊者鄭注射人掌以射法治射儀司士掌國中之士治凡其戒令皆司馬之屬也殊戒公卿大夫與士辨貴賤也贊佐也謂士佐執事不射者前射三日宰夫戒宰及司馬射人㝛視滌鄭注宰夫冢宰之屬掌百官之徵令者司馬于天子政官之卿凡大射則合其六耦滌謂溉器掃除射宫司馬命量人量侯道與所設乏以貍步大侯九十參七十干五十設乏各去其侯西十北十鄭注量人司馬之屬掌量道巷涂數者案涂今注疏本作塗據釋文作涂侯謂所射布也尊者射之以威不寧侯卑者射之以求爲侯量侯道謂去堂逺近也容謂之乏所以爲𫉬者之禦矢貍之伺物毎舉足者止視逺近爲𤼵必中也是以量侯道取象焉鄉射記曰侯道五十弓考工記曰弓之下制六尺則此貍步六尺明矣大侯熊侯謂之大者與天子熊侯同參讀爲糝糝雜也雜侯者豹鵠而麋飾下天子大夫也干讀爲豻豻侯者豻鵠豻飾也大夫將祭于己射麋侯士無臣祭不射遂命量人巾車張三侯大侯之崇見鵠于參參見鵠于干干不及地武不繫左下綱設乏西十北十凡乏用革鄭注巾車于天子宗伯之屬掌裝衣車者亦使張侯侯巾𩔖崇高也高必見鵠鵠所射之主射義曰為人君者以為君鵠為人臣者以為臣鵠為人父者以為父鵠為人子者以為子鵠言射中此乃能任己位也鵠之言較較直也射者所以直己志或曰鵠鳥名射之難中中之為俊是以所射于侯取名也淮南子曰鳱鵠知來然則所云正者正也亦鳥名齊魯之間名題肩為正正鵠皆鳥之㨗黠者考工記曰梓人為侯廣與崇方參分其廣而鵠居一焉則大侯之鵠方六尺糝侯之鵠方四尺六寸大半寸豻侯之鵠方三尺三寸少半寸及至也武迹也中人之足長尺二寸以豻侯計之糝侯去地一丈五寸少半寸大侯去地二丈二尺五寸少半寸凡侯北面西方謂之左前射三日張侯設乏欲使有事者豫志焉禦人㝛縣于阼階東笙磬西面其南笙鐘其南鑮皆南陳鄭注笙猶生也東為陽中萬物以生春秋𫝊曰太蔟所以金奏贊陽出滯姑洗所以脩絜百物考神納賓是以東方鐘磬謂之笙皆編而縣之周禮曰凡縣鐘磬半為堵全為肆有鐘有磬為全鑮如鐘而大奏樂以鼓鑮為節建鼓在阼階西南鼔應鼙在其東南鼓鄭注建猶樹也以木貫而載之樹之跗也南鼓謂所伐面也應鼙應朔鼙也先擊朔鼙應鼙應之鼙小鼓也在東便其先擊小後擊大也鼓不在東縣南為君也西階之西頌磬東面其南鐘其南鑮皆南陳一建鼓在其南東鼓朔鼙在其北鄭注言成功曰頌西為陰中萬物之所成春秋傳曰夷則所以詠歌九則平民無忒無射所以宣布哲人之令德示民軌義是以西方鐘磬謂之頌朔始也奏樂先擊西鼙樂為賓所由來也鐘不言頌鼙不言東鼓義同省文也古文頌為庸一建鼓在西階之東南面鄭注言面者國君于其羣臣備三面爾無鐘磬有鼓而巳其為諸侯則軒縣簜在建鼙之閒鄭注簜竹也謂笙簫之屬􅀝于堂鼗􅀝于頌磬西紘鄭注鼗如鼓而小有柄賓至摇之以奏樂也紘編磬繩也設鼗于磬西􅀝于紘也王制曰天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之厥明司宫尊于東楹之西兩方壺膳尊兩甒在南有豐幂用錫若絺綴諸箭蓋幂加勺又反之皆𤣥尊酒在北鄭注膳尊君尊也後陳之尊之也豐以承尊也說者以為若井鹿盧其為字從豆􅞱聲近似豆大而卑矣幂覆尊巾也錫細布也絺細葛也箭篠也為幂葢卷辟綴于篠横之也又反之為覆勺也皆𤣥尊二者皆有𤣥酒之尊重本也酒在北尊統于君南為上也惟君面尊言專惠也今文錫或作緆絺或作綌古文箭作晉尊士旅食于西鑮之南北面兩圜壺鄭注旅衆也士衆食未得正禄謂庶人在官者圜壺變于方也賤無𤣥酒又尊于大侯之之東北兩壺獻酒鄭注為𨽻僕人巾車糝侯豻侯之獲者獻讀為沙沙酒濁特泲之必摩沙者也兩壺皆沙酒郊特牲曰汁獻涗于醆酒服不之尊俟時而陳于南統于侯皆東面設洗于阼階東南罍水在東篚在洗西南陳設膳篚在其北西面鄭注或言南陳或言西面異其文也又設洗于獲者之尊西北水在洗北篚在南東陳鄭注亦統于侯也無爵因服不也有篚為奠虚爵也服不之洗亦俟時而陳于其南小臣設公席于阼階上西鄉司宫設賓席于户西南面有加席卿席賓東東上小卿賓西東上大夫繼而東上若有東面者則北上席工于西階之東東上諸公阼階西北面東上鄭注惟賓及公席布之也其餘樹之于位後耳小卿命于其君者也席于賓西射禮辨貴賤也諸公大國有孤卿一人與君論道亦不典職如公矣官􅄿鄭注百官各􅄿其所當共之物羮定鄭注烹肉熟也射義曰諸侯之射也必先行燕禮燕禮牲用狗射人告具于公公升即位于席西鄉小臣師納諸公卿大夫諸公卿大夫皆入門右北面東上士西方東面北上大史在干侯之東北案史今注疏本訛作夫據唐石經及宋本訂正北面東上士旅食者在士南北面東上小臣師從者在東堂下南面西上鄭注大史在干侯東北案史今注疏本亦訛作夫據宋本訂正士旅食者在士南為有侯入庭深也案入上今注疏本衍故字據宋本刪小臣師正之佐也正相君出入君之大命公降立于阼階之東南鄉小臣師詔揖諸公卿大夫諸公卿大夫西面北上揖大夫大夫皆少進鄭注詔告也變爾言揖亦以其入庭深也上言大夫誤衍耳大射正擯鄭注大射正射人之長擯者請賓公曰命某為賓鄭注某大夫名擯者命賓賓少進禮辭鄭注命賓者東面南顧辭辭以不敏反命鄭注以賓之辭告于君又命之賓再拜稽首受命鄭注又復擯者反命賓出立于門外北面公揖卿大夫升就席小臣自阼階下北面請執幂者與羞膳者鄭注請士可使執君兩甒之幂及羞脯醢庶羞于君者方圜壺獻無幂乃命執幂者執幂者升自西階立于尊南北面東上鄭注命者于西階前以公命命之東上執𤣥尊之幂為上羞膳者從而東由堂東升自北階立于房中西面南上不言命者不升堂略之膳宰請羞于諸公卿者鄭注膳宰請者異于君也擯者納賓賓及庭公降一等揖賓賓辟鄭注及至也辟逡遁不敢當盛公升即席鄭注以賓將與主人為禮不參之奏肆夏鄭注肆夏樂章名今亡吕叔玉云肆夏時邁也時邁者太平廵守祭山川之樂歌其詩曰明昭有周式序在位又曰我求懿徳肆于時夏奏此以延賓其著宣王德勸賢與周禮曰賓出入奏肆夏賓升自西階主人從之賓右北面至再拜賓荅再拜鄭注主人宰夫也又掌賓客之獻飲食君于臣雖為賓不親獻以其莫敢亢禮主人降洗洗南西北面鄭注賓將從降鄉之不于洗北辟正主賓降階西東面主人辭降賓對鄭注對荅主人北面盥坐取觚洗賓少進辭洗主人坐奠觚于篚興對賓反位鄭注賓少進者所辭異宜違其位也獻不用爵辟正主主人卒洗賓揖升案今注疏本作乃升唐石經及宋本無乃字鄭注賓每先升尊也案尊也今注疏本作揖之據宋本訂正主人升賓拜洗主人賓右奠觚荅拜降盥賓降主人辭降賓對卒盥賓揖升主人升坐取觚鄭注取觚將就瓦甒酌膳執幂者舉幂主人酌膳執幂者葢幂酌者加勺又反之鄭注反之覆勺筵前獻賓賓西階上拜受爵于筵前反位主人賓右拜送爵鄭注賓既拜于筵前受爵退復位宰胥薦脯醢鄭注宰胥宰官之吏也不使膳宰薦不主于飲酒變于燕賓升筵庶子設折俎鄭注庶子司馬之屬掌正六牲之體者也鄉射記曰賓俎脊脅肩肺不使膳宰設俎為射變于燕賓坐左執觚右祭脯醢奠爵于薦右興取肺坐絶祭嚌之興加于俎坐捝手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告旨執爵興主人荅拜鄭注降席席西也旨美也樂闋鄭注闋止也樂止者尊賓之禮盛于上也賓西階上北面坐卒爵興坐奠爵拜執爵興主人荅拜賓以虚爵降鄭注既卒爵將酢也主人降賓洗南西北面坐奠觚少進辭降主人西階西東面少進對賓坐取觚奠于篚下盥洗鄭注篚下篚南主人辭洗賓坐奠觚于篚興對卒洗及階揖升主人升拜洗如賓禮賓降盥主人降賓辭降卒盥揖升酌膳執幂如初以酢主人于西階上主人北面拜受爵賓主人之左拜送爵鄭注賓南面授爵乃于左拜凡授爵鄉所受者主人坐祭不啐酒鄭注辟正主也未薦者臣也不拜酒鄭注主人之義燕禮曰不拜酒不告㫖遂卒爵興坐奠爵拜執爵興賓荅拜主人不崇酒以虚爵降奠于篚鄭注不崇酒辟正主也案主今注疏本訛作君據宋本訂正崇充也謂謝酒惡相充實賓降立于西階西東面鄭注既受獻矣不敢安盛擯者以命升賓賓升立于西序東面鄭注命公命也東西牆謂之序主人盥洗象觚升酌膳東北面獻于公鄭注象觚觚有象骨飾者也案今注疏本脱者字據宋本補取象觚東面不言實之變于燕公拜受爵乃奏肆夏鄭注言乃者其節異于賓主人降自西階阼階下北面拜送爵宰胥薦脯醢由左房庶子設折俎升自西階鄭注自由也左房東房也人君左右房鄉射記曰主人俎脊脅臂肺也公祭如賓禮庶子贊授肺不拜酒立卒爵坐奠爵拜執爵興鄭注凡異者君尊變于賓主人荅拜樂闋升受爵降奠于篚更爵洗升酌散以降酢于阼階下北面坐奠爵再拜稽首公荅拜鄭注更易也易爵不敢襲至尊古文更為受主人坐祭遂卒爵興坐奠爵再拜稽首公荅拜主人奠爵于篚主人盥洗升媵觚于賓酌散西階上坐奠爵拜賓西階上北面荅拜鄭注媵送也散方壺之酒也古文媵皆作騰主人坐祭遂飲賓辭卒爵興坐奠爵拜執爵興賓荅拜鄭注辭者辭其代君行酒不立飲也比于正主酬也主人降洗賓降主人辭降賓辭洗卒洗賓揖升不拜洗鄭注不拜洗酬而禮殺也主人酌膳賓西階上拜受爵于筵前反位主人拜送爵賓升席坐祭酒遂奠于薦東鄭注遂者因坐而奠之不北面也奠之者酬不舉也主人降復位賓降筵西東南面立鄭注賓不立于序内位彌尊小臣自阼階下請媵爵者公命長鄭注命之使選于長幼之中也卿則尊士則卑小臣作下大夫二人媵爵鄭注作使媵爵者阼階下皆北面再拜稽首公荅拜鄭注再拜稽首拜君命媵爵者立于洗南西面北上序進盥洗角觶升自西階序進酌散交于楹北降適阼階下皆奠觶再拜稽首執觶興公荅拜鄭注序次第也猶代也先者既酌右還而反與後酌者交于西楹北相左俟于西階上乃降徃來以右為上古文曰降造阼階下媵爵者皆坐祭遂卒觶興坐奠觶再拜稽首執觶興公荅再拜媵爵者執觶待于洗南鄭注待待君命小臣請致者鄭注請君使一人與二人與不必君命若命皆致則序進奠觶于篚阼階下皆北面再拜稽首公荅拜媵爵者洗象觶升實之序進坐奠于薦南北上降適阼階下皆再拜稽首送觶公荅拜鄭注既酌而代進往來由尊北交于東楹北亦相左奠于薦南不敢必君舉媵爵者皆退反位鄭注反門右北面位公坐取大夫所媵觶興以酬賓賓降西階下再拜稽首小臣正辭賓升成拜鄭注公起酬賓于西階降尊以就卑也正長也小臣長辭變于燕升成拜復再拜稽首先時君辭之于禮若未成然公坐奠觶荅拜執觶興公卒觶賓下拜小臣正辭賓升再拜稽首鄭注不言成拜者為拜故下實未拜也下不輒拜禮殺也案今注疏本輒訛作就又脱殺字據宋本訂正下亦降也𤼵端言降拜因上事言下拜公坐奠觶荅拜執觶興賓進受虚觶降奠于篚易觶興洗鄭注賓進以臣道就君受虛爵君不親酌凡爵不相襲者于尊者言更自敵以下言易更作新易有故之辭也不言公酬賓于西階上及公反位者尊君空其文也公有命則不易不洗反升酌膳下拜小臣正辭賓升再拜稽首公荅拜鄭注不易君義也不洗臣禮也賓告于擯者請旅諸臣擯者告于公公許鄭注旅序也實欲以次序勸諸臣酒賓以旅大夫于西階上擯者作大夫長升受旅鄭注作使也使之以長幼之次先孤卿後大夫賓大夫之右坐奠觶拜執觶興大夫荅拜鄭注賓在右相飲之位賓坐祭立卒觶不拜鄭注酬而禮殺若膳觶也則降更觶洗升實散大夫拜受賓拜送遂就席鄭注言更觶尊卿尊卿則賓禮殺大夫辯受酬如受賓酬之禮不祭酒卒受者以虚觶降奠于篚復位鄭注卒猶已也今文辯作徧主人洗觚升實散獻卿于西階上鄭注酬賓而後獻卿飲酒禮成于酬司宫兼卷重席設于賓左東上鄭注言兼卷則每卿異席重席蒲筵緇布純席卿言東上案席卿今注疏本作卿席從宋本改統于君席自房來卿升拜受觚主人拜送觚卿辭重席司宫徹之鄭注徹猶去也重席雖非加猶為其重累辭之辟君乃薦脯醢卿升席庶子設折俎鄭注卿折俎未聞葢用脊脅臑折肺卿有俎者射禮尊卿坐左執爵右祭脯醢奠爵于薦右興取肺坐絶祭不嚌肺興加于俎坐挩手取爵遂祭酒執爵興降席西階上北面坐卒爵興坐奠爵拜執爵興鄭注陳酒肴君之惠也不嚌啐事在射臣之意案啐以下七字今注疏本訛作肺亦自貶于君六字從宋本訂正主人荅拜受爵卿降復位鄭注復西面位不酢辟君辯獻卿主人以虚爵降奠于篚擯者升卿卿皆升就席若有諸公則先卿獻之如獻卿之禮席于阼階西北面東上無加席鄭注公孤也席之北面為大尊屈之也亦因阼階上近君近君則親寵茍敬私昵之坐小臣又請媵爵者二大夫媵爵如初請致者若命長致則媵爵者奠觶于篚鄭注命長致者使長者一人致也公或時未能舉自優暇一人待于洗南鄭注不致者長致者阼階下再拜稽首公荅拜鄭注再拜稽首拜君命洗象觶升實之坐奠于薦南降與立于洗南者二人案二人今注疏本訛作三人從宋本訂正皆再拜稽首送觶公荅拜鄭注奠于薦南先媵者上觶之處也二人皆拜如初共勸君飲之公又行一爵若賓若長惟公所賜鄭注一爵先媵者之下觶也若賓若長禮殺也長孤卿之尊者也于是言賜射禮明尊卑以旅于西階上如初鄭注賜賓則以酬長賜長則以酬賓大夫長升受旅以辯大夫卒受者以虛觶降奠于篚主人洗觚升獻大夫于西階上大夫升拜受觚主人拜送觚大夫坐祭立卒爵不拜既爵主人受爵大夫降復位鄭注既盡也大夫卒爵不拜賤不備禮胥薦主人于洗北西面脯醢無脀鄭注胥宰官之吏主人下大夫也先大夫薦之尊之也不薦于上辟正主脀俎實辯獻大夫遂薦之繼賓以西東上若有東面者則北上卒擯者升大夫大夫皆升就席鄭注辯獻乃薦略賤也亦獻後布席也乃席工于西階上少東小臣納工工六人四瑟鄭注工謂瞽矇善歌諷誦詩者也六人大師少師各一人上工四人四瑟者禮大樂衆也僕人正徒相太師僕人師相少師僕人士相上工鄭注徒空手也正僕人之長師其佐也士其吏也天子視瞭相工諸侯兼官是以僕人掌之大師少師工之長也凡國之瞽矇正焉杜蒯曰曠也大師也于是分别工及相者射禮明貴賤相者皆左何瑟後首内弦挎越右手相鄭注謂相上工者後首主于射略于此樂案今注疏本作略于樂也從宋本改内弦挎越以右手相工由便也越瑟下孔所以發越其聲者也古文後首爲後手後者徒相入鄭注謂相大師少師者也上列官之尊卑此言先後之位亦所以明貴賤凡相者以工出入小樂正從之鄭注從大師也後升者變于燕也小樂正于天子樂師也升自西階北面東上鄭注工六人坐授瑟乃降鄭注相者也降立于西縣之北小樂正立于西階東鄭注不統于工明工雖衆位猶在此乃歌鹿鳴三終鄭注鹿鳴小雅篇也人君與臣下及四方之賓燕講道脩政之樂歌也言己有旨酒以召嘉賓與之飲者樂嘉賓之來示我以善道又樂嘉賓有孔昭之明德可則傚也歌鹿鳴三終而不歌四牡皇皇者華主于講道略于勞苦與諮事主人洗升實爵獻工工不興左瑟鄭注工歌而獻之以事報之也洗爵獻工辟正主也獻不用觚工賤異之也工不興不能備禮左瑟便其右大師無瑟于是言左瑟者節也一人拜受爵鄭注謂大師也言一人者工賤同之也工拜于席主人西階上拜送爵薦脯醢鄭注輒薦之變于大夫使人相祭鄭注使人相者相其祭薦祭酒卒爵不拜主人受虛爵衆工不拜受爵坐祭遂卒爵辯有脯醢不祭鄭注相者相其祭酒而已主人受爵降奠于篚復位大師及少師上工皆降立于鼓北羣工陪于後鄭注鼓北西縣之北也言鼓北者與鼓齊面餘長在後也羣工陪于後三人爲列也于是時小樂正亦降立于其南北面工立僕人立于其側坐則在後考工記曰鼔人爲臯陶長六尺有六寸乃管新宫三終鄭注管謂吹簜以播新宫之樂其篇亡其義未聞笙從工而入既管不獻略下樂也立于東縣之中卒管大師及少師上工皆東坫之東南西面北上坐鄭注不言縣北統于堂也于是時大樂正還北面立于其南擯者自阼階下請立司正鄭注三爵既備上下樂作君將留羣臣而射宜更立司正以監之察儀法也公許擯者遂爲司正鄭注君許其請因命用之不易之者俱相禮其事同也司正適洗洗角觶南面坐奠于中庭鄭注奠觶者著其位以顯其事威儀多也升東楹之東受命于公西階上北面命賓諸公卿大夫公曰以我安賓諸公卿大夫皆對曰諾敢不安鄭注以我安者君意殷勤欲留之以我故安也司正降自西階南面坐取觶升酌散降南面坐奠觶鄭注奠于中庭故處案處今注疏本訛作也據宋本改正興右還北面少立坐取觶興坐不祭卒觶奠之興再拜稽首左還南面坐取觶洗南面反奠于其所北面立鄭注皆所以自昭明于衆也將于觶南北面則右還于觶北南面則左還如是得從觶西往來也必從觶西往來者爲君在阼不背之也司射適次袒決遂執弓挾乗矢于弓外見鏃于弣右巨指鉤弦鄭注司射射人也次若今時更衣處張幃席爲之案張今注疏本訛作帳據宋本改正耦次在洗東南袒左免衣也決猶闓也以象骨爲之著右巨指所以鉤弦而闓之遂射韝也以朱韋爲之著左臂所以遂弦也方持弦矢曰挾乗矢四矢弣弓把也見鏃焉順其射也右巨指右手大擘以鉤弦弦在旁挾由便也古文挾皆作接自阼階前曰爲政請射鄭注爲政謂司馬也司馬政官主射禮遂告曰大夫與大夫士御於大夫鄭注因告𨕖三耦于君御猶侍也大夫與大夫爲耦不足則士侍于大夫與爲耦也今文於爲于遂適西階前東面右顧命有司納射器鄭注納内也射器皆入君之弓矢適東堂賓之弓矢與中籌豐皆止于西堂下衆弓矢不挾總衆弓矢楅皆適次而俟鄭注中閭中算器也籌算也豐可奠射爵者衆弓矢三耦及卿大夫以下弓矢也司射亦止西堂下衆弓矢不挾則納公與賓弓矢者挾之楅承矢器今文俟作待工人士與梓人升自北階兩楹之間疏數容弓若丹若墨度尺而午射正莅之案莅今注疏本作涖據唐石經及宋本改鄭注工人士梓人皆司空之屬能正方圜者一從一横曰午謂畫物也射正司射之長卒畫自北階下司宫埽所畫物自北階下鄭注埽物重射事也工人士梓人司宫位在北堂下太史俟于所設中之西東面以聽政鄭注中未設也大史俟焉將有事也鄉射禮曰設中南當楅西當西序東面司射西面誓之曰公射大侯大夫射參士射干射者非其侯中之不獲卑者與尊者爲耦不異侯太史許諾鄭注誓猶告也古文異作辭遂比三耦鄭注比𨕖次之也不言面者大夫在門右北面士西方東面三耦俟于次北西面北上鄭注未知其耦今文俟爲立司射命上射曰某御于子命下射曰子與某子射卒遂命三耦取弓矢于次鄭注取弓矢不拾者次中隱蔽處司射入于次搢三挾一个出于次西面揖當階北面揖及階揖升堂揖當物北面揖及物揖由下物少退誘射鄭注搢㨗也挾一个挾于弦也个猶枚也由下物而少退謙也誘猶敎也夫子循循然善誘人射三侯將乗矢始射干乂射參大侯再發鄭注將行也行四矢象有事于四方詩云四矢反兮以御亂兮卒射北面揖鄭注揖于當物之處不南面者為不背卿及階揖降如升射之儀遂適堂西改取一个挾之鄭注改更也不射而挾矢示有事也遂取扑搢之以立于所設中之西南東面鄭注扑所以撻犯教者也于是言立著其位也鄉射記曰司射之弓矢與扑􅀝于西階之西司馬師命負侯者執旌以負侯鄭注司馬師正之佐也欲令射者見侯與旌深志于侯中也負侯獲者也天子服不氏下士一人徒四人掌以旌居乏待獲析羽爲旌負侯者皆適侯執旌負侯而俟司射適次作上耦射鄭注作使也司射反位上耦出次西面揖進上射在左竝行當階北面揖及階揖上射先升三等下射從之中等鄭注上射在左便射位也中猶間也上射升堂少左下射升上射揖竝行鄭注竝併也併東行皆當其物北面揖及物揖皆左足履物還視侯中合足而俟鄭注視侯中各視其侯之中大夫耦則視參中參中十四尺士耦則視干中干中十尺司馬正適次袒決遂執弓右挾之出升自西階適下物立于物閒左執弣右執簫南揚弓命去侯鄭注司馬正政官之屬簫弓末揚弓者執下末揚猶舉也適下物由上射後東過也命去侯者將射當獲也鄉射禮曰西南面立于物閒負侯皆許諾以宫趨直西及乏南又諾以商至乏聲止鄭注宫爲君商爲臣其聲和相生也郷射禮曰獲者執旌許諾古文聲爲磬授獲者退立于西方獲者興共而俟鄭注大侯服不氏負侯徒一人居乏相代而獲參侯干侯徒負侯居乏不相代鄉射禮曰獲者執旌許諾聲不絶以至于乏坐東面偃旌興而俟古文獲皆作護非也司馬正出于下射之南還其後降自西階遂適次釋弓說決拾襲反位鄭注拾遂也鄉射禮曰司馬反位立于司射之南司射進與司馬正交于階前相左由堂下西階之東北面視上射命曰毋射獲毋獵獲上射揖司射退反位鄭注射獲矢中乏也從旁爲獵乃射上射既發挾矢而后下射射拾發以將乗矢鄭注拾更也將行也獲者坐而獲鄭注坐言獲也舉旌以宫偃旌以商鄭注再言獲也案再今注疏本作等據宋木改正獲而未釋獲鄭注但言獲未釋算古文釋爲舎卒射右挾之北面揖揖如升射鄭注右挾之右手挾弦上射降三等下射少右從之中等竝行上射于左與升射者相左交于階前相揖適次釋弓說決拾襲反位鄭注上射于左由下射階上少右乃降待之言襲者凡射皆袒三耦卒射亦如之司射去扑􅀝于階西適阼階下北面告于公曰三耦卒射反搢扑反位司馬正袒決遂執弓右挾之出與司射交于階前相左鄭注出出于次也袒時亦適次升自西階自右物之後立于物閒西南面揖弓命取矢鄭注揖推之負侯許諾如初去侯皆執旌以負其侯而俟鄭注俟小臣取矢以旌指教之司馬正降自西階北面命設楅鄭注此出于下射之南還其後而降之小臣師設楅司馬正東面以弓爲畢鄭注畢所以敎助執事者鄉射記曰乃設幅于中庭南當洗東肆既設楅司馬正適次釋弓說決拾襲反位小臣坐委矢于楅北括司馬師坐乗之鄭注乗四四數之卒案今注疏本脫此字據唐石經及宋本補若矢不備則司馬正又袒執弓升命取矢如初曰取矢不索乃復求矢加于楅卒司馬正進坐左右撫之興反位鄭注左右撫分上下射此坐皆北面
