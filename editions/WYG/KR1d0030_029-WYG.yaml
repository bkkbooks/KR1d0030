body:
  text: 儀禮集釋卷二十九宋李如圭撰有司徹第十七鄭目録云少牢之下篇也上大夫既祭儐尸于堂之禮若下大夫祭畢禮尸于室中無别行儐尸于堂之事天子諸侯之祭眀日而繹有司徹于五禮屬吉禮案今注疏本脫禮字大戴第九小戴第十二别録少牢下篇第十七有司徹鄭注徹室中之饋及祝佐食之俎卿大夫既祭而儐尸禮崇也儐尸則不設饌西北隅以此薦俎之陳有祭象而亦足以厭飫神天子諸侯明日祭于祊而繹春秋傳曰辛巳有事于大庿仲遂卒于垂壬午猶繹是也爾雅曰繹又祭也埽堂鄭注為儐尸新之少儀曰汎埽曰埽埽席前曰拚司宫攝酒鄭注更洗益整頓之今文攝為聶乃燅尸俎鄭注燅溫也溫尸俎于爨肵亦溫焉獨言溫尸俎則祝與佐食不與儐尸之禮古文燅皆作尋記或作燖春秋傳曰若可燖也亦可寒也釋曰燅說文曰于湯中爚肉也尸俎神俎也尸所舉肩骼加于肵者下皆復載于俎知肵俎亦燅卒燅乃升羊豕魚三鼎無腊與膚乃設扃鼏陳鼎于門外如初鄭注腊為庶羞膚從豕去其鼎者儐尸之禮殺于初如初者如庿門之外東方北面北上今文扃為鉉古文鼏為宻乃議侑于賓以異姓鄭注議猶擇也擇賓之賢者可以侑尸必用異姓廣敬也是時主人及賓有司已復内位古文侑皆作宥宗人戒侑鄭注戒猶告也南面告于其位戒曰請子為侑侑出俟于庿門之外鄭注俟待也待于外當與尸更入主人興禮事尸極敬心也司宫筵于戸西南面鄭注為尸席也又筵于西序東面鄭注為侑席也釋曰尸侑席位與鄉飲酒賓介之位同尸與侑北面于庿門之外西上鄭注言與殊尊卑北面者賓尸而尸益卑西上統于賓客主人出迎尸宗人擯鄭注賓客尸而迎之主人益尊擯贊釋曰鄉者祝擯尸神象今宗人擯賓尸也主人拜尸荅拜主人又拜侑侑荅拜主人揖先入門右鄭注道尸尸入門左侑從亦左揖乃讓鄭注沒霤相揖至階又讓釋曰沒霤至門内霤主人先升自阼階尸侑升自西階西楹西北面東上鄭注東上統于其席釋曰異于門外西上也户西之席東上侑席亦西于尸席主人東楹東北面拜至尸荅拜主人又拜侑侑荅拜鄭注拜至喜之乃舉鄭注舉舉鼎也舉者不盥殺也司馬舉羊鼎司士舉豕鼎舉魚鼎以入陳鼎如初鄭注如初如阼階下西面北上雍正執一匕以從雍府執二匕以從司士合執二俎以從司士贊者亦合執二俎以從匕皆加于鼎東枋二俎設于羊鼎西西縮二俎皆設于二鼎西亦西縮鄭注雍正羣吏掌辨體名肉物者府其屬凡三匕鼎一匕四俎為尸侑主人主婦其二俎設于豕鼎魚鼎之西陳之宜具也古文縮皆為蹙釋曰四俎皆載羊體之正俎而分陳二鼎西者欲使鼎具有俎雍人合執二俎陳于羊俎西竝皆西縮覆二疏匕于其上皆縮俎西枋鄭注竝併也其南俎司馬以羞羊匕湇羊肉湇其北俎司士以羞豕匕湇豕肉湇豕脀湇魚疏匕匕柄有刻飾者古文竝皆作併釋曰二俎上有匕知以羞匕湇既則以羞羊肉湇豕脀下經羊肉湇載于南俎匕湇皆次賔羞之侑魚湇司馬羞之而槩云司馬司士者因司馬刲羊司士擊豕而統言之疏者疏通刻飾之名明堂有疏屏豕肉湇三字衍即豕脀也主人降受宰几尸侑降主人辭尸對鄭注几所以坐安體周禮大宰掌贊玉几玉爵宰授几主人受二手横執几揖尸鄭注獨揖尸几禮主于尸主人升尸侑升復位鄭注位阼階賓階上位主人西面左手執几縮之以右袂推拂几三二手横執几進授尸于筵前鄭注衣袖謂之袂案此下今注疏本有拂者外拂之也六字推拂去塵示新尸進二手受于手閒鄭注受從手閒謙也主人退尸還几縮之右手執外廉北面奠于筵上左之南縮不坐鄭注左之者異于鬼神生人陽長左鬼神隂長右不坐奠之者几輕主人東楹東北面拜鄭注拜送几也尸復位尸與侑皆北面荅拜鄭注侑拜者從于尸主人降洗尸侑降尸辭洗主人對卒洗揖主人升尸侑升尸西楹西北面拜洗主人東楹東北面奠爵荅拜降盥尸侑降主人辭尸對卒盥主人揖升尸侑升主人坐取爵酌獻尸尸北面拜受爵主人東楹東北面拜送爵鄭注降盥者為土汚手不可酌主婦自東房薦韭菹醢坐奠于筵前菹在西方婦贊者執昌菹醢以授主婦主婦不興受陪設于南昌在東方興取籩于房麷蕡坐設于豆西當外列麷在東方婦贊者執白黑以授主婦主婦不興受設于初籩之南白在西方興退鄭注昌昌本也韭菹醓醢昌本麋臡麷熬麥也蕡熬枲實也白熬稻黑熬黍此皆朝事之豆籩大夫無朝事而用之儐尸亦豐大夫之禮主婦取籩興者以饌異親之當外列辟鉶也退退入房也釋曰先獻後薦異于祭也陪設重列之也籩人掌朝事之籩其實麷蕡白黑醢人掌朝事之豆其實韭菹醓醢昌本麋臡凡無骨為醢有骨為臡當外列麷在昌菹西韭菹西以俟亞獻設鉶乃升鄭注升牲體于俎也司馬朼羊亦司馬載載右體肩臂肫骼臑正脊一脡脊一横脊一短脅一正脅一代脅一腸一胃一祭肺一載於一俎鄭注言燅尸俎復序體者明所舉肩骼存焉亦著脊脅皆一骨也臑在下者折分之以為肉湇貶也案貶今注疏本訛作俎一俎謂司士所設羊鼎西第一俎釋曰此尸之羊正俎也復肩骼于俎與正祭神俎同其異者脊脅腸胃祭肺皆一又無舉肺且折分其臑故降臑在骼下第一俎謂羊鼎西之南俎羊肉湇俎在豕俎之南知尸俎亦在侑俎南羊肉湇臑折正脊一正脅一腸一胃一嚌肺一載于南俎鄭注肉湇肉在汁中者以増俎實為尸加也必為臑折上所折分者嚌肺離肺也南俎雍人所設在南者此以下十一俎俟時而載于此厯說之爾今文湇為汁釋曰此羊加俎也以肉初在湇中故異其名曰羊肉湇臑折折分正俎之臑也凡祭肺切之嚌肺離之祭肺祭而不嚌嚌肺嚌而亦祭祭肺尊故加俎用嚌肺祭肺又名切肺刌肺嚌肺又名離肺舉肺南俎羊俎西之南俎尸羊俎以下凡十二俎其四俎尸侑主人主婦之正俎餘八俎以雍人所設二俎徃還載之司士朼豕亦司士載亦右體肩臂肫骼臑正脊一脡脊一横脊一短脅一正脅一代脅一膚五嚌肺一載于一俎鄭注臑在下者順羊也俎謂雍人所設在北者釋曰此豕脀也豕無正俎不折臑臑亦在下順上文也侑俎羊左肩左肫正脊一脅一腸一胃一切肺一載于一俎侑俎豕左肩折正脊一脅一膚三切肺一載于一俎鄭注侑俎用左體侑賤其羊俎過三體有肫尊之加也豕左肩折折分為長兄弟俎也切肺亦祭肺互言之爾無羊湇下尸也豕又祭肺不嚌肺不備禮俎司士所設羊鼎西之北俎也豕俎與尸同釋曰體數奇而侑羊俎四體尊侑而加肫也羊正俎用祭肺豕加俎當用嚌肺此豕俎與尸同用雍人羊俎西之北俎阼俎羊肺一祭肺一載于一俎羊肉湇臂一脊一脅一腸一胃一嚌肺一載于一俎豕脀臂一脊一脅一膚三嚌肺一載于一俎鄭注阼俎主人俎無體逺下尸也以肺代之肺尊也加羊肉湇而有體崇尸惠亦尊主人臂左臂也侑用肩主人用臂下之也不言左臂者大夫尊空其文也降于侑羊體一而増豕膚三有所屈有所申亦所謂順而摭也阼俎司士所設豕鼎西俎也其湇俎與尸俎同豕俎又與尸豕俎同釋曰侑無羊肉湇尸酢主人而有之三體降于侑羊俎一為屈膚三増于主婦俎二則申摭之石反猶拾也拾取上禮用之主婦俎羊左臑脊一脅一腸一胃一膚一嚌羊肺一載于一俎鄭注無豕體而有膚以主人無羊體不敢備也無祭肺有嚌肺亦下侑也祭肺尊言嚌羊肺者文承膚下嫌也膚在羊肺上則羊豕之體名同相亞也其俎司士所設在魚鼎西者釋曰豕之膚猶羊之腸胃故膚次腸胃下羊肺上言羊肺嫌是豕肺嚌肺同于侑司士朼魚亦司士載尸俎五魚横載之侑主人皆一魚亦横載之皆加膴祭于其上鄭注横載之者異于牲體彌變于神膴讀如殷冔之冔刳魚時割其腹以為大臠也可用祭也其俎又與尸豕俎同釋曰食生薦神魚俎縮俎右首此横于俎則進其尾也少儀曰羞濡魚者進尾冬右膄夏右鰭祭膴濡魚此所謂魚湇冔或呼孤反覆也卒升鄭注卒已也已載尸羊俎賓長設羊俎于豆南賓降尸升筵自西方坐左執爵右取韭菹㨎于三豆祭于豆間尸取麷蕡宰夫贊者取白黑以授尸尸受兼祭于豆祭鄭注賓長上賓雍人授次賓疏匕與俎受于鼎西左手執俎左廉縮之卻右手執匕枋縮于俎上以東面受于羊鼎之西司馬在羊鼎之東二手執挑匕枋以挹湇注于疏匕若是者三鄭注挑謂之歃讀如或舂或抌之抌字或作挑者秦人語也此二匕者皆有淺升狀如飯操挑長枋可以抒物于器中者注猶寫也案寫今注疏本作瀉今文挑作抌挹皆為扱尸興左執爵右取肺坐祭之祭酒興左執爵鄭注肺羊祭肺次賓縮執匕俎以升若是以授尸尸卻手受匕枋坐祭嚌之興覆手以授賓賓亦覆手以受縮匕于俎上以降鄭注嚌湇者明湇肉加耳嘗之以其汁尚味釋曰此匕湇也匕湇無肉肉湇無汁匕湇羊豕皆有之豕不曰肉湇而曰豕脀曰肉湇者言肉初在湇中曰脀者明在俎時無汁羊豕互文也魚無匕湇言湇魚者明魚在湇耳俎降以俟羞羊肉湇尸席末坐啐酒興坐奠爵拜告旨執爵以興主人北面于東楹東荅拜鄭注旨美也拜告酒美荅主人意古文曰東楹之東司馬羞羊肉湇縮執俎尸坐奠爵興取肺坐絶祭嚌之興反加于俎司馬縮奠俎于羊湇俎南乃載于羊俎卒載俎縮執以降案各本作縮執俎以降唐石經無俎字鄭注絶祭絶肺末以祭周禮曰絶祭湇使次賓肉使司馬大夫禮多崇敬也釋曰正俎皆横執于席前横設之加俎皆縮執于席前縮奠之羊湇俎湇字衍下尸酢主人司馬縮奠湇俎于羊俎西尸坐執爵以興次賓羞羊燔縮執俎縮一燔于俎上鹽在右尸左執爵受燔㨎于鹽坐振祭嚌之興加于羊俎賓縮執俎以降鄭注燔炙釋曰羞羊燔亦當以羊肉湇之俎鄭不言或者曰有俎與當考主人獻尸之從獻五籩豆一俎二羊匕湇三羊肉湇四羊燔五侑降于尸無羊湇羊肉湇主人受酢從獻與尸同五主婦與侑同三尊卑之羞也尸降筵北面于西楹西坐卒爵執爵以興坐奠爵拜執爵以興主人北面于東楹東荅拜主人受爵尸升筵立于筵末主人酌獻侑侑西楹西北面拜受爵主人在其右北面荅拜鄭注不洗者俱獻間無事也主人就右者賤不專階釋曰獻間無他酢酬故不洗也若爵自卑者來獻尊者則否主婦薦韭菹醢坐奠于筵前醢在南方婦贊者執二籩麷蕡以授主婦主婦不興受之奠麷于醢南蕡在麷東主婦入于房鄭注醢在南方者立侑為尸使正饌統焉侑升筵自北方司馬横執羊俎以升設于豆東侑坐左執爵右取菹㨎于醢祭于豆間又取麷蕡同祭于豆祭興左執爵右取肺坐祭之祭酒興左執爵次賓羞羊燔如尸禮侑降筵自北方北面于西楹西坐卒爵執爵以興坐奠爵拜主人荅拜鄭注荅拜拜于侑之右釋曰侑與主婦無羊肉湇故羊俎皆司馬設之尸受侑爵降洗侑降立于西階西東面主人降自阼階辭洗尸坐奠爵于篚興對卒洗主人升尸升自西階主人拜洗尸北面于西楹西坐奠爵荅拜降盥主人降尸辭主人對卒盥主人升尸升坐取爵酌鄭注酌者將酢主人司宫設席于東序西面主人東楹東北面拜受爵尸西楹西北面荅拜主婦薦韭菹醢坐奠于筵前菹在北方婦贊者執二籩麷蕡主婦不興受設麷于菹西北蕡在麷西主人升筵自北方主婦入于房鄭注設籩于菹西北亦辟鉶今文無二籩案今注疏本脫此五字釋曰菹北當設籩豆于鉶西設籩長室設羊俎于豆西主人坐左執爵祭豆籩如侑之祭興左執爵右取肺坐祭之祭酒興次賓羞匕湇如尸禮席末坐啐酒執爵以興司馬羞羊肉湇縮執俎主人坐奠爵于左興受肺坐絶祭嚌之興反加于湇俎司馬縮奠湇俎于羊俎西乃載之卒載縮執虛俎以降鄭注奠爵于左者神惠變于常也言受肺者明有授言虛俎者羊湇俎訖于此虛不復用釋曰神惠右不舉變于飲酒也賈氏曰羊俎西之南俎不復用則羞羊燔用北之豕俎主人坐取爵以興次賓羞燔主人受如尸禮主人降筵自北方北面于阼階上坐卒爵執爵以興坐奠爵拜執爵以興尸西楹西荅拜主人坐奠爵于東序南鄭注不降奠爵于篚急崇酒侑升尸侑皆北面于西楹西鄭注見主人不及位知將與己為禮主人北面于東楹東再拜崇酒鄭注崇充也拜謝尸侑以酒薄充满尸侑皆荅再拜主人及尸侑皆升就筵司宫取爵于篚以授婦贊者于房東以授主婦鄭注房東房户外之東主婦洗于房中案今注疏本作洗爵于房中唐石經亦無爵字出實爵尊南西面拜獻尸尸拜于筵上受鄭注尊南西面拜由便也主婦西面于主人之席北拜送爵入于房取一羊鉶坐奠于韭菹西婦贊者執豕鉶以從主婦不興受設于羊鉶之西興入于房取糗與腶脩執以出坐設之糗在蕡西脩在白西興立于主人席北西面鄭注飲酒而有鉶者祭之餘鉶無黍稷殺也糗糗餌也腶脩擣肉之脯今文腶為斷尸坐左執爵祭糗脩同祭于豆祭以羊鉶之柶挹羊鉶遂以挹豕鉶祭于豆祭祭酒次賓羞豕匕湇如羊匕湇之禮尸坐啐酒左執爵嘗上鉶執爵以興坐奠爵拜主婦荅拜執爵以興司士羞豕脀尸坐奠爵興受如羊肉湇之禮坐取爵興次賓羞豕燔尸左執爵受燔如羊燔之禮坐卒爵拜主婦荅拜受爵酌獻侑侑拜受爵主婦主人之北西面荅拜鄭注酌獻者主婦今文無西面釋曰亞獻之從獻五鉶一糗脩二豕匕湇三豕脀四豕燔五侑無鉶與豕匕湇主人與尸同五主婦羞糗脩坐奠糗于麷南脩在蕡南侑坐左執爵取糗脩兼祭于豆祭司士縮執豕脀以升侑興取肺坐祭之司士縮奠豕脀于羊俎之東載于羊俎卒乃縮執俎以降侑興鄭注豕脀無湇于侑禮殺次賓羞豕燔侑受如尸禮坐卒爵拜主婦荅拜受爵酌以致于主人主人筵上拜受爵主婦北面于阼階上荅拜鄭注主婦易位拜于阼階上辟併敬主婦設二鉶與糗脩如尸禮主人共祭糗脩祭鉶祭酒受豕匕湇拜啐酒皆如尸禮嘗鉶不拜鄭注主人如尸禮尊也其異者不告旨釋曰尸啐酒不拜而云拜啐酒如尸禮者特牲少牢饋食禮尸嘗鉶不拜則此尸嘗鉶拜仍為啐酒也或拜字衍其受豕脀受豕燔亦如尸禮坐卒爵拜主婦北面荅拜受爵尸降筵受主婦爵以降鄭注將酢主婦主人降侑降主婦入于房主人立于洗東北西面侑東面于西階西南鄭注俟尸洗尸易爵于篚盥洗爵鄭注易爵者男女不相襲爵主人揖尸侑鄭注將升主人升尸升自西階侑從主人北面立于東楹東侑西楹西北面立鄭注俟尸酌尸酌主婦出于房西面拜受爵尸北面于侑東荅拜主婦入于房司宫設席于房中南面主婦立于席西鄭注設席者主婦尊今文曰南面立于席西婦贊者薦韭菹醢坐奠于筵前菹在西方婦人贊者執麷蕡以授婦贊者婦贊者不興受設麷于菹西蕡在麷南鄭注婦人贊者宗婦之少者主婦升筵司馬設羊俎于豆南主婦坐左執爵右取菹㨎于醢祭于豆間又取麷蕡兼祭于豆祭主婦奠爵興取肺坐絶祭嚌之興加于俎坐挩手祭酒啐酒鄭注挩手者于帨帨佩巾内則曰婦人亦左佩紛帨古文挩作說釋曰主婦羊俎嚌肺不祭肺故絶祭挩手次賓羞羊燔主婦興受燔如主人之禮主婦執爵以出于房西面于主人席北立卒爵執爵拜尸西楹西北面荅拜主婦入立于房尸主人及侑皆就筵鄭注出房立卒爵宜鄉尊不坐者變于主人也執爵拜變于男子也上賓洗爵以升酌獻尸尸拜受爵賓西楹西北面拜送爵尸奠爵于薦左賓降鄭注上賓賓長也謂之上賓以將獻異之或謂之長賓奠爵爵止也釋曰奠于薦左尸後舉之神惠右不舉主人降洗觶案觶今注疏本作爵下兩實觶同唐石經亦竝作觶尸侑降主人奠爵于篚辭尸對卒洗揖尸升侑不升鄭注侑不升尸禮益殺不從主人實觶酬尸東楹東北面坐奠爵拜尸西楹西北面荅拜坐祭遂飲卒爵拜尸荅拜降洗尸降辭主人奠爵于篚對卒洗主人升尸升主人實觶尸拜受爵主人反位荅拜尸北面坐奠爵于薦左鄭注降洗者主人釋曰奠于薦左者奠酬不舉也神惠右不舉而此左不舉者賓尸而酬之同于賓客異于神惠尸侑主人皆升筵乃羞宰夫羞房中之羞于尸侑主人主婦皆右之司士羞庶羞于尸侑主人主婦皆左之鄭注二羞所以盡歡心房中之羞其籩則糗餌粉餈其豆則酏食糝食庶羞羊臐豕膮皆有胾醢房中之羞内羞也内羞在右隂也庶差在左陽也釋曰内羞穀物庶羞牲物内羞周禮曰羞籩羞豆膮許堯反主人降南面拜衆賓于門東三拜衆賓門東北面皆荅壹拜鄭注拜于門東明少南就之也言三拜者衆賓賤旅之也衆賓壹拜賤也卿大夫尊賓賤純臣也位在門東古文壹為一釋曰特牲饋食禮記私臣門東北面主人洗爵長賓辭主人奠爵于篚興對卒洗升酌獻賓于西階上長賓升拜受爵主人在其右北面荅拜宰夫自東房薦脯醢醢在西司士設俎于豆北羊骼一腸一胃一切肺一膚一鄭注羊骼羊左骼上賓一體賤也薦與設俎者既則俟于西序端古文骼為胳釋曰俟俟執薦俎從賓降鄉飲酒司正升相旅退立于序端賓坐左執爵右取脯㨎于醢祭之執爵興取肺坐祭之祭酒遂飲卒爵執爵以興案各本脫爵字據唐石經補坐奠爵拜執爵以興主人荅拜受爵賓坐取祭以降西面坐委于西階西南鄭注成祭于上尊賓也取祭以降反下位也反下位而在西階西南已獻尊之祭脯肺釋曰賓自門東而位西階西南猶燕禮士卒于西方已獻而位于東方也衆賓以下則已獻而設薦俎于其位宰夫執薦以從設于祭東司士執俎以從設于薦東衆賓長升拜受爵主人荅拜坐祭立飲卒爵不拜既爵鄭注既盡也長賓升者以次第升受獻言衆賓長拜則其餘不拜宰夫贊主人酌若是以辯鄭注主人每獻一人奠空爵于棜宰夫酌授于尊南今文若為如辯皆為徧辯受爵其薦脯醢與脀設于其位其位繼上賓而南皆東面其脀體儀也鄭注徧獻乃薦畧之亦宰夫薦司士脀用儀者尊體盡儀度餘骨可用而用之尊者用尊體卑者用卑體而已亦有切肺膚今文儀皆作或為議乃升長賓主人酌酢于長賓西階上北面賓在左鄭注言升長賓則有贊者為之主人酌自酢序賓意賓卑不敢酢主人坐奠爵拜執爵以興賓荅拜坐祭遂飲卒爵執爵以興坐奠爵拜賓荅拜賓降鄭注降反位
