body:
  text: 儀禮集釋卷二十宋李如圭􅁧士喪禮第十二鄭目録云士喪其父母自始死至于既殯之禮喪於五禮屬凶禮案今注疏本脱此禮字大戴第四小戴第八别録第十二釋曰雜記曰恤由之喪哀公使孺悲之孔子學士喪禮士喪禮於是乎書士喪禮死於適室幠用斂衾鄭注適室正寢之室也疾者齊故于正寢焉疾時處北庸下死而遷之當牖下有牀衽幠覆也斂衾大斂所幷用之衾衾被也小斂之衾當陳喪大記曰始死遷尸于牀幠用斂衾去死衣復者一人以爵弁服簪裳于衣左何之扱領于帶鄭注復者有司招魂復魄也天子則夏采祭僕之屬諸侯則小臣為之爵弁服純衣纁裳也禮以冠名服簪連也釋曰連裳于衣取其便也凡復皆用死者之上服喪大記曰君以卷夫人以屈狄大夫以𤣥赬世婦以襢衣士以爵弁士妻以税衣以卷者謂上公以屈狄者謂子男之夫人互舉之也雜記又曰復諸侯以襃衣冕服爵弁服夫人稅衣揄狄狄稅素沙内子以鞠衣襃衣素沙下大夫以襢衣其餘如士復西上則復所用非一服復者非一人葢各如其命數公侯伯之士一命子男之士不命故此經復者一人升自前東榮中屋北面招以衣曰皋某復三降衣于前鄭注北面招求諸幽之義也皋長聲也某死者之名也復反也降衣下之也喪大記曰凡復男子稱名婦人稱字釋曰檀弓曰復盡愛之道也有禱祠之心焉望反諸幽求諸鬼神之道也北面求諸陰之義也士禮復于寢而已檀弓曰君復于小寢大寢小祖大祖庫門四郊周禮大䘮夏采以冕服復于大祖以乗車建綏復于四郊祭僕復于小廟隸僕復于小寢大寢受用篚升自阼階以衣尸鄭注受者受之于庭也復者其一人招則受衣亦一人也人君則司服受之衣尸者覆之若得魂反之釋曰此衣浴而去之不用襲斂故喪大記曰復衣不以衣尸不以斂又曰復有林麓則虞人設階無林麓則狄人設階小臣復復者朝服皆升自東榮中屋履危北面三號卷衣投于前司服受之降自西北榮復者降自後西榮鄭注不由前降不以虚反也降因徹西北厞若云此室凶不可居然也自是行死事釋曰復者冀其生復而不蘇可以為死事也喪大記曰惟哭先復復而後行死事徹西北厞薪用以爨沐必毁屋厞明于死者無所愛惜所以趨其急也前後各有東西榮則屋有四榮楔齒用角柶鄭注為將含恐其口閉急也釋曰周禮玉府大喪共角枕角柶綴足用燕几鄭注綴猶拘也為將屨案屨今注疏本訛作履恐其辟戾也今文綴為對釋曰燕几燕寢所用以安體者喪大記曰小臣楔用角柶綴足用燕几君大夫士一也檀弓曰殷道毁竈以綴足奠脯醢醴酒升自阼階奠于尸東鄭注鬼神無象設奠以馮依之釋曰是謂始死之奠自始死至葬之祭曰奠不立尸奠置之而已帷堂鄭注事小訖也釋曰帷之者鬼神尚幽闇檀弓曰復楔齒綴足飯設飾帷堂竝作父兄命赴者曽子曰尸未設飾故帷堂小斂而徹帷仲梁子曰夫婦方亂故帷堂小斂而徹帷乃赴于君主人西階東南面命赴者拜送鄭注赴告也臣君之股肱耳目死當有恩有賓則拜之鄭注賓僚友羣士也其位猶朝夕哭矣釋曰因出命赴者而拜賔也始死惟君命出朝夕哭賓位在庭直東序及門東門西入坐于牀東衆主人在其後西面婦人俠牀東面鄭注衆主人庶昆弟也婦人謂妻妾子姓也亦適妻在前親者在室鄭注謂大功以上父兄姑姊妹子姓在此者衆婦人户外北面衆兄弟堂下北面鄭注衆婦人衆兄弟小功以下釋曰喪大記曰既正尸子坐于東方卿大夫父兄子姓立于東方有司庶士哭于堂下北面夫人坐于西方内命婦姑姊妹子姓立于西方外命婦率外宗哭于堂上北面大夫之喪主人坐于東方主婦坐于西方其有命夫命婦則坐無則皆立士之喪主人父兄子姓皆坐于東方主婦姑姊妹子姓皆坐于西方哭尸于室者主人二手承衾而哭下記室中惟主人主婦坐兄弟有命夫命婦在焉亦坐大記据不命之士下記据命士故與大夫禮同君使人弔徹帷主人迎于寢門外見賓不哭先入門右北面鄭注使人士也禮使人必以其爵使者至使人入將命乃出迎之寢門内門也徹帷㧁之事畢則下之釋曰不迎于外門外降于君至也弔者入升自西階東面主人進中庭弔者致命鄭注主人不升賤也致命曰君聞子之喪使某如何不淑主人哭拜稽顙成踊鄭注稽顙頭觸地成踊三者三釋曰稽顙拜稽首而觸地無容也踊跳躍也成踊每踊三跳三踊而九跳成一節也檀弓曰拜稽顙哀戚之至隱也稽顙隱之甚也辟踊哀之至也有算為之節文也喪服小記曰為父母長子稽顙大夫弔之雖緦必稽顙者賓出主人拜送于外門外君使人襚徹帷主人如初襚者左執領右執要入升致命鄭注襚之言遺也衣被曰襚致命曰君使某襚主人拜如初襚者入衣尸出主人拜送如初惟君命出升降自西階遂拜賓有大夫則特拜之即位于西階下東面不踊大夫雖不辭入也鄭注惟君命出以明大夫以下時來弔襚不出也始喪之日哀戚甚在室故不出拜賓也大夫則特拜别于士旅拜也即位西階下未忍在主人位也不踊但哭拜而已不辭而主人升入明本不為賓出不成禮也釋曰因事曰遂因君出而拜賓非為賓出也既小斂主人位階下不辭不致弔辭也喪大記曰君之喪未小斂為寄公國賓出大夫之喪未小斂為君命出士之喪于大夫不當斂則出凡主人之出也徒跣扱衽拊心降自西階君命寄公國賓于位大夫于君命迎于寢門外使者升堂致命主人拜于下士于大夫親弔則與之哭不迎于門外夫人為寄公夫人出命婦為夫人之命出士妻不當斂則為命婦出親者襚不將命以即陳鄭注大功以上有同財之義也不將命不使人將之致于主人也即陳陳在房中釋曰少儀曰親者兄弟不襚進庶兄弟襚使人以將命于室主人拜于位委衣于尸東牀上鄭注庶兄弟即衆兄弟也變衆言庶容同姓耳將命曰某使某襚拜于位室中位也釋曰庶者疏逺之稱同姓謂絶服者君襚尊故以衣尸庶襚委于牀而已下經曰西面委衣如于室禮則委衣西面朋友襚親以進主人拜委衣如初退哭不踊鄭注親以進親之恩也退下堂反賓位也主人徒哭不踊别于君襚也徹衣者執衣如襚以適房鄭注凡于襚者出有司徹衣釋曰如襚亦右執要左執領房以即陳為銘各以其物亡則以緇長半幅䞓末長終幅廣三寸書銘于末曰某氏某之柩鄭注銘明旌也雜帛為物大夫士之所建也以死者為不可别故以其旗識識之愛之斯録之矣亡無也無旌案旌今注疏本訛作旗不命之士也半幅一尺終幅二尺在棺為柩今文銘皆為名末為斾也釋曰雜帛者以絳帛為旗縿白縁之案司常大夫同建物而杠之長短則異䞓赤也喪服小記曰復與書銘自天子逹于士其辭一也男子稱名婦人稱姓與伯仲如不知姓則書氏司常大喪共銘旌竹杠長三尺置于宇西階上案敖繼公云宇檐也不宜與西階上連文宇字葢因于字而衍也周官小祝職鄭司農注引此無宇字鄭注杠銘橦也宇梠也釋曰屋之邉垂謂之宇宇西階上者宇之下西階之上也宇即檐也釋宫曰檐謂之樀郭曰屋梠樀與梠以承檐之材言之兩階上當宇則堂廉迫近霤矣是以鄉飲酒記言階間縮霤甸人掘坎于階間少西為垼于西牆下東鄉鄭注甸人有司主田野者垼塊竈西牆中庭之西今文鄉為面釋曰中庭庭南北之中也新盆槃瓶廢敦重鬲皆濯造于西階下鄭注新此瓦器五種者重死事盆以盛水槃承渜濯瓶以汲水也廢敦敦無足者所以盛米也重鬲鬲將縣於重者也濯滌溉也造至也猶􅄿也以造言之喪事遽釋曰凡物無足者曰廢士虞禮有廢爵足爵敦之有足者直名敦下經敦啟㑹面足是也陳襲事于房中西領南上不綪鄭注襲事謂衣服也綪讀為䋫䋫屈也案今注疏本脫一䋫字襲事少上陳而下不屈江沔之間謂縈收繩索為䋫古文綪皆爲精明衣裳用布鄭注所以親身為圭潔也釋曰論語曰齊必有明衣布親如字或清刃反鬠笄用桑長四寸纋中鄭注桑之為言喪也用爲笄取其名也長四寸不冠故也纋笄之中央以安髮釋曰鬠即髻也男子冠而婦人笄下記云母之喪鬠無笄則知男子亦不冠此笄四寸者安髮之笄耳纋中謂狹其中央也家語曰孔子之喪襲而冠家語出于王肅與禮異布巾環幅不鑿鄭注環幅廣袤等也不鑿者士之子親含反其巾而已大夫以上賓為之含當口鑿之嫌有惡古文環作還釋曰此巾含時設之覆面雜記曰鑿巾以含公羊賈為之也掩練帛廣終幅長五尺析其末鄭注掩裹首也析其末為將結于頤下又還結于項中瑱用白纊鄭注瑱充耳纊新綿幎目用緇方尺二寸䞓裏著組繫鄭注幎目覆面者也幎讀若詩云案云今注疏本作曰葛藟縈之之縈䞓赤也著充之以絮也組繫為可結也古文幎為涓案今注疏本脫此五字握手用𤣥纁裏長尺二寸廣五寸牢中旁寸著組繫鄭注牢讀為樓樓謂削約握之中央以安手也今文牢為纋旁為方決用正王棘若檡棘組繫纊極二鄭注決猶闓也挾弓以横執弦詩云決拾既佽正善也王棘與檡棘善理堅刃者皆可以為決極猶放弦也以沓指放弦令不挈指也生者以朱韋為之而三死用纊又二明不用也古文王為玉案玉今注疏本訛作三今文檡為澤世俗謂王棘矺鼠冒緇質長與手齊䞓殺掩足鄭注冐韜尸者制如直囊上曰質下曰殺質正也其用之先以殺韜足而上後以質韜首而下齊手上𤣥下纁象天地也喪大記曰君錦冒黼殺綴旁七大夫𤣥冒黻殺案黻原本今注疏本皆作黼張淳儀禮識誤云監杭本黼作黻巾箱嚴本之為黼其以禮記喪大記之文乎禮器曰君黼大夫黻喪大記之文葢誤也從監杭本綴旁五士緇冒䞓殺綴旁三凡冒質長與手齊殺三尺釋曰冒者總名對殺言之則亦為在上之稱其制為兩囊一旁不縫韜尸巳乃綴之自明衣至冒皆喪具以所用先後為陳之次爵弁服純衣鄭注謂生時爵弁之服也案今注疏本作爵弁所衣之服也據疏内舉注文亦無所衣二字純衣者纁裳古者以冠名服死者不冠皮弁服鄭注皮弁所衣之服也其服白布衣素裳也褖衣鄭注黑衣裳赤緣之謂之褖案原本作赤縁謂之褖據釋文云縁之則縁下當有之字今注疏本作赤縁之謂褖刪去下之字亦非也注意謂黑衣裳以赤縁之謂之褖耳褖之言縁也所以表袍者也喪大記曰衣必有裳袍必有表不襌謂之一稱古文褖為縁釋曰此𤣥端也𤣥端有三裳喪禮略用𤣥裳而已變名褖衣者以其連裳為之與婦人赤縁之褖衣同連衣裳者用之以表袍袍連衣裳故也雜記曰子羔之襲也繭衣裳與褖衣為一纊為繭緼為袍衣有著之異名耳緇帶鄭注黑繒之帶韎韐鄭注一命緼韍釋曰韎赤色也韐蔽膝也合韋為之祭服謂之韍他服謂之韠士名韎韐一命者名緼韍不得直名韍襲三服共一帶一韎韐竹笏鄭注笏所以書思對命者玉藻曰笏天子以璆玉諸侯以象大夫以魚須文竹士以竹本象可也又曰笏度二尺有六寸其中博三寸其殺六分而去一又曰天子搢珽方正于天下也諸侯荼前詘後直讓于天子也大夫前詘後詘無所不讓今文笏作忽夏葛屨冬白屨皆繶緇純案緇下各本衍絇字據釋文緇純中無絇字又周禮屨人注引此文皆繶緇純疏云葛屨皮屨皆有繶也緇純純用緇可證漢及唐初之本皆無絇字後人因注引士冠禮緇絇繶純訛入經耳今刪正組綦繫于踵鄭注冬皮屨變言白者明夏時用葛亦白也此皮弁之屨士冠禮曰素積白屨以魁柎之緇絇繶純純博寸綦屨係也所以拘止屨也綦讀如馬絆綦之綦釋曰踵足跟也士冠禮曰屨夏用葛冬皮屨可也又曰素積白屨緇絇繶純素積皮弁之服也屨用皮弁帶用𤣥端韎韐用爵弁參相備自爵弁服至屨皆主者常服其陳之以貴賤為次庶襚繼陳不用鄭注庶衆也不用不用襲也多陳之為榮少納之為貴釋曰庶襚至小斂則用之貝三實于笲鄭注貝水物古者以為貨江水出焉笲竹器名稻米一豆實于筐鄭注豆四升釋曰春秋傳曰四升為豆沐巾一浴巾二皆用綌于笲鄭注巾所以拭汚垢案汚今注疏本訛作汗浴巾二者上體下體異也綌麤葛櫛于簞鄭注簞葦笥案葦今注疏本訛作􅓗釋曰櫛梳也浴衣于篋鄭注浴衣巳浴所衣之衣以布為之其制如今通裁釋曰浴衣無殺布單衣以晞身者巾櫛衣既沐浴棄之故􅄿次貝米口實之下皆􅄿于西序下南上鄭注皆者皆貝以下案貝原本訛作具從今注疏本東西牆謂之序中以南謂之堂釋曰堂半以北近房與户多繼房户言之半以南無所繫屬者則謂之堂下文淅米于堂是也管人汲不説繘屈之鄭注管人有司主館舍者不說繘將以就祝濯米屈縈也釋曰聘禮記曰管人為客三日具沐五日具浴繘綆也易曰汔至亦未繘井祝淅米于堂南面用盆鄭注祝夏祝也淅汰也管人盡階不升堂受潘煑于垼用重鬲鄭注盡階三等之上喪大記曰管人受沐乃煑之甸人取所徹庿之西北厞薪用爨之案今注疏本脫用字釋曰説文曰潘淅米汁也用之以沐故又曰沐祝盛米于敦奠于貝北鄭注復于筐處案此下今注疏本有也字釋曰米未淅盛于筐巳淅盛于敦還于筐處置之士有冰用夷槃可也鄭注謂夏月而君加賜冰也夷槃承尸之槃喪大記曰君設大槃造冰焉大夫設夷槃造冰焉士併瓦槃無冰設牀襢笫有枕釋曰設冰于牀下以寒尸也春秋傳曰命夫命婦喪沐用冰士加賜則有冰其無冰者併瓦槃以盛水耳周禮凌人大喪共夷槃冰諸侯曰大槃辟天子大夫士曰夷槃卑不嫌外御受沐入鄭注外御小臣侍從者沐管人所煑潘也主人皆出户外北面鄭注象平生沐浴裸裎子孫不在旁主人出而襢笫釋曰襢笫去席而露其簀盝水便也乃沐櫛挋用巾鄭注挋晞也清也古文挋皆作振釋曰沐沐髮也挋拭也浴用巾挋用浴衣鄭注用巾用拭之也喪大記曰御者二人浴浴水用盆沃水用枓釋曰盛浴餘水之槃于尸牀下置之枓酌水器渜濯棄于坎鄭注沐浴餘潘水巾櫛浴衣亦幷棄之古文渜作湪荆沔之間語蚤揃如他日鄭注蚤讀為爪斷爪揃鬚也人君則小臣為之他日平生時釋曰喪大記曰管人汲授御者御者差沐于堂上君沐粱大夫沐稷士沐粱甸人為垼于西牆下陶人出重鬲管人受沐乃煑之甸人取所徹廟之西北厞薪用爨之管人授御者沐乃沐沐用瓦盤挋用巾如它日小臣爪手翦須渜濯棄于坎又曰管人汲不說繘屈之盡階不升堂授御者御者入浴小臣四人抗衾御者二人浴浴水用盆沃水用枓浴用絺巾挋用浴衣如它日小臣爪足浴餘水棄于坎周禮大喪大祝以肆鬯渳尸小祝贊渳鬯人設斗共其釁鬯鬱人共其肆器喪大記云士沐粱者葢天子之士也浴用絺巾葢亦君大夫禮玉藻云浴用二巾上絺下綌亦與此士禮異也潘巳煑故曰渜巳沐故曰濯渜濯棄于坎則浴餘氷與所用器服當亦并棄之鬠用組乃笲設明衣裳鄭注用組組束髮也古文鬠皆為括主人入即位鄭注巳設明衣可以入也商祝襲祭服褖衣次鄭注商祝祝習商禮者商人教之以敬于接神宜襲布衣牀上祭服爵弁服皮弁服皆從君助祭之服大蜡有皮弁素服而祭送終之禮也案原本脫也字從今注疏本襲衣于牀牀次含牀之東衽如初也喪大記曰含一牀襲一牀遷尸于堂又一牀主人出南面左袒扱諸面之右盥于盆上洗貝執以入宰洗柶建于米執以從鄭注俱入户西鄉也今文宰不言執釋曰面前也不言設盥喪事遽也周禮大宰大喪贊含玉商祝執巾從入當牖北面徹枕設巾徹楔受貝奠于尸西鄭注當牖北面值尸南也設巾覆面為飯之遺落米也如商祝之事位則尸南首明矣釋曰尸南首未葬不忍異于生也樂記曰商祝辯乎喪禮故後主人主人由足西牀上坐東面鄭注不敢從首前也祝受貝米奠之口實不由足也釋曰商祝不言由足西則自尸首徃來祝又受米奠于貝北宰從立于牀西在右鄭注米在貝北便扱者也宰立牀西在主人之右當佐飯事釋曰祝奠貝乃奠米則米奠貝南為便而奠于貝北者欲其北近主人也主人左扱米實于右三實一貝左中亦如之又實米惟盈鄭注于右尸口之右案周禮大宰職疏内引此注有左右齻及中央象齒堅九字惟盈取滿而已釋曰檀􅃓曰飯用米貝弗忍虚也不以食道用美焉爾雜記曰天子飯九貝諸侯七大夫五士三主人襲反位鄭注襲復衣也位在尸東商祝掩瑱設幎目乃屨綦結于跗連絇鄭注掩者先結頤下既瑱幎目乃還結項也跗足上也絇屨飾如刀衣鼻在屨頭上以餘組連之止足坼也釋曰綦繫于踵以兩端向前結于足背餘組穿兩絇連之乃襲三稱鄭注遷尸于襲上而衣之凡衣死者左衽不紐襲不言設牀又不言遷尸于襲上以其俱當牖案俱今注疏本訛作居無大異釋曰三稱祭服褖衣也明衣不在算鄭注算數也不數明衣案不下各本衍在字張淳儀禮識誤云釋文不數中無在字從釋文襌衣不成稱也設韐帶搢笏鄭注韐帶韎韐緇帶不言韎緇者省文亦欲見韐自有帶韐帶用革搢㨗也㨗于帶之右旁古文韐為合也釋曰雜記曰子羔之襲也繭衣裳與稅衣纁袡為一素端一皮弁一爵弁一𤣥冕一曽子曰不襲婦服譏其襲纁袡也又曰公襲卷衣一𤣥端一朝服一素積一纁裳一爵弁二𤣥冕一襃衣一朱緑帶申加大帶重加大帶于上朱緑帶者襲衣之帶也申加大帶重加于革帶也革帶以繫韍繫佩襲有韎韐則亦有革帶士襲三稱子羔襲五稱公襲九稱諸侯其七天子其十二與設決麗于􅓲自飯持之設握乃連􅓲鄭注麗施也􅓲手後節中也飯大擘指本也決以韋為藉案為下各本衍之字張淳儀禮識誤云釋文為藉中無之字從釋文有彄彄内端為紐外端有横帶設之以紐擐大擘本也因沓其彄以横帶貫紐結于擘之表也案擘今注疏本訛作􅓲設握者以綦繫鉤中指由手表與決帶之餘連結之此謂右手也古文麗亦為連􅓲作捥釋曰横帶即組繫也設冒櫜之幠用衾鄭注櫜韜盛物者取事名焉衾者始死時斂衾今文櫜為橐釋曰雜記曰冒者何也所以掩形也自襲以至小斂不設冒則形是以襲而後設冒也巾柶鬊蚤埋于坎鄭注坎至此築之也將襲辟奠既則反之釋曰鬊所櫛之亂髮蚤所斷之爪喪大記曰君大夫鬊爪實于緑中士埋之下記云小斂辟奠不出室此始死之奠襲後因名襲奠
