body:
  text: 儀禮集釋卷二十四宋李如圭撰既夕主人之史請讀賵執算從柩東當前束西面不命毋哭哭者相止也惟主人主婦哭燭在右南面鄭注史北面請既而與執算西面于主人之前讀書釋算燭在右南面照書便也古文算皆為筴釋曰燭在右則算在史南讀書釋算則坐鄭注必釋算者榮其多釋曰算者坐為釋之卒命哭滅燭書與算執之以逆出鄭注卒已按此下今注疏本有也字釋曰雜記曰大夫之喪既薦馬薦馬者哭踊出乃包奠而讀書士禮異公史自西方東面命毋哭主人主婦皆不哭讀遣卒命哭滅燭出鄭注公史君之典禮書者遣者入壙之物君使史來讀之成其得禮之正以終也燭俠輅釋曰公史尊故命毋哭而主人主婦皆不哭商祝執功布以御柩執披鄭注居柩車之前若道有低仰傾虧則以布為抑抑左右之節使引者執披者知之士執披八人今文無以釋曰下記曰執披者旁四人䘮大記曰君葬用輴四綍二碑御棺用羽葆大夫葬用輴二綍二碑御棺用茅士葬用國車二綍無碑比出宫御棺用功布周禮喪祝掌大喪勸防之事及辟令啟及朝御匶乃奠及祖飾棺乃載遂御及葬御匶出宫乃代及壙說載除飾小喪亦如之鄉師大喪及葬執纛以與匠師御匶而治役司士作六軍之士執披大司徒帥六鄉之衆庶屬其六引遂人帥六遂之役屬六綍功布士以上葢通有之御柩天子以纛君以羽葆大夫以茅士賤無御柩之物故在宫以功布拂柩而出宫因以御柩按原本脱出字今補主人袒乃行踊無算鄭注袒為行變也乃行謂柩車行也凡從柩者先後左右如遷于祖之序出宫踊襲鄭注哀次釋曰大門外有賓次常時君大夫將葬弔于宫及出命引之三步則止如是者三君退朝亦如之哀次亦如之朝謂喪朝庿也哀次謂此出宫踊時也三命引柩以義奪孝子之情至于邦門公使宰夫贈𤣥纁束鄭注邦門城門也贈送也主人去杖不哭由左聴命賓由右致命鄭注柩車前輅之左右也當時止柩車主人哭拜稽顙賓升實幣于葢降主人拜送復位杖乃行鄭注升柩車之前實其幣于棺葢之栁中若親授之然復位反柩車後至于壙陳器于道東面北上鄭注統于壙釋曰墓南鄉周禮巾車大喪及墓嘑啟闗陳車方相氏大喪先匶及墓入壙以戈擊四隅敺方良茵先入鄭注當藉柩也元士則葬用輁軸加茵焉釋曰元士用輁軸未聞屬引鄭注于是說載除飾更屬引于緘耳古文屬為燭釋曰棺束末皆為緘耳及壙以紼貫之而下棺人君又以木横貫緘耳屬紼于横木喪大記曰君窆以衡大夫士以咸咸即緘也主人袒衆主人西面北上婦人東面皆不哭鄭注俠羨道為位釋曰袒為下棺變也不哭者下棺宜靜喪大記曰君命毋譁以鼓封大夫命毋哭士哭者相止也婦人亦北上羨道者入壙之道明器之屬皆自羨道入壙口容下棺而已國昭子之母死問于子張曰葬及墓男子婦人安位子張曰司徒敬子之喪夫子相男子西鄉婦人東鄉曰噫毋賓為賓焉主為主焉婦人從男子皆西鄉非禮也乃窆主人哭踊無算鄭注窆下棺也今文窆為封襲贈用制幣𤣥纁束拜稽顙踊如初鄭注丈八尺曰制二制合之束十制五合釋曰𤣥纁束葢公使宰夫所贈者重君物故以送終也雜記曰魯人之贈也三𤣥三纁廣尺長終幅禮幣用制以儉為節昬禮幣用二丈取成數卒袒拜賓主婦亦拜賓即位拾踊三襲鄭注主婦拜賓拜女賓也即位反位釋曰反羨道東西位賓位男女各繼主人言拾踊三者主人踊婦人踊賓踊賓出則拜送鄭注相問之賓也凡弔賓有五去皆拜之此舉中焉藏器于旁加見鄭注器用器役器也見棺飾也更謂之見者加此則棺柩不復見矣先言藏器乃云加見者器在見内也内之者明君子之于事終不自逸也檀弓曰有虞氏之瓦棺夏后氏堲周殷人棺槨案今注疏本脱此十五字周人牆置翣釋曰棺飾在柩外若牆然其外置翣後王之制文也周禮冢人共喪之窆器及葬言鸞車象人及窆執斧以涖遂入藏凶器藏苞筲于旁鄭注于旁者在見外也不言罋甒􅄿相次可知四者兩兩而居喪大記曰棺槨之間君容柷大夫容壺士容甒釋曰雜記曰罋甒筲衡實見問而後折入衡即桁也加折卻之加抗席覆之加抗木鄭注宜次也釋曰卻仰也折抗席皆善面鄉下折于陳時則為仰自茵至抗木相重累之此士禮重禮器曰天子五重八翣諸侯三重六翣大夫再重四翣以多為貴實土三主人拜鄉人鄭注謝其勤勞釋曰雜記曰弔非從主人也四十者執紼鄉人五十者從反哭四十者待盈坎鄉人助事故于實土拜之即位踊襲如初鄭注哀親之在斯釋曰上無袒文而言襲疑杜佑曰將踊袒既踊即襲乃反哭入升自西階東面衆主人堂下東面北上鄭注西階東面反諸其所作也反哭者于其祖庿不于阼階西面西方神位釋曰所作者庿堂親平日所行禮之處婦人入丈夫踊升自阼階鄭注辟主人也主婦入于室踊出即位及丈夫拾踊三鄭注入于室反諸其所養也出即位堂上西面也拾更也釋曰所養庿室親所饋食之處自小歛以後主婦位常在阼階上西面問喪曰送形而往迎精而反也其往送也望望然汲汲然如有追而弗及也其反哭也皇皇然若有求而弗得也故其往送也如慕其反也如疑求而無所得之也入門而弗見也上堂又弗見也入室又弗見也亡矣喪矣不可復見已矣故哭泣辟踊盡哀而止矣養羊尚反賓弔者升自西階曰如之何主人拜稽顙鄭注賓弔者衆賓之長也反而亡焉失之矣于是為甚故弔之弔者北面主人拜于位不北面拜賓東者以其亦主人位也今文無曰案今注䟽本作今文無曰字釋曰此相見之賓也升無改面文則北面也反哭主人之位在西故因其位而拜坊記曰升自客階受弔於賓位教民追孝也檀弓曰反哭之弔也哀之至也殷既封而弔周反哭而弔孔子曰殷已慤吾從周賓䧏出主人送于門外拜稽顙遂適殯宫皆如啓位拾踊三鄭注啓位婦人入升堂丈夫即中庭之位釋曰啓位亦朝夕哭位也二庿者先朝禰次朝祖乃行其反哭亦當于祖庿次禰庿乃適殯宫兄弟出主人拜送鄭注兄弟小功以下也異姓大功亦可以歸衆主人出門哭止闔門主人揖衆主人乃就次鄭注次倚廬也釋曰問喪曰成壙而歸不敢入處室居於倚廬哀親之在外也寢苫枕塊哀親之在土也猶朝夕哭不奠鄭注是日也以虞易奠三虞鄭注虞䘮祭名虞安也骨肉歸于土精氣無所不之孝子為其彷徨三祭以安之朝葬日中而虞不忍一日離也案今注䟽本無也字卒哭鄭注卒哭三虞之後祭名始朝夕之間哀至則哭至此祭止也朝夕哭而已釋曰雜記士三月而葬是月也卒哭大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭士三虞大夫五諸侯七明日以其班祔鄭注班次也祔卒哭之明日祭名祔猶屬也祭昭穆之次而屬之今文班為胖案今注疏本脱此五字釋曰檀弓曰葬于北方北首三代之逹禮也之幽之故也既封主人贈而祝宿虞尸既反哭主人與有司視虞牲有司以几筵舍奠于墓左反日中而虞葬日虞不忍一日離也是日也以虞易奠卒哭曰成事是日也以吉祭易喪􅀕明日祔于祖父殷練而祔周卒哭而祔孔子善殷記士處適寢寢東首于北墉下鄭注將有疾乃寢于適室今文處為居于為於有疾疾者齊鄭注正情性也適寢者不齊不居其室養者皆齊鄭注憂也釋曰曲禮曰言不惰琴瑟不御食肉不至變味飲酒不至變貌徹琴瑟鄭注去樂疾病外内皆埽鄭注為有賓客來問也疾甚曰病徹䙝衣加新衣鄭注故衣垢汚為來人穢惡之御者四人皆坐持體鄭注為不能自轉側御者今時侍從之人屬纊以俟絶氣案此條之前今注䟽本有記文男女改服四字注文為賓客來問病亦朝服主人深衣十三字與禮記喪大記篇正文及注並同葢人取彼混入故永樂大典本無此十七字鄭注為氣㣲難節也纊新絮男子不絶于婦人之手婦人不絶于男子之手鄭注備䙝釋曰謂持體者春秋傳曰男子不絶于婦人之手以齊終也喪大記曰疾病外内皆埽君大夫徹縣士去琴瑟寢東首于北牖下廢牀徹䙝衣加新衣體一人男女改服屬纊以俟絶氣乃行禱于五祀鄭注盡孝子之情五祀博言之士二祀曰門曰行釋曰論語子疾病子路請禱禱禮也請之非也五祀當考乃卒鄭注卒終也主人啼兄弟哭鄭注哀有甚有否于是始去笄纚服深衣檀弓曰始死羔裘𤣥冠者易之釋曰主人啼者𤼵聲則氣絶而息若往而不反也曾申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有設牀笫當牖袵下莞上簟設枕鄭注病卒之間廢牀至是設之事相變袵卧席古文笫為茨遷尸鄭注徙于牖下也于是幠用歛衾復者朝服左執領右執要招而左鄭注衣朝服服未可以變釋曰復以求生未可變服凶服楔貌如軶上兩末鄭注事便也今文軶作厄釋曰軶馬鞅軶馬領者也角柶屈之如軶中間入口兩末向上與扱醴之柶異綴足用燕几校在南御者坐持之鄭注校脛也尸南首几脛在南以拘足則不得辟戾矣古文校為枝釋曰几兩端各二足今縱用之以夾尸足又使御者坐持之恐几攲側也即牀而奠當腢用吉器若醴若酒無巾柶鄭注腢肩頭也用吉器器未變也或卒無醴用新酒釋曰脯醢亦取閣上所餘者卒遽不用改新也檀弓曰死之奠其餘閣也與赴曰君之臣某死赴母妻長子則曰君之臣某之某死鄭注赴走告也今文赴作訃釋曰雜記曰凡訃于其君曰君之臣某死父母妻長子曰君之臣某之某死室中惟主人主婦坐兄弟有命夫命婦在焉亦坐鄭注别尊卑也尸在室有君命衆主人不出鄭注不二主襚者委衣于牀不坐鄭注牀髙由便其襚于室戸西北面致命鄭注始死時也夏祝淅米差盛之鄭注差擇之御者四人抗衾而浴襢笫鄭注抗衾為其裸裎蔽之也襢袒也袒簀去席盝水便也案今注疏本脱也字其母之喪則内御者浴鬠無筓鄭注内御女御也無筓猶丈夫之不冠也釋曰周禮女御大喪掌沐浴設明衣婦人則設中帶鄭注中帶若今之褌襂卒洗貝反于笲實貝柱右齻左齻鄭注象齒堅夏祝徹餘飯鄭注徹去鬻瑱塞耳鄭注塞充窒釋曰瑱縣耳旁今以塞耳與生時異掘坎南順廣尺輪二尺深三尺南其壤鄭注南順統于堂輪從也今文掘為坅垼用塊鄭注塊堛也古文垼為役明衣裳用幕布袂屬幅長下膝鄭注幕布帷幕之布升數未聞也屬幅不削幅也長下膝又有裳于蔽下體深也釋曰長下膝衣長至膝下也有前後裳不辟長及觳鄭注不辟質也觳足跗也凡他服短不見膚長無被土縓綼緆鄭注一染謂之縓今之淺紅也案今注疏本脱之淺二字飾裳在幅曰綼在下曰緆緇純鄭注七入為緇緇黑也案今注疏本作黑色也飾衣曰純謂領與袂衣以緇裳以縓象天地也釋曰案自掘坎南順至緇純經次當在夏祝淅米之前疑脱簡在此設握裏親膚繫鉤中指結于􅓲鄭注􅓲掌後節中也手無決者以握繫一端繞􅓲還從上自貫反與其一端結之甸人築坅坎鄭注築實土其中堅之穿坎之名一曰坅𨽻人湼厠鄭注𨽻人罪人也今之徒役作者也湼塞也為人復往褻之又亦鬼神不用釋曰周禮司隸邦有喪紀之事則役其煩辱之事既襲宵為燎于中庭鄭注宵夜厥明滅燎陳衣鄭注記節釋曰記陳衣之時凡絞紟用布倫如朝服鄭注凡凡小歛大斂也倫比也今文無紟古文倫為輪設棜于東堂下南順齊于坫􅄿于其上兩甒醴酒酒在南篚在東南順實角觶四木柶二素勺二豆在甒北二以並籩亦如之鄭注棜今之轝也角觶四木柶二素勺二為夕進醴酒兼􅄿之也勺二醴酒各一也豆籩二以併則是大斂􅄿也記於此者明其他與小斂同陳古文角觶為角柶釋曰醴用觶一柶一酒用觶一而實四觶二柶者後奠醴酒不同今器兼􅄿之凡籩豆實具設皆巾之鄭注籩豆偶而為具具則于􅄿巾之巾之加飾也明小斂一豆一籩不巾觶俟時而酌柶覆加之面枋及錯建之鄭注時朝夕也檀弓曰朝奠日出夕奠逮日釋曰建扱之于醴中也小斂辟奠不出室鄭注未忍神逺之也辟襲奠以辟斂既斂則不出于室設于序西南畢事而去之釋曰辟奠而不徹遽也無踊節鄭注其哀未可節也既馮尸主人袒髺髮絞帶衆主人布帶鄭注衆主人齊衰以下大斂于阼鄭注未忍便離主人位也主人奉尸斂于棺則西階上賓之大夫升自西階階東北面東上鄭注視斂釋曰此大夫未大斂而先至者其視斂位與君在之位同君視斂主人西楹東北面大夫繼主人東上既馮尸大夫逆降復位鄭注中庭西面位釋曰位在主人之南同朝夕哭位巾奠執燭者滅燭出降自阼階由主人之北東鄭注巾奠而室事已既殯主人說髦鄭注既殯置銘于肂復位時也今文説皆作稅兒生三月鬋髮為鬌男角女羈否則男左女右長大猶為飾存之謂之髦所以順父母幼小之心至此尸柩不見喪無飾可以去之髦之形象未聞釋曰内則曰子事父母總拂髦冠緌纓玉藻曰親没不髦三日絞垂鄭注成服日絞要絰之散垂者冠六升外縪纓條屬厭鄭注縪謂縫著于武也外者案外下今注疏衍之字外其餘也纓條屬者通屈一條繩為武垂下為纓屬之冠厭伏也釋曰武冠卷也喪冠纓武同材以冠屬之武謂之條屬葢以一條繩交過兩旁綴之為武垂其餘為纓乃以冠前後著武從下鄉外縫之衰三升鄭注衣與裳也屨外納鄭注納收餘也杖下本竹桐一也鄭注順其性也居倚廬鄭注倚木為廬在中門外東方北户釋曰朝夕哭位在東方故廬亦在門外之東横一木著地立細木其上倚就東墉北其户既虞乃柱起横木之著地者而西其户喪服傳謂之外寢寢苫枕塊鄭注苫編稾案各本作藳據釋文改正塊堛也不説絰帶鄭注哀戚不在于安哭晝夜無時鄭注哀至則哭非必朝夕釋曰始喪至殯哭不絶聲既殯哭晝夜無時既卒哭惟朝夕哭既練朝夕止哭或一日二日哀至則哭亦無時非喪事不言鄭注不忘所以為親歠粥朝一溢米夕一溢米不食菜果鄭注不在于飽與滋味粥糜也二十兩曰溢為米一升二十四分升之一實在木曰果在地曰蓏主人乘惡車鄭注拜君命拜衆賓及有故行所乘也雜記曰端衰喪車皆無等然則此惡車王喪之木車也古文惡作堊白狗幦鄭注未成豪狗幦覆笭也以狗皮為之取其臑也白于喪飾宜古文幦為幕釋曰車前有式以幦覆之式之材謂之軨故通謂式為軨也禮記謂之幦周禮謂之􅍜詩謂之幭其實一也釋畜曰犬未成豪狗蒲蔽鄭注蔽藩御衣蒲菆鄭注不在于驅馳蒲菆牡蒲莖古文菆作騶釋曰御者以蒲菆策馬春秋傳蒲菆可為矢犬服鄭注笭間兵服以犬皮為之取堅也亦白今文犬為大案今注疏本脱此五字木錧鄭注取少聲今文錧為轄釋曰常時車錧馬鑣以金為之約綏約轡鄭注約繩綏所以引升車木鑣鄭注亦取少聲古文鑣為苞馬不齊髦鄭注齊翦也今文髦為毛主人之惡車如王之木車則齊衰以下其乘素車繅車駹車漆車與釋曰周禮蒲蔽犬􅍜鄭謂始喪所乘也卒哭乘素車既練乘繅車大祥乘駹車禫乘漆車喪車無等齊衰以下葢差次乘之主婦之車亦如之疏布裧鄭注裧者車裳幃于葢弓垂之釋曰裧周禮謂之容詩謂之帷裳貳車白狗攝服鄭注貳副也攝猶縁也狗皮縁服差飾其他皆如乗車鄭注如所乘惡車朔月童子執帚卻之左手奉之鄭注童子隸子弟若内豎寺人之屬執用左手卻之示未用釋曰曲禮拚者加帚于箕上從徹者而入鄭注童子不專禮事比奠舉席埽室聚諸㝔布席如初卒奠埽者執帚垂末内鬛從執燭者而東鄭注比猶先也室中東南隅謂之㝔案今注疏本脱中字釋曰㝔近户隠闇處也入時燭先徹者童子從徹者出時徹者先燭童子從燭童子常後于成人燕養餽羞湯沐之􅄿如他日鄭注燕養平常所用供養也饋朝夕食也羞四時之珍異湯沐所以洗去汙垢内則曰三日具沐五日具浴孝子不忍一日廢其事親之禮于下室日設之如生存也進徹之時如其頃釋曰下室燕寢也如其頃如食頃朔月若薦新則不饋于下室鄭注以其殷奠有黍稷也下室如今之内堂正寢聽朝事筮宅冢人物土鄭注物猶相也相其地可葬者乃營之卜曰吉告從于主婦主婦哭婦人皆哭主婦升堂哭者皆止鄭注事畢啓之昕外内不哭鄭注將有事為其讙囂既啓命哭古文啓為開夷牀輁軸􅄿于西階東鄭注明階閒者位近西也夷牀􅄿于祖庿輁軸􅄿于殯宫其二庿者于禰亦􅄿輁軸焉古文輁或為拱其二庿則􅄿于禰庿如小斂奠乃啓鄭注祖尊禰卑也士事祖禰上士異庿下士共庿朝于禰庿重止于門外之西東面柩入升自西階正柩于兩楹間奠止于西階之下東面北上主人升柩東西面衆主人東即位婦人從升東面奠升設于柩西升降自西階主人要節而踊鄭注重不入者主于朝祖而行若過之矣門西東面待之便也燭先入者升堂東楹之南西面後入者西階東北面在下鄭注照正柩者先先柩者後後柩者適祖時燭亦然互記于此主人降即位徹乃奠升降自西階案今注疏本脱降字主人踊如初鄭注如其降拜賓至于要節而踊不薦車不從此行祝及執事舉奠巾席從而降柩從序從如初適祖鄭注此謂朝禰明日舉奠適祖之序也此祝執醴先酒脯醢俎從之巾席為後既正柩席升設設奠如初祝受巾巾之凡喪自卒至殯自啓至葬主人之禮其變同則此日數亦同矣序從主人以下今文無從薦乘車鹿淺幦干笮革靾載旜載皮弁服纓轡貝勒縣于衡鄭注士乘棧車鹿淺鹿夏毛也幦覆笭玉藻曰士齊車鹿幦豹犆干盾也笮矢箙也靾韁也旜旌旗之屬通帛為旜孤卿之所建亦攝焉皮弁服者視朔之服貝勒貝飾勒有干無兵有箙無弓矢明不用古文靾為殺旜為膳釋曰纓轡貝勒馬所用也及薦馬又取纓用道車載朝服鄭注道車朝夕及燕出入之車朝服日視朝之服也𤣥衣素裳槀車載蓑笠鄭注槀猶散也散車以田以鄙之車蓑笠備雨服今文槀為潦凡道車槀車之纓轡及勒亦縣于衡也釋曰槀車游散所乘也詩都人士曰臺笠緇撮將載祝及執事舉奠戸西南面東上卒束前而降奠席于柩西鄭注將于柩西當前束設之巾奠乃牆鄭注牆柩飾也抗木刋鄭注剝削之古文刋為竿茵著用荼實綏澤焉鄭注荼茅秀也綏亷薑也澤澤蘭也皆取其香且御溼葦苞長三尺一編鄭注用便易也菅筲三其實皆瀹鄭注米麥皆湛之湯未知神之所享不用食道所以為敬釋曰不以食道謂不孰之飯用米其義亦然祖還車不易位鄭注為鄉外耳未行執披者旁四人鄭注前後左右各二人凡贈幣無常鄭注賓之贈也玩好曰贈在所有凡糗不煎鄭注以膏煎之則䙝非敬惟君命止柩於堩其餘則否鄭注不敢留神也堩道也曾子問曰葬既引至於堩車至道左北面立東上鄭注道左墓道東先至者在東釋曰不北上統于壙者車不入壙柩至于壙斂服載之鄭注柩車至壙祝説載除飾乃斂乘車道車槀車之服載之不空之以歸也案今注疏夲脱也字送形而往迎精而反亦禮之宜卒窆而歸不驅鄭注孝子往如慕反如疑為親之在彼釋曰檀弓曰衛有送葬者夫子觀之曰善者為喪乎足以為法矣其往也如慕其反也如疑君視斂若不待奠加葢而出不視斂則加葢而至卒事鄭注為有他故及辟忌也既正柩賓出遂匠納車于階間鄭注遂匠遂人匠人也遂人主引徒役匠人主載柩窆職相左右也車載柩車周禮謂之蜃車雜記謂之團或作輇或作摶聲讀皆相附耳未聞孰正其車之轝狀如牀中央有轅前後出設前後輅轝上有四周下則前後有軸以輇為輪許叔重説有輻曰輪無輻曰輇祝􅄿祖奠于主人之南當前輅北上巾之鄭注言􅄿于主人之南當前輅則既祖祝乃􅄿弓矢之新沽功鄭注設之宜新沽示不用今文沽作古釋曰沽功麤功也有弭飾焉鄭注弓無縁者謂之弭弭以骨角為飾釋曰弭弓梢末也亦張可也鄭注亦使可張有柲鄭注柲弓檠弛則縛之于弓裏備損傷以竹為之詩云竹柲緄縢今文柲為枈釋曰柲狀如弓緄縢謂繩約之設依撻焉鄭注依纏絃也撻弣側矢道也皆以韋為之今文撻為銛有韣鄭注韣弓衣也以緇布為之矢案各本脱此字據釋文補翭矢一乘骨鏃短衛鄭注翭猶候也候物而射之矢也四矢曰乘骨鏃短衛亦示不用也案示今注疏本訛作云生時翭矢金鏃凡為矢五分笴長而羽其一釋曰衛謂羽也羽以防衛矢使之調故名羽為衛釋器曰骨鏃不翦羽謂之志短衛即翦羽也志矢一乘軒輖中亦短衛鄭注志猶擬也習射之矢書云若射之有志輖􅜛也無鏃短衛亦示不用生時志矢骨鏃凡為矢前重後輕也釋曰志矢不言鏃則無鏃也軒􅜛中者矢前後之輕重等也自君視斂至此記者更自前記之
