body:
  text: 儀禮集釋卷七宋李如圭􅁧燕禮第六鄭目録云諸侯無事若卿天天有勤勞之功與羣臣燕飲以樂之禮也案今注疏本脱此二字燕禮于五禮屬嘉禮大戴第十二小戴及别録皆第六釋曰諸侯與羣臣燕飲酒之禮燕禮小臣戒與者鄭注小臣相君燕飲之法戒與者謂留羣臣也君以燕禮勞使臣若臣有功故與羣臣樂之小臣則警戒告語焉飲酒以合㑹為歡也釋曰周禮大僕王燕飲則相其法小臣凡大事佐大僕諸侯兼官小臣當大僕之事故燕飲小臣相也留羣臣謂羣臣留在國不出使者若君臣無事亦有燕魯頌振鷺之詩是也膳宰具官􅄿于寢東鄭注膳宰天子曰膳夫掌君飲食膳羞者也具官􅄿具其官之所􅄿謂酒也牲也脯醢也寢路寢釋曰天子之宰夫下大夫膳夫上士諸侯膳宰葢亦卑于宰夫燕禮膳宰具􅄿而公食大夫宰夫具􅄿者彼食異國之大夫敬之異于己臣子也樂人縣鄭注縣鍾磬也國君無故不徹縣言縣者案言今注疏本訛作宫為燕新之釋曰燕在路寢有常縣之樂今更整理之而巳大射在學官學官不常縣故前射一日縣且具辨樂縣之位設洗篚于阼階東南當東霤案敖繼公云諸篇于此但言設洗無連言篚者又下别云篚在洗西則于此言篚文意重複且不可以東霤爲節明衍文也罍水在東篚在洗西南肆設膳篚在其北西面鄭注設此不言其官賤也當東霤者人君爲殿屋也亦南北以堂深肆陳也膳篚者君象觚所􅄿也亦南陳言西面尊之異其文釋曰霤屋檐滴水處也殿屋四向流水所謂四阿故有東霤此設洗處與士禮處同大夫以下無東霤洗當東榮耳篚亦西面互其文司宫尊于東楹之西兩方壺左𤣥酒南上公尊瓦大兩有豐幂用綌若錫在尊南南上尊士旅食于門西兩圜壺鄭注司宫天子曰小宰聽酒人之成要者也尊方壺爲卿大夫士也臣道直方于東楹之西予君專此酒也玉藻曰惟君面尊𤣥酒在南順君之面也瓦大有虞氏之尊也禮器曰君尊瓦甒豐形似豆卑而大幂用綌若錫冬夏異也在尊南在方壺之南也尊士旅食者用圜壺變于卿大夫也旅衆也士衆食謂未得正禄所謂庶人在官者也今文錫爲緆釋曰鄉飲酒尊于房户之閒賓主共之此尊近東者君尊專大惠也君西鄉尊東面以君之左爲上故𤣥酒皆在南圜壺不言上下無𤣥酒也明堂位曰泰有虞氏之尊也有虞氏上陶案原本脱陶字今據考工記補用瓦大射儀云膳尊兩甒幂夏宜綌冬宜錫葛之麤者曰綌喪服傳曰麻十五斤抽其半無事其縷有事其布曰錫方圜壺無幂以尊厭卑也天官小宰掌治王宫之政令掌酒人之成要此司宫掌宫事亦掌酒事知當天子之小宰司宫筵賓于戸西東上無加席也鄭注筵席也席用蒲筵緇布純無加席燕私禮臣屈也諸侯之官無司几筵也射人告具鄭注告事具于君射人主此禮以其或射也釋曰以其或射故與大射儀同公食大夫禮贊者告具小臣設公席于阼階上西鄉設加席公升即位于席西鄉鄭注周禮諸侯胙席莞筵紛純案胙今注疏本訛作昨加繅席畫純後設公席者凡禮卑者先即事尊者後也小臣納卿大夫卿大夫皆入門右北面東上士立于西方東面北上祝史立于門東北面東上小臣師一人在東堂下南面士旅食者立于門西東上鄭注納者以公命引而入也自士以下從而入即位耳師長也小臣之長一人猶天子大僕正君之服位者也凡入門而右由闑東左則由闑西釋曰立者位于此也西方堂下位也門東門西門内位也凡位堂下東方者西面西方者東面位門内者皆北面小臣師在東堂下南面則東堂下在堂之東公降立于阼階之東南南鄉爾卿卿西面北上爾大夫大夫皆少進鄭注爾近也移也揖而移之近之也大夫猶北面少前釋曰公降立者揖人必違其位射人請賓鄭注命當由君出也公曰命某爲賓鄭注某大夫也射人命賓賓少進禮辭鄭注命賔者東面南顧禮辭辭不敏也反命鄭注射人以賓之辭告于君又命之賓再拜稽首許諾鄭注又復釋曰稽首拜頭至地春秋傳曰非天子寡君無所稽首郊特牲曰大夫之臣不稽首非尊家臣以辟君也則臣拜君皆稽首射人反命鄭注告賓許賓出立于門外東面案敖繼公云大射儀云北面此東字葢誤也鄭注當更以賓禮入公揖卿大夫乃升就席鄭注揖之人之也案疏云言人之者公將及升堂故以人意相存偶小臣自阼階下北面請執幂者與羞膳者鄭注執幂者執瓦大之幂也方圜壺無幂羞膳羞于公謂庶羞釋曰羞進也君物曰膳凡薦謂脯醢羞謂庶羞乃命執幂者執幂者升自西階立于尊南北面東上鄭注以公命于西階前命之也東上𤣥酒之幂爲上也羞膳者從而東由堂東升自北階房中西面南上不言之者不升堂畧之也釋曰記云執幂者皆士士位在西方故于西階前命之羞膳者無升文以羞在房知由堂東自北階升也士冠禮脯醢在房贊者薦脯醢立于房中西面南上膳宰請羞于諸公卿者鄭注小臣不請而使膳宰于卑者彌畧也禮以異爲敬射人納賓鄭注射人爲擯者也今文曰擯者釋曰大射儀大射正擯擯者請賓春秋傳王以鞏伯宴使相告之相相禮者即擯者也賓入及庭公降一等揖之鄭注及至也至庭謂既入而左北面時釋曰出堂塗時也客入門而左公升就席鄭注以其將與主人爲禮不參之也釋曰燕義曰諸侯燕禮之義君立阼階之東南南鄉爾卿大夫皆少進定位也君席阼階之上居主位也君獨升立席上西面特立莫敢適之義也設賓主飲酒之禮也使宰夫為獻主臣莫敢與君亢禮也不以公卿爲賓而以大夫爲賓爲疑也明嫌之義也賓入中庭君降一等而揖之禮之也賓升自西階主人亦升自西階賓右北面至再拜賓荅再拜鄭注主人宰夫也宰夫大宰之屬掌賓客之獻飲食者也其位在洗北西面君于其臣雖爲賓不親獻以其尊莫敢伉禮也至再拜者拜賓來至也天子膳夫為獻主釋曰至再拜者賓至乃拜之有尊卑不敵之義體敵者皆言拜至周禮膳夫王燕飲酒則爲獻主主人降洗洗南西北面鄭注賓將從降鄉之釋曰洗南當北面今西北面者當辭賓降也鄉飲酒賓主異階故主人在階下辭賓降宰夫代君爲獻主升降不由阼階與賓同由西階升降故于洗南辭降賓降階西東面主人辭降賓對鄭注對荅主人北面盥坐取觚洗賓少進辭洗主人坐奠觚于篚興對賓反位鄭注賓少進者又辭宜違其位也獻不以爵辟正主也古文觚皆爲觶主人卒洗賓揖乃升鄭注賓毎先升尊也主人升賓拜洗主人賓右奠觚荅拜降盥鄭注主人復盥爲拜手坋塵也賓降主人辭賓對卒盥賓揖升主人升坐取觚鄭注取觚將就瓦大酌膳執幂者舉幂主人酌膳執幂者反幂鄭注君物曰膳膳之言善也酌君尊者尊賓也主人筵前獻賓賓西階上拜筵前受爵反位主人賓右拜送爵鄭注賓既拜前受觚退復位釋曰一升爲爵二升爲觚通言之則觚亦稱爵膳夫薦脯醢賓升筵膳宰設折俎鄭注折俎牲體骨也鄉飲酒記曰賓俎脊脅肩肺賓坐左執爵右祭脯醢奠爵于薦右興取肺坐絶祭嚌之興加于俎坐挩手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告旨執爵興主人荅拜鄭注降席席西也旨美案此下今注疏本有也字賓西階上北面坐卒爵興坐奠爵遂拜主人荅拜鄭注遂拜拜既爵也賓以虚爵降鄭注將酢主人主人降賓洗南坐奠觚少進辭降主人東面對鄭注上既言爵矣復言觚者嫌易之也大射禮曰主人西階西東面少進對今文從此以下觚皆爲爵賓坐取觚奠于篚下盥洗鄭注篚下篚南主人辭洗鄭注謙也今文無洗賓坐奠觚于篚興對卒洗及階揖升主人升拜洗如賓禮賓降盥主人降賓辭降卒盥揖升酌膳執幂如初以酢主人于西階上主人北面拜受爵賓主人之左拜送爵鄭注賓既南面授爵乃之左主人坐祭不啐酒鄭注辟正主也未薦者臣也釋曰凡獻則薦宰夫代君行禮雖受酢而不薦至獻大夫乃薦于其位不拜酒不告旨鄭注主人之義不殺案今注疏本脱此二字鄭注無俎故也案今注疏本脱此注文四字遂卒爵興坐奠爵拜執爵興賓荅拜主人不崇酒以虗爵降奠于篚鄭注崇充也不以酒惡充滿謝賓者案原本作不以酒謝實今注疏本作不以酒惡謝賓皆脱誤不可通從儀禮經傳通解所引訂正甘美君物也釋曰正主啐酒而崇酒賓降立于西階西鄭注既受獻矣不敢安盛射人升賓賓升立于序内東面鄭注東西牆謂之序大射禮曰擯者以命升賓主人盥洗象觚升實之東北面獻于公鄭注象觚觚有象骨飾也取象觚者東面釋曰南面取則背君膳篚之南有臣篚不得北面取故因自西階來東面取也實之實膳酒不言膳者可知大射禮曰洗象觚升酌膳公拜受爵主人降自西階阼階下北面拜送爵士薦脯醢膳宰設折爼升自西階鄭注薦進也大射禮曰宰胥薦脯醢由左房釋曰此篇凡應先拜者公皆後拜尊公也受獻禮重故公猶先拜賓之薦爼皆使膳宰公之薦爼異人者公尊故也大射公之賓與薦爼同人者畧于飲酒主于射公祭如賓禮膳宰贊授肺不拜酒立卒爵坐奠爵拜執爵興鄭注凡異者君尊變于賓也主人荅拜升受爵以降奠于膳篚更爵洗升酌膳酒以降案敖繼公云上下文酌膳皆無酒字此有者衍也酢于阼階下北面坐奠爵再拜稽首公荅再拜鄭注更爵者不敢襲至尊也古文更爲受主人坐祭遂卒爵再拜稽首公荅再拜主人奠爵于篚主人盥洗升媵觚于賓酌散西階上坐奠爵拜賓賓降筵北面荅拜鄭注媵送也讀或爲揚揚舉也酌散者酌方壺酒也于膳爲散今文媵皆作騰釋曰媵觚者以酬賓也賓酢主人酌膳不敢卑主人主人酬賓酌散不敢自尊也少儀君之乗車君綏曰良綏副綏曰散綏散義同此主人坐祭遂飲賓辭卒爵拜賓荅拜鄭注辭者辭其代君行酒不立飲也此降于正主酬也主人降洗賓降主人辭降賓辭洗卒洗揖升不拜洗鄭注不拜洗酬而禮殺主人酌膳賓西階上拜鄭注拜者拜其酌已案己今注疏本訛作也受爵于筵前反位主人拜送爵賓升席坐祭酒遂奠于薦東鄭注遂者因坐而奠不北面也奠之者酬不舉也釋曰于酌膳時賓即拜且手受而祭之急承主人之酌重君物也此皆異于鄉飲酒酬禮主人降復位釋曰下經薦主人於洗北則洗北者主人之位賓降筵西東南面立鄭注賓不立于序内位彌尊也位彌尊者其禮彌卑記所謂一張一弛者是之𩔖與小臣自阼階下請媵爵者公命長鄭注命長使選卿大夫之中長幼可使者釋曰媵爵者獻酬禮成更舉酒于公以爲旅酬之始小臣作下大夫二人媵爵鄭注作使也卿爲上大夫不使之者爲其尊媵爵者阼階下皆北面再拜稽首公荅再拜鄭注再拜稽首拜君命也媵爵者立于洗南西面北上序進盥洗角觶升自西階序進酌散交于楹北降阼階下皆奠觶再拜稽首執觶興公荅再拜鄭注序次第也猶代也楹北西楹之北也交而相待于西階上既酌右還而反往來以右為上釋曰盥洗北面酌散宜鄉君東面其在洗南及西階上皆先者在右媵爵者皆坐祭遂卒觶興坐奠觶再拜稽首執觶興公荅再拜媵爵者執觶待于洗南鄭注待君命也小臣請致者鄭注請使一人與二人與優君也釋曰二人俱致禮之當然優君故取君進止若君命皆致則序進奠觶于篚阼階下皆再拜稽首公荅再拜媵爵者洗象觶升實之序進坐奠于薦南北上降阼階下皆再拜稽首送觶公荅再拜鄭注序進徃來由尊北交于東楹之北奠于薦南不敢必君舉也大射禮曰媵爵者皆退反位釋曰尊在東楹之西以執幂者在尊南故既酌由尊北楹北徃奠于君所薦南君左也鄉射記曰凡奠者于左將舉于右公坐取大夫所媵觶興以酬賓賓降西階下再拜稽首公命小臣辭賓升成拜鄭注興以酬賓就其階而酬之也升成拜復再拜稽首也先時君辭之于禮若未成然釋曰此君爲賓舉旅行酬也酬賓就西階降尊以就卑也臣拜君皆于堂下孔子曰拜下禮也今拜乎上泰也雖違衆吾從下公坐奠觶荅再拜執觶興立卒觶賓下拜小臣辭賓升再拜稽首鄭注不言成拜者爲拜故下實未拜也下不輒拜禮殺也此賓拜于君之左不言之者不敢敵偶于君釋曰燕義曰君舉旅于賓及君所賜爵皆降再拜稽首升成拜明臣禮也君荅拜之禮無不荅明君上之禮也臣下竭力盡能以立功于國君必報之以爵禄故臣下皆務竭力盡能以立功是以國安而君寧禮無不荅言上之不虗取于下也公坐奠觶荅再拜執觶興賓進受虗爵降奠于篚易觶洗鄭注君尊不酌故也凡爵不相襲者也于尊者言更自敵以下言易更作新易有故之辭進受虗爵尊君也不言公酬賓于西階上及公反位者亦尊君空其文也釋曰受尊者爵與尊者爵皆言更受卑者爵與卑者爵皆言易此公酬賓與卑者爵故言易也公有命則不易不洗反升酌膳觶案敖繼公云觶衍文大射儀無之下拜小臣辭賓升再拜稽首鄭注下拜下亦未拜凡下未拜有二或禮殺或君親辭君親辭則聞命即升升乃拜是以不言成拜案以原本作亦從今注疏木公荅再拜鄭注拜于阼階上也于是賓請旅侍臣釋曰請行酒于羣臣也記曰凡公所酬既拜請旅侍臣賓以旅酬于西階上鄭注旅序也以次序勸卿大夫飲酒射人作大夫長升受旅鄭注言作大夫則卿存矣長者尊先而卑後釋曰王制曰上大夫卿通言之則卿亦大夫賓大夫之右坐奠觶拜執觶興大夫荅拜鄭注賓在右者相飲之位釋曰賓位在西而今在大夫之東者相飲之位如此賓坐祭立飲卒觶不拜鄭注酬而禮殺若膳觶也則降更觶洗升實散大夫拜受賓拜送鄭注言更觶卿尊也釋曰賓卑于卿故酬卿言更觶大夫辯受酬如受賓酬之禮不祭卒受者以虗觶降奠于篚鄭注卒猶後也大射禮曰奠于篚復位今文辯皆作徧釋曰不祭者禮殺也大夫復門右北面位旅卿大夫辯不及士主人洗升實散獻卿于西階上鄭注酬而後獻卿别尊卑也飲酒成于酬也司宫兼卷重席設于賓左東上鄭注言兼卷則毎卿異席也重席重蒲筵緇布純也卿坐東上統于君也席自房來卿升拜受觚主人拜送觚卿辭重席司宫徹之鄭注徹猶去也重席雖非加猶爲其重累去之辟君也釋曰重者一種席重設之異席則稱加乃薦脯醢卿升席坐左執爵右祭脯醢遂祭酒不啐酒降席西階上北面坐卒爵興坐奠爵拜執爵興主人荅拜受爵卿降復位鄭注不酢辟君也卿無俎者燕主于羞辯獻卿主人以虗爵降奠于篚鄭注今文無奠于篚射人乃升卿卿皆升就席若有諸公則先卿獻之如獻卿之禮鄭注諸公者謂大國之孤也孤一人言諸者容牧有三監釋曰王制曰天子使其大夫爲三監監于方伯之國殷制也周制以伯佐牧容有因殷不改者周禮公之孤四命天子大夫四命與孤等故同稱公席于阼階西北面東上無加席鄭注席孤北面爲其大尊屈之也亦因阼階西位近君近君則屈親􅃂苟敬私昵之坐小臣又請媵爵者二大夫媵爵如初鄭注又復請致者若命長致則媵爵者奠觶于篚一人待于洗南長致致者阼階下再拜稽首公荅再拜鄭注命長致者公或時未能舉自優暇也古文云阼階下北面再拜案今注疏本脱此十字釋曰若者不定之辭前所媵二觶上觶以爲賓舉旅下觶以爲卿舉旅今所媵一觶以爲大夫舉旅所用惟此三觶而言若命長致者優君之辭洗象觶升實之坐奠于薦南降與立于洗南者二人皆再拜稽首送觶公荅再拜鄭注奠于薦南者于公所用酬賓觶之處二人俱拜以其共勸君公又行一爵若賓若長惟公所酬鄭注一爵先媵者之下觶也若賓若長則賓禮殺矣長公卿之尊者也賓則以酬長長則以酬賓釋曰此爲卿舉旅也故惟公所酬以旅于西階上如初大夫卒受者以虗觶降奠于篚主人洗升獻大夫于西階上大夫升拜受觚主人拜送觚大夫坐祭立卒爵不拜既爵主人受爵大夫降復位鄭注既盡也不拜之者禮又殺釋曰前卿受獻不酢主人今大夫受獻又不拜既爵胥薦主人于洗北西面脯醢無脀鄭注胥膳宰之吏也主人大夫之下先大夫薦之尊之也不于上者上無其位也脀爼實釋曰胥庶人在官爲什長者薦羞者皆膳宰知胥膳宰之吏也脀升也升牲體于爼故爲爼實辯獻大夫遂薦之繼賓以西東上鄭注徧獻之乃薦畧賤也亦獻而后布席也卒射人乃升大夫大夫皆升就席案今注疏本脱此句升字
