body:
  text: 儀禮集釋卷十八宋李如圭撰喪服疏衰裳齊牡麻絰無受者鄭注無受者服是服而除不以輕服受之不著月數者天子諸侯葬異月也小記曰齊衰三月與大功同者繩屨釋曰凡喪皆既葬受以輕服此服三月既葬而除其為天子諸侯者葬而又反服之舊說此章衰裳六升冠九升如圭按曾祖父母不當為義服其衰亦宜五升冠八升不言冠帶屨者因服輕畧之繩屨者以麻糾繩為之凡用麻者以繩為經故齊衰期麻屨無受者繩屨寄公為所寓鄭注寓亦寄也為所寄之國君服釋曰春秋傳衛侯出奔齊齊人以郲寄衛侯詩序曰狄人迫逐黎侯寓於衛是謂寄公傳曰寄公者何也失地之君也何以為所寓服齊衰三月也言與民同也鄭注諸侯五月而葬而服齊衰三月者三月而藏其服至葬又反服之案反今注疏本作更既葬而除之釋曰郊特牲曰諸侯不臣寓公故服所寓惟與民同丈夫婦人為宗子宗子之母妻鄭注婦人女子子在室及嫁歸宗者也宗子繼别之後百世不遷所謂大宗也釋曰宗子有君族之道故族人皆為齊衰三月其在五屬之内則三月之後自以本服終之宗子之母妻統族人之婦故族人亦為之服曾子問曰宗子雖七十無無主婦義由于此傳曰何以服齊衰三月也尊祖也尊祖故敬宗敬宗者尊祖之義也宗子之母在則不為宗子之妻服也釋曰無二統故也下記宗子不孤為殤則族人不為之服孤為殤者乃服之義亦猶此宗子母在雖不為宗子之妻服然舅没則姑老宗子之妻收放承祭之重異于他人故宗子母在得為妻禫大𫝊曰自仁率親等而上之至于祖自義率祖順而下之至于禰故人道親親也親親故尊祖尊祖故敬宗敬宗故收族收族故宗庿嚴為舊君君之母妻𫝊曰為舊君者孰謂也仕焉而己者也何以服齊衰三月也言與民同也君之母妻則小君也鄭注仕焉而已者謂老若有廢疾而致仕者也為小君服者恩深于民釋曰仕焉而已則釋斬而齊者别親疏明貴賤也案士相見禮凡自稱于君宅者在邦則曰市井之臣在野則曰草莽之臣宅者謂致仕者也孟子曰在國曰市井之臣在野曰草莽之臣皆謂庶人宅者稱謂與庶人正同故其服亦同庶人為國君鄭注不言民而言庶人庶人或有在官者天子畿内之民服天子亦如之釋曰庶人在官者謂府史胥徒也檀弓曰公之喪諸達官之長杖則庶人在官者不杖斬同于民而已大夫在外其妻長子為舊國君鄭注在外待放已去者𫝊曰何以服齊衰三月也妻言與民同也長子言未去也鄭注妻雖從夫而出古者大夫不外娶婦人歸宗徃來猶民也春秋𫝊曰大夫越竟逆女案竞今注疏本作境非禮君臣有合離之義長子去可以無服釋曰長子言未去則妻已去矣長子未去固從庶人之服而特著之者以大夫之適子為君得服士服嫌大夫已去猶為君斬也士之妻服舊國君與大夫妻同經欲明大夫長子之服故主大夫而言耳大夫之庶子士之子未去則庶人服之已去則皆不服上下條曰舊君此曰舊國君者以在其國而服之義繋于國故與庶人爲國君之文同繼父不同居者鄭注嘗同居今不同曽祖父母𫝊曰何以齊衰三月也小功者兄弟之服也不敢以兄弟之服服至尊也鄭注正言小功者服之數盡于五則髙祖宜緦麻曽祖宜小功也據祖期則曽祖宜大功案今注疏本脱宜字髙祖宜小功也曾祖髙祖案各本作髙祖曾祖據通典所引先曾祖方與下先曾孫語相貫皆有小功之差則曾孫𤣥孫為之服同也重其衰麻尊尊也減其日月恩殺也釋曰減其日月者減五月為三月也兄弟猶言族親也記曰小功以下為兄弟與己同出于曾祖者已皆為之小功故不敢以其服服曾祖也曾猶重也曾祖以上皆謂之曾祖曾孫以下皆謂之曾孫雖成王之于后稷蒯聵之于康叔皆稱曾孫故喪服無髙祖𤣥孫之文雖十世之祖茍相逮者必為之齊衰三月小記所謂親親以三為五以五為九上殺下殺旁殺而親畢者自為旁親生文旁親之殺極于九正統則固無絶道也不言以五為七者因曾祖以上曾孫以下之服皆同故畧為一節言之大夫為宗子𫝊曰何以服齊衰三月也大夫不敢降其宗也釋曰大夫不奪宗故也曾子問曰宗子為士庶子為大夫以上牲祭於宗子之家小宗且然大宗可知舊君鄭注大夫待放未去者𫝊曰大夫為舊君何以服齊衰三月也大夫去君埽其宗庿故服齊衰三月也言與民同也何大夫之謂乎言其以道去君而猶未絶也鄭注以道去君謂三諌不從待放于郊未絶者言爵禄尚有列于朝出入有詔于國妻子自若民也釋曰案𫝊言大夫去又曰以道去君葢大夫已去而服舊君之有恩禮者非待放未去者也雜記曰違諸侯之大夫不反服檀弓曰仕而未有禄者違而君薨弗為服也其為反服者則此經是已穆公問于子思曰為舊君反服古與曰古之君子進人以禮退人以禮故有舊君反服之禮齊宣王問孟子曰禮為舊君有服何如斯可為之服曰諫行言聽膏澤下於民有故而去則君使人導之出疆又先之於其所徃去三年不反然後收其田里如此則為之服子思孟子所言皆據此𫝊也埽其宗廟謂􅂸除之也鄭以此經為大夫待放未去又以子思所論為仕焉而已者失之矣雜記又曰違大夫之諸侯不反服則此經舊君亦通謂大夫君士去其國為舊君亦然𫝊舉大夫而言耳曾祖父母為士者如衆人𫝊曰何以齊衰三月也大夫不敢降其祖也女子子嫁者未嫁者為曾祖父母𫝊曰嫁者其嫁于大夫者也未嫁者其成人而未嫁者也何以服齊衰三月不敢降其祖也鄭注言嫁于大夫者明雖尊猶不降也成人謂年二十已笄醴者也此著不降案著今注疏本訛作者明有所降釋曰成人有出道嫌即得降其祖故特出以明之大功布衰裳牡麻絰無受者鄭注大功布者其鍛治之功麤沽之釋曰布用功麤畧故曰大功布也小功則功差細宻緦則治其縷細如絲矣閒𫝊曰大功七升八升九升此章皆齊衰以上之殤降而服大功其齊裳七升冠十升衰服不言齊者齊之可知無受者既卒哭不變服也服問曰殤非重麻為其無卒哭之税所謂無受也子女子子之長殤中殤鄭注殤者男女未冠笄而死可傷者案傷各本訛作殤今改正女子子許嫁不為殤也釋曰言子者長子亦在焉以殤死畧之小記曰丈夫冠而不為殤婦人笄而不為殤春秋伯􅁎卒公羊𫝊曰此未適人何以卒許嫁矣婦人許嫁字而笄之死則以成人之喪治之傳曰何以大功也未成人也何以無受也喪成人者其文縟喪未成人者其文不縟故殤之絰不樛垂葢未成人也年十九至十六為長殤十五至十二為中殤十一至八歲為下殤不滿八歲以下皆為無服之殤案今注疏本脱皆字唐石經亦有無服之殤以日易月以日易月之殤殤而無服故子生三月則父名之死則哭之未名則不哭也鄭注縟猶數也其文數者謂變除之節也不樛垂者不絞其帶之垂者雜記曰大功以上散帶以日易月謂生一月者哭之一日也殤而無服者哭之而已為昆弟之子女子子亦如之凡言子者可以兼男女又云女子子者殊之以子關適庶也釋曰凡喪小斂後皆服麻大功以上垂其帶是謂散帶至成服而絞之小功以下初而絞之殤則自初以至成服皆垂之而不絞是謂不樛垂其文不縟與無受之義同以日易月者謂若滿七歲則八十四日哭之惟期親則然故𫝊于此章𤼵之大功親以下不復有以日易月之哭馬融王肅以為以哭之日易服之月謂若當服期者則哭之十有三日當服緦者則哭之三日非也期親長中殤降而大功下殤降而小功猶有緦一等以無服之殤未及于禮不以緦服之隨其生月制為哭日若大功則長中殤降而小功下殤降而緦無服之殤服名已絶與小功中殤緦之長殤皆已無服矣柰何生三月而更制哭日乎束晳曰緦麻不服長殤小功不服中殤大功不為易月哭惟齊衰乃備四殤叔父之長殤中殤姑姊妹之長殤中殤昆弟之長殤中殤夫之昆弟之子女子子之長殤中殤適孫之長殤中殤大夫之庶子為適昆弟之長殤中殤公為適子之長殤中殤大夫為適子之長殤中殤鄭注公君也諸侯大夫不降適殤者重適也天子亦如之釋曰天子諸侯絶服旁親大夫降一等正統之親則皆不降故經兩見之其長殤皆九月纓絰其中殤七月不纓絰鄭注絰有纓者為其重也自大功以上絰有纓以一條繩為之小功已下絰無纓也釋曰纓所以固絰亦于頥下結之小記曰再期之喪三年也期之喪二年也九月七月之喪三時也五月之喪二時也三月之喪一時也喪服之正無七月七月者謂此中殤之服也大功布衰裳牡麻絰纓布帶三月受以小功衰即葛九月者鄭注受猶承也釋曰此章衰裳三等降服七升正服八升冠皆十升義服九升冠十一升三月既葬各以其冠為受十升十一升者小功之布故曰受以小功衰也下記曰大功八升若九升小功十升若十一升記此受服之差也纓絰者絰有纓也大功九月以上絰有纓故于此著之即就也傳曰大功布九升小功布十一升鄭注此受之下也以𤼵傳者明受盡于此也又受麻絰以葛絰間傳曰大功之葛與小功之麻同凡天子諸侯卿大夫既虞士卒哭而受服正言三月者天子諸侯無大功主于大夫士也此雖有君為姑姊妹女子子嫁于國君者非内喪也案凡天子諸侯至此五十四字注疏本接上注受猶承也之下古文依此禮也案今注疏本脫此六字又古文二字下當有訛脫釋曰傳據義服大功而言也義服大功衰九升受以小功衰十一升服之有受者止于此小功以下無受也凡為天子諸侯必以重服服之嫁于國君者彼國雖以五月葬此國自以三月受服姑姊妹女子子適人者𫝊曰何以大功也出也鄭注出必降之者葢有受我而厚之者釋曰雜記曰伯母叔母疏衰踊不絶地姑姊妹之大功踊絶于地若知此者由文矣哉由文矣哉絶地離地也伯叔母義也姑姊妹骨肉也姑姊妹雖已出降其情猶不殺也從父昆弟鄭注世父叔父之子也其姊妹在室亦如之釋曰世父叔父從父而别故謂其子為從父昆弟為人後者為其昆弟傳曰何以大功也為人後者降其昆弟也庶孫鄭注男女皆是下殤小功章曰為姪庶孫丈夫婦人同適婦鄭注適婦適子之妻傳曰何以大功也不降其適也鄭注婦言適者從夫名釋曰婦人從服夫黨之尊者降于夫一等所為服者亦降其夫一等報之婦為舅姑期舅姑宜為之大功又以正尊降之服小功惟適婦則不降小記曰適婦不為舅後者則姑為之小功女子子適人者為衆昆弟鄭注父在則同父没乃為為父後者服期也案為父後者為之服期各本脫一為字今據文義補姪丈夫婦人報鄭注為姪男女服同釋曰姪者嫁姑謂其昆弟之子女子子也言婦人者明已嫁者與在室之服同下經大夫之妻為姑姊妹嫁于大夫者大功為人後者為其姊妹適人者小功則以出降者兩皆出亦止降一等傳曰姪者何也謂吾姑者吾謂之姪釋曰春秋傳曰姪其從姑夫之祖父母世父母叔父母傳曰何以大功也從服也夫之昆弟何以無服也其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎故名者人治之大者也可無愼乎鄭注道猶行也言婦人棄姓無常秩嫁于父行則為母行嫁于子行則為婦行案今注疏本脫此二十四字謂弟之妻為婦者卑逺之故謂之婦嫂者尊嚴之稱是嫂亦可謂之母乎案今注疏本脫此八字言不可案各本脫此三字今據通典所引補嫂猶叟也叟老人之稱也是為序男女之别耳若已以母婦之服服兄弟之妻兄弟之妻以舅子之服服已則是亂昭穆之序也治猶理也父母兄弟夫婦之理人倫之大者可不愼乎大傳曰同姓從宗合族屬異姓主名治際㑹名著而男女有别釋曰母道者名之為母以名服之與其夫同婦道者名之為婦以服已之服報之昆弟之妻本非母婦之行不可服以母婦之服又不得以妻道屬其昆弟之妻故昆弟之妻與夫之昆弟不相為服其謂之嫂與婦者以名逺之耳夫之祖父母世叔父母夫皆服期故妻從服大功為昆弟子夫之昆弟子之妻之服經無文案下經為夫之姑小功為夫之諸祖父母緦皆言報則夫之旁尊于卑者之婦皆報之不盡出耳王肅以為與己子之婦同服小功非旁尊報之例也大夫為世父母叔父母子昆弟昆弟之子為士者鄭注子謂庶子傳曰何以大功也尊不同也尊同則得服其親服鄭注尊同謂亦為大夫者親服期公之庶昆弟大夫之庶子為母妻昆弟鄭注公之庶昆弟則父卒也大夫之庶子則父在也其或為母謂妾子也釋曰昆弟者繫于今君之稱言公之昆弟則庶自明矣重言庶者主見為母者指妾子為其母適子為母自伸其本服傳曰何以大功也先君餘尊之所厭不得過大功也大夫之庶子則從乎大夫而降也父之所不降子亦不敢降也鄭注言從乎大夫而降則于父卒如國人也昆弟庶昆弟也舊讀昆弟在下其于厭降之義宜蒙此傳也是以上而同之父所不降謂適也釋曰大夫降其庶子庶婦一等為貴妾緦故大夫庶子為其母妻昆弟亦降期而大功諸侯絶服庶子庶婦不服妾故公子不敢服其母妻昆弟先君既没猶厭于餘尊服大功而已凡屈而降服者皆以心喪終其月數劉智曰小功以下不稅服者乃無心喪耳厭降之與尊降異者不降其正統之親及旁親之尊同者厭降者父所不服則皆不敢服之榖梁傳曰公子之重視大夫公之昆弟其尊與大夫等而其服有不同者以此公之昆弟于大功以下乃無餘尊之厭得伸于尊不同者則自以己旁尊降之一等與大夫同皆為其從父昆弟之為大夫者鄭注皆者言其互相為服尊同則不相降其為士者降在小功適子為之亦如之釋曰皆者皆公之庶昆弟大夫之庶子也公之昆弟為從父昆弟為大夫不降者以尊同大夫之庶子不降者以父所不降也大夫之適子亦然承上庶子之文而不及于適耳為夫之昆弟之婦人子適人者鄭注婦人者女子子也不言女子子者因出見恩疏大夫之妾為君之庶子鄭注下傳曰何以大功也妾為君之黨服得與女君同指為此也妾為君之長子亦三年自為其子期異于女君也士之妾為君之衆子亦期女子子嫁者未嫁者為世父母叔父母姑姊妹傳曰嫁者其嫁于大夫者也未嫁者成人而未嫁者也案以上乃本節經文之傳何以大功也妾為君之黨服得與女君同案此十六字乃上節經文之𫝊鄭注以為文爛在下是也鄭注舊讀合大夫之妾為君之庶子女子子嫁者未嫁者言大夫之妾為此三人之服也案舊讀以下三十二字各本訛在經之下傳曰之上文勢遂不相貫今改正下言為世父母叔父母姑姊妹者謂妾自服其私親也案此二十一字各本椄傳得與女君同下為𫝊文唐石經亦然賈氏疏乃云下言二字及者謂妾自服其私親也九字總十一字既非子夏自著又非舊讀者自安是誰置之也今以義必是鄭君置之鄭君欲分别舊讀者如此意趣然後以注破之據疏此說以為世父母叔父母姑姊妹十字為傳文以下言二字及者謂妾自服其私親也九字共十一字為鄭所加不知經既見為世父母叔父母姑姊妹十字𫝊不應重見此十字而絶不釋其意是二十一字通為鄭注無疑且考其文義上云言大夫之妾為此三人之服也下云謂妾自服其私親也一言字一謂字皆指舊讀者之意如是自舊讀至此不辭凡五十六字一氣連貫不可截斷今訂正此不辭即實為妾遂自服其私親當言其以明之案明今注疏本作見齊衰三月章曰女子子嫁者未嫁者為曾祖父母經與此同足以明之矣案明今注疏本亦作見傳所云何以大功也妾為君之黨服得與女君同文爛在下耳女子子成人者有出道降旁親及將出者明當及時也釋曰未嫁者為此期親當服期而服大功者以其成人將出欲其及時故逆降旁親也假年十九而遭期喪降之為大功則得及時而嫁大功之末可以嫁子故也馬融舊讀以大夫之妻降其庶子大功為女子子未嫁者亦然其嫁于大夫者則以出降無尊降亦大功大夫之妾為此三人者悉從女君之服其自服其私親世父以下則無尊厭降一如邦人出降一等兩義各異故經兩言為以别之其義自通鄭義于經文為順特成人未嫁者得逆降其旁親為異耳大夫大夫之妻大夫之子公之昆弟為姑姊妹女子子嫁于大夫者釋曰凡婦人從其夫之爵位故大夫之妻得體夫之尊其服與大夫同君為姑姊妹女子子嫁于國君者傳曰何以大功也尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君公子之子稱公孫公孫不得祖諸侯此自卑别于尊者也若公子之子孫有封為國君者則世世祖是人也不祖公子此自尊别于卑者也是故始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟封君之孫盡臣諸父昆弟故君之所為服子亦不敢不服也君之所不服子亦不敢服也鄭注不得禰不得祖者不得立其庿而祭之也卿大夫以下祭其祖禰則世世祖是人不得祖公子者後世為君者祖此受封之君不得祀别子也公子若在髙祖以下則如其親服後世遷之乃毁其庿爾因國君以尊降其親故終說此義云釋曰檀弓曰齊穀王􅁎之喪魯莊公為之大功由魯嫁故為之服姊妹之服春秋伯􅁎卒榖梁𫝊曰外夫人不卒此其言卒何也吾女也適諸侯則尊同以吾為之變卒之也其尊不同者則皆絶服也所不臣者鄭氏謂以其親服服之荀顗以為大夫猶降其親則諸侯雖所不臣者亦絶不服虞喜以為大夫亦當從諸侯之例一世為大夫不降兄弟二世不降諸父三世乃皆降之如圭謂諸侯世國大夫不世爵禄恐不得以世數為比所不臣者服此國君先儒据小記謂與諸侯為兄弟者服斬疑亦未然繐衰裳牡麻絰既葬除之者傳曰繐衰者何以小功之繐也鄭注治其縷如小功而成布四升半細其縷者以恩輕也升數少者以服至尊也凡布細而疏者謂之繐今南陽有鄧繐釋曰繐衰裳縷如小功又服天子七月既葬而除故章次在大功九月下也其冠八升戴徳謂絰亦當同小功之絰馬融以小功帶絰言澡麻此但言牡麻則絰當從大功諸侯之大夫為天子傳曰何以繐衰也諸侯之大夫以時接見乎天子鄭注接猶㑹也諸侯之大夫以時㑹見于天子而服之則其士庶民不服可知釋曰㑹見謂聘覜之屬雖未㑹見猶服之周衰子栁之妻以繐衰環絰服其舅叔仲皮又有綌衰而繐裳者皆非禮小功布衰裳澡麻帶絰五月者鄭注澡者治去莩垢不絶其本也小記曰下殤小功帶澡麻不絶其本屈而反以報之釋曰閒傳曰小功十升十一升十二升此殤小功衰裳十升冠亦如之澡麻者以牡麻澡戛之使滑淨也小功以下皆然凡言絰則帶在其中矣此又言帶者欲見下殤之帶不絶其本屈而反以報之異于餘帶也凡絰大功以上有本小功以下斷本下殤小功本齊衰之親首絰無本而要絰猶有本又凡殤皆散帶垂下殤小功則屈所垂散帶上至于要乃中分麻為兩股合糾為繩垂之以明親重故經帶絰兩見而帶又序絰上主為下殤生文也賀瑒曰下殤小功之服男子澡麻帶婦人澡麻絰故帶在絰上男子絰婦人帶仍用牡麻非鄭義也凡喪年月已過而始聞喪者大功以上皆追服之謂之稅小功則否檀弓曰小功不稅小記曰降而在緦小功者則稅之叔父之下殤適孫之下殤昆弟之下殤大夫庶子為適昆弟之下殤為姑姊妹女子子之下殤為人後者為其昆弟釋曰此下少之長殤三字從父見弟之長殤傳曰問者曰中殤何以不見也大功之殤中從上小功之殤中從下鄭注問者據從父昆弟之下殤在緦麻也大功小功皆謂服其成人也大功之殤中從上則齊衰之殤亦中從上也此主謂大夫之為殤者服也凡不見者以此求之也釋曰下𫝊曰齊衰之殤中從上大功之殤中從下彼謂婦人為夫黨之殤生文知此則主謂丈夫也不見中殤者以服差輕從省文為夫之叔父之長殤鄭注不見中殤者中從下也昆弟之子女子子夫之昆弟之子女子子之下殤釋曰昆弟之子女子子下殤在此章則長中殤當大功矣公大夫為適長中殤大功則下殤亦小功也互文耳為姪庶孫丈夫婦人之長殤大夫公之昆弟大夫之子為其昆弟庶子姑姊妹女子子之長殤鄭注大夫為昆弟之長殤小功謂為士者若不仕者也以此知為大夫無殤服也公之昆弟不言庶者此庶服無所見也大夫之子不言庶者關適子亦服此殤也云公之昆弟為庶子之長殤則知公之昆弟猶大夫釋曰大夫為昆弟之為士者尊不同故降其長殤大功而為小功也然則尊司者不降矣而大功章不見大夫為昆弟之長殤者為大夫無殤服也五十命為大夫者禮之常其或少有才徳命為大夫者雖在殤年而死亦不以殤服服之故大夫無為昆弟之殤大功也公子之重視大夫舊見大夫昆弟相為期而公之昆弟相為大功遂疑公之昆弟與大夫之尊不等此經大夫與公之昆弟為庶子以下之殤服同則公之昆弟與大夫之尊不殊也上章公之昆弟言庶者主見妾母之服此無取于庶之義故不言妾大夫之妾為庶子之長殤鄭注君之庶子小功布衰裳牡麻絰即葛五月者鄭注即就也小功輕三月變麻因故衰以就葛絰帶而五月也間傳曰小功之葛與緦之麻同舊説小功以下吉屨無絇也釋曰此章降服衰冠十升正服十一升義服十二升牡麻不言澡因上文也絇屨飾也吉屨大飾故去其絇從祖祖父母從祖父母報鄭注祖父之昆弟之親釋曰從祖父者從祖祖父之子父之從父昆弟也報者為昆弟之孫從父昆弟之子亦小功故其長殤皆緦凡旁尊之服皆報從祖祖母從祖母云報則凡夫之卑屬皆報之可知從祖昆弟鄭注父之從父昆弟之子釋曰上三小功與己同出于曾祖而别故以從祖名之從父姊妹鄭注父之昆弟之女孫適人者鄭注孫者子之子女孫在室亦大功也為人後者為其姊妹適人者鄭注不言姑者舉其親者而恩輕者降可知釋曰上章為人後者為其昆弟而不言世叔父猶此為外祖父母傳曰何以小功也以尊加也釋曰從乎母而服之也母之正尊故加緦而小功從母丈夫婦人報鄭注從母母之姊妹釋曰從乎母而有母名故曰從母旁尊故報之傳曰何以小功也以名加也外親之服皆緦也鄭注外親異姓正服不過緦丈夫婦人姊妹之子男女同釋曰言婦人者異姓無出降已嫁與在室者同服故舉其成人之名外親之服以緦斷外祖有尊從母有名因其可加而加之男女異長母于姊妹有相親之近情故加及于從母而不及于舅夫之姑姊妹娣姒婦報鄭注夫之姑姊妹不殊在室及嫁者因恩輕畧從降釋曰從于夫而降一等當大功恩輕故與嫁者皆小功傳曰娣姒婦者弟長也何以小功也以為相與居室中則生小功之親焉鄭注娣姒婦者兄弟之妻相名也長婦謂稺婦為娣婦娣婦謂長婦為姒婦釋曰年小者曰娣年大者曰姒穆姜謂聲伯之母為姒伯華妻謂叔向妻為長叔姒則弟之妻亦曰姒也兄妻非母道弟妻非婦道以相與居室而小功耳娣姒婦兩見則相為服自明報文指為夫之姑姊妹而退在下者要娣姒之服亦因夫而生故使并蒙上文大夫大夫之子公之昆弟為從父昆弟庶孫姑姊妹女子子適士者鄭注從父昆弟及庶孫亦謂為士者大夫之妾為庶子適人者鄭注君之庶子女子子也庶女子子在室大功其嫁于大夫亦大功釋曰上文云適士則此亦適士也適士者小功則嫁于大夫者大功大功章大夫之妾與女子子嫁者傳謂嫁于大夫是也鄭氏曰凡女行于大夫以上曰嫁行于士庶人曰適人葢據此也庶婦鄭注夫將不受重者釋曰凡父母于子舅姑于婦將不傳重于適及將所傳重非適者服之如庶子庶婦君母之父母從母鄭注君母君之適妻也從母君母之姊妹傳曰何以小功也君母在則不敢不從服君母不在則不服鄭注不敢不服者恩實輕也凡庶子為君母如適子釋曰小記曰為君母後者君母卒則不為君母之黨服是則君母卒雖為後者猶不服其黨徒從者所從亡則已也庶子亦自服其母之黨下記曰庶子為父後者為其外祖父母從母舅無服不為後如邦人馬氏以為外親無二統君母在則降其外祖父母緦君母卒乃得申服凡親母之黨惟母出則無施服母猶服之母之君母則否小記曰為母之君母母卒則不服亦徒從故也為繼母之黨無服親母出則服之服問曰母出則為繼母之黨服母死則為其母之黨服為其母之黨服則不為繼母之黨服雖外親亦無二統故也慈母恩不能及其黨小記曰為慈母之父母無服君子子為庶母慈已者鄭注君子子者大夫及公子之適妻子傳曰君子子者貴人之子也為庶母何以小功也以慈已加也鄭注云君子子者則父在也父没則不服之矣以慈已加則君子子亦以士禮為庶母緦也内則曰異為孺子室於宫中擇於諸母與可者必求其寛裕慈惠温良恭敬愼而寡言者使為子師其次為慈母其次為保母皆居子室他人無事不徃又曰大夫之子有食母庶母慈已者此之謂也其可者賤于諸母案今注疏本脫此七字謂𫝊姆之屬也其不慈已則緦可矣不言師保慈母居中服之可知也國君世子生卜士之妻大夫之妾使食子三年而出見於公宫則劬非慈母也士之妻自養其子釋曰父没不服謂不服小功仍服緦也禮言貴人君子者皆謂大夫以上士之子賤無庶母慈已者國君子雖有此三母厭而不服故知君子子者指謂大夫及公子之適妻子其妾子賤亦無此三母也曾子問曰子游問喪慈母如母禮與孔子曰非禮也古者男子外有傅内有慈母君命所使教子也何服之有則庶母慈已者公子不服梁武帝曰庶母慈已謂適妻之子無母使妾養之者適妻之子妾無為母之義故謂之庶母慈已者而服以小功若子非無母擇賤者視之者亦有慈母之名此母無服内則所云是也子游所問乃此慈母故夫子曰非禮
