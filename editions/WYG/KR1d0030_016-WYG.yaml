body:
  text: 儀禮集釋卷十六宋李如圭撰覲禮第十鄭目錄云覲見也諸侯秋見天子之禮春見曰朝夏見曰宗秋見曰覲冬見曰遇朝宗禮備覲遇禮省是以享獻不見焉三時禮亡惟此存爾覲禮于五禮屬賔禮案今注疏本脱禮字大戴第十六小戴第十七别錄第十覲禮至于郊王使人皮弁用璧勞侯氏亦皮弁迎于帷門之外再拜鄭注郊謂近郊去王城五十里小行人職曰凡諸侯入王則逆勞于畿則郊勞者大行人也皮弁者天子之朝朝服也璧無束帛者天子之玉尊也不言諸侯言侯氏者明國殊舍異禮不凡之也郊舍狹寡為帷宫以受勞掌舍職曰為帷宫設旌門使者不荅拜遂執玉三揖至于階使者不讓先升侯氏升聽命降再拜稽首遂升受玉鄭注不荅拜者為人使不當其禮也不讓先升奉王命尊也升者升壇使者東面致命侯氏東階上西面聽之釋曰案此下原本缺使者左還而立侯氏還璧使者受侯氏降再拜稽首使者乃出鄭注左還還南面示將去也立者見侯氏將有事于已俟之也還玉重禮侯氏乃止使者使者乃入侯氏與之讓升侯氏先升授几侯氏拜送几使者設几荅拜鄭注侯氏先升賓禮統焉几者安賓所以崇優厚也上介出止使者則已布席也釋曰統者統于主人也使者不坐而設几優賓也諸侯之卿卑聘禮卿勞儐之不設几侯氏用束帛乘馬儐使者使者再拜受侯氏再拜送幣鄭注儐使者所以致尊敬也拜者各于其階使者降以左驂出侯氏送于門外再拜侯氏遂從之鄭注騑馬曰驂左驂設在西者其餘三馬侯氏之士遂以出授使者之從者于外從之者遂隨使者以至朝釋曰馬在庭北面西上聘禮賓亦執左馬以出馬在旁者曰驂天子使尊雖從之亦拜送天子賜舍鄭注以其新至道路勞苦未受其禮且使即安也賜舍猶致館也所使者司空與小行人為承儐今文賜皆作錫案今注疏本脫皆字釋曰聘禮賓至即欲受之者主人之禮覲禮且使即安者君上之惠勞如字曰案唐石經無曰字伯父女順命于王所賜伯父舍鄭注此使者致館辭侯氏再拜稽首鄭注受館儐之束帛乘馬鄭注王使人以命致館無禮猶儐之者尊王使也侯氏受館于外既則儐使者于内天子使大夫戒曰某日伯父帥乃初事鄭注大夫者卿為訝者也掌訝職曰凡訝者賓客至而徃詔相其事戒猶告也其為告使順循其事也初猶故也古文帥作率侯氏再拜稽首鄭注受覲日也諸侯前朝皆受舍于朝同姓西面北上異姓東面北上鄭注言諸侯者明來朝者衆矣顧其入覲不得竝耳受舍于朝受次于文王庿門之外聘禮曰宗人授次次以帷少退于君之次則是次也言舍者尊舍也天子使掌次為之諸侯上介先朝受焉此覲也言朝者覲遇之禮雖􅂤其來之心猶若朝也分别同姓異姓受之將有先後也春秋傳曰寡人若朝于薛不敢與諸任齒則周禮先同姓釋曰諸侯受聘于祧知天子受覲亦于祧鄭以文武庿為二祧故謂受舍于文王庿門外也下記上介皆奉其君之旂置于宫知受舍者亦上介侯氏裨冕釋幣于禰鄭注將覲質明時也裨冕者衣裨衣而冠冕也裨之為言埤也天子六服大裘為上其餘為裨以事尊卑服之而諸侯亦服焉上公衮無升龍侯伯鷩子男毳孤絺卿大夫𤣥此差司服所掌也禰謂行主遷主矣而云禰親之也釋幣者告將覲也其釋幣如聘大夫將受命釋幣于禰之禮既則祝藏其幣歸乃埋之于祧西階之東今文冕皆作絻案今注疏本脫此六字釋曰諸侯𤣥冕以祭今入天子庿得伸其上服故服裨冕因告禰也曽子問曰天子巡守以遷庿主行諸侯去其國亦然冕服九章龍山華蟲火宗彞五者畫以為繢藻粉米黼黻四者絺以為繡衮之衣五章裳四章鷩之衣三章裳四章毳之衣三章裳二章絺刺粉米衣一章裳二章𤣥者衣無文裳刺黻而已皆𤣥衣纁裳乘墨車載龍旂弧韣乃朝以瑞玉有繅鄭注墨車大夫制也乘之者入天子之國車服不可盡同也交龍為旂諸侯之所建弧所以張縿之弓也弓衣曰韣瑞玉謂公桓圭侯信圭伯躬圭子穀璧男蒲璧繅所以藉玉以韋衣木廣袤各如其玉之大小以朱白蒼為六色今文玉為璧繅或為璪釋曰大宗伯之職以玉作瑞桓圭以下是也各以其所琢飾名之天子設斧依于户牖之間左右几鄭注依如今綈素屏風也有繡斧文所以示威也斧謂之黼几玉几也左右者優至尊也其席莞席紛純加繅席畫純加次席黼純釋曰釋宫曰户牖之間謂之扆謂窗東户西也扆與依同斧依亦以設于此處得名考工記曰白與黑謂之黼斧刃白而銎黒据形言之則謂之斧也書顧命曰設黼扆牖間南嚮敷重篾席黼純華玉仍几篾席則次席也天子衮冕負斧依鄭注衮衣者裨之上也繢之繡之為九章其龍天子有升龍有降龍衣此衣而冠冕南嚮而立以俟諸侯見釋曰衮者卷龍衣也上公亦服之以無升龍為異負依謂背之也曲禮曰天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝見賢遍反下見尊同嗇夫承命告于天子鄭注嗇夫葢司空之屬也為末擯承命于侯氏下介𫝊而上上擯以告于天子案今注疏本脫于字天子見公擯者五人見侯伯擯者四人見子男擯者三人皆宗伯為上擯春秋𫝊曰嗇夫馳釋曰此交擯也案司儀諸侯相為賓皆交擯則見天子可知天子曰非他伯父實來予一人嘉之伯父其入予一人將受之鄭注言非他者親之辭嘉之者美之辭也上擯又𫝊此而下至嗇夫侯氏之下介受之𫝊而上上介以告其君君乃許入今文實作寔嘉作賀釋曰其入者覲禮不出迎侯氏入門右坐奠圭再拜稽首鄭注入門而右案今注疏本脫而字執臣道不敢由賓之位也案之各本訛作客張淳儀禮識誤言據周顯徳監本改正今從之卑見尊奠贄而不授案卑下各本衍者字張淳儀禮識誤云釋文見侯注云卑見同卑見謂此也中無者字從釋文擯者謁鄭注謁猶告也上擯告以天子前辭欲親受之如賓客也其辭所易者曰伯父其升侯氏坐取圭升致命王受之玉侯氏降階東北面再拜稽首擯者延之曰升升成拜乃出鄭注擯者請之侯氏坐取圭則遂左降拜稽首送玉也從後詔禮曰延延進也釋曰階東西階之東也侯氏取圭由門左升自西階致命郊特牲曰覲禮不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下四享皆束帛加璧庭實惟國所有鄭注四當為三古書作三四或皆積畫此篇又多四字字相似由此誤也大行人職曰諸侯庿中將幣皆三享其禮差又無取于四也初享或用馬或用虎豹之皮其次享三牲魚腊籩豆之實龜也金也丹漆絲纊竹箭也其餘無常貨此物非一國所能有案物上今注疏本衍地字惟國所有案今注疏本脫圉字分為三享皆以璧帛致之奉束帛匹馬卓上九馬随之中庭西上奠幣再拜稽首鄭注卓讀如卓王孫之卓卓猶的也以素的一馬以為上書其國名後當識其何產也馬必十匹者不敢斥王之乘用成數敬也釋曰中庭庭南北之中也凡庭實三分庭一在南此以三享同陳故入庭深設之書康王既尸天子王出在應門之内大保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黄朱賓稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首彼因喪而見與此禮異乘黄朱四黄馬朱鬛也出應門其當宁而立與擯者曰予一人將受之鄭注亦言王欲親受之侯氏升致命王撫玉侯氏降自西階東面授宰幣西階前再拜稽首以馬出授人九馬隨之鄭注王不受玉撫之而已輕財也以馬出隨侯氏出授王人于外也王不使人受馬者至于享案至原本訛作主據今注疏本改正王之尊益君侯氏之卑益臣釋曰幣謂束帛加璧也宰大宰也大宰之職大朝覲㑹同贊玉幣享者貢其國所有臣禮也聘禮使人受賓覿之馬者不臣人之臣事畢鄭注三享訖乃右肉袒于庿門之東乃入門右北面立告聽事鄭注右肉袒者刑宜施于右也凡以禮事者左袒入更從右者臣益純也告聽事者告王以國所用為罪之事也易曰折其右肱無咎釋曰士喪禮主人左袒則雖凶禮亦袒左擯者謁諸天子天子辭于侯氏曰伯父無事歸寧乃邦鄭注謁告寧安也乃猶女也釋曰書文侯之命曰王曰父義和其歸視爾師寧爾邦侯氏再拜稽首出自屛南適門西案敖繼公云西下脫襲字遂入門左北面立王勞之再拜稽首擯者延之曰升升成拜降出鄭注王辭之不即左者當出隱于屛而襲之也天子外屛勞之勞其道勞也釋曰釋宫曰屛謂之𣗳論語曰邦君樹塞門謂立小牆當門中以自蔽也禮緯曰天子外屛諸侯内屛内屛在路門之内外屛在路門之外臣朝君至而加肅敬故屛有逺近也此出門乃自屛南知天子外屛道勞如字天子賜侯氏以車服迎于外門外再拜鄭注賜車者同姓以金路異姓以象路服則衮也鷩也毳也古文曰迎于門外也釋曰巾車掌五路玉路以祀金路同姓以封象路異姓以封革路以封四衛木路以封蕃國司服公之服自衮冕而下侯伯鷩冕子男毳冕路先設西上路下四亞之重賜無數在車南鄭注路謂車也凡君所乘車曰路路下四謂乘馬也亞之次車而東也詩云君子來朝何錫予之雖無予之路車乘馬又何予之𤣥衮及黼重猶善也所加賜善物多少由恩也春秋𫝊曰重錦三十兩諸公奉篋服加命書于其上升自西階東面大史是右鄭注言諸公者王同時分命之而使賜侯氏也右讀如周公右王之右是右者始隨入于升東面乃居其右古文是為氏也侯氏升西面立大史述命鄭注讀王命書也侯氏降兩階之間北面再拜稽首鄭注受命升成拜鄭注大史辭之降也春秋傳曰且有後命以伯舅耋老毋下拜此辭之𩔖大史加書于服上侯氏受鄭注受篋服使者出侯氏送再拜儐使者諸公賜服者束帛四馬儐大史亦如之鄭注既云拜送乃言儐使者以勞有成禮略而遂言釋曰亦儐乃拜送如儐勞者之禮同姓大國則曰伯父其異姓則曰伯舅同姓小邦則曰叔父其異姓小邦則曰叔舅鄭注據此禮云伯父同姓大邦而言饗禮乃歸鄭注禮謂食燕也王或不親以其禮幣致之略言饗禮互文也掌客職曰上公三饗三食三燕侯伯再饗再食再燕子男一饗一食一燕釋曰掌客職又曰若弗酌則以幣致之春秋傳戎朝于周發幣于公卿則諸侯既朝亦當有幣問公卿如聘問大夫禮諸侯覲于天子為宫方三百歩四門壇十有二尋深四尺加方明于其上鄭注四時朝覲受之于庿此謂時㑹殷同也宫謂壝土為埒以象牆壁也為宫者于國外春㑹同則于東方夏㑹同則于南方秋會同則于西方冬㑹同則于北方八尺曰尋十有二尋則方九十六尺也深謂高也從上曰深司儀職曰為壇三成成猶重也三重者自下差之為三等而上有堂焉堂上方二丈四尺上等中等下等每面十二尺方明者上下四方神明之象也上下四方之神者所謂明神也㑹同而盟明神監之則謂之天之司盟有象者猶宗廟之有主乎王巡守至于方嶽之下諸侯㑹之亦為此宫以見之司儀職曰將㑹諸侯則命為壇三成宫旁一門詔王儀南郷見諸侯也釋曰大宗伯職曰時見曰㑹殷見曰同時見者王將有征討之事則既朝覲王合諸侯而發禁殷見者十二歲王如不巡守則六服盡朝朝畢王亦合諸侯而命政皆為壇于國外以命事司盟職云北面詔明神春秋傳盟于亳城北載書有司愼司盟方明者木也方四尺設六色東方青南方赤西方白北方黑上𤣥下黄設六玉上圭下璧南方璋西方琥北方璜東方圭鄭注六色象其神六玉以禮之上宜以蒼璧下宜以黄琮而不以者則上下之神非天地之至貴者也設玉者刻其木而著之釋曰大宗伯職曰以玉作六器以禮天地四方以蒼璧禮天以黄琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方此上下用圭璧葢禮日月也典瑞職云圭璧以祀日月鄭下注云日月而云天地靈之上介皆奉其君之旂置于宫尚左公侯伯子男皆就其旂而立鄭注置于宫者建之豫為其君見王之位也諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上尚左者案者今注疏本訛作皆建旂公東上侯先伯伯先子子先男而位皆上東方也諸侯入壝門或左或右各就其旂而立王降階南鄉見之三揖土揖庶姓時揖異姓天揖同姓見揖位乃定古文尚作上釋曰旂者表朝位之旂也與銘旌及作軍徽幟同以尺易仞而為之贄虞曰建旂者所以殊爵命示等威也詩曰君子至止言觀其旂尚左左者東方也公侯伯子男面位鄭皆据朝事儀而言周公朝諸侯于明堂其位亦如此或曰壇三成者即明堂也爾雅丘三成為崐崙丘謂三重也此明堂形如崐崙丘故公玉帶遂謂明堂名曰崐崙謂之明堂者或者以祀方明而名與當考四𫝊擯鄭注王既揖五者升壇設擯升諸侯以㑹同之禮其奠瑞玉及享幣公拜于上等侯伯于中等子男于下等擯者每延之升堂致命王受玉撫玉降拜于下等及請事勞皆如覲禮是以記之覲云四傳擯者案今注疏本云上脫覲字每一位畢擯者以告乃更陳列而升其次公也侯也伯也各一位子男俠門而俱東上亦一位也至庭乃設擯則諸侯初入門王官之伯帥之耳古文傳作傅釋曰康王之誥曰帥諸侯入者大保畢公所謂王官伯天子乘龍載大旂象日月升龍降龍出拜日于東門之外反祀方明鄭注此謂㑹同以春者也馬八尺以上為龍大旂大常也王建大常縿首畫日月其下及旒交畫升龍降龍朝事儀曰天子冕而執鎭圭尺有二寸繅藉尺有二寸搢大圭乘大路建大常十有二旒樊纓十有二就貳車十有二乘帥諸侯而朝日于東郊所以教尊尊也退而朝諸侯由此二者言之已祀方明乃以㑹同之禮見諸侯也凡㑹同者不協而盟司盟職曰凡邦國有疑㑹同則掌其盟約之載書及其禮儀北面詔明神既盟則貳之案貳各本訛作藏今據周禮改正言北面詔明神則明神有象也象者其方明乎及盟時又加于壇上乃以載辭告焉詛祝掌其祝號釋曰常禮既朝日退而朝諸侯若邦國有疑而盟則既朝日反祀方明巳祀方明天子升壇見諸侯禮畢更加方明于壇而盟則此覲禮所記是禮日于南門外禮月與四瀆于北門外禮山川丘陵于西門外鄭注此謂㑹同以夏冬秋者也變拜言禮者容祀也禮月于北郊者月大陰之精以為地神也盟神必云日月山川焉者尚著明也詩曰謂予不信有如皦日春秋傳曰縱子忘之山川神祗其忘諸乎此皆用明神為信也釋曰言禮者容兼祀方明也先北後西者月尊也四瀆亦極陰故與月同配北方祭天燔柴祭山丘陵升祭川沈祭地瘞鄭注升沈必就祭者也就祭則是謂王巡守及諸侯之盟祭也其盟掲其著明者燔柴升沈瘞祭禮終矣備矣郊特牲曰郊之祭也迎長日之至也大報天而主日也宗伯職曰以實柴祀日月星辰則燔柴祭天謂祭日也柴為祭日則祭地瘞者祭月也日月而云天地靈之也王制曰王巡守至于岱宗柴是王巡守之盟其神主日也春秋傳曰晉文公為踐土之盟而傳云山川之神是諸侯之盟其神主山川也月者大陰之精上為天使臣道莫貴焉是王官之伯㑹諸侯而盟其神主月與古文瘞作殪記几俟于東箱鄭注王即席乃設之也東箱東夾之前相翔待事之處釋曰公食大夫禮賓食公揖退于箱偏駕不入王門鄭注在旁與已同曰偏同姓金輅異姓象輅四衛革輅蕃國木輅駕之與王同謂之偏偏駕不入王門案今注疏本脫一偏字乘墨車以朝是也偏駕之車舍之于館與釋曰此車天子所乘者諸侯亦乘之故謂之偏奠圭于繅上鄭注謂釋于地也
