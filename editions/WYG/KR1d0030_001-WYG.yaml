body:
  text: 儀禮集釋卷一宋李如圭撰士冠禮第一鄭目録云童子任職居士位年二十而冠主人𤣥冠朝服則是仕于諸侯天子之士朝服皮弁素積古者四民世事士之子恒為士冠禮于五禮屬嘉禮大小戴及别録此皆第一釋曰童子居士位年二十而冠之禮也班固曰帝王質文世有損益至周事為之制威儀三千周衰諸侯惡其害己滅去其籍至秦大壞漢興魯髙堂生𫝊禮十七篇古經者出于魯淹中及孔氏與十七篇文相似多三十九篇今儀禮十七篇則髙堂生所𫝊者也古經所多三十九篇字皆篆書絶無師説此十七篇之次因劉向别録戴徳篇次初士冠禮至士相見禮三篇與别録同次士喪禮四既夕禮五士虞禮六特牲饋食禮七少牢饋食禮八有司九鄉飲酒禮十鄉射禮十一燕禮十二大射儀十三聘禮十四公食大夫禮十五覲禮十六喪服十七戴聖則大射儀已前七篇亦同别録之次而士虞禮八喪服九特牲饋食禮十少牢饋食禮十一有司十二士喪禮十三既夕禮十四聘禮十五公食大夫禮十六覲禮十七士冠禮筮于庿門案庿原本作廟下同唐石經作庿陸徳明經典釋文云庿劉昌宗音廟則知古本無作廟者今從釋文及石經為正鄭注筮者以蓍問日吉凶于易也冠必筮日于庿門者重以成人之禮成子孫也庿謂禰庿不于堂者嫌蓍之靈由庿神釋曰龜為卜筴為筮凡言庿者皆禰庿昬禮行事于庿記云受諸禰庿是也其非禰庿則皆舉庿名以别之主人𤣥冠朝服緇帶素韠即位于門東西面鄭注主人将冠者之父兄也𤣥冠委貌也朝服者十五升布衣而素裳也衣不言色者衣與冠同也筮必朝服者案今注疏本脫者字尊蓍龜之道案此下今注疏本有也字緇帶黒繒帶案此下今注疏本有也字士帶博二寸再繚四寸屈垂三尺素韠白韋韠案此下今注疏本有也字長三尺上廣一尺下廣二尺其頸五寸肩革帶博二寸天子與其臣𤣥冕以眡朔案眡各本作視張淳儀禮識誤云釋文眡音視陸既音視正文非視字明矣皮弁以日眡朝諸侯與其臣皮弁以眡朔朝服以日眡朝凡染黒五入為緅七入為緇𤣥則六入與釋曰禮之通例衣與冠同色黄衣黄冠是也裳與韠同色素積素韠是也此𤣥冠素韠故其服緇衣而素裳帶大帶也韠蔽膝也古者佃漁而食因衣其皮先知蔽前後知蔽後後王易之以布帛而猶存其蔽前者不忘本也門東門外之東天子之朝服皮弁諸侯之朝服𤣥冠主人𤣥冠朝服則諸侯之士矣朝服尊于𤣥端冠時主人𤣥端尊蓍龜故筮時朝服特牲饋食禮筮日與祭同服𤣥端者蓍不可尊於先祖𤣥冠如字下冠同冠弁以冠布冠冠箱執冠齊冠喪冠同大夫巳上大帶博四寸士再繞腰共為四寸帶之反屈向上又垂而下者則皆三尺頸韠之中央肩其兩角皆上繫於革帶者有司如主人服即位于西方東面北上鄭注有司羣吏有事者謂主人之吏所自辟除府史已下案此下今注疏本有也字今時卒吏及假吏是也案吏下今注疏本有皆字筮與席所卦者具饌于西塾鄭注筮所以問吉凶謂蓍也所卦者所以畫地記爻易曰六畫而成卦饌陳也具俱也西塾門外西堂也布席于門中闑西閾外西面鄭注闑門橛案此下今注疏本有也字閾閫也古文闑為􅈏閾為蹙釋曰闑門中央所豎短木也閾門限也闑西而曰門中者舉大分言之闑與􅈏音義同穀梁𫝊曰置旃以為轅門葛覆質以為􅈏古文即出於孔氏壁中字以篆書者筮人執筴抽上韇兼執之進受命于主人案此于字唐石經作於應從前後作于為正鄭注筮人有司主三易者案此下今注疏本有也字韇藏筴之器案此下今注疏本有也字今時藏弓矢者謂之韇丸也案丸今注疏本訛作几兼并也進前也自西方而前受命者當知所筮也釋曰筴蓍也下韇以承筴上韇韜之案此下永樂大典内刪去原文注云餘同賈疏今取疏義補之少牢云史左執筮右抽上韇兼與筮執之東面受命于主人得主人命訖史曰諾西面于門西抽下韇左執筮右兼執韇以擊筮乃釋韇立筮此云筴彼云筮一也少牢具陳此不言者文不具當與彼同案三正記大夫蓍五尺故立筮士之蓍三尺當坐筮與彼異也宰自右少退贊命鄭注宰有司主政教者案此下今注疏本有也字自由也贊佐也命告也佐主人告所以筮也少儀曰贊幣自左詔辭自右釋曰有司各司其事者宰則總衆職者也仲弓為季氏宰問政子曰先有司少退後于主人筮人許諾右還卽席坐西面卦者在左鄭注卽就也東面受命右還北行就席卦者有司主畫地識爻者案此下今注疏本冇也字卒筮書卦執以示主人鄭注卒已也書卦者筮人以方寫所得之卦案此句下今注疏本有也字釋曰方板也主人受眡反之鄭注反還也筮人還東面旅占卒進告吉鄭注旅衆也還與其屬共占之古文旅作臚釋曰以易辭占其吉凶也洪範曰三人占則從二人之言若不吉則筮逺日如初儀鄭注逺日旬之外釋曰曲禮曰旬之外曰逺某日吉事先近日夏小正曰二月綏多女士冠子取婦之時是則冠有常月徹筮席鄭注徹去也斂也宗人告事畢鄭注宗人有司主禮者案此下今注疏本有也字主人戒賓賓禮辭許鄭注戒警也告也賓主人之僚友古者有吉事則樂與賢者勸成之案勸今注疏本訛作歡有凶事則欲與賢者哀戚之今将冠子故就告僚友使來禮辭一辭而許案此下今注疏本有也字再辭而許曰固辭三辭曰終辭不許也主人再拜賓荅拜案荅今注疏本作答唐石經及古本竝從艸無從竹者主人退賓拜送鄭注退去也歸也前期三日筮賓如求日之儀鄭注前期三日空二日也筮賓筮其可使冠子者賢者恒吉冠義曰古者冠禮筮日筮賓所以敬冠事敬冠事所以重禮重禮所以為國本乃㝛賓賓如主人服出門左西面再拜主人東面荅拜鄭注㝛進也㝛者必先戒戒不必㝛其不㝛者為衆賓或悉來或否主人朝服釋曰筮日朝服至此無改服之文知皆朝服朝服者常時相見所服也乃㝛賓賓許主人再拜賓荅拜主人退賓拜送鄭注乃㝛賓者親相見致其辭㝛贊冠者一人亦如之鄭注贊冠者佐賓為冠事者謂賓若他官之屬中士若下士也㝛之以筮賓之明日釋曰贊者皆降賓主一等若主人下士亦取下士為贊禮窮則同故也㝛賓㝛贊冠者同日厥明夕為期于庿門之外案此庿字原本及今注疏本竝作廟唐石經作庿今從石經為正主人立于門東兄弟在其南少退西面北上有司皆如㝛服立于西方東面北上鄭注厥其也㝛服朝服擯者請期宰告曰質明行事鄭注擯者有司佐禮者在主人曰擯在客曰介質正也宰告曰旦日正明行冠事告兄弟及有司鄭注擯者告也釋曰兄弟有司在列而猶告之者審慎重冠事告事畢鄭注宗人告也擯者告期于賓之家夙興設洗直于東榮南北以堂深水在洗東鄭注夙早也興起也洗承盥洗者棄水器也士用鐵榮屋翼也周制自卿大夫以下其室爲夏屋水器尊卑皆用金罍及大小異案及周學健改作其釋曰直當也榮説文曰屋梠之兩頭起也梠楚謂之梠齊謂之檐檐頭之起者如翬之飛故榮又謂之屋翼周制天子諸侯爲殷人四阿之屋東西南北皆有霤大夫已下爲夏后氏南北兩下之屋無東霤而有東榮燕禮洗當東霤大夫士禮洗當東榮其處則同耳以堂深者洗北去堂逺近取于堂廉至北壁之逺近也盥手洗爵之時恐水穢地故設洗承而棄之凡設水用罍沃盥用枓見少牢饋食禮陳服于房中西墉下東領北上鄭注墉牆也案今注疏本無也字爵弁服纁裳純衣緇帶韎韐鄭注此與君祭之服雜記曰士弁而祭于公爵弁者冕之次其色赤而微黑如爵頭然或謂之緅其布十三升纁裳淺絳裳凡染絳一入謂之縓再染謂之赬案染各本作入張淳儀禮識誤云釋文再染如琰反下二字同葢以三入四入皆染字也爾雅有再染三染之文此鄭氏用染字之據若染絳之染則去聲也三染謂之纁朱則四染與純衣絲衣也餘衣皆用布惟冕與爵弁服用絲耳先裳後衣者欲令下近緇明衣與帶同色案衣字原本訛在明字上據疏文改正韎韐緼韍也士緼韍而幽衡合韋為之士染以茅蒐因以名焉今齊人名蒨為韎韐案疏云周公時名蒨草為韎草以此韎染韋合之爲韐因名韍爲韎韐是蒨一名韎而韍名韎韐蒨不得名韎韐也韐字乃衍文韍之制似韠冠弁不與衣陳案冠弁下各本衍者字今據疏刪正而言于上以冠名服耳今文纁皆作熏釋曰爵弁服者冕服之次士服之上者也凡冕以木爲體長尺六寸廣八寸低前一寸二分以三十升布衣之上𤣥下纁前後有旒其服𤣥衣而纁裳有章爵弁前後平無旒又爵色爲異耳其服無章亦純衣纁裳古緇䊷二字竝行據布為色則字爲緇據帛爲色則字爲䊷純即䊷字之轉也爾雅曰一染謂之縓再染謂之頳三染謂之纁考功記曰三入爲纁五入爲緅七入爲緇自纁已上爲絳自緅已下爲黑若以纁入赤則爲朱以纁入黑則爲紺又以紺入黒則爲緅𤣥在緅緇之間緅即爵也其色黑多而赤少與緇𤣥同𩔖故𤣥冠爵弁皆緇衣也韎韐者士之韍也合韋爲之故謂之韐染以茅蒐茅蒐一名蒨可以染絳韋昭謂急疾呼茅蒐成韎故因名其所染爲韎韐而齊人又名蒨爲韎韐也案齊人名蒨為韎即韋昭所謂急疾呼茅蒐成韎也李氏據鄭注誤本不知韐字屬衍文他服謂之韠祭服謂之韍韍有龍章山火之飾士無飾韎韋而已與君音預下與君同緼赤黄間色幽黑色也衡佩玉之衡也皮弁服素積緇帶素韠此與君視朔之服也皮弁者以白鹿皮爲冠象上古也積猶辟也以素爲裳辟蹙其要中皮弁之衣用布亦十五升其色象焉釋曰古者以鳥獸之皮冒而句領皮弁象之服不言色者衣與冠同色也素素白繒𤣥端𤣥裳黄裳雜裳可也緇帶爵韠鄭注此莫夕於朝之服𤣥端即朝服之衣易其裳耳上士𤣥裳中士黄裳下士雜裳雜裳者前𤣥後黄案前後原本訛作上下據疏云前陽後隂故知前𤣥後黄也今從疏文改正易曰夫𤣥黄者天地之雜也天𤣥而地黄士皆爵韋爲韠其爵同不以𤣥冠名服者是爲緇布冠陳之玉藻曰韠君朱大夫素士爵韋釋曰謂之端者用正幅爲之朝服冕服亦得端名語曰端章甫記曰端冕而聽古樂是也可也者三等士惟其所宜服者陳之裳雖有三而爵俱爲士故同用爵韠爵亦雜色也帶有二大帶以束衣革帶以繫韠繫佩舉韠則有革帶可知莫見曰夕緇布冠缺項青組纓屬于缺緇纚廣終幅長六尺皮弁笄爵弁笄緇組紘纁邊同篋鄭注缺讀如有頍者弁之頍緇布冠無笄案此下各本衍者字今據疏刪正著頍圍髮際結項中隅爲四綴以固冠也項中有􅕒亦由固頍爲之耳今未冠笄者著卷幘頍象之所生也滕嶭名蔮爲頍屬猶著纚今之幘梁案此下今注疏本有也字終充也纚一幅長六尺足以韜髪而結之矣笄今之簪有笄者屈組為紘垂爲飾無笄者纓而結其絛纁邊組側赤也同篋謂以上凡六物案以原本訛作此張淳儀禮識誤據釋文改爲以今注疏本作謂此以上隋方曰篋案隋今注疏本作隨釋曰六物者缺項青組纓一緇纚二皮弁笄三爵弁笄四緇組紘皮弁爵弁皆有之為六緇布冠無笄冠武以下别爲頍頍之兩端爲􅕒以繩穿之結于項上其上四隅綴于武又以二組左右著于頍垂于頥下結之其有笄者則以組繫于笄之左繞頥仰屬于笄之右屈繫之組垂者曰纓屈者曰紘櫛實于簞鄭注簞笥也蒲筵二在南鄭注筵席也側尊一甒醴在服北有篚實勺觶角柶脯醢南上鄭注側猶特也無偶曰側置酒曰尊側者無𤣥酒服北者纁裳北也篚竹器如笭者勺尊升所以􅆽酒也爵三升曰觶柶状如匕以角爲之者欲滑也南上者篚次尊籩豆次篚古文甒作廡釋曰凡醴無𤣥酒而有柶一豆一籩者籩實脯而豆實醢按下行案此下原本缺爵弁皮弁緇布冠各一匴執以待于西坫南南面東上賓升則東面鄭注爵弁者制如冕黑色但無繅耳周禮王之皮弁㑹五采玉琪象邸玉笄諸侯及孤卿大夫之冕皮弁各以其等爲之則士之皮弁又無玉象邸飾緇布冠今小吏冠其遺象也匴竹器名今之冠箱也執之者有司也坫在堂角古文匴爲篹坫爲檐案原本云古文匴作纂坫作襜張淳儀禮識誤據釋文訂改釋曰西坫堂西南隅之坫也以土爲之執匴者賓未入南面賓升東面以向賓也繅繩貫旒者㑹户外古外二反縫中也琪結也弁頂之柢也主人𤣥端爵韠立于阼階下直東序西面鄭注𤣥端士入庿之服也阼猶酢也東階所以荅酢賓客也堂東西牆謂之序兄弟畢袗𤣥立於洗東西面北上鄭注兄弟主人親戚也畢猶盡也袗同也𤣥者𤣥衣𤣥裳也緇帶韠位在洗東退于主人不爵韠者降于主人也古文袗爲均也釋曰兄弟之服衣裳帶與上士同惟以不爵韠爲降耳擯者𤣥端負東塾鄭注東塾門内東堂負之北面將冠者采衣紒在房中南面鄭注采衣未冠者所服玉藻曰童子之節也緇布衣錦縁錦紳并紐錦束髮皆朱錦也紒結髮古文紒爲結釋曰以朱錦爲總束髮又以爲大帶并約帶之紐及爲緇布衣之縁童子尚華飾賓如主人服贊者𤣥端從之立于外門之外鄭注外門大門外擯者告鄭注告者出請入告釋曰出請賓所以來故入告主人主人迎出門左西面再拜賓荅拜鄭注左東也出以東爲左入以東爲右釋曰古者宮必南鄉主人迎出門左出以東爲左也主人入門而右客入門而左入以東爲右也主人揖贊者與賓揖先入鄭注贊者賤揖之而已又與賓揖先入道之贊者隨賓每曲揖鄭注周左宗庿入外門將東曲揖直庿將北曲又揖釋曰庿在寢東既入大門曲而東主人在南賓在北揖至庿南曲而北主人在東賓在西又揖至于庿門揖入三揖至于階三讓鄭注入門將右曲揖將北曲揖當碑揖釋曰既入廟門主人右趨堂塗將背客宜揖當堂塗俱北鄉又揖前行當碑碑三分庭一在北庭之節又宜揖也三者禮之大節尊卑同主人升立于序端西面賓西序東面鄭注主人賓俱升立相鄉贊者盥案此下各本有于洗西三字因注云盥于洗西後人妄増加經文耳據疏云贊者盥于洗西無正文可證唐初本猶無此三字升立于房中西面南上鄭注盥于洗西由賓階升也立于房中近其事也南上尊于主人之贊者古文盥皆作浣釋曰盥盥手也凡主人盥于洗北賓盥于洗南盥于洗西下賓也贊者之事在篋簞皆陳于房西面立于將冠者之東南贊冠者一人而云南上明與主人之贊者竝立敬賓之贊者序之于上主人之贊者筵于東序少北西面鄭注主人之贊者其屬中士若下士筵布席也東序主人位也適子冠于阼少北辟主人將冠者出房南面鄭注南面立于房外之西待賓命釋曰昬禮母南面于房外女出于母左知房外南面者皆于房户外之西其房外之東則南當阼階矣贊者奠纚笄櫛于筵南端鄭注贊者賓之贊冠者也奠停也古文櫛爲節賓揖將冠者將冠者即筵坐贊者坐櫛設纚鄭注卽就設施賓降主人降賓辭主人對鄭注主人降爲賓將盥不敢安位也辭對之辭未聞賓盥卒壹揖壹讓升主人升復初位鄭注揖讓皆壹者降于初古文壹皆作一釋曰賓盥者將有事先自絜也賓筵前坐正纚興降西階一等執冠者升一等東面授賓鄭注正纚者將加冠宜親之興起也降下也下一等升一等則中等相授冠緇布冠也賓右手執項左手執前進容乃祝坐如初乃冠興復位贊者卒鄭注進容者行翔而前鶬焉至則立祝坐如初坐筵前興起也復位西序東面卒謂設缺項結纓也冠者興賓揖之適房服𤣥端爵韠出房南面鄭注復出房南面者一加禮成觀衆以容體釋曰冠于堂服于房以冠爲重也冠義曰冠而後服備服備而後容體正顏色齊辭令順觀示也賓揖之即筵坐櫛設笄賓盥正纚如初降二等受皮弁右執項左執前進祝加之如初復位贊者卒紘鄭注如初爲不見者言也卒紘謂繫屬之釋曰不見謂辭對主人升復位之𩔖案此下永樂大典内刪去原文注云餘同賈疏今取疏義補之櫛者脫緇布冠更櫛也笄有二一是紒内安髪之笄一是皮弁及六冕固冠之笄今此櫛訖未加冠即言設笄宜是安髮之笄緇布冠亦有之緇布冠不言設笄而言設纚皮弁言設笄不言設纚互見爲義繫屬之者左相繫定右相屈繫擬解時易興賓揖之適房服素積素韠容出房南面鄭注容者再加彌成其儀益繁賓降三等受爵弁加之服纁裳韎韐其他如加皮弁之儀鄭注降三等下至地他謂卒紘容出徹皮弁冠櫛筵入于房鄭注徹者贊冠者主人之贊者爲之筵於户西南面鄭注筵主人之贊者户西室户西釋曰寢庿以室爲主故室户專得户名凡言户者皆室户房户則兼言房以别之贊者洗於房中側酌醴加柶覆之面葉鄭注洗盥而洗爵者昬禮曰房中之洗在北堂直室東隅篚在洗東北面盥側酌者言無爲之薦者面前也葉柶大端贊酌者賓尊不入房古文葉爲擖釋曰凡洗爵必先盥手盥有不洗者無爲之薦自酌自薦也柶醴匕也其兩端枋細而葉大贊者面葉以授賓賓迎受得面枋以授冠者冠者亦迎受得面葉以扱醴也爲于偽反賓揖冠者就筵筵西南面賓受醴于户東加柶面枋筵前北面鄭注户東室户東今文枋爲柄冠者筵西拜受觶賓東面荅拜鄭注筵西拜南面拜也賓還荅拜于東序之位東面者明成人與爲禮異于荅主人釋曰凡賓荅主人拜于西階上北面又主人禮賓皆云拜送此云荅拜亦異于主人薦脯醢鄭注贊冠者也冠者即筵坐左執觶右祭脯醢以柶祭醴三興筵末坐啐醴建柶興案釋文云捷柶初洽反本又作插亦作扱張淳儀禮識誤以爲注之扱柶釋文作捷柶李如圭以為經之建柶釋文作㨗柶今注疏本此處經文作捷柶興乃誤據釋文改經考之他篇經文仍作建柶不得此處獨異唐石經亦作建柶則釋文指注非指經明矣降筵坐奠觶拜執觶興賓荅拜鄭注建柶扱柶于醴中案扱釋文作捷今考此即釋文所云亦作扱者是唐初已非一本無庸改扱爲捷其拜皆如初古文啐爲呼釋曰祭謂取少許祭先世造此食者不忘本也凡醴不卒觶啐之而禮成上拜拜受觶此拜拜禮成其卒觶者則卒觶乃拜曽子問曰將冠子冠者至聞齊衰大功之喪如之何孔子曰内喪則廢外喪則冠而不醴徹􅄿而埽即位而哭如冠者未至則廢内喪謂同門者冠者謂賓及贊者也廢者喪成服因喪而冠建陸作捷案此下原本缺冠者奠觶于薦東降筵北面坐取脯降自西階適東壁北面見于母鄭注薦東薦左凡奠爵將舉者于右不舉者于左適東壁者出闈門也時母在闈門之外婦人入庿由闈門釋曰凡言薦謂籩豆也南面者以東爲左取脯明得禮也案此下永樂大典内刪去原文注云賈疏見前當是疏引雜記入自闈門升自側階鄭注云宫中之門曰闈門今集釋僅缺此數語母拜受子拜送母又拜鄭注婦人于丈夫雖其子猶俠拜賓降直西序東面主人降復初位鄭注初位初至階讓升之位冠者立于西階東南面賓字之冠者對鄭注對應也其辭未聞賓出主人送于庿門外鄭注不出外門將醴之請醴賓賓禮辭許賓就次鄭注此醴當作禮禮賓者謝其自勤勞也案今注疏本脫此九字次門外更衣處也以帷幕簟席爲之案以今注疏本訛作必釋曰士之醴子醴賓醴婦經皆作醴不必改爲禮大夫以上乃曰儐曰禮耳聘禮次以帷士或用簟席冠者見于兄弟案此于字唐石經作於應從前後作于爲正兄弟再拜冠者荅拜見贊者西面拜亦如之鄭注見贊者西面拜則見兄弟東面拜贊者後賓出入見姑姊如見母鄭注入入寢門也庿在寢門外如見母者亦北面姑與姊亦俠拜案此下今注疏本有也字不見妺妺卑釋曰未字見母巳字見兄弟急于母緩于兄弟不言見父與賓者冠訖是見己乃易服服𤣥冠𤣥端爵韠奠摯見于君遂以摯見于鄉大夫鄉先生案此于字唐石經作於應同上句作于爲正鄭注易服不朝服者非朝事也摯雉也鄉先生鄉中老人爲卿大夫致仕者乃醴賓以壹獻之禮鄭注壹獻者主人獻賓而已即燕無亞獻者獻酢酬賓主人各兩爵而禮成特牲少牢饋食之禮獻尸此其𩔖也士禮一獻卿大夫三獻禮賓不用柶者案禮賓今注疏本訛作賓醴泲其醴内則曰飲重醴案此下原本衍清糟二字今據内則刪正稻醴清糟黍醴清糟梁醴案今注疏本脫此十字清糟凡醴事質者用糟文者用清釋曰壹獻之禮主人獻賓賓酢主人主人復自飲酬賓賓奠而不舉即燕坐案此下原本缺主人酬賓束帛儷皮鄭注飲賓客而從之以財貨曰酬所以申暢厚意也案厚下原本衍之字今據注疏本刪正束帛十端也儷皮兩鹿皮也古文儷爲離釋曰諸侯用虎豹皮餘人麋鹿皮可也案此下永樂大典内刪去原文注云餘同前賈疏今取疏義補之大戴禮云禮幣采飾而四馬是大夫禮多與士異禮器云琥璜爵鄭云天子酬諸侯諸侯相酬以此玉將幣則又異于大夫也尊卑獻數多少不同及其酬幣惟于奠酬之節一行而巳凡言束者無問脯與錦皆以十爲數贊者皆與贊冠者爲介鄭注贊者衆賓也皆與亦飲酒爲衆賓介賓之輔以贊爲之尊之飲酒之禮賢者爲賓其次爲介釋曰大戴禮曰公冠饗之以三獻之禮無介無樂皆𤣥端其酬幣朱錦采四馬賓出主人送于外門外再拜歸賓俎鄭注一獻之禮有薦有俎其牲未聞使人歸諸賓家也若不醴則醮用酒鄭注若不醴謂國有舊俗可行聖人用焉不改舊也曲禮曰君子行禮不求變俗祭祀之禮居喪之服哭泣之位皆如其國之故謹脩其法而審行之是案此下今注疏本有也字酌而無酬酢曰醮醴亦當爲禮釋曰醴尚質無酬酢酒本有酬酢故無酬酢者爲醮尊于房户之間兩甒有禁𤣥酒在西加勺南枋鄭注房户間者房西室户東也禁承尊之器也名之爲禁者因爲酒戒也𤣥酒新水也雖今不用猶設之不忘古也釋曰醴在房酒在堂酒事文也凡醴無幂醮亦不用幂從醴質古未有醴酪以水當酒之用後世以其色𤣥故謂之𤣥酒洗有篚在西南順鄭注洗庭洗當東榮南北以堂深篚亦以盛勺觶陳于洗西南順北爲上也釋曰篚亦有識爲上下也始加醮用脯醢賓降取爵于篚辭降如初卒洗升酌鄭注始加者言一加一醮也加冠于東序醮之于户西同耳始醮亦薦脯醢賓降者爵在庭酒在堂將自酌也辭降如初如將冠時降盥辭主人降也凡薦出自東房冠者拜受賓荅拜如初鄭注贊者筵于户西賓升揖冠者就筵乃酌冠者南面拜受賓授爵東面荅拜如醴禮也於賓荅拜贊者則亦薦之冠者升筵坐左執爵右祭脯醢祭酒興筵末坐啐酒降筵拜賓荅拜冠者奠爵于薦東立于筵西鄭注冠者立俟賓命賓揖之則就東序之筵釋曰不卒爵者從醴禮徹薦爵筵尊不徹鄭注徹薦與爵者辟後加也不徹筵尊三加可相因由便也加皮弁如初儀再醮攝酒其他皆如初鄭注攝猶整也整酒謂撓之今文攝爲聶釋曰撓攪益之示新也酒云攝明因前加爵弁如初儀三醮有乾肉折俎嚌之其他如初北面取脯見于母鄭注乾肉牲體之脯也折其體以爲俎嚌嘗之若殺則特豚載合升離肺實于鼎設扃鼏鄭注特豚一豚也凡牲皆用左胖煮于鑊曰亨在鼎曰升在俎曰載載合升者明亨與載皆合左右胖離割也割肺者使可祭也可嚌也今文扃爲鈜古文鼏爲宻釋曰說文曰豚小豕也周祭肺離割之不絶其中央少者食時乃絶以祭既又嚌之是謂離肺一名舉肺一名嚌肺言舉之以嚌也扃所以扛鼎鼏覆之牲體在俎亦得升名下云肴升折俎少牢饋食禮云升羊載右胖是也周人尚右胖用左胖者葢異代之禮始醮如初鄭注亦薦脯醢徹薦爵筵尊不徹矣再醮兩豆葵菹蠃醢兩籩栗脯鄭注蠃醢螔蝓醢今文蠃爲蝸三醮攝酒如再醮加俎嚌之皆如初嚌肺鄭注攝酒如再醮則再醮亦攝之矣加俎嚌之嚌當爲祭字之誤也祭俎如初如祭脯醢釋曰上于再醮不言攝酒此言于三醮互相備也凡俎必祭而後嚌故鄭謂上嚌字當爲祭如圭謂如初皆謂如不殺者也嚌之如初如嚌乾肉折俎其所異者嚌肺耳卒醮取籩脯以降如初若孤子則父兄戒㝛鄭注父兄諸父諸兄冠之日主人紒而迎賓拜揖讓立于序端皆如冠主禮于阼鄭注冠主冠者親父若宗兄也古文紒爲結今文禮作醴釋曰禮當從今文作醴醴重而醮輕孤子禮盛醴而不醮也且士之醴子無作禮字者凡拜北面于阼階上賓亦北面于西階上荅拜釋曰大戴禮曰公冠自爲主迎賓揖升自阼立于席北既醴降自阼其餘自爲主者其降也自西階以異其餘皆與公同也曽子問曰父没而冠則已冠掃地而祭于禰巳祭而見伯父叔父而后饗冠者饗冠者謂禮賓也若殺則舉鼎陳于門外直東塾北面鄭注孤子得申禮盛之父在有鼎不陳于門外若庶子則冠于房外南面遂醮焉鄭注房外謂尊東也不于阼階非代也不醮于客位成而不尊釋曰適子不醴則醮庶子醮而不醴醮三舉而醴一酌以簡爲貴也醮用酒而醴用醴以質爲貴也醮有折俎醴惟脯醢而已以少爲貴不尚味也適子冠與醮異處以變爲敬庶子冠而遂醮略之此適庶之辨也冠者母不在則使人受脯于西階下戒賓曰某有子某將加布于其首願吾子之教之也鄭注吾子相親之辭吾我也子男子之美稱古文某爲謀賓對曰某不敏恐不能共事以病吾子敢辭鄭注病猶辱也古文病爲秉主人曰某猶願吾子之終教之也賓對曰吾子重有命某敢不從鄭注敢不從許之辭釋曰此所謂一辭而許曰禮辭也㝛曰某將加布于某之首案此于字唐石經作於應從前後作于爲正吾子將莅之敢㝛賓對曰某敢不夙興鄭注莅臨也今文無對始加祝曰令月吉日始加元服鄭注令吉皆善也元首也釋曰服古音蒲北反下同棄爾幼志順爾成徳壽考惟祺介爾景福鄭注爾女也既冠爲成徳祺祥也介景皆大也因冠而戒且勸之女如是則有壽考之祥大女之大福也釋曰古順愼通用既冠責以爲人子爲人弟爲人臣爲人少者之禮皆成人之徳也家語曰成王年十三而嗣立明年冠周公命祝雍祝王祝雍曰使王近于民逺于年嗇于時惠于財親賢而任能其頌曰令月吉日王始加元服去玉㓜志服衮職欽若昊天六合是式率爾祖考永永無極此周公之制也福古音拍逼反下同再加曰吉月令辰乃申爾服鄭注辰子丑也申重也敬爾威儀淑愼爾徳睂壽萬年永受胡福鄭注胡猶遐也逺也逺無窮古文眉作麋三加曰以歳之正以月之令咸加爾服案加原夲訛作服據唐石經改正鄭注正猶善也咸皆也皆加女之三服謂緇布冠皮弁爵弁也兄弟具在以成厥徳鄭注厥其也案今注疏本脫此三字黄耇無疆受天之慶鄭注黃黃髮也耇凍棃也案棃今注疏本作犂皆壽徴也疆竟釋曰黄髪髮白而復黄也凍棃面似凍棃色也慶古音羌下同此辭正與令叶服與徳叶疆與慶叶醴辭曰甘醴惟厚嘉薦令芳鄭注嘉善也善薦謂脯醢芳香也拜受祭之以定爾祥承天之休壽考不忘鄭注休美也案今注疏本脫此三字不忘長有令名醮辭曰㫖酒既清嘉薦亶時鄭注亶誠也古文亶爲癉始加元服兄弟具來孝友時格永乃保之鄭注善父母爲孝善兄弟爲友時是也格致也永長也保安也行此乃能保之今文格爲嘏凡醮者不祝釋曰醮者于醮乃有辭冠時不祝來古音力之反再醮曰㫖酒既湑嘉薦伊脯鄭注湑清也伊惟也乃申爾服禮儀有序祭此嘉爵承天之祜鄭注祜福也三醮曰㫖酒令芳籩豆有楚鄭注㫖美也楚陳列之貌釋曰再醮徹始醮之籩豆而别薦三醮則因之惟加俎而已是以始醮再醮之辭皆云嘉薦三醮直云籩豆有楚也咸加爾服肴升折俎鄭注肴升折俎亦謂豚案此七字今注疏本在下受福無疆之下承天之慶受福無疆字辭曰禮儀既備令月吉日昭告爾字鄭注昭明也案此三字今注疏本在下爰字孔嘉之下爰字孔嘉髦士攸宜鄭注爰於也孔甚也案此六字今注疏本接上注昭明也之下髦俊也攸所也案此六字今注疏本在下永受保之之下釋曰嘉古音姬與宜字叶宜之于假永受保之曰伯某甫仲叔季惟其所當鄭注于猶爲也假大也宜之是爲大矣案此十三字今注疏本接上攸所也之下伯仲叔季長幼之稱甫是丈夫之美稱孔子爲尼甫周大夫有嘉甫宋大夫有孔甫是其𩔖甫字或作父釋曰惟其所當者當其次則稱之若次仲則曰仲某甫夏殷質次積于仲周文次積于叔二十曰伯某甫至五十則又舍其二十之字直以伯仲别之檀􅃓曰幼名冠字五十以伯仲死諡周道也假古音古隔句與甫叶之隔句與宜叶屨夏用葛𤣥端黒屨青絇繶純純博寸鄭注屨者順裳色𤣥端黒屨以𤣥裳爲正也絇之言拘也以爲行戒狀如刀衣鼻在屨頭繶縫中紃也純縁也三者皆青博廣也素積白屨以魁柎之緇絇繶純純博寸鄭注魁蜃蛤柎注也爵弁纁屨黒絇繶純純博寸鄭注爵弁屨以黒爲飾爵弁尊其屨飾以繢次釋曰爵弁纁裳故纁屨畫繢之事青與白白與黑𤣥與黄對方爲繢次青與赤赤與白白與黑黑與青比方爲繡次凡舄之飾如繢次屨之飾如繡次上黑屨以青爲飾白屨以緇爲飾如繡次也纁屨當以白爲飾而乃以繢次黑爲飾者尊爵弁故飾其屨與舄同複下曰舄禪下曰屨天子諸侯乃冕服用舄他服用屨爵弁服者冕服之次也三服見屨不同者屨同裳色禮例之常故皮弁以裳挈屨𤣥端屨一而裳三故舍裳而以衣挈屨冕服亦𤣥衣纁裳而用舄故爵弁以弁挈屨也冬皮屨可也不屨繐屨鄭注繐屨喪屨也屨不灰治曰繐釋曰屨冬皮夏葛春宜從夏秋宜從冬魏人以葛屨履霜詩刺其褊喪服有繐衰知繐屨喪屨也曽子問曰如將冠子而未及期日而有齊衰大功之喪則因喪服而冠除喪不改冠雜記曰以喪冠者雖三年之喪可也大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以取婦已雖小功既卒哭可以冠取妻下殤之小功則不可記冠義始冠緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也鄭注大古唐虞以上緌纓飾未之聞大古質葢亦無飾案今注疏本脫葢亦二字重古始冠冠其齊冠白布冠今之喪冠是也釋曰雜記曰大白冠緇布之冠皆不緌大白即大古白布冠也玉藻曰始冠緇布冠自諸侯下達冠而敝之可也緇布冠繢緌諸侯之冠也緇布冠士以上冠而敝棄之庶人則常服之詩云彼都人士臺笠緇撮是也撮謂其制小僅可撮其紒也凡記皆補經所不備者蓋當時所記亦或後世追記之適子冠于阼以著代也醮于客位加有成也案此二于字唐石經竝作於應從前後作于爲正鄭注醮夏殷之禮每加于阼階醮之于客位所以尊敬之成其爲人也案今注疏本脫此二十五字釋曰客位户西也户西者尊處凡賓皆位于此故謂之客位三加彌尊諭其志也鄭注彌猶益也冠服後加益尊諭其志者欲其徳之進也案今注疏本脫此二十字冠而字之敬其名也鄭注名者質所受于父母冠成人益文故敬之也今文無之案今注疏本脫也字及今文無之四字委貌周道也章甫殷道也毋追夏后氏之道也鄭注委猶安也案此句之上今注疏本有或謂委貌爲𤣥冠七字乃後人誤以儀禮經𫝊通解之文竄入于此言所以安正容貌章明也殷質言以表名丈夫也甫或爲父今文爲斧母發聲也追猶堆也夏后氏質以其形名之三冠皆所服以行道也其制之異同未之聞周弁殷冔夏收鄭注弁名出于槃槃大也言所以自光大也冔名出于幠幠覆也言所以自覆飾也收言所以收斂髪也案此下今注疏本有齊所服而祭也六字亦後人誤以經𫝊通解之文竄入于此其制之異亦未聞案今注疏本脫亦字三王共皮弁素積鄭注質不變釋曰歴記此者緇布冠始加皮弁再加周弁三加後言皮弁者見此先代之冠百王同之委貌即易服服𤣥冠者也無大夫冠禮而有其昬禮古者五十而后爵何大夫冠禮之有鄭注據時有未冠而命爲大夫者周之初禮年未五十而有賢才者試以大夫之事猶服士服行士禮二十而冠急成人也五十乃爵重官人也大夫或時改取案今本作娶有昬禮是也釋曰喪服大夫爲昆弟之長殤小功大夫有兄殤是未二十而試爲大夫也已爲大夫則冠矣所謂大夫冠而不爲殤也雖早冠亦行士禮而冠無大夫冠禮也記之時有之非也公侯之有冠禮也夏之末造也鄭注造作也自夏初已上諸侯雖父死子繼年未滿五十者亦服士服行士禮五十乃命也至其衰末上下相亂篡弑所由生故作公侯冠禮以正君臣也坊記曰君不與同姓同車與異姓同車不同服示民不嫌也以此坊民民猶得同姓以弑其君也案也今本作者釋曰家語曰古者王世子雖幼其即位則尊爲人君人君治成人之事者何冠之有然則諸侯之冠異天子與曰君薨而世子主喪是亦冠也已人君無所殊也諸侯之有冠禮也夏之末造也有自來矣今無譏焉春秋𫝊曰晉侯以魯公宴于河上問公年曰十二年矣可以冠矣公還及衛冠于成公之庿假鍾磬焉書曰王與大夫盡弁以啓金縢之書説者以爲成王時年十五則天子諸侯不必二十而冠也大戴禮曰公冠四加𤣥冕天子儗焉或曰四當爲三𤣥當爲衮字之誤天子之元子猶士也天下無生而貴者也鄭注元子世子也無生而貴皆由下升釋曰此明天子元子亦依士禮而冠也大戴禮曰太子與庶子冠禮與士同其饗賓也皆同繼世以立諸侯象賢也鄭注象法也爲子孫能法先祖之賢故使之繼世也釋曰古者四民世事士之子常爲士案此下原本缺以官爵人徳之殺也鄭注殺猶衰也徳大者爵以大官徳小者爵以小官死而諡今也古者生無爵死無諡鄭注今謂周衰記之時也古謂殷殷士生不爲爵死不爲諡周制以士爲爵死猶不爲諡耳下大夫也今記之時士死則諡之非也諡之由魯莊公始也
