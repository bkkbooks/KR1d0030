body:
  text: 儀禮集釋卷十五宋李如圭撰公食大夫禮第九鄭目録云主國君以禮食小聘大夫之禮也案今注疏本脫也字于五禮屬嘉禮大戴第十五小戴第十六别録第九公食大夫之禮使大夫戒各以其爵鄭注戒猶告也告之必使同班敵者易以相親敬釋曰戒者必以其爵恭也已輕則卑之已重則是以其貴臨之言各以其爵則凡大夫聘賓皆用此禮上介出請入告鄭注問所以為來事案原本脫為字據釋文云以為于偽反謂此也今注疏本依釋文補三辭鄭注為既先受賜不敢當賓出拜辱鄭注拜使者屈辱來迎已大夫不荅拜將命鄭注不荅拜為人使也將猶致也賓再拜稽首鄭注受命大夫還鄭注復于君賓不拜送遂從之鄭注不拜送者為從之不終事賓朝服即位于大門外如聘鄭注于是朝服則初時𤣥端如聘亦入于次俟即位具鄭注主人也擯者俟君于大門外卿大夫士序及宰夫具其饌物皆于庿門之外羮定鄭注肉謂之羮定猶孰也案孰今注疏本作熟古通用孰著之者下以為節甸人陳鼎七當門南面西上設扃鼏若束若編鄭注七鼎一大牢也甸人冢宰之屬兼亨人者南面西上以其為賓統于外也扃鼎扛所以舉之者也凡鼎鼏盖以茅為之長則束本短則編其中央今文扃作鉉古文鼏皆作密釋曰鼎七牛羊豕魚腊腸胃膚也吉時陳鼎于門外者北面于阼階下者西面皆北上茅之為物潔白故鼏疑用之天官有甸師氏又有亨人諸侯甸人兼亨人之事設洗如饗鄭注必如饗者先饗後食如其近者也饗禮亡燕禮則設洗于阼階東南古文饗或作鄉釋曰春秋傳趙孟叔孫豹曹大夫入于鄭鄭伯兼享之子皮戒趙孟遂戒穆叔趙孟欲一獻及享具五獻之籩豆于幕下趙孟辭乃用一獻趙孟為客禮終乃宴飲酒樂此春秋時饗禮之可見者小臣具槃匜在東堂下鄭注為公盥也公尊不就洗小臣于小賓客饗食掌正君服位釋曰特牲饋食禮尸盥匜水實于槃中簞巾宰夫設筵加席几鄭注設筵于户西南面而左几公不賓至授几者親設湇醬可以略此無尊鄭注主于食不獻酬飲酒漿飲俟于東房鄭注飲酒清酒也漿飲酨漿也其俟奠于豐上也飲酒先言飲明非獻酬之酒也漿飲先言漿别于六飲也釋曰此酒漿以酳口耳異于獻酬之酒與六飲也酨之言載以其汁滓相載故曰酨酒人職云共賓客之飲酒凡宰夫之具饌于東房鄭注凡非一也飲食之具宰夫所掌也酒漿不在凡中者雖無尊猶嫌在堂公如賓服迎賓于大門外鄭注不出大門降于國君釋曰出門者待其君之禮也臣之意欲尊其君迎賓于門内所以順其尊君之意也大夫納賓鄭注大夫謂上擯也納賓以公命釋曰卿為上擯賓入門左公再拜賓辟再拜稽首鄭注左西方賓位也辟逡遁不敢當君拜也公揖入賓從鄭注揖入道之及庿門公揖入鄭注庿禰庿也釋曰不言庿名者皆禰庿賓入三揖鄭注毎曲揖及當碑揖相人偶至于階三讓鄭注讓先升公升二等賓升鄭注逺下人君大夫立于東夾南西面北上鄭注東夾南東西節也取節于夾明東于堂士立于門東北面西上鄭注統于門者非其正位辟賓在此小臣東堂下南面西上宰東夾北西面南上鄭注宰宰夫之屬也古文無南上内官之士在宰東北西面南上鄭注夫人之官内宰之屬也自卿大夫至此不先即位從君而入者明助君饗食賓自無事介門西北面西上鄭注西上自統于賓也然則承擯已下立于士西少進東上釋曰承擯大夫也故少進于士上擯進相君退則反其位負東塾而立公當􅎝北鄉至再拜賓降也公再拜鄭注􅎝謂之梁至再拜者興禮俟賓嘉其來也公再拜賓降矣釋曰凡言也者皆與下事為節賓西階東北面荅拜鄭注西階東少就主君敬也擯者辭鄭注辭拜于下拜也公降一等辭曰寡君從子雖將拜興也鄭注賓降再拜公降擯者釋辭矣賓猶降終其再拜稽首興起也栗階升不拜案栗上各本有賓字考此句承上賓西階東北面荅拜不必更言賓唐石經無賓字者是今從之鄭注自以巳拜也栗實栗也不拾級連步趨主國君之命不拾級而下曰辵案說文引春秋公羊傳曰辵階而走今𫝊辵作躇釋文云丑略反一本作辵音同釋曰實栗疾意升階之節前足涉一級後足從之併足相隨不相過是謂連步曲禮所謂涉級聚足連步以上是也栗階者其始升連步至上二等左右各一發而升堂歴階則從下至上皆越等無連步禮記杜蕢入寢歴階而升是也公羊趙盾避靈公躇階而走謂左右足越三等即鄭所謂辵命之成拜階上北面再拜稽首鄭注賓降拜主君辭之賓雖終拜于主君之意猶為不成士舉鼎去鼏于外案鼏石經訛作冪今從釋文為正次入陳鼎于碑南南面西上案原本脫一南字唐石經同今據注疏本補右人抽扃坐奠于鼎西南順出自鼎西左人待載鄭注入由東出由西明為賓也今文奠為委古文待為持雍人以俎入陳于鼎南旅人南面加匕于鼎退鄭注旅人雍人之屬旅食者也雍人言入旅人言退文互相備也出入之由亦如舉鼎者匕俎毎器一人諸侯官多也釋曰大夫饋食禮匕俎皆合執以從大夫長盥洗東南西面北上序進盥退者與進者交于前卒盥序進南面匕鄭注長以長幼也序猶更也前洗南釋曰北面盥載者西面鄭注載者左人案此下今注疏本有也字亦序自鼎東西面于其前大夫匕則載之魚腊飪鄭注飪孰也案孰今注疏本作熟食禮宜孰饗有腥者載體進奏鄭注體謂牲與腊也奏謂皮膚之理也進其理本在前下大夫體七箇魚七縮俎寢右鄭注右首也寢右進鬐也乾魚近腴多骨鯁釋曰縮縱也賓在户西南面俎東西陳其前魚在俎縱之于人為横西首而寢其右則腹腴鄉南而進鬐脊近賓矣以少骨鯁者鄉賓優賓也祭祀則體進下魚進腴腸胃七同俎鄭注以其同𩔖也不異其牛羊腴賤也此俎實凡二十八釋曰君子不食圂腴圂謂犬豕也取牛羊腴而已牛與羊之腸及胃各七倫膚七鄭注倫理也謂精理滑脆者案脆原本訛作脃今注疏本同據宋本改正今文倫或作論釋曰膚取豕之脅革肉為之腸胃膚皆横諸俎垂之鄭注順其在牲之性也腸胃垂及俎拒釋曰俎拒脛中當横節大夫既匕匕奠于鼎逆退復位鄭注事畢宜由便也士匕載者又待設俎公降盥鄭注將設醬賓降公辭鄭注辭其從巳卒盥公壹揖壹讓公升賓升鄭注揖讓皆壹案今注疏本作一殺于初古文壹皆作一宰夫自東房授醯醬鄭注授授公也醯醬以醯和醬公設之鄭注以其為饌本賓辭北面坐遷而東遷所鄭注東遷所奠之東側其故處也案原本無也字釋文取處也二字下云昌慮反今據釋文補入釋曰賓遷之不敢當君設處且若親授然側猶近也公立于序内西鄉鄭注不立阼階上示親饌賓立于階西疑立鄭注不立階上以主君離阼也疑正立也自定之貌今文曰西階宰夫自東房薦豆六設于醬東西上韭菹以東醓醢昌本昌本南麋臡以西菁菹鹿臡鄭注醓醢醢有醓昌本昌蒲本菹也醢有骨謂之臡菁蓂菁菹也今文臡皆作麋士設俎于豆南西上牛羊豕魚在牛南腊腸胃亞之鄭注亞次也不言䋫錯俎尊也釋曰設豆䋫設黍稷錯俎尊具其文膚以為特鄭注直豕與腸胃東也特膚者出下牲賤旅人取匕甸人舉鼎順出奠于其所鄭注以其空也其所謂當門釋曰士不舉鼎出者俟設俎士喪禮亦甸人舉鼎宰夫設黍稷六簋于俎西二以竝東北上黍當牛俎其西稷錯以終南陳鄭注竝併也今文曰併古文簋皆作軌大羮湇不和實于鐙宰右執鐙左執葢由門入升自阼階盡階不升堂授公以葢降出入反位鄭注大羮湇煮肉汁也大古之羮不和無鹽菜瓦豆謂之鐙宰謂大宰宰夫之長也有葢者饌自外入為風塵今文湇為汁又曰入門自阼階無升釋曰湇升自阼階者公親設之故也公設之于醬西賓辭坐遷之鄭注亦東遷所宰夫設鉶四于豆西東上牛以西羊羊南豕豕以東牛鄭注鉶菜和羮之器釋曰以鼎煮牲取其骨體置之俎其汁謂之大羮芼之以菜調以醎酸盛之于鉶謂之鉶羮案原本脱羮字今補飲酒實于觶加于豐鄭注豐所以承觶者也如豆而卑釋曰觶之豉反宰夫右執觶左執豐進設于豆東鄭注食有酒者優賓也設于豆東不舉也燕禮記曰凡奠者于左宰夫東面坐啓簋㑹各卻于其西鄭注㑹簋葢也亦一一合卻之各當其簋之西釋曰㑹古外反後同贊者負東房南面告具于公鄭注負東房負房戶而立也南面者欲得鄉公與賓也公再拜揖食鄭注再拜拜賓饌具賓降拜鄭注荅公拜釋曰曲禮曰主人親饋則拜而食公辭賓升再拜稽首鄭注不言成拜降未拜賓升席坐取韭菹以辯擩于醢上豆之間祭鄭注擩猶染也今文無于贊者東面坐取黍實于左手辯又取稷辯反于右手興以以授賓賓祭之鄭注取授以右手便也賓亦興受坐祭之于豆祭也獨云贊興優賓也少儀曰受立授立不坐釋曰簋俎去席逺故贊者取以授賓豆祭謂前祭豆處上豆之間三牲之肺不離贊者辯取之壹以授賓鄭注肺不離者刌之也不言刌刌則祭肺也此舉肺不離而刌之便賓祭也壹猶稍也古文壹作一釋曰離割也刌切也刌肺切之離肺離割之不絶其中央少許刌肺直取以祭亦謂之祭肺離肺則絶之以祭亦謂之舉肺刌肺惟祭祀乃有之賓興受坐祭鄭注于是云賓興受坐祭重牲也賓亦毎肺興受祭于豆祭挩手扱上鉶以柶辯擩之上鉶之間祭鄭注扱以柶扱其鉶菜也挩拭也拭以巾祭飲酒于上豆之間魚腊醬湇不祭鄭注不祭者非食物之盛者也釋曰魚腊不祭腸胃膚不祭可知或曰曲禮殽之序徧祭之殽謂出于牲體者惟魚腊不祭耳宰夫授公飯粱公設之于湇西賓北面辭坐遷之鄭注既告具矣而又設此殷勤之加也遷之遷而西之以其東上也釋曰東上統于正􅄿公與賓皆復初位鄭注位序内階西宰夫膳稻于粱西鄭注膳猶進也進稻粱者以簠士羞庶羞皆有大盖執豆如宰鄭注羞進也庶衆也進衆珍味可進者也大以肥美者特為臠所以祭也魚或謂之膴膴大也唯醢醬無大如宰如其進大羮湇右執豆左執葢先者反之由門入升自西階鄭注庶羞多羞人不足則相授于階上復出取也先者一人升設于稻南簋西間容人鄭注簋西黍稷西也必言稻南者明庶羞加不與正豆併也間容人者賓當從間往來也釋曰庶羞與稻粱皆加故繼稻言之旁四列西北上鄭注不統于正􅄿者雖加自是一體是所謂羮胾中别釋曰曲禮曰左殽右胾殽骨體也為正􅄿胾切肉也為庶羞肉謂之羮羮則殽也正􅄿在東庶羞在西羮胾中别也管子弟子職篇云羮胾中别胾在醬前其設要方飯是為卒左酒右醬膷以東臐膮牛炙鄭注膷臐膮今時􅌜也牛曰膷羊曰臐豕曰膮皆香美之名也古文膷作香臐作薰炙南醢以西牛胾醢牛鮨鄭注先設醢䋫之以次也内則謂鮨為鱠然則膾用鮨今文鮨作鰭釋彐醢配胾而卑于胾今設之胾上者欲既設之五醢相錯也内則曰膳膷臐膮醢牛炙醢牛胾醢牛膾羊炙羊胾醢豕炙醢豕胾芥醬魚鱠雉鶉鷃自魚鱠以上與此庶羞同惟膮牛炙間衍醢字雉以下即上大夫之加數彼又以鴽為鷃耳鮨南羊炙以東羊胾醢豕炙炙南醢以西豕胾芥醬魚膾鄭注芥醬芥實醬也内則曰膾春用蔥秋用芥衆人騰羞者盡階不升堂授以葢降出鄭注騰當作媵媵送也授授先者一人贊者負東房告備于公鄭注復告庶羞具者以其異􅄿贊升賓鄭注以公命命賓升席釋曰公不揖食者加􅄿禮殺賓坐席末取粱即稻祭于醬湇間鄭注即就也祭稻粱不以豆祭祭加宜于加釋曰稻粱加􅄿也醬湇不祭亦正􅄿之加贊者北面坐辯取庶羞之大興一以授賓賓受兼壹祭之鄭注一一受之而兼壹祭之庶羞輕也自祭之于膷臐之間以異􅄿也賓降拜鄭注拜庶羞公辭賓升再拜稽首公荅再拜釋曰賓先拜庶羞公乃荅拜亦禮殺賓北面自間坐左擁簠粱右執湇以降鄭注自間坐由兩􅄿之間也擁抱也必取粱者公所設也以之降者堂尊處欲食于階下然也釋曰曲禮曰客若降等執食興辭主人興辭于客然後客坐公辭賓西面坐奠于階西東面對西面坐取之栗階升北面反奠于其所降辭公鄭注奠而後對成其意也降辭公敬也必辭公者為其尊而親臨巳食侍食贊者之事公許賓升公揖退于箱鄭注箱東夾之前俟事之處擯者退負東塾而立鄭注無事賔坐遂卷加席公不辭鄭注贊者以告公公聽之重來優賓釋曰公案此下原本缺賓三飯以湇醬鄭注毎飲歠湇以有擩醬食正􅄿也三飯而止君子食不求飽不言其殽優賓釋曰飯飯粱也飯粱以湇醬者公所設也食禮尸食舉殽皆有次第此則惟賓取之宰夫執觶漿飲與其豐以進鄭注此進漱也非為卒食為將有事縁賓意欲自絜清賓挩手興受鄭注受觶宰夫設其豐于稻西鄭注酒在東漿在西是所謂左酒右漿釋曰曲禮曰酒漿處右鄭云若兩有之則左酒右漿案弟子職篇曰左酒右醬此云右漿未詳庭實設鄭注乘皮賓坐祭遂飲奠于豐上鄭注飲漱公受宰夫束帛以侑西鄉立鄭注束帛十端帛也侑猶勸也主國君以為食賓殷勤之意未至復幣以勸之欲用深安賓也西鄉立序内位也受束帛于序端賓降筵北面鄭注以君將有命也北面于西階上擯者進相幣鄭注為君釋幣辭于賓賓降辭幣升聽命鄭注降辭幣主國君又命之升聽命釋許辭降拜鄭注當拜受幣公辭賓升再拜稽首受幣當東楹北面鄭注主國君南面授之當東楹者欲得君行一臣行二也退西楹西東面立鄭注俟主國君送幣也退不負序以將降公壹拜賓降也公再拜鄭注賓不敢俟成拜介逆出鄭注以賓事畢賓北面揖執庭實以出鄭注揖執者示親受公降立鄭注俟賓反上介受賓幣從者訝受皮鄭注從者府史之屬訝迎也今文曰梧受釋曰案下經魚腸胃倫膚下大夫則若七若九九者葢侯伯大夫再命之數七則子男之大夫一命之數也小聘使大夫此篇魚腸胃倫膚之數皆七則所食者子男之小聘大夫也其士介止一人既受賓幣知受皮者府史之屬賓入門左没􅋼北面再拜稽首鄭注便退則食禮未卒不退則嫌更入行拜若欲從此退公辭鄭注止其拜使之卒食釋曰食如字下至注卒食同揖讓如初鄭注如初入也升賓再拜稽首公荅再拜鄭注賓拜拜主國君之厚意賓揖介入復位釋曰下更云介逆出明此時入賓降辭公如初鄭注將復食賓升公揖退于箱賓卒食㑹飯三飲鄭注卒巳也巳食㑹飯三漱漿也㑹飯謂黍稷也此食黍稷則初時食稻粱不以醬湇鄭注不復用正􅄿也初時食加飯用正􅄿此食正飯用庶羞互相成也後言湇或時後用挩手興北面坐取粱與醬以降西面坐奠于階西鄭注示親徹也不以出者非所當得又以已得侑幣釋曰醬湇粱公所設故賓前擁粱與湇此取粱與醬以降也玉藻曰若賜之食而君客之君既徹執飯與醬乃出授從者又曰主人自置其醬則客自徹之曲禮曰卒食客自前跪徹飯齊以授相者齊醬屬也東面再拜稽首鄭注卒食拜也不北面者異于辭公降再拜鄭注荅之也不辭之使升拜明禮有終介逆出賓出公送于大門内再拜賓不顧鄭注初來揖讓而退不顧退禮略也示難進易退之義擯者以賓不顧告公公乃還也有司卷三牲之俎歸于賓館鄭注卷猶收也無遺之辭也三牲之俎正􅄿尤尊盡以歸賓尊之至也歸俎者實于篚它時有所釋故釋曰士虞禮尸所舉牲體皆盛于篚以歸尸釋猶遺也饋食禮俎釋三个此無所釋故言卷也魚腊不與鄭注以三牲之俎無所釋故也禮之有餘為施惠不言腸胃膚者在魚腊下不與可知也古文與作豫明日賓朝服拜賜于朝拜食與侑幣皆再拜稽首鄭注朝謂大門外訝聽之鄭注受其言入告出報也此下大夫有士訝上大夫八豆八簋六鉶九俎魚腊皆二俎鄭注記公食上大夫異于下大夫之數豆加葵菹蝸醢四四為列俎加鮮魚鮮腊三三為列無特釋曰按周禮醢人朝事之豆韭菹醓醢饋食之豆葵菹蝸醢少牢饋食禮四豆兼而用之此亦大夫禮故取葵菹蝸醢加于韭菹以下六豆也魚腸胃倫膚若九若十有一下大夫則若七若九鄭注此以命數為差也九謂再命者也十一謂三命者也七謂一命者也九或上或下者再命謂小國之卿次國之大夫也卿則曰上大夫則曰下大國之孤視子男庶羞西東毋過四列鄭注謂上下大夫也古文毋為無上大夫無羞二十案二十唐石經作卄加于下大夫以雉鶉鴽鄭注鴽無毋釋曰爾雅釋鳥云鴽鴾毋上大夫西東亦四列南北則五列矣此篇所食者子男小聘之大夫也食凡聘賓與大夫介同用此禮故以食大夫名篇惟􅄿數異耳聘禮據侯伯之大聘食禮據子男之小聘互以見若不親食鄭注謂主國君有疾病若他故使大夫各以其爵朝服以侑幣致之鄭注執幣以將命豆實實于罋陳于楹外二以竝北陳簋實實于筐陳于楹内兩楹間二以竝南陳鄭注陳罋筐于楹間者象授受于堂中也南北相當以食􅄿同列耳罋北陳者變于食罋數如豆醢芥醬從焉筐米四今文竝作併釋曰豆實毎物為一罋黍稷稻粱各一筐庶羞之醢芥醬與醢臡同𩔖故從豆實醢芥醬宜各一罋庶羞陳于碑内鄭注生魚也魚腊從焉上大夫加鮮魚鮮腊雉鶉鴽不陳于堂辟正􅄿釋曰生魚即庶羞所用為鱠者也膾切之此則用全三牲之胾炙在牲未殺醢芥醬從豆實故所陳者生魚耳乾魚乾腊同𩔖故從焉雉鶉鴽亦生致之牲不殺而有醢者醢經百日乃成不繫于殺有芥醬者以有生魚故也庭實陳于碑外鄭注執乘皮者也不參分庭一在南者以言歸宜近内釋曰凡陳庭實三分庭一在南設碑三分庭一在北碑外盖南北之中庭牛羊豕陳于門内西方東上鄭注為其踐汙館庭使近外賓朝服以受如受饔禮鄭注朝服食禮輕也釋曰賓受饔皮弁服無擯鄭注以己本宜往釋曰擯當作儐下無擯同明日賓朝服以拜賜于朝訝聽命鄭注亦謂食侑幣大夫相食親戒速鄭注記異于君者也􅄩召也先就告之歸具既具復自召之迎賓于門外拜至皆如饗拜鄭注饗大夫相饗之禮也今亡古文饗或作鄉降盥受醬湇侑幣束錦也皆自阼階降堂受授者升一等鄭注皆者謂受醬受湇受幣也侑用束錦大夫文也降堂謂止階上今文無束賓止也鄭注主人三降賓不從釋曰三降受醬湇幣主人降堂不盡等故賓不降賓執粱與湇之西序端鄭注不敢食于尊處釋曰兩大夫敵故賓不降食食如字至卒食同主人辭賓反之卷加席主人辭賓反之辭幣降一等主人從鄭注從辭賓降受侑幣再拜稽首主人送幣亦然鄭注敵也辭于主人降一等主人從鄭注辭謂辭其臨己食卒食徹于西序端鄭注亦親徹東面再拜降出鄭注拜亦拜卒食其他皆如公食大夫之禮若不親食則公作大夫朝服以侑幣致之鄭注作使也大夫有故君必使其同爵者為之致禮列國之賓來榮辱之事君臣同賓受于堂無擯鄭注與受君禮同記不宿戒鄭注食禮輕也此所以不宿戒者謂前期三日之戒申戒為宿謂前期一日戒不速鄭注食賓之朝夙興戒之賓則從戒者而來不復召不授几鄭注異于醴也無阼席鄭注公不享亨于門外東方鄭注必于門外者大夫之事也東方者主陽司宫具几與蒲筵常緇布純加雈席尋𤣥帛純皆卷自末鄭注司宫太宰之屬掌宫庿者也丈六尺曰常半常曰尋純縁也雈細葦也末經所終有以識之必長筵者以有左右􅄿也今文雈皆作莞案原本云皆為莞釋文取作莞二字下云音官今從釋文釋曰太宰之屬有宫人諸侯則司宫兼之宰夫筵出自東房鄭注筵本在房宰夫敷之也天子諸侯左右房賓之乘車在大門外西方北面立鄭注賓車不入門廣敬也凡賓即朝中道而往將至下行而後車還立于西方賓及位而止北面卿大夫之位當車前凡朝位賓主之間各以命數為逺近之節也釋曰曲禮曰客車不入大門賓主之間謂主人未迎賓時賓主相去之數也鉶芼牛藿羊苦豕薇皆有滑鄭注藿豆葉也苦苦荼也滑蓳荁之屬今文苦為芐釋曰菜者土之毛故謂之芼堇荁乾則滑贊者盥從俎升鄭注俎其所有事簠有葢幂案幂今注疏本訛作冪鄭注稻粱將食乃設去㑹于房葢以幂幂巾也今文或作幕釋曰簠至設時幂亦去之食如字下食庶羞同凡炙無醬鄭注巳有醎和也上大夫蒲筵加雈席其純皆如下大夫純鄭注謂三命大夫也孤為賓則莞筵紛純加繅席畫純也釋曰言上下大夫筵席不殊雖侯伯之卿亦與子男之大夫同也四命之孤則異莞筵繅席司几筵筵國賓之席卿擯由下鄭注不升堂也上贊下大夫也鄭注上謂堂上擯贊者事相近以佐上下為名釋曰擯謂上擯使卿贊謂贊賓食者使下大夫擯在堂下贊在堂上上大夫庶羞酒飲漿飲庶羞可也鄭注于食庶羞宰夫又設酒漿以之食庶羞可也以優賓拜食與侑幣皆再拜稽首鄭注嫌上大夫不稽首
