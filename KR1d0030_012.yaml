body:
  text: 儀禮集釋卷十二宋李如圭撰聘禮擯者出請事賓告事畢鄭注公事畢賓奉束錦以請覿鄭注覿見也嚮將公事案嚮各本作鄉今從釋文及張渟儀禮識誤訂正是欲交其歡敬也不用羔因使而見非特來釋曰荀子曰聘問也享獻也私覿私見也擯者入告出辭鄭注客有大禮未有以待之請禮賓案禮賓之禮當作醴注同賓禮辭聽命擯者入告鄭注告賓許也宰夫徹几改筵鄭注宰夫又主酒食者也將禮賓徹神几改神席更布也賓席東上公食大夫禮曰蒲筵常緇布純加萑席尋玄帛純此筵上下大夫也周禮曰筵國賓于牖前莞筵紛純加繅席畫純左彤几者則是筵孤也孤彤几卿大夫其漆几與公出迎賓以入揖讓如初鄭注公出近者己之禮更端也公升側受几于序端鄭注漆几也今文無升宰夫內拂几三奉兩端以進鄭注內拂几不欲塵坌尊者以進自東箱來授君釋曰內拂几拂之向己也坌被也公東南鄉外拂几三卒振袂中攝之進西鄉鄭注進就賓也擯者告鄭注告賓以公授几賓進訝受几于筵前東面俟鄭注未設也今文訝為梧釋曰訝受迎受也公中攝几賓以兩手從兩端受之公一拜送鄭注公尊也古文一作一賓以几辟鄭注辟位逡遁北面設几不降階上答再拜稽首鄭注不降以主人禮未成也凡賓左几宰夫實觶以醴加柶于觶面枋鄭注酌以授君也君不自酌尊也宰夫亦洗升實觶以醴自東箱來不面擸不訝授也釋曰擸即葉也柶之大端為葉小端為枋面前也凡主人授賓醴者皆面枋賓迎受之皆面葉冠禮贊者酌醴以授主人主人迎受故贊者面葉主人受之得面枋此宰夫實醴公不迎受故宰夫面枋公受之亦得面枋也下記曰醴尊于東箱宰夫不言升降者賤略之公側受醴鄭注將以飲賓賓不降一拜進筵前受醴復位公拜送醴鄭注賓一拜者醴質以少為貴宰夫薦籩豆脯醢賓升筵擯者退負東孰鄭注事未畢擯者不退中庭以有宰夫也釋曰飲食之事宰夫所主故宰夫相也賓祭脯醢以柶祭醴三庭實設鄭注庭實乘馬降筵北面以柶兼諸觶尚擸坐啐醴鄭注降筵就階上公用束帛鄭注致幣也言用尊于下也亦受之于序端建柶北面奠于薦東鄭注糟醴不啐案啐今注疏本作卒似李如圭所見本亦作卒釋曰不卒觶案此下原本缺擯者進相幣鄭注贊以辭賓降辭幣鄭注不敢當公禮也公降一等辭鄭注辭賓降也栗階升聽命鄭注栗階趨君命尚疾不連步釋曰連步者足相隨不相過每等先舉一足而後足并之栗階者始升連步至上等則不連步左右足各一發而升堂降拜鄭注拜受公辭鄭注不降一等殺也升再拜稽首受幣當東楹北面鄭注亦訝受而北面者禮主于己己臣也退東面俟鄭注俟君拜也不北面者謙若不敢當階然釋曰鄉飲酒禮賓主專階者皆北面公一拜賓降也公再拜鄭注不俟公再拜者不敢當公之盛也公再拜者事畢成禮也賓執左馬以出鄭注受尊者禮宜親之也效馬者并左右靮授之餘三馬主人牽者從出也上介受賓幣從者訝受馬鄭注從者士介釋曰下記曰主人之庭實則主人遂以出賓之士訝受之賓覿奉束錦總乘馬二人贊入門右北面奠幣再拜稽首鄭注不請不辭嚮時已請也案嚮各本作鄉今從釋文及張淳儀禮識誤訂正覿用束錦辟享幣也總者總八轡牽之贊者居馬間扣馬也入門而右私事自闑右奠幣再拜以臣禮見也贊者賈人之屬介特覿也釋曰由闑右自牽馬不從介不升堂授幣皆臣禮擯者辭鄭注辭其臣賓出鄭注事畢擯者坐取幣出有司二人牽馬以從出門西面于東孰南鄭注將還之也贊者有司受馬乃出凡取幣于庭北面擯者請受鄭注請以客禮受之賓禮辭聽命鄭注賓受其幣贊者受馬牽馬右之入設鄭注庭實先設客禮也右之欲人居馬左任右手便也于是牽馬者四人事得伸也案伸今注疏本作申曲禮曰效馬效羊者右牽之釋曰言右之知人牽一馬賓奉幣入門左介皆入門左西上鄭注以客禮入可從介公揖讓如初升公北面再拜鄭注公再拜者以其初以臣禮見新之也釋曰公拜亦為受幣賓三退反還負序鄭注反還者不敢與授圭同振幣進授當東楹北面鄭注不言君受略之也釋曰禮賓賓覿受授當東楹臣禮也春秋傳鄭伯如晉拜成授玉于東楹之東士貞伯以為鄭伯視流而行速不安其位凡敵者授受當于兩楹間也士受馬者自前還牽者後適其右受鄭注自由也適牽者之右而受之也此亦並授者不自前左由便也便其已授而去也受馬自前變于受皮釋曰馬在庭北面西上牽者各在其西士受馬者從東方來由牽者之前繞其後于人東馬西受馬受不由其左者欲牽者已授馬右還而出便也牽馬者自前西乃出鄭注自由也釋曰自前西由馬前而西也其西一人則否賓降階東拜送君辭鄭注拜送幣于階東以君在堂鄉之釋曰拜送者己物也凡致命者不拜送拜也君降一等辭鄭注君乃辭之而賓由拜案由猶古通用敬也擯者曰寡君從子雖將拜起也鄭注此禮固多有辭矣未有著之者是其志而煥乎未敢明説栗階升公西鄉賓階上再拜稽首鄭注成拜公少退鄭注為敬賓降出公側授宰幣馬出鄭注庿中宜清公降立擯者出請上介奉束錦士介四人皆奉玉錦束請覿鄭注玉錦錦之文纖縟者也禮有以少文為貴者後言束辭之便也釋曰玉錦錦文纖縟如玉之縝密者賓及上介不用玉錦以少文為貴也擯者入告出許上介奉幣儷皮二人贊鄭注儷猶兩也上介用皮變于賓也皮糜鹿皮皆入門右東上奠幣皆再拜稽首鄭注皆者皆衆介也贊者奠皮出擯者辭鄭注亦辭其臣介逆出鄭注亦事畢也擯者執上幣士執衆幣有司二人舉皮從其幣出請受鄭注此請受請于上介也擯者先即西面位請之釋辭之時衆執幣者隨立門中而俟釋曰介在門西東面故擯者西面請之隨立一一相隨而立委皮南面鄭注擯者既釋辭執衆幣者進即位有司乃得委之南面便其復入也委皮當門釋曰委皮於門中北上贊皮者得北面取之而先入便執幣者西面北上擯者請受鄭注請于上介也上言其次此言其位互約文也釋曰雖衆幣亦請于上介介同時覿統于上介也介禮辭聽命皆進訝受其幣鄭注此言皆訝受者嫌擯者一一授之上介奉幣皮先入門左奠皮鄭注皮先者介隨執皮者而入也入門左介至揖位而立執皮者奠皮以有不敢授之義古文重入公再拜鄭注拜中庭也不受于堂介賤也介振幣自皮西進北面授幣退復位再拜稽首送幣鄭注進者北行參分庭一而東行當君乃復北行也介出宰自公左受幣鄭注不側授介禮輕釋曰不云側授蓋贊者受于公轉以授宰有司二人坐舉皮以東擯者又納士介鄭注納者出道入也士介入門右奠幣再拜稽首鄭注終不敢以客禮見擯者辭介逆出擯者執上幣以出禮請受賓固辭鄭注禮請受者一諸受而聽之也賓為之辭士介賤不敢以言通于主君也案今注疏本脫也字固衍字當如面大夫也釋曰一辭而許曰禮辭再辭而許曰固辭今擯者禮請受明無固辭也下士介面大夫時賓亦一辭耳公答再拜擯者出立于門中以相拜鄭注擯者以賓辭入告還立門中閾外西面公乃遙答拜也相者贊告之士介皆辟鄭注辟于其東面位逡遁也士三人東上坐取幣立鄭注俟擯者執上幣來也擯者進鄭注就公所也宰夫受幣于中庭以東鄭注使宰夫受于士士介幣輕也受之于公左賓幣公側授宰上介幣宰受于公左士介幣宰夫受于士敬之差執幣者序從之鄭注序從者以宰夫當一一受之擯者出請賓告事畢鄭注賓既告事畢衆介逆道賓而出也擯者入告公出送賓鄭注公出衆擯亦逆道紹擯及賓並行間亦六步及大門內公問君鄭注嚮以公禮將事案嚮各本作鄉今從釋文及張淳儀禮識誤訂正無由問也賓至始入門之位北面將揖而出衆介亦在其右少退西上于此可以問君居處何如序殷勤也時承擯紹擯亦于門東北面東上上擯往來傳君命南面蘧伯玉使人於孔子孔子問曰夫子何為此公問君之類也賓對公再拜鄭注拜其無恙公拜賓亦辟公問大夫賓對公勞賓賓再拜稽首公答拜鄭注勞以道路之勤釋曰司儀職云出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟公勞介介皆再拜稽首公答拜賓出公再拜送賓不顧鄭注公既拜客趨辟君命上擯送賓出反告賓不顧于此君可以反路寢矣論語説孔子之行曰君召使擯色勃如也足躩如也賓退必復命曰賓不顧矣釋曰凡去者不答拜賓請有事于大夫鄭注請問問卿也不言問聘聘亦問也嫌近君也上擯送賓出賓東面而請之擯者反命因告之公禮辭許鄭注禮辭一辭賓即館鄭注少休息也即就也卿大夫勞賓賓不見鄭注以己公事未行上介以賓辭辭之釋曰公事問大夫之公事大夫奠鴈再拜上介受鄭注不言卿卿與大夫同執鴈下見于國君周禮凡諸侯之卿見朝君皆執羔勞上介亦如之君使卿韋辨歸饔餼五牢鄭注變皮辨服韋辨敬也韋辨韎韋之辨兵服也而服之者皮韋同類取相近耳其服蓋韎布以為衣而素裳牲殺曰饔生曰餼今文歸或為饋釋曰有毛曰皮去毛熟治曰韋韎赤色也春秋傳鄢陵之戰晉郤至衣韎韋凡衣同冠色衣韎韋則辨亦韎韋也致饔餼非兵事衣以韎布為之皮辨服素裳白舄韋辨服當亦與之同也周禮司服先序祭服次韋辨服次皮辨服則韋辨尊于皮辨上介請事賓朝服禮辭鄭注朝服示不受也受之當以尊服有司入陳鄭注入賓所館之庿陳其積饔鄭注謂飪與腥飪一牢鼎九設于西階前陪鼎當內廉東面北上上當碑南陳牛羊豕魚臘腸胃同鼎膚鮮魚鮮臘設扃冪膷臐膮蓋陪牛羊豕鄭注陪鼎三牲􅌜膷臐膮陪之庶羞加也當內廉辟堂塗也腸胃次臘以其出牛羊也膚豕肉也惟燖者有膚此饌先陳其位後言其次重大禮詳其事也宫必有碑所以識日景引陰陽也凡碑引物者宗庿則麗牲焉以取毛血其材宫庿以石窆用木釋曰陪者陪牛羊豕正鼎之後也不用豕腸胃者君子不食圂腴內廉西階之東廉也皆有東西兩廉近堂之中者為內廉陪鼎陪正鼎之後而當階內廉則鼎設于西階之東矣鼎以辟堂塗而設之當階內廉則堂塗直階也識日景知陰陽者視碑景邪正以知日之早晚視景短長以知陰陽之盈縮進退腥二牢鼎二七無鮮魚鮮臘設于阼階前西面南陳如飪鼎二列鄭注有腥者所以優賓也堂上八豆設于户西西陳皆二以並東上韭菹其南醓醢屈鄭注户室户也東上變于親食賓也案于今注疏本訛作乎醓醢汁也屈猶錯也今文並皆為併釋曰屈者句屈陳之案公食下大夫六豆西上韭菹以東醓醢昌本昌本南麋臡以西菁菹鹿臡上大夫八豆鄭云加葵菹蝸醢此賓亦上大夫則八豆者韭菹東上其南醓醢以西昌本麋臡菁菹菁菹北鹿臡以東葵菹蝸醢八簋繼之黍其南稷錯鄭注黍在北釋曰繼豆以西黍南稷稷西黍黍北稷八簋間錯陳之六鉶繼之牛以西羊豕豕南牛以東羊豕鄭注鉶羮器也釋曰此䋫陳之也不言䋫者文已具也屈者句而屈陳之䋫者直屈陳之錯者間雜而陳既陳則皆有類兩簠繼之粱在北鄭注簠不次簋者粱稻加也凡饌屈錯要相變八壺設于西序北上二以並南陳鄭注壺酒尊也酒蓋稻酒粱酒不錯者酒不以錯雜為味西夾六豆設于西墉下北上韭菹其東醓醢屈六簋繼之黍其東稷錯四鉶繼之牛以南羊羊東豕豕以北牛兩簠繼之粱在西皆二以並南陳六壺西上二以並東陳鄭注東陳在北墉下統于豆饌于東方亦如之鄭注東方東夾室西北上鄭注亦韭菹其東醓醢也釋曰雖陳于東墉下其陳亦以西北為上悉與西夾同嫌統于東墉以東北為上故著之壺東上西陳鄭注亦在北墉下統于豆醯醢百甕夾碑十以為列醯在東鄭注夾碑在鼎之中央也醯在東醯榖陽也醢肉陰也餼二牢陳于門西北面東上牛以西羊豕豕西牛羊豕鄭注餼生也牛羊右手牽之豕束之寢右亦居其左釋曰豕束其足北首而臥其右尚左也士虞禮陳牲北首寢右與生人禮同陳于門內之西為其踐汙館庭使近外米百筥筥半斛設于中庭十以為列北上黍粱稻皆二行稷四行鄭注庭實固當庭中言當中庭者南北之中也東西為列列當酼醢南亦相變也此言中庭則設碑近如堂深也釋曰醯醢言醯在東則南北為列米言北上則東西為列米繼醯醢設之知在醯醢南也醯醢夾碑米設于庭南北之中而在醯醢南則碑近北矣設洗南北以堂深而鄭言設碑如堂深則碑東當洗也米以黍稷為正稻粱為加故南北兩端陳黍稷而稻粱于其間設之門外米三十車案三十唐石經作卅車秉有五籔設于門東為三列東陳鄭注大夫之禮米禾皆視死牢秉籔數名也秉有五籔二十四斛也籔讀若不數之數今文籔或為逾禾三十車案三十唐石經作卅車三秅設于門西西陳鄭注秅數名也三秅千二百秉薪芻倍禾鄭注倍禾者以其用多也薪從米芻從禾四者之車皆陳北輈凡此所以厚重禮也聘義曰古之用財不能均如此然而用財如此其厚者言盡之于禮也盡之于禮則內君臣不相陵而外不相侵故天子制之而諸侯務焉爾賓皮辨迎大夫于外門外再拜大夫不答拜鄭注大夫使者卿也揖入及庿門賓揖入鄭注賓與使者揖而入使者止執幣賓俟之于門內謙也古者天子適諸侯必舍于大祖庿諸侯行舍于諸公庿大夫行舍于大夫庿大夫奉束帛鄭注執其所以將命入三揖皆行鄭注皆猶並也使者尊不後主人至于階讓大夫先升一等鄭注讓不言三不成三也凡升者主人讓于客三敵者則客三辭主人乃許升亦道賓之義也使者尊主人三讓則許升矣今使者三讓則是主人四讓也公雖尊亦三讓乃許升不可以不下主人也古文曰三讓釋曰使者尊者奉主君命也賓從升堂北面聽命鄭注北面于階上也大夫東面致命賓降階西再拜稽首拜餼亦如之鄭注大夫以束帛同致饔餼也賓殊拜之敬也重君之禮也大夫辭升成拜鄭注尊賓受幣堂中西北面鄭注趨主君命也堂中西中央之西釋曰堂中西蓋中堂與西楹之間大夫降出賓降授老幣出迎大夫鄭注老家臣也賓出迎欲儐之案儐原本訛作擯據今注疏本訂正大夫禮辭許入揖讓如初賓升一等大夫從升堂鄭注賓先升敵也皆北面庭實設馬乘鄭注乘四馬也賓降堂受老束錦大夫止鄭注止不降使之餘尊賓奉幣西面大夫東面賓致幣鄭注不言致命非君命也大夫對北面當􅎝再拜稽首鄭注稽首尊君客也致對有辭也釋曰體敵者當頓首受幣于楹間南面退東面俟鄭注賓北面授尊君之使賓再拜稽首送幣大夫降執左馬以出鄭注出庿門從者亦訝受之賓送于外門外再拜明日賓拜于朝拜饔與餼皆再拜稽首鄭注拜謝主君之恩惠于大門外周禮曰凡賓客之治令訝聽之此拜亦皮辨服釋曰案鄉射禮明日賓拜賜于門外主人不見知此拜饔餼亦于大門外也拜于大門外而曰拜于朝則諸侯外朝在大門外明矣公食大夫禮若不親食使大夫朝服致之賓朝服受明日朝服拜賜受饔餼皮辨則亦皮辨拜可知上介饔餼三牢飪一牢在西鼎七羞鼎三鄭注飪鼎七無鮮魚鮮臘案此下今注疏本有也字賓介皆異館腥一牢在東鼎七堂上之饌六鄭注六者賓西夾之數西夾亦如之筥及甕如上賓鄭注凡所不貶者尊介也言如上賓者明此賓容介也餼一牢門外米禾視死牢牢十車薪芻倍禾凡其實與陳如上賓鄭注凡凡飪以下下大夫韋辨用束帛致之上介韋辨以受如賓禮鄭注介不皮辨者以其受大禮似賓不敢純如賓也儐之兩馬束錦士介四人皆餼大牢米百筥設于門外鄭注牢米不入門略之也米設當門亦十為列北上牢在其南西上釋曰設于門外不言東西明當門牢亦在米南與賓介之陳同此西上為異耳宰夫朝服牽牛以致之鄭注執紖牽之東面致命朝服無束帛亦略之上介西面拜迎釋曰車米禾視死牢士無死牢故無米禾無米禾則無芻薪士介朝服北面再拜稽首受鄭注受于牢東拜自牢後適宰夫右受由前東面授從者無擯案擯今注疏本作儐據集釋云當作儐則其訛已久鄭注既受拜送之矣明日衆介亦各如其受之服從賓拜于朝釋曰擯當作儐下經記無擯及注不擯賓同
