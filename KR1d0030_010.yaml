body:
  text: 儀禮集釋卷十宋李如圭撰大射儀司射適西階西倚扑升自西階東面請射于公鄭注倚扑者將即君前不敢佩刑器也升堂者欲諸公卿大夫辯聞也公許遂適西階上命賓御于公諸公卿則以耦告于上大夫則降即位而後告鄭注告諸公卿于堂上尊之也司射自西階上北面告于大夫曰請降司射先降搢扑反位大夫從之降適次立于三耦之南西面北上鄭注適次由次前而北西面立司射東面于大夫之西比耦大夫與大夫案比今注疏本訛作北據唐石經及宋本改正命上射曰某御于子命下射曰子與某子射卒遂比衆耦鄭注衆耦士也衆耦立于大夫之南西面北上若有士與大夫為耦則以大夫之耦為上鄭注為上居羣士之上命大夫之耦曰子與某子射告于大夫曰某御于子鄭注士雖為上射其辭猶尊大夫命衆耦如命三耦之辭諸公卿皆未降鄭注言未降者見其志在射遂命三耦各與其耦拾取矢皆袒決遂執弓右挾之鄭注此命入次之事也司射既命而反位不言之者上射出當作取矢事未訖一耦出西面揖當楅北面揖及楅揖鄭注三耦同入次其出也一上射出西面立司射作之乃揖行也當楅楅正南之東西上射東面下射西面上射揖進坐横弓卻手自弓下取一个兼諸弣興順羽且左還毋周反面揖鄭注横弓者南踣弓也卻手自弓下取矢者以左手在弓表右手從裏取之便也兼幷也并矢于跗當順羽既又當執弦順羽者手放而下備不整理也左還反其位毋周右還而反東面也君在阼還周則下射將背之古文且為阻下射進坐横弓覆手自弓上取一个兼諸弣興順羽且左還毋周反面揖鄭注横弓亦南踣弓也人東西鄉以南北為横覆手自弓上取矢以左手在弓裏右手從表取之便也既拾取矢梱之鄭注梱齊等之也古文梱作魁兼挾乘矢皆内還南面揖鄭注内還者上射左下射右不皆右還亦以君在阼嫌下射故左還而背之也上以陽為内下以陰為内因其宜可也適楅南皆左還北面揖搢三挾一个鄭注楅南鄉當楅之位也揖以耦左還上射于左鄭注以猶與也言以者耦之事成于此意相人耦也上射轉居左便其反位也上射少北乃東面退者與進者相左相揖案此下今注疏本衍還字據唐石經及宋本刪退釋弓矢于次説決拾襲反位二耦拾取矢亦如之後者遂取誘射之矢兼乘矢而取之以授有司于次中皆襲反位鄭注有司納射器因留主授受之司射作射如初一耦揖升如初司馬命去侯負侯許諾如初司馬降釋弓反位司射猶挾一个去扑與司馬交于階前適阼階下北面請釋獲于公鄭注猶有故之辭案有今注疏本訛作守據宋本改正于此言之者司射既誘射恒執弓挾矢以掌射事備尚未知當教之也今三耦卒射衆足以知之矣案足以二字今注疏本訛作一已字據宋本訂正猶挾之者君子不必也公許反搢扑遂命釋獲者設中以弓為畢北面鄭注北面立于所設中之南當視之也鄉射禮曰設中南當楅西當西序大史釋獲小臣師執中先首坐設之東面退大史實八算于中横委其餘于中西興共而俟鄭注先猶前也命大史而小臣師設之國君官多也小臣師退反東堂下位鄉射禮曰横委其餘于中西南末司射西面命曰中離維綱揚觸梱復公則釋獲衆則不與鄭注離猶過也獵也侯有上下綱其邪制躬舌之角者為維或曰維當為絹案絹當作縜考工記曰縜寸焉絹綱耳揚觸者謂矢中他物揚而觸侯也梱復謂矢至侯不著而還案謂今注疏本訛作為據宋本改正復復反也公則釋獲優君也衆當中鵠而著古文梱作魁惟公所中中三侯皆獲鄭注值中一侯則釋獲釋獲者命小史小史命獲者鄭注𫝊告服不使知此司射所命司射遂進由堂下北面視上射命曰不貫不釋上射揖司射退反位鄭注貫猶中也射不中鵠不釋算古文貫作闗釋獲者坐取中之八算改實八算興執而俟鄭注執所取算乃射若中則釋獲者毎一个釋一算上射于右下射于左若有餘算則反委之鄭注委餘算禮貴異又取中之八算改實八算于中興執而俟三耦卒射賓降取弓矢于堂西鄭注不敢與君竝俟告取之以升俟君事畢諸公卿則適次繼三耦以南鄭注言繼三耦明在大夫北公將射則司馬師命負侯皆執其旌以負其侯而俟鄭注君尊若始焉司馬師反位隸僕人埽侯道鄭注新之司射去扑適阼階下告射于公公許適西階東告于賓鄭注告當射也今文曰阼階下無適遂搢扑反位小射正一人取公之決拾于東坫上一小射正授弓拂弓皆以俟于東堂鄭注授弓當授大射正拂弓去塵公將射則賓降適堂西袒決遂執弓搢三挾一个升自西階先待于物北北一笴東面立鄭注不敢與君併笴矢幹東面立鄉君也司馬升命去侯如初還右乃降釋弓反位鄭注還右還君之右也猶出下射之南還其後也今文曰右還公就物小射正奉決拾以笥大射正執弓皆以從于物鄭注笥萑葦器大射正舍司正親其職小射正坐奠笥于物南遂拂以巾取決興贊設決朱極三鄭注極猶放也所以韜指利放弦也以朱韋為之三者食指將指無名指無極放弦契于此指多則痛小指短不用小臣正贊袒公袒朱襦卒袒小臣正退俟于東堂小射正又坐取拾興贊設拾以笥退奠于坫上復位鄭注既袒乃設拾拾當以韝襦上大射正執弓以袂順左右隈上再下壹左執弣右執簫以授公公親揉之鄭注順放之也隈弓淵也揉宛之觀其安危也今文順為循古文揉為紐小臣師以巾内拂矢而授矢于公稍屬鄭注内拂恐塵及君也稍屬不搢矢大射正立于公後以矢行告于公鄭注若不中使君當知而改其度下曰留上曰揚左右曰方鄭注留不至也揚過去也方出旁也公既發大射正受弓而俟拾發以將乗矢鄭注公下射也而先發不留尊也公卒射小臣師以巾退反位大射正受弓鄭注受弓以授有司于東堂小射正以笥受決拾退奠于坫上復位大射正退反司正之位小臣正贊襲公還而后賓降釋弓于堂西反位于階西東面鄭注階西東面賓降位公即席司正以命升賓賓升復筵而后卿大夫繼射諸公卿取弓矢于次中袒決遂執弓搢三挾一个出西面揖揖如三耦升射卒射降如三耦適次釋弓説決拾襲反位衆皆繼射釋獲皆如初鄭注諸公卿言取弓矢衆言釋獲互言也卒射釋獲者遂以所執餘獲適阼階下北面告于公曰左右卒射鄭注司射不告者案告上今注疏本衍言字據宋本刪釋獲者于是有事宜終之也餘獲餘算也無餘算則無所執古文曰餘算反位坐委餘獲于中西興共而俟司馬袒執弓升命取矢如初負侯許諾以旌負侯如初司馬降釋弓如初小臣委矢于楅如初鄭注司馬司馬正于是司馬師亦坐乗矢賓諸公卿大夫之矢皆異束之以茅卒正坐左右撫之進束反位鄭注異束大夫矢尊殊之也正司馬正也進前也又言束整結之示親也賓之矢則以授矢人于西堂下鄭注是言矢人則納射器之有司各以其器名官職不言君矢小臣以授矢人于東下可知司馬釋弓反位而后卿大夫升就席鄭注此言其升前小臣委矢于楅司射適階西釋弓去扑襲進由中東立于中南北面視算鄭注釋弓去扑射事已也釋獲者東面于中西坐先數右獲鄭注固東面矣復言之者少南就右獲二算為純鄭注純猶全也耦陰陽也一純以取實于左手十純則縮而委之鄭注縮從也于數者東西為從古文縮皆作蹙毎委異之鄭注易校數有餘純則横諸下鄭注又異之也自近為下一算為竒奇則又縮諸純下鄭注又從之興自前適左鄭注從中前北也更端故起東面坐鄭注少北于故坐兼斂算實于左手一純以委十則異之鄭注變于右也其餘如右獲鄭注謂所縮所横者司射復位釋獲者遂進取賢獲執之由阼階下北面告于公鄭注賢獲勝黨之算也執之者齊而取其餘若右勝則曰右賢于左若左勝則曰左賢于右以純數告若有奇者亦曰奇鄭注告曰某賢于某若干純若干奇若左右鈞則左右各執一算以告曰左右鈞還復位坐兼斂算實八算于中委其餘于中西興共而俟司射命設豐鄭注當飲不勝者射爵司宫士奉豐由西階升北面坐設于西楹西降復位勝者之弟子洗觶升酌散南面坐奠于豐上降反位鄭注弟子其少者也不授者射爵猶罰爵略之司射遂袒案今注疏本脱遂字據唐石經及宋本補執弓挾一个搢扑東面于三耦之西命三耦及衆射者勝者皆袒決遂執張弓鄭注執張弓言能用之也右手挾弦不勝者皆襲說決拾卻左手右加弛弓于其上遂以執弣鄭注固襲說決拾矣復言之者起勝者也不勝者執弛弓言不能用之也兩手執弣無所挾也司射先反位鄭注居前俟所命入次而來飲三耦及衆射者皆升飲射爵于西階上鄭注不勝之黨無不飲小射正作升飲射爵者如作射一耦出揖如升射及階勝者先升升堂少右鄭注先升尊賢也少右辟飲者亦因相飲之禮然不勝者進北面坐取豐上之觶興少退立卒觶進坐奠于豐下興揖鄭注立卒觶不祭不拜受罰不備禮也右手執觶左手執弓不勝者先降鄭注後勝先降略之不由次也降而少右復竝行與升飲者相左交于階前相揖適次釋弓襲反位僕人師繼酌射爵取觶實之反奠于豐上退俟于序端鄭注僕人師酌者君使之代弟子也自此以下辯為之酌升飲者如初三耦卒飲若賓諸公卿大夫不勝則不降不執弓耦不升鄭注此耦謂士也諸公卿或闕士為之耦者不升其諸公卿大夫相為耦者不降席重恥尊也僕人師洗升實觶以授賓諸公卿大夫受觶于席以降適西階上北面立飲卒觶授執爵者反就席鄭注雖尊亦西階上立飲不可以己尊枉正罰也授爵而不奠豐尊大夫也若飲公則侍射者降洗角觶升酌散降拜鄭注侍射賓也飲君則不敢以為罰從致爵之禮也公降一等小臣正辭賓升再拜稽首公荅再拜賓坐祭卒爵再拜稽首公荅再拜賓降洗象觶升酌膳以致下拜小臣正辭升再拜稽首公荅再拜公卒觶賓進受觶降洗散觶升實散下拜小臣正辭再拜稽首公荅再拜鄭注賓復酌自飲者夾爵也但如致爵則無以異于燕也夾爵亦所以恥公也所謂若飲君燕則夾爵賓坐不祭卒觶降奠于篚階西東面立鄭注不祭象射爵擯者以命升賓賓升就席鄭注擯者司正也今文席為筵若諸公卿大夫之耦不勝則亦執弛弓特升飲鄭注此耦亦謂士也特猶獨也以尊與卑為耦而又不勝案今注疏本脱與卑二字據宋本𥙷使之獨飲若無倫匹孤賤也衆皆繼飲射爵如三耦射爵辯乃徹豐與觶鄭注徹除也司宫尊侯于服不之東北兩獻酒東面南上皆加勺設洗于尊西北篚在南東肆實一散于篚鄭注為大侯獲者設尊也言尊侯者獲者之功由侯也不于初設之者不敢必君射也君不射則不獻大侯之獲者散爵名容五升司馬正洗散遂實爵獻服不鄭注言服不者著其官尊大侯也服不司馬之屬掌養猛獸而教擾之者洗酌皆西面服不侯西北三歩北面拜受爵鄭注近其所為獻司馬正西面拜送爵反位鄭注不俟卒爵略賤也此終言之獻服不之徒乃反位宰夫有司薦庻子設折俎鄭注宰夫有司宰夫之吏也鄉射記曰獲者之俎折脊脅肺卒錯獲者適右个薦俎從之鄭注不言服不言獲者國君大侯服不負侯其􅑫居乏待獲變其文容二人也司馬正皆獻之薦俎已錯乃適右个明此獻己己歸功于侯也適右个由侯内鄉射記曰東方謂之右个獲者左執爵右祭薦俎二手祭酒鄭注祭俎不奠爵不備禮也二手祭酒者獲者南面于俎北當為侯祭于豆間爵反注為一手不能正也此薦俎之設如于北面人焉天子祝侯曰惟若寧侯無或若女不寜侯不屬于王所故抗而射女彊飲彊食貽女曽孫諸侯百福諸侯以下祝辭未聞適左个祭如右个中亦如之鄭注先祭个後中者以外即之至中若神在中鄉射禮曰獻獲者俎與薦皆三祭卒祭左个之西北三歩東面鄭注此鄉受獻之位也不北面者嫌為侯卒爵設薦俎立卒爵鄭注不言不拜既爵司馬正已反位不拜可知也鄉射禮曰獲者薦右東面立飲司馬師受虚爵洗獻隸僕人與巾車獲者皆如大侯之禮鄭注隸僕人埽侯道巾車張大侯及參侯干侯之獲者其受獻之禮如服不也隸僕人巾車于服不之位受之功成于大侯也不言量人者此自後以及先可知卒司馬師受虚爵奠于篚鄭注獲者之篚獲者皆執其薦庶子執俎從之設于乏少南鄭注少南為復射妨旌也隸僕人巾車量人自服不而南服不復負侯而俟司射適階西去扑適堂西釋弓説決拾襲適洗洗觚升實之降獻釋獲者于其位少南鄭注獻釋獲者與獲者異文武不同也去扑者扑不升堂也少南辟中薦脯醢折俎皆有祭鄭注俎與服不同惟祭一為異釋獲者薦右東面拜受爵司射北面拜送爵釋獲者就其薦坐左執爵右祭脯醢興取肺坐祭遂祭酒鄭注祭俎不奠爵亦賤不備禮興司射之西北面立卒爵不拜既爵司射受虚爵奠于篚釋獲者少西辟薦反位鄭注辟薦少西之者為復射妨司射視算亦辟俎也司射適堂西袒決遂取弓挾一个適階西搢扑以反位鄭注為將復射司射倚扑于階西適阼階下北面請射于公如初鄭注不升堂賓諸公卿大夫既射矣聞之可知反搢扑適次命三耦皆袒決遂執弓序出取矢鄭注曏言拾是言序互言耳司射先反位鄭注言先先三耦也司射既命三耦以入次之事即反位三耦入次袒決遂執弓挾矢乃出反次外西面位曏不言司射先反位三耦未有次外位無所先也二耦拾取矢如初案二今注疏本訛作三據宋本訂正小射正作取矢如初鄭注小射正司射之佐作取矢禮殺代之三耦既拾取矢諸公卿大夫皆降如初位與耦入于次皆袒決遂執弓皆進當楅進坐説矢束上射東面下射西面拾取矢如三耦鄭注皆進當楅進三耦揖之位也凡繼射命耦而已不作射不作取矢從初若士與大夫為耦士東面大夫西面大夫進坐説矢束退反位鄭注説矢束自同于三耦謙也耦揖進坐兼取乘矢興順羽且左還毋周反面揖鄭注兼取乘矢不敢與大夫拾大夫進坐亦兼取乘矢如其耦北面搢三挾一个揖進案敖繼公云進當作退鄉射云揖退是也大夫與其耦皆適次釋弓説決拾襲反位諸公卿升就席鄭注大夫反位諸公卿乃升就席大夫與己上下位衆射者繼拾取矢皆如三耦遂入于次釋弓矢説決拾襲反位司射猶挾一个以作射如初一耦揖升如初司馬升命去侯負侯許諾司馬降釋弓反位司射與司馬交于階前倚扑于階西適阼階下北面請以樂于公公許鄭注請奏樂以為節也始射獲而未釋獲復釋獲復用樂行之君子之于事也案今注疏本脱也字據宋夲補始取茍能中課有功終用成法教化之漸也射用應樂為難孔子曰射者何以聽循聲而發發而不失正鵠者其惟賢者乎司射反搢扑東面命樂正曰命用樂鄭注言君有命用樂射也樂正在工南北面樂正曰諾司射遂適堂下北面眡上射命曰不鼓不釋鄭注不與鼓節相應不釋算也鼓亦樂之節學記曰鼓無當於五聲五聲不得不和凡射之鼓節投壺其存者也周禮射節天子九諸侯七卿大夫以下五上射揖司射退反位樂正命大師曰奏貍首閒若一鄭注樂正西面受命左還東面命大師以大射之樂章使奏之也貍首逸詩曽孫也貍之言不來也其詩有射諸侯首不朝者之言因以名篇後世失之謂之曽孫曽孫者其章頭也射義所載詩曰曽孫侯氏是也以為諸侯射節者采其既有弧矢之威又言小大莫處御于君所以燕以射則燕則譽有樂以時㑹君事之志也閒若一者調其聲之疏數重節大師不興許諾樂正反位奏貍首以射三耦卒射賓待于物如初公樂作而後就物稍屬不以樂志其他如初儀鄭注不以樂志君之射儀遟速從心其發不必應樂辟不敏也志意所擬度也春秋𫝊曰吾志其目卒射如初賓就席諸公卿大夫衆射者皆繼射釋獲如初卒射降反位釋獲者執餘獲進告左右卒射如初司馬升命取矢負侯許諾司馬降釋弓反位小臣委矢司馬師乗之皆如初司射釋弓視算如初釋獲者以賢獲與鈞告如初復位司射命設豐實觶如初遂命勝者執張弓不勝者執弛弓升飲如初卒退豐與觶如初司射猶袒決遂左執弓右執一个兼諸弦面鏃適次命拾取矢如初鄭注側持弦矢曰執面猶尚也兼矢于弦尚鏃將止變于射也司射反位三耦及諸公卿大夫衆射者皆袒決遂以拾取矢如初矢不挾兼諸弦面鏃退適次皆授有司弓矢襲反位鄭注不挾亦謂執之如司射卿大夫升就席司射適次釋弓説決拾去扑襲反位司馬正命退楅解綱小臣師退楅巾車量人解左下綱司馬命獲者以旌與薦俎退鄭注解猶釋也今文司馬師無司馬司射命釋獲者退中與算而俟鄭注諸所退射器皆俟備君復射釋獲者亦退其薦俎公又舉奠觶惟公所賜若賓若長以旅于西階上如初大夫卒受者以虚觶降奠于篚反位司馬正升自西階東楹之東北面告于公請徹俎公許鄭注射事既畢禮殺人倦宜徹俎燕坐遂適西階上北面告于賓賓北面取俎以出諸公卿取俎如賓禮遂出授從者于門外鄭注自其從者大夫降復位鄭注門東北面位庶子正徹公俎降自阼階以東鄭注降自阼階若親徹也以東去藏賓諸公卿皆入門東面北上鄭注諸公卿不入門而右以將燕亦因從賓司正升賓賓諸公卿大夫皆説屨升就席公以賓及卿大夫皆坐乃安鄭注曏命以我安臣于君尚猶踧踖至此乃敢安羞庶羞鄭注羞進也庶衆也所進衆羞謂􅍧肝膋狗胾醢也或有炮鼈膾鯉雉兎鶉鴽大夫祭薦鄭注燕乃祭薦不敢于盛成禮司正升受命皆命公曰衆無不醉賓及諸公卿大夫皆興對曰諾敢不醉皆反位坐鄭注皆命者命賓命諸公命卿大夫皆鄕其位也興對必降席敬也司正退立西序端主人洗酌獻士于西階上士長升拜受觶主人拜送鄭注獻士用觶士賤也今文觶作觚士坐祭立飲不拜既爵其他不拜坐祭立飲鄭注其他謂衆士也升不拜受爵乃薦司正與射人于觶南北面東上司正為上鄭注司正射人士也以齒受獻既乃薦之也司正大射正也射人小射正略其佐辯獻士士既獻者立于東方西面北上乃薦士鄭注士既獻易位者以卿大夫在堂臣位尊東也畢獻薦之略賤祝史小臣師亦就其位而薦之鄭注亦者亦士也辯獻乃薦也祝史門東北面東上主人就士旅食之尊而獻之旅食不拜受爵坐祭立飲鄭注主人既酌西面士旅食北面受之不洗者于賤略之案此下今注疏本有也字宋本無主人執虚爵奠于篚復位賓降洗升媵觶于公酌散下拜公降一等小臣正辭賓升再拜稽首公荅再拜鄭注賓受公賜多矣禮將終宜勸公序厚意也今文觶為觚公荅拜無再拜賓坐祭卒爵再拜稽首公荅再拜賓降洗象觚升酌膳坐奠于薦南降拜小臣正辭賓升成拜公荅拜賓反位鄭注反位反席也此觚當為觶公坐取賓所媵觚興惟公所賜受者如初受酬之禮降更爵洗升酌膳下再拜稽首小臣正辭升成拜公荅拜乃就席坐行之鄭注坐行之若今坐相勸酒有執爵者鄭注士有盥升主酌授之惟受于公者拜鄭注公所賜者拜其餘則否司正命執爵者爵辯卒受者興以酬士鄭注欲令惠均大夫卒受者以爵興西階上酬士士升大夫奠爵拜士荅拜鄭注興酬士者士立堂下與上坐者異也案今注疏本脱也字據宋本補大夫立卒爵不拜實之士拜受大夫拜送士旅于西階上辯鄭注祝史小臣師旅食皆及焉士旅酌鄭注旅序也士以次自酌相酬無執爵者若命曰復射則不獻庶子鄭注獻庶子則正禮畢後無事司射命射惟欲鄭注司射命賓及諸公卿大夫射欲者則射不欲者則止可否之事從人心也卿大夫皆降再拜稽首公荅拜鄭注拜君樂與臣下執事無已不言賓賓從羣臣禮在上壹發中三侯皆獲鄭注其功一也而和者益多案益今注疏本訛作亦據宋本改正尚歡樂也矢揚觸或有參中者主人洗升自西階獻庶子于阼階上如獻士之禮辯獻降洗遂獻左右正與内小臣皆于阼階上如獻庶子之禮鄭注庶子既掌正六牲之體案既今注疏本訛作即據宋本改正又正舞位授舞器與膳宰樂正聫事又掌國子戒令教治世子之官也左右正謂樂正僕人正也位在中庭之左右小樂正在頌磬之北右也工在西則北面案則今注疏本訛作即據宋本改正工遷于東則東面大樂正在笙磬之北左也工在西則西面工遷于東則北面僕人正相大師工升堂與其師士降立于小樂正之北北上工遷于東則陪其工後國君無故不釋縣二正君之近官也内小臣奄人掌君隂事陰令后夫人之官也獻三官于阼階别内外臣也同獻更洗以時事不聫也獻正下及内小臣則磬人鐘人鎛人鼓人僕人師僕人士盡獻可知也庶子内小臣位在小臣師之東少退西上無算爵鄭注算數也爵行無次數惟意所勸醉而止士也有執膳爵者有執散爵者執膳爵者酌以進公公不拜受執散爵者酌以之公命所賜所賜者興受爵降席下奠爵再拜稽首公荅再拜鄭注席下席西受賜爵者以爵就席坐公卒爵然後飲鄭注酬之禮爵代舉今爵竝行嫌不代也竝行猶代者明勸惠從尊者來執膳爵者受公爵酌反奠之鄭注燕之歡在飲酒成其意也受賜爵者興案今注疏本脱爵字據宋本補授執散爵者執散爵者乃酌行之鄭注與其所勸者案勸今注疏本訛作歡據宋本改正惟受于公者拜卒受爵者興案今注疏本脱受字據宋本補以酬士于西階上士升大夫不拜乃飲實爵鄭注乃猶而也士不拜受爵大夫就席士旅酌亦如之公有命徹幂則賓及諸公卿大夫皆降西階下北面東上再拜稽首鄭注命徹幂者公意殷勤欲盡酒公命小臣正辭公荅拜大夫皆辟升反位鄭注升不成拜于將醉正臣禮士終旅于上如初鄭注卿大夫降而爵止于其反席卒之無算樂鄭注升歌間合無次數惟意所樂宵則庶子執燭于阼階上司宫執燭于西階上甸人執大燭于庭閽人為燭于門外鄭注宵夜也燭燋也甸人掌其薪蒸者庭大燭為其位廣也為作也作燭俟賔出案俟今注疏本訛作候據宋本改正賓醉北面坐取其薦脯以降鄭注取脯重得君之賜奏陔鄭注陔夏樂章也其歌頌𩔖也以鐘鼓奏之其篇今亡賓所執脯以賜鐘人于門内霤遂出鄭注必賜鐘人鐘人以鐘鼓奏陔夏賜之脯明雖醉志禮不忘樂卿大夫皆出鄭注從賓出公不送鄭注臣也與之安燕交歡嫌亢禮也公入驁鄭注驁夏亦樂章也以鐘鼓奏之其詩今亡此公出而言入者射宫在郊以將還為入燕不驁者于路寢無出入也
