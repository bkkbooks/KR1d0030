body:
  text: 儀禮集釋卷一九宋李如圭撰喪服緦麻三月者鄭注緦麻布衰裳而麻絰帶也不言衰絰略輕服省文傳曰緦者十五升抽其半有事其縷無事其布曰緦鄭注謂之緦者治其縷細如絲也或曰有絲朝服用布何衰用絲乎抽猶去也雜記曰緦冠繅纓釋曰間傳曰緦麻十五升去其半有事其縷無事其布曰緦事猶治也朝服之布其經千二百縷緦半之升數雖少而縷之精粗如朝服故服次小功也冠之布與衰同纓則加澡治之又事其布也斬衰冠繩纓纓重于冠齊衰以下布纓纓與冠同緦冠澡纓纓輕于冠服輕者冠彌飾也三月既葬除之族曽祖父母族祖父母族父母族昆弟鄭注族曾祖父者曾祖昆弟之親也族祖父者亦髙祖之孫祖父之從父昆弟之親也案原本脫此十字據今注疏本補則髙祖有服明矣釋曰族父者族祖父之子父之從祖昆弟族昆弟者族父之子已之三從昆弟也族之為言屬也骨肉相連屬也髙祖玄孫之親謂之九族春秋傳曰凡諸侯之喪同姓臨于宗廟同宗于祖廟同族于禰廟杜預云同族謂髙祖以下也此四緦麻與已同出于髙祖恐其親盡相疏故以族名之大傳曰四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣庶孫之婦釋曰適孫之婦服無文以次差之當小功也庶婦小功適婦則大功庶孫之婦緦故適孫之婦當小功庶孫之中殤鄭注庶孫者成人大功其殤中從上此當為下殤言中殤者字之誤耳又諸言中者皆連上下也從祖姑姊妹適人者報從祖父從祖昆弟之長殤鄭注不見中殤者案今注疏本脫者字中從下外孫鄭注女子子之子釋曰女外適所生故曰外孫外祖父母以尊加小功為外孫自從其正服緦從父昆弟姪之下殤夫之叔父之中殤下殤鄭注言中殤者明中從下案今注疏本脫明字從母之長殤報庶子為父後者為其母傳曰何以緦也傳曰與尊者為一體不敢服其私親也然則何以服緦也有死于宮中者則為之三月不舉祭因是以服緦也鄭注君卒庶子為母大功大夫卒庶子為母三年也案今注疏本脫也字士雖在庶子為母皆如衆人釋曰不敢服與不服出母義同雜記曰父母之喪將祭而兄弟死既葬而祭如同宫則雖臣妾葬而後祭緣此義而為之三月異于出母之不同宫悉無服也此服自士上達天子皆然服問曰君之母非夫人則羣臣無服惟近臣及僕驂乘從服惟君所服服曾子問又曰古者天子練冠以燕居鄭謂蓋庶子王為其母異代之制非周禮也皇氏以為練冠者君母在之服君母沒則伸服緦士為庶母傳曰何以緦也以名服也大夫以上為庶母無服釋曰喪服平文皆通據士庶人此特言士者庶人無妾無庶母大夫以上又降其庶母不服為庶母服者惟士而巳貴臣貴妾傳曰何以緦也以其貴也鄭注此謂公士大夫之君也殊其臣妾貴賤而為之服貴臣室老士也貴妾姪娣也天子諸侯降其臣妾無服士卑無臣案此下各本衍則士二字據疏內舉注文無之今刪正妾又賤不足殊有子則為之緦無子則巳案此注今注疏本在經文下傳曰上釋曰士妾之服見小記魯哀公為悼公之母齊衰晉平公為少薑衰絰皆非禮乳母鄭注謂養子者有它故賤者代之慈已傳曰何以緦也以名服也釋曰荀子曰乳母飲食之者也而三月慈母衣被之者也而九月君曲被者也三年畢乎哉從祖昆弟之子鄭注族父母為之服釋曰族祖父母族曾祖父母亦服從父昆弟之孫昆弟之曾孫緦從省文可知曾孫鄭注孫之子釋曰曾玄以下皆為曾孫曾祖同服齊衰三月故曾祖同服緦父之姑鄭注歸孫為祖父之姊妹釋曰不言適人者行屬已尊適人可知猶從祖祖父之不言殤服也其在室者自從上章從祖父之服釋親曰女子謂晜弟之子為姪謂姪之子為歸孫從母昆弟傳曰何以緦也以名服也釋曰從母之子也以與已有昆弟之名而服之甥鄭注姊妹之子傳曰甥者何也謂吾舅者吾謂之甥何以緦也報之也壻鄭注女子子之夫也傳曰何以緦案此下今注疏本有也字報之也釋曰壻亦有甥名孟子曰帝館甥是也釋親曰妻之父為外舅妻之父母傳曰何以緦從服也鄭注從于妻而服之釋曰此服問所謂有從重而輕也妻之父母妻服期而夫從服緦抑外親以崇已族故不從降一等之例雖母黨亦然加不過小功而已凡以厭降者皆降其妻之父母服問曰有從有服而無服公子為其妻之父母是也小記曰世子不降妻之父母適子得伸服其妻故為其黨亦不降庾蔚之曰適子服妻之父母則天子諸侯亦服之矣母之父母其服可知譙周曰舊説外祖父母母之正統妻之父母妻之正統母妻與巳尊同母妻所不降已亦不降姑之子鄭注外兄弟也釋曰姑外適而生故曰外兄弟傳曰何以緦報之也釋曰姑之子從于母而服已己則報之舅鄭注母之昆弟案昆今注疏本訛作兄考篇內及爾雅釋親曰昆弟曰從父昆弟曰從祖昆弟曰族昆弟皆不稱兄弟女子謂其五屬之內亦然至若母與妻之黨為兄弟及舅之子為內兄弟姑之子為外兄弟皆不得稱昆弟而兄弟又為小功以下通稱此經傳中辨别親疏義例不宜溷同也傳曰何以緦從服也鄭注從于母而服之舅之子鄭注內兄弟也釋曰從于母而服故對姑之子而名內兄弟傳曰何以緦從服也夫之姑姊妹之長殤夫之諸祖父母報鄭注諸祖父母者夫之所為小功從祖祖父母外祖父母或曰曾祖父母曾祖于曾孫之婦無服而云報乎曾祖父母正服小功妻從服緦釋曰馬融曰夫之諸祖父母有四曾祖父母也從祖祖父母也從祖父母也外祖父母也夫皆為之小功曾祖本亦小功之服故妻皆降一等從服緦曾祖父母以正尊降之不報外祖父母亦降外孫之服于其妻蓋亦不報報之者旁尊耳君母之昆弟傳曰何以緦從服也鄭注從于君母而服緦也君母在則不敢不從服君母卒則不服也釋曰以其徒從故經每别出之從父昆弟之子之長殤昆弟之孫之長殤為夫之從父昆弟之妻傳曰何以緦也以為相與同室則生緦之親焉長殤中殤降一等下殤降二等齊衰之殤中從上大功之殤中從下鄭注同室者不如居室之親也齊衰大功皆服其成人也大功之殤中從下則小功之殤亦中從下也此主謂妻為夫之親服也凡不見者以此求之釋曰此例發于為夫黨之下知服夫黨之殤則然也檀弓曰同爨緦大功同居同財故從父昆弟之妻相為緦今人謂從父昆弟為同堂本此記公子為其母練冠麻麻衣緣縓為其妻縓冠葛絰帶麻衣縓緣皆既葬除之鄭注公子君之庶子也其或為母謂妾子也麻者緦麻之絰帶也此麻衣者如小功布深衣為不制衰裳變也詩云麻衣如雪縓淺絳也一染謂之縓練冠而麻衣縓緣三年練之受飾也檀弓曰練練衣黃裏縓緣諸侯之妾子厭于父為母不得伸權為制此服不奪其恩也為妾縓冠葛絰帶妻輕釋曰此經麻下經朋友麻與緦麻之麻同文知麻之大小如絲之絰帶也練冠練布冠也其布蓋與衣同父在士之子為其母妻期大夫之子為其母妻大功則公子宜為其母妻小功矣知此麻衣用小功布也麻衣與深衣皆用十五升布連裳為之麻衣緣以布深衣緣以采此麻衣不用十五升布而又縓緣其名同耳傳曰何以不在五服之中也君之所不服子亦不敢服也君之所為服子亦不敢不服也鄭注君之所不服謂妾與庶婦也君之所為服謂夫人與適婦也諸侯之妾貴者視卿賤者視大夫皆三月而葬釋曰諸侯絶旁期公子亦從乎父而絶之母妻本杖期三年之喪雖不敢服不奪其恩猶制此服三月既葬除之齊王子有其母死其傅為之請數月之喪孟子曰是欲終之而不可得也謂此也公子既以厭降其母妻為其母妻之黨無服其妻于公子之黨自如其本服服之舅不厭婦故也服問曰有從輕而重公子之妻為其皇姑有從無服而有服公子之妻為公子之外兄弟有從有服而無服公子為其妻之父母是也皇姑之服期外兄弟謂母黨夫為之小功者妻從服緦公子之妻不厭于其舅大夫之妻可知大夫公之昆弟大夫之子于兄弟降一等鄭注兄弟猶言族親也凡不見者以此求之案此下今注疏本有也字為人後者于兄弟降一等報于所為後之子兄弟若子案各本訛作于所為後之兄弟之子若子唐石經亦然考古人昆弟不稱兄弟凡稱兄弟皆疏逺者上節注云兄弟猶言族親是也于所為後之子兄弟若子所為後之子者其女子子也所為後之兄弟則其族親也舉逺以該近之辭若言兄弟之子則義不可通矣通典載賀循引喪服制曰為人後者為兄弟降一等報于所為後之子兄弟若子其所見記文未舛誤今據以訂正鄭注報者嫌其為宗子不降釋曰雖後大宗其本親第依降服報之小記曰為人後者其妻為舅姑大功則妻于夫本親兄弟亦從夫而降一等兄弟皆在他邦加一等不及知父母與兄弟居加一等鄭注皆在他邦謂行仕出逰若辟仇案今注疏本作讐不及知父母父母早卒傳曰何如則可謂之兄弟傳曰小功以下為兄弟鄭注于此發兄弟傳者嫌大功以上又加也大功以上若皆在他國則親自親矣若不及知父母則固同財矣釋曰大功以上同居同財恩義自重服稱其情無所復加故傳明記所加謂小功以下者朋友皆在他邦袒免歸則已鄭注謂服無親者當為之主每至袒時則袒袒則去冠代之以免舊説以為免象冠廣一寸已猶止也歸有主則止也主若幼少則未止小記曰大功者主人之喪有三年者則必為之再祭朋友虞祔而已朋友麻鄭注朋友雖無親有同道之恩相為服緦之絰帶檀弓曰羣居則絰出則否其服弔服也周禮曰凡弔當事則辨絰服辨絰者如爵辨而素加環絰也其服有三錫衰也緦衰也疑衰也王為三公六卿錫衰為諸侯緦衰為大夫士疑衰諸侯及卿大夫亦以錫衰為弔服當事乃辨絰案乃今注疏本作則否則皮辨辟天子也士以緦衰為喪服其弔服則疑衰也舊説以為士弔服布上素下或曰素委貌冠加朝服論語曰緇衣羔裘又曰羔裘玄冠不以弔何朝服之有乎然則二者皆有似也此實疑衰也其辨絰皮辨之時則如卿大夫然又改其裳以素辟諸侯也朋友之相為服即士弔服疑衰素裳冠則皮辨加絰庶人不爵辨則其弔服素冠委貌釋曰朋友言麻而不言衰則不别制衰因士之弔服耳辨絰者素辨而加環絰以一股麻為骨一股麻為繩纏之加環然異于五服之絞絰也朋友相為服士之弔服疑衰素裳而加麻絰帶雖不當事亦辨絰大夫以上亦然為師之異于朋友者出行亦絰檀弓曰孔子之喪二三子皆絰而出是也皆三月既葬除之為師則有心喪三年者隨其恩之輕重無定制也凡弔服皆有絰而無帶故經止云辨絰朋友則加帶子遊帶絰而入弔鄭謂所弔者朋友是也賈公彥以為麻者不紳凶服必用麻帶君有友諸臣之義弔服三衰所服皆朋友絰帶具有也帶未必如環亦五分去一為帶糾之矣未詳是否君之所為兄弟服室老降一等鄭注公士大夫之君釋曰邑宰逺臣不從服旁期國君不服夫之所為兄弟服妻降一等釋曰謂從服尊于巳者卑者則報之與夫同庶子為後者為其外祖父母從母舅無服不為後如邦人釋曰與尊者為一體降其母矣故于其黨無服宗子孤為殤大功衰小功衰皆三月親則月算如邦人鄭注言孤有不孤者不孤則族人不為殤服服之也不孤謂父有廢疾若年七十而老子代主宗事者也孤為殤長殤中殤大功衰下殤小功衰皆如殤服而三月謂與宗子絶屬者也親謂在五屬之內算數也月數如邦人者與宗子有期之親者成人服之齊衰期長殤大功衰九月中殤大功衰七月下殤小功衰五月有大功之親者成人服之齊衰三月卒哭受以大功衰九月其長殤中殤大功衰五月下殤小功衰三月有小功之親者成人服之齊衰三月卒哭受以小功衰五月其殤與絶屬者同有緦麻之親者成人及殤皆與絶屬者同釋曰為宗子齊衰其殤中從上改葬緦鄭注謂墳墓以他故崩壞將亡失尸柩也言改葬者案今注疏本脫言字明棺物毁敗改設之如葬時也其奠如大斂從庿之庿從墓之墓理宜同也服緦者臣為君也子為父也妻為夫也必服緦者親見尸柩不可以無服緦三月而除之釋曰穀梁傳曰改葬之禮緦舉下緬也言舉服之下者以其緬藐故也司徒文子改葬其叔父問服于子思答曰禮父母改葬緦既葬而除不忍無服送至親也非父母無服無服則弔服而加麻文子曰喪服既除然後葬則其服何服答曰三年之喪未葬服不變除何有焉期大功之喪服其所除之服以葬既葬而除之童子惟當室緦鄭注童子未冠之稱也當室者為父後承家事者為家主與族人為禮于有親者雖恩不至不可以無服也傳曰不當室則無緦服也釋曰禮曰童子不緦惟當室緦緦者其免也當室則免而杖矣言童子不杖不杖者不免當室則杖而免乃有緦服也內則曰男子二十而冠惇行孝弟則未冠者容有恩不至者故不備禮凡妾為私兄弟如邦人鄭注嫌厭降之也私兄弟自其族親也然則女君有以尊降其兄弟者案今注疏本脫然則二字謂士之女為大夫妻大夫之女為諸侯夫人諸侯之女為天王后也案也今注疏本作者父卒昆弟之為父後者宗子亦不敢降也釋曰如鄭義則繼禰之宗子嫁者亦不敢以尊降也為父後者無出降又不以尊降則還服期矣射慈譙周賀循以為大宗子亦不降按上經婦人為宗子鄭謂女子在室及嫁歸宗者則出嫁者不服大夫弔于命婦錫衰命婦弔于大夫亦錫衰鄭注弔于命婦命婦死也弔于大夫大夫死也小記曰諸侯弔必皮辨錫衰服問曰公為卿大夫錫衰以居出亦如之當事則辨絰大夫相為亦然為其妻往則服之出則否釋曰雜記曰大夫之哭大夫辨絰大夫與殯亦辨絰諸侯弔者弔異國之臣也雖當事亦皮辨耳出謂以他事非至喪所傳曰錫者何也麻之有錫者也錫者十五升抽其半無事其縷有事其布曰錫鄭注謂之錫者治其布使之滑易也錫者不治其縷哀在內也緦者不治其布哀在外也君及卿大夫弔士雖當事皮辨錫衰而已士之相弔則如朋友服矣案今注疏本脫矣字疑衰素裳凡婦人相弔吉笄無首素總釋曰灰治之使錫錫然滑易故曰錫也雜記曰朝服十五升去其半而錫加灰錫也疑衰之布十四升疑之言擬擬于吉也婦人笄總相將男子弔服素冠故婦人素總為父母卒哭折吉笄之首故弔服吉笄無首也女子子適人者為其父母婦為舅姑惡笄有首以髽卒哭子折筓首以笄布總鄭注言以髽則髽有著笄者明矣釋曰舊蓋云髽無笄南宫縚之妻之姑之喪夫子誨之髽蓋榛以為笄髽笄之文相連亦髽有笄之證傳曰笄有首者惡笄之有首也惡笄者櫛笄也折笄首者折吉笄之首也吉笄者象笄也何以言子折笄首而不言婦終之也鄭注櫛笄者以櫛之木為笄或曰榛笄有首者若今時刻鏤摘頭矣卒哭而喪之大事畢女子子可以歸于夫家而著吉笄吉笄尊變其尊者婦人之義也案此十二字今注疏本在下為其大飾也之下折其首者為其大飾也據在夫家宜言婦終之者終子道于父母之恩釋曰玉藻曰沐櫛用樿櫛此惡笄以樿木為之象笄者象骨之笄也婦人外成卒哭歸夫家可以加容婦于人之義妾為女君君之長子惡笄有首布總釋曰妾之事女君與婦之事舅姑等故其服皆同其為君之長子雖與女君同三年而情本輕故從齊衰之笄總凡衰外削幅裳內削幅幅三袧鄭注削猶殺也大古冠布衣布先知為上外殺其幅以便體也後知為下內殺其幅稍有飾也後世聖人易之以此為喪服袧者謂辟兩側空中央也祭服朝服辟積無數凡裳前三幅後四幅也釋曰外削幅者削布之邊幅向外內幅者幅向內也幅三袧者拘裳而言裳前三幅象陽後四幅象隂每幅三辟攝之每辟攝兩邊相著中央空也吉冠與裳辟積無數喪服三辟積而巳若齊裳內衰外鄭注齊緝也凡五服之衰一斬四緝緝裳者內展之緝衰者外展之釋曰展已乃行針功也裳內衰外順其削幅也齊以裳為主故先言裳負廣出于適寸鄭注負在背上者也適辟領也負出于辟領外旁一寸釋曰以一方布負之于背故曰負其上端縫著于領其下垂之辟領廣尺六寸負廣尺八寸適博四寸出于衰鄭注博廣也辟領廣四寸則與闊中八寸也兩之為尺六寸也出于衰者旁出衰外不著寸數者可知也釋曰衣領當項處左右各開四寸向外辟厭之是謂辟領所開處則闊中也辟領與闊中每旁合為八寸通左右計之則尺六寸衰廣四寸當心辟領旁出衰外六寸闊中或作闕中謂闕去中央以安項也衰長六寸博四寸鄭注廣袤當心也前有衰後有負版左右有辟領孝子哀戚無所不在釋曰衰綴于外襟之上表其哀摧之心負言負其悲哀適言主于念親不及他事張子厚曰喪服變而之輕而哀不變著之變服之上謂之受者以此得名不欲摧割之心亟忘且表其本服也衣帶下尺鄭注衣帶下尺者要也廣尺足以掩裳上際也釋曰衣身之下為要其闊一尺以掩衣裳之際袵二尺有五寸鄭注袵所以掩裳際也二尺五寸與有司紳齊也上正一尺燕尾一尺五寸案燕尾一尺五寸各本訛作二尺五寸據三尺五寸之布裁成兩袵上下各留正一尺中一尺五寸交裁之得正一尺燕尾一尺五寸通正與燕尾共二尺五寸為袵今改正釋曰取布三尺五寸交解之兩端各留全幅長一尺其下橫斷六寸乃斜裁之為二燕尾長尺五寸凡用布三尺五寸而得二袵綴于衣要之兩旁垂之以掩裳前後際其闊頭在上反于吉也春秋傳魯昭公比及葬襄公三易衰衰袵如故衰即此袵袂屬幅鄭注屬猶連也連幅謂不削釋曰袂袖也布幅二尺二寸凡用布兩邊各去一寸為縫削此袂則全幅用之屬之于衣欲其與袂中縱橫正方也衣二尺有二寸鄭注此謂袂中也言衣者明與身參齊二尺二寸其袖足以容中人之肱也衣自領至要二尺二寸倍之四尺四寸加辟領八寸而又倍之案辟領今注疏本作中凡衣用布一丈四寸釋曰袂中謂袂自上向掖下之廣狹也中人之肘尺二寸袂可以回肘故袂中二尺二寸左右袂中與身參齊故舉衣之尺寸以見袂中也布幅二尺二寸袂中與衣身長亦二尺二寸以其正方故謂之端衰雜記曰端衰喪車皆無等無等者自天子達于庶人也辟領賈氏作闕中袪尺二寸鄭注袪袖口也尺二寸足以容中人之併兩手也吉時拱尚左手喪時拱尚右手釋曰袂中二尺二寸自掖下微圜裁之至袂口而狹止闊尺二寸深衣曰袂圜以應規是也雜記曰凡辨絰其衰侈袂侈袂者蓋半而益一則其袂三尺三寸袪尺八寸衰三升三升有半其冠六升以其冠為受受冠七升鄭注衰斬衰也或曰三升半者義服也其冠六升齊衰之下也斬衰正服變而受之此服也三升三升半其受冠皆同以服至尊宜少差也釋曰義服者為君服也六升者義服之齊衰故曰齊衰之下三升半之衰不見于間傳經記亦無降正義服之文先儒以間傳齊功之衰各有三差之為三等又此記之三升半為義服舊説服夫之族類為義而以名服者其情亦輕則凡服君與從服名服皆義服也夫妻雖以義合然一體之名均于天性是曰至親列于正服與君臣之方喪有殊為夫之黨曰屬從而為君之黨曰徒從蓋由于此齊衰四升其冠七升以其冠為受受冠八升鄭注言受以大功之上也此謂為母服也齊衰正服五升其冠八升義服六升其冠九升亦以其冠為受凡不著之者服之首主于父母釋曰七升者降服之大功故曰大功之上繐衰四升有半其冠八升鄭注此謂諸侯之大夫案今注疏本脫一謂字為天子繐衰也服在小功之上者欲著其縷之精粗也升數在齊衰之中者不敢以兄弟之服服至尊也釋曰齊衰五升者冠八升繐衰雖四升有半而縷則細故冠與之同大功八升若九升小功十升若十一升鄭注此以小功受大功之差也不言七升者主于受服欲其文相值言服降而在大功者衰七升正服衰八升其冠皆十升義服九升其冠十一升亦皆以其冠為受也斬衰受之以下大功受之以正者重者輕之輕者從禮聖人之意然也其降而在小功者衰十升正服衰十一升義服衰十二升皆以即葛及緦麻無受也此大功不言受者其章既著之釋曰自衰三升以下主記受服斬齊章經無受文故記明言其受大功章既言受以小功衰矣故直記其受服之差而已凡有喪服而重遭喪者若遭重喪則皆變而服後喪之服遭輕喪則惟大功以上乃得變前服其變之節必于前喪之葛與後喪之麻大小正等之時間傳曰斬衰之喪既虞卒哭遭齊衰之喪輕者包重者特既練遭大功之喪麻葛齊衰之喪既虞卒哭遭大功之喪麻葛兼服小記曰斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同皆兼服之兼服謂服麻又服葛也男子重絰而輕帶絰重喪之葛特之而不變帶輕喪之麻以包重喪之葛所謂易服易輕者也大功之麻與三年之練葛同故大功之服于三年既練乃變練而首絰已除故得重麻也雜記曰有三年之練冠則以大功之麻易之惟杖屨不易其衰裳則皆從其粗者服之後喪既虞卒哭則反前喪之葛若前喪已除則自受以後喪之受矣若遭小功以下之喪則皆無所變服問曰小功無變也又曰小功不易喪之練冠又曰緦之麻不變小功之葛小功之麻不變大功之葛惟大功之長中殤降而在緦小功者乃有變耳服問曰殤長中變三年之葛下殤則否間傳曰大功之葛與小功之麻同小功之葛與緦之麻同麻同則兼服之主為大功之殤長中而言也然則下殤小功亦得變矣服問曰麻之有本者變三年之葛小功以下麻斷本下殤小功齊衰之親麻猶有本得變可知庾蔚之以為殤長中經無大功文蓋謂齊衰之殤在大功者其下殤雖麻有本以在小功亦不得變三年之葛間傳所云緦小功麻葛兼服者因上文而并言之耳非鄭義也凡遭輕喪而不得變者皆為之成服當事則服之卒事反前服雜記曰有殯聞外喪哭之他室改服即位又曰三年之喪雖功衰不弔如有服而將往哭之則服其服而往其輕喪當除者亦服其服而除之雜記曰雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服是也曽子問曰有君喪服于身不敢私服又何除焉則惟服君喪者有私喪不服亦不除爾
