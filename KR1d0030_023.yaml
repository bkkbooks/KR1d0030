body:
  text: 儀禮集釋卷二十三宋李如圭撰既夕第十三鄭目録云士喪禮之下篇也既已也謂先葬二日已夕哭時與葬間一日凡朝庿日請啓期必容焉此諸侯之下士一庿其上士二庿則既夕哭先葬前三日大戴第五刪小戴第十四别録名士喪禮下篇第十三既夕哭鄭注既已也謂出門哭止復外位時釋曰謂先葬二日已夕哭時請啓期告于賓鄭注將葬當遷柩于祖有司于是乃請啓肂之期于主人以告賓賓宜知其時也今文啓為開釋曰冠禮曰夕為期于庿門外告期于賓之家請夙興設盥于祖庿門外鄭注祖王父也下士祖禰共庿釋曰祭法曰適士二廟官師一廟官師中士下士也此經据一廟者曰祖庿舉尊者而言陳鼎皆如殯東方之饌亦如之鄭注皆皆三鼎也如殯如大斂既殯之奠侇牀饌于階間鄭注侇之言尸也朝正柩用此牀二燭俟于殯門外鄭注早暗以為明也燭用蒸丈夫髽散帶垂即位如初鄭注為將啓變也此互文以相見耳髽婦人之變喪服小記曰男子免而婦人髽男子冠而婦人笄如初朝夕哭門外位釋曰小斂後男子髺髮免散帶垂婦人髽今啓殯見柩故變同小斂也雜記曰非從柩與反哭無免于堩從柩言免不言括髮又既啓之後皆無括髮之文則啓後雖斬衰者亦免為母于即位又哭而免斬衰啓殯乃免禮之差也婦人不哭主人拜賓入即位袒鄭注此不蒙如初者以男子入門不哭也不哭者將有事止歡囂案此下今注疏本有也宇釋曰朝夕哭主人即門外位婦人不哭主人拜賓入門哭即位此啓之昕主人主婦皆不哭與朝夕哭異商祝免袒執功布入升自西階盡階不升堂聲三啓三命哭鄭注功布灰治之布也執之以接神為有所拂㧍也聲三三有聲存神也啓三三言啓告神也舊說以為聲噫興也今文免作絻釋曰袒必免者問喪曰冠至尊不居肉袒之體故為之免以代之也曽子問君薨告世子亦祝聲三乃告聲燭入鄭注照徹與啓肂者祝降與夏祝交于階下取銘置于重鄭注祝降者祝徹宿奠降也與夏祝交事相接也夏祝取銘置于重為啓肂遷之吉事交相左凶事交相右今文銘皆作名釋曰祝不言夏商則周祝也宿奠昨日之奠日相右降者在東升者在西踊無算鄭注主人也釋曰為見柩商祝拂柩用功布幠用夷衾鄭注拂去塵也幠覆之案今注疏本脫幠字為其形露遷于祖用軸鄭注遷徙也徙于祖朝祖庿也檀弓曰殷朝而殯于祖周朝而遂葬蓋象平生時將出必辭尊者軸輁軸也軸狀如轉轔刻兩頭為軹輁狀如長牀穿桯前後著金而關軹焉案軹今注疏本訛作軸大夫諸侯以上有四周謂之輴天子畫之以龍釋曰載柩以輁挽其軸而行也轔輪也桯謂輁之兩旁木如牀髀者檀弓謂三家者廢輴喪大記謂大夫葬用輴當考重先奠從燭從柩從主人從鄭注行之序也主人從者丈夫由右婦人由左以服之親疏為先後各從其昭穆男賓在前女賓在後釋曰奠所徹宿奠也周禮天府凡吉凶之事祖廟之中沃盥執燭內豎王后之喪遷于宫中則前蹕升自西階鄭注柩也猶用子道不由阼也奠俟于下東面北上鄭注俟正柩也主人從升婦人升東面衆主人東即位案各本脫主字據唐石經補鄭注東方之位釋曰東階下西面位也主人既正柩乃西面正柩于兩楹間用夷牀鄭注兩楹間象鄉户牖也是時柩北首釋曰兩楹間堂東西之中也户東牖西尊者之處其位西柩居中而北首象鄉之耳檀弓曰喪之朝也順死者之孝心也其哀離其室也故至于祖考之廟而遂行雜記升正柩諸侯大夫有銜枚執鐸之禮主人柩東西面置重如初鄭注如殯宫時也席升設于柩西奠設如初巾之升降自西階鄭注席設于柩之西直柩之西當西階也從奠設如初東面也不統于柩神不西面也不設柩東東非神位也巾之者為禦當風塵釋曰奠設如初如于宫殯席前東面也殯宫設于奧此設于柩西耳奠統于柩則當西面不西面者神位在奧不在東也不于庿奧者奧庿神所在非死者之處也凡奠有牲肉乃巾之此宿奠無牲肉以設于堂堂多風塵故巾之異于在室主人踊無算降拜賓即位踊襲主婦及親者由足西面鄭注設奠時婦人皆室户西南面奠畢乃得東面親者西面堂上迫疏者可以居房中釋曰奠設于柩西故婦人辟之下記曰將戴柩祝及執事舉奠户西南面東上知婦人辟奠時面位亦然奠畢還東面時主人猶在柩東既降拜賓婦人乃得西面雜記曰小斂大斂啓皆辨拜薦車直東榮北輈鄭注薦進也進車者象生時將行陳駕今時謂之魂車輈轅也車當東榮東陳西上于中庭釋曰輈車前持衡者北輈者鄉內也中庭庭南北之中下記薦乘車道車稿車乘車為首下經陳明器于乘車之西則陳車西上質明滅燭鄭注質正也徹者升自阼階降自西階鄭注徹者辟新奠不設序西南已再設為䙝釋曰將為遷祖奠故徹舊夕奠乃奠如初升降自西階鄭注為遷祖奠也奠升不由阼階柩北首辟其足釋曰亦柩西席前設之主人要節而踊鄭注節升降薦馬纓三就入門北面交轡圉人夾牽之鄭注駕車之馬每車二匹纓今馬鞅也就成也諸侯之臣飾纓以三色而三成此三色者蓋絛絲也其著之如罽然天子之臣如其命數王之革路絛纓圉人養馬者在左右曰夾既奠乃薦馬者為其踐汚庿中也凡入門參分庭二在南釋曰下經公賵馬兩則每車馬二匹也周禮巾車玉路纓十有再就金路纓九就象路纓七就革路絛纓五就鄭謂象路以上以五采罽飾之革路以絛絲飾之此三色三就則諸侯之大夫士皆同不依命數也凡陳于庭者皆三分庭繼堂言之者皆庭一在北繼門言之者皆一在南此言入門而不言門左門右則當門北矣既奠乃薦馬便其既出不久停庿中也周禮圉人凡賓客喪紀牽馬而入陳御者執䇿立于馬後哭成踊右還出鄭注主人于是乃哭踊者薦車之禮成于薦馬釋曰馬以行車薦馬則行期已至故主人哭踊賓出主人送于門外有司請祖期鄭注亦因在外位請之當以告賓賓每事畢輒出將行而飲酒曰祖祖始也釋曰吕氏云朝庿祖賓送而不拜曰日側鄭注側昳也謂將過中之時主人入袒乃載踊無算卒束襲鄭注袒為載變也乃舉柩卻下而載之案今注疏本脫乃字束束棺于柩車賓出遂匠納車于階間謂此車釋曰下柩于階間載之降奠當前束鄭注下遷祖之奠也當前束猶當尸腢也亦在柩車西束有前後也釋曰下記始死即牀而奠當腢腢肩頭也商祝飾柩一池紐前赬後緇齊三采無貝鄭注飾柩謂設牆栁也巾奠乃牆謂此也牆有布帷栁有布荒池者象宫室之承霤以竹為之牀如小車笭衣以青布一池縣于栁前士不揄絞紐所以聯帷荒前赤後黑因以為飾左右面各有前後齊居栁之中央若今小車蓋上㽔矣以三采繪為之上朱中白下蒼著以絮元士以上有貝釋曰柩飾在旁曰帷在上曰荒荒蒙也對言之則帷為牆象宫室之牆壁荒為栁栁之言聚諸采之所聚通言之則帷荒總名栁周禮縫人掌喪縫棺飾衣翣栁之材是也亦總名牆下記云巾奠乃牆檀弓云周人牆置翣是也齊三采以繅藉例之則宜朱白蒼以其居中若人之有齊故謂之齊設披鄭注披絡栁棺上貫結于戴人居旁牽之以備傾虧案今注疏本脫虧字喪大記曰士戴前纁後緇二披用纁今文披皆為藩釋曰許叔重曰從旁持曰披以戴連繫棺束于栁材又以披貫于戴結之餘披出于外使人持之若登髙則引前適下則引後攲左則引右攲右則引左以防傾側也喪大記曰飾棺君龍帷三池振容黼荒火三列黼三列素錦褚加僞荒纁紐六齊五采五貝黼翣二黻翣二畫翣二皆戴圭魚躍拂池君纁戴六纁披六大夫畫帷二池不振容畫荒火三列黻三列素錦褚纁紐二𤣥紐二齊三采三貝黻翣二畫翣二皆戴綏魚躍拂池大夫戴前纁後𤣥披亦如之士布帷布荒一池揄絞纁紐二緇紐二齊三采一貝畫翣二皆戴綏士戴前纁後緇二披用纁鄭謂僞當為帷綏當為緌大夫以上有褚以覆棺以銅為魚垂于池下畫揄翟于絞繒而垂之以為振容大夫不揄絞士則去魚士揄絞一貝與此禮異蓋亦天子之士屬引鄭注屬猶著也引所以引柩車在軸輴曰紼古者人引柩春秋傳曰坐引而哭之三釋曰繩曰紼用力曰紖人引柩所謂乘人也雜記曰士喪有與天子同者三其終夜燎及乘人専道而行専道謂行不辟人屬音燭引音𦙍又如字注引所後屬引皆同陳明器于乘車之西鄭注明器藏器也檀弓曰其曰明器神明之也言神明者異于生器竹不成用瓦不成味木不成斫琴瑟張而不平竽笙備而不和有鐘磬而無簨虡陳器于乘車之西則重北也案重下今注疏本衍之字釋曰薦車陳于南北之中庭重三分庭一在南明器陳于乘車之西如在重北折橫覆之鄭注折猶􅔑也方鑿連木為之蓋如牀而縮者三橫者五無簀窆事畢加之壙上以承抗席橫陳之者為苞筲以下䋫于其北便也覆之見善面也釋曰折以承抗木抗木橫三縮二折宜大于抗木故縮三橫五橫謂東西陳之折加于壙其善面下鄉于棺今覆之而以善面鄉上取觀之便也抗木橫三縮二鄭注抗禦也所以禦止土者其橫與縮各足掩壙釋曰抗木陳于折西加抗席三鄭注席所以禦塵釋曰加者加于抗木上加茵用疏布緇翦有幅亦縮二橫三鄭注茵所以藉棺者翦淺也幅緣之亦者亦抗木也及其用之木三在上茵二在下象天三合地二人藏其中焉今文翦作淺釋曰加者又加于抗席上也茵用粗布為淺緇色不去邊幅縫合為袋更以物緣固邊縫因為飾也古之為椁纍木于棺之四旁而上下不周棺之下藉以茵其上加以折次加抗席次加抗木故今亦重纍陳之後陳者先用故窆時茵先入也折不加于抗上者為其長大故别陳之器西南上綪鄭注器目言之也陳明器以西行南端為上綪屈也不容則屈而反之茵鄭注茵在抗木上陳器次而北也苞二鄭注所以裹奠羊豕之肉筲三黍稷麥鄭注筲畚種類也其容蓋與簋同一觳也罋三醯醢㞕幂用疏布鄭注罋瓦器其容亦蓋一觳㞕薑桂之㞕也內則曰㞕桂與薑幂覆也今文幂皆作密甒二醴酒幂用功布鄭注甒亦瓦器也案今注疏本脫也字古文甒皆作廡釋曰罋甒有幂者溼物也皆木桁久之鄭注桁所以庪苞筲罋甒也久當為灸灸謂以蓋按塞其口每器異桁釋曰言皆塞之異桁用器弓矢耒耜兩敦兩杅盤匜匜實于槃中南流鄭注此皆常用之器也杅盛湯漿槃匜盥器也流匜口也今文杅為桙釋曰周禮司弓矢大喪共明弓矢無祭器鄭注士禮略也大夫以上兼用鬼器人器也釋曰檀弓曰明器鬼器也祭器人器也士無祭器故明器實之兼用之則虛明器而實祭器宋襄公葬其夫人醯醢百罋曾子曰既曰明器而又實之譏其與祭器皆實之有燕樂器可也鄭注與賓客燕飲用樂之器也釋曰周禮笙師鎛師籥師視瞭大喪廞樂器及葬奉而藏之役器甲胄干笮鄭注此皆師役之器甲鎧胄兜鍪干楯笮矢箙釋曰周禮司兵大喪廞五兵燕器杖笠翣鄭注燕居安體之器也笠竹􅡓蓋也翣扇徹奠巾席俟于西方主人要節而踊鄭注巾席俟于西方祖奠將用焉要節者來象升丈夫踊去象降婦人踊徹者由明器北西面既徹由重南東不設于序西南者非宿奠也宿奠必設者為神馮依之久也袒鄭注為將祖變商祝御柩鄭注亦執功布居前為還柩車為節乃祖鄭注還柩鄉外為行始釋曰還柩車令轅鄉外踊襲少南當前束鄭注主人也柩還則當前東南釋曰柩未還時亦當前束今還柩少南于故婦人降即位于階間鄭注為柩將去有時也位東上釋曰東上統于男子也不位車西辟祖奠祖還車不還器鄭注祖有行漸車亦宜鄉外也器之陳自若南上案若今注疏本訛作已祝取銘置于茵鄭注重不藏故于此移銘加于茵上二人還重左還鄭注重與車馬還相反由便也布席乃奠如初主人要節而踊鄭注車已祖可以為之奠也是之謂祖奠釋曰下記曰祝饌祖奠于主人之南當前輅北上巾之不言陳鼎蓋止如朝夕之奠也雜記曰君若載而後弔之則主人東面而拜門右北面而踊出待反而後奠薦馬如初鄭注柩動車還宜新之也賓出主人送有司請葬期鄭注亦因在外位時入復位鄭注主人也自死至于殯自啓至于葬主人及兄弟恆在內位釋曰未小斂位在尸東小斂後及啓後朝庿位在阼階下公賵𤣥纁束馬兩鄭注公國君也賵所以助主人送葬也兩馬士制也春秋傳曰宋景曹卒魯季康子使冉求賵之以馬曰其可以稱旌繁乎釋曰士常兩馬出使若戎事則乘駟馬大夫以上常乘四馬春秋公羊傳曰賵者蓋以馬以乘馬束帛以馬者謂士不備四即此馬兩是也書傳曰士乘飾車兩馬束帛𤣥三纁二賵芳鳳反車馬曰賵稱舉也擯者出請入告主人釋杖迎于庿門外不哭先入門右北面及衆主人袒鄭注尊君命也衆主人自若面西釋曰釋杖迎及衆主人亦袒皆尊君命也衆主人不出自若柩東西面喪大記曰子有王命則去杖國君之命則輯杖大夫有君命則去杖大夫之命則輯杖內子為夫人之命去杖為世婦之命授人杖士于君命夫人之命如大夫于大夫世婦之命如大夫馬入設鄭注設于庭在重南釋曰重北陳明器故設重南賓奉幣由馬西當前輅北面致命鄭注賓使者幣𤣥纁也輅轅縛所以屬引由馬西則亦當前輅之西于是北面致命得鄉柩與奠柩車在階間少前參分庭之北案參今注疏本作三輅有前後釋曰輅言前知有後也轅縛者以木縛于轅上屬引其上而挽之也既還柩而婦人降即位于階間知柩車在階間少前主人哭拜稽顙成踊賓奠幣于棧左服出鄭注棧謂柩車也凡士車制無漆飾左服象授人授其右也服車箱今文棧作輚釋曰周禮巾車職曰士乘棧車柩車鄉外以東為左于尸柩南首則東為右也宰由主人之北舉幣以東鄭注柩東主人位以東藏之釋曰宰由柩東主人位之北舉幣也時主人在門右未復位雜記諸侯賵殯之禮曰上介賵執圭將命曰寡君使某賵相者入告反命曰孤某須矣陳乘黃大輅于中庭北輈執圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東士受馬以出鄭注此士謂胥徒之長也有勇力者受馬聘禮曰皮馬相閒可也主人送于外門外拜襲入復位杖賓賵者將命鄭注賓卿大夫士也擯者出請入告出告須鄭注不迎告曰孤某須馬入設賓奉幣擯者先入賓從致命如初鄭注初公使者主人拜于位不踊鄭注柩車東位也既啓之後與在室同釋曰惟君命出及受朋友襚不踊皆與始死同賓奠幣如初舉幣受馬如初擯者出請鄭注賓出在外請之為其復有事若奠鄭注賓致可以奠也釋曰致可為奠之物入告出以賓入將命如初士受羊如受馬又請鄭注士亦謂胥徒之長又復也若賻鄭注賻之言補也助也貨財曰賻釋曰公羊傳曰車馬曰賵貨財曰賻衣被曰襚入告主人出門左西面賓東面將命鄭注主人出者賻主施于主人主人拜賓坐委之宰由主人之北東面舉之反位鄭注坐委之明主人哀戚志不在受人物反位反主人之後位釋曰宰違其位而由主人之北舉幣則位在主人後少儀曰賵馬入廟門賻馬與其幣大白兵車不入廟門賻者既致命坐委之擯者舉之主人無親受也賵入廟門以其主于死者若無器則捂受之鄭注謂對相授受案今注疏本脫受字不委地又請賓告事畢拜送入釋曰雜記曰諸侯使人弔其次含襚賵臨皆同日而畢事者也其次如此也此賓賵奠賻亦相次以一人行之耳贈者將命鄭注贈送擯者出請納賓如初鄭注如其入告出告須賓奠幣如初鄭注亦于棧左服若就器則坐奠于陳鄭注就猶善也贈無常惟玩好所有陳明器之陳凡將禮必請而后拜送鄭注雖知事畢猶請君子不必人意兄弟賵奠可也鄭注兄弟有服親者可且賵且奠許其厚也賵奠于死生兩施所知則賵而不奠鄭注所知通問相知也降于兄弟奠施于死者為多故不奠釋曰上經賓賵若奠若賻者亦任行其一非必竝行也知死者贈知生者賻鄭注各主于所知書賵于方若九若七若五鄭注方板也書賵奠賻贈之人名與其物于板每板若九行若七行若五行釋曰云書賵者舉某首也曲禮曰書方衰凶器不以告不入公門書遣于策鄭注策簡也遣猶送也謂所當藏物茵以下釋曰策者簡之編連者也聘禮記曰百名以上書于策不及百名書于方遣物多故以策書之乃代哭如初鄭注棺柩有時將去不忍絶聲也初謂既小斂時宵為燎于門內之右鄭注為哭者為明釋曰周禮閽人大喪紀設門燎蹕宫門廟門厥明陳鼎五于門外如初鄭注鼎五羊豕魚臘鮮獸各一鼎也士禮特牲三鼎盛葬奠加一等用少牢也如初如大斂奠時釋曰陳如大斂奠鼎數則異凡宰鼎用特牲者一鼎或三鼎冠禮醮子昏禮饋舅姑喪禮小斂奠朝禰奠皆特豚一鼎昏禮同牢喪禮大斂奠朔奠遷祖奠祖奠用特豚虞禮饋食禮用特豚皆三鼎而以魚臘配之用少牢者皆五鼎饋食禮其實羊豕魚臘膚士葬奠加鮮獸而無膚聘禮致飧衆介少牢鄭謂去膚而有腸胃惟有司徹殺于正祭用少牢而羊豕魚三鼎用大牢者公食大夫鼎七若九聘禮致飧饔鼎十若十二者牛羊豕魚臘腸胃膚加鮮魚鮮臘而九又各加陪鼎膷臐膮而十與十二郊特牲曰鼎俎奇而籩豆偶鼎有十與十二而曰奇者正鼎與陪鼎各數之其實羊左胖鄭注反吉祭也言左胖者體不殊骨也髀不升鄭注周貴肩賤髀古文髀作脾釋曰左胖骨體相連惟去其體耳然則前後體為二豚皆合升成牲者則升其胖者髀不升合升者并髀升之腸五胃五鄭注亦盛之也釋曰少牢饋食禮腸三胃三離肺鄭注離㨒也案今注疏本脫也字豕亦如之豚解無腸胃鄭注如之如羊左胖髀不升離肺也豚解解之如解豚亦前肩後肫脊脅而已無腸胃者君子不食溷腴釋曰豕升左胖髀不升與羊同而豕解則異豚解者殊左右肩左右髀左右脅并脊為七體臂臑屬于肩肫胳屬于髀此惟取右胖亦屬肩肫脊脅為四惟去脾耳魚臘鮮獸皆如初鄭注鮮新殺者士臘用兔加鮮獸而無膚者豕既豚解略之釋曰鮮獸亦兔膚出于豕豕不體解故亦無膚周禮喪紀獸人共其生獸死獸東方之饌四豆脾析蜱醢葵菹螺醢鄭注脾讀為雞脾肶之脾脾析百葉也蜱蚌也今文螺為蝸釋曰脾析虀也虀菹之稱菜肉通凡不言菹者皆虀也四籩棗糗栗脯鄭注糗以豆糗粉餌釋曰粉稻米黍米合蒸之以為餌搗熬大豆為糗以粉之籩人謂之糗餌醴酒鄭注此東方之饌與祖奠同在主人之南當前輅北上巾之釋曰下記云祝饌祖奠于主人之南當前輅北上巾之此葬奠與之同處甒在北次南豆次南籩陳器鄭注明器也夜斂藏之案夜今注疏本訛作適滅燎執燭俠輅北面鄭注照徹與葬奠也釋曰輅西照徹輅東照饌賓入者拜之鄭注明自啓至此主人無出禮釋曰拜賓于內位徹者入丈夫踊設于西北婦人踊鄭注猶阼階升時也亦既盥乃入入由重東面主人踊猶其升也自重北西面而徹設于柩車西北亦猶序西南徹者東鄭注由柩車北東設葬奠之饌鼎入鄭注舉入陳之也陳之蓋于重東北西面北上如初釋曰如小斂奠時乃奠豆南上綪籩螺醢南北上綪鄭注籩螺醢南辟醴酒也釋曰脾析其北蜱醢蜱醢東葵菹葵菹南螺醢醴酒將奠脾析南故棗辟之而在螺醢南棗南糗糗東栗栗北脯俎二以成南上不綪特鮮獸鄭注成猶併也不綪者魚在羊東臘在豕東古文特為俎釋曰不綪者不屈陳復以南為始也鮮獸在北無偶醴酒在籩西北上鄭注統于豆也奠者出主人要節而踊鄭注亦以往來為節奠由重北西既奠由重南東釋曰檀弓曰曾子弔于負夏主人既祖填池推柩而反之降婦人而后行禮從者問諸子游曰禮與子游曰飯于牖下小斂于户內大斂于阼殯于客位祖于庭葬于墓所以即逺也故喪事有進而無退鄭氏曰填池當為奠徹謂徹遣奠更設祖奠也禮既祖而婦人降今反柩車于載處婦人辟之升堂而又降婦人皆非禮曽子之弔蓋在此時甸人抗重出自道道左倚之鄭注還重不言甸人抗重言之者重既虞將埋之言其官使守視之抗舉也出自道出自門中央也不由闑東西者重不反變于恆出入道左主人位今時有死者鑿木置食其中樹于道側由此薦馬馬出自道車各從其馬駕于門外西面而俟南上鄭注南上便其行也行者乘車在前道槀序從釋曰薦馬凡三徹者入踊如初徹巾苞牲取下體鄭注苞者象既饗而歸賓俎者也取下體者脛骨象行又俎實之終始也士苞三個前脛折取臂臑後脛折取骼亦得俎釋三個雜記曰父母而賓客之所以為哀釋曰臂臑膞骼下體也少牢饋食禮載俎肩臑膞骼在兩端特牲禮取牲魚臘以歸尸俎釋三箇此羊俎骨體有二豕俎有四各折取其臂臑與骼羊俎仍有二豕俎仍有四所釋者通六箇也雜記曰遣車視牢具牢具者所苞牲體之箇數也檀弓曰國君七箇遣車七乘大夫五箇遣車五乘自上差之則士三箇遣車三乘矣士葬用少牢而苞二則每牲一苞也用大牢者當苞三以箇數為尊卑之别耳遣車吕大臨謂即上所薦之車士則乘車道車槀車也先儒疑遣車載苞牲而藏于壙者若然則車各有苞苞數亦視其箇數矣士禮二苞三箇各自為數而曰苞視牢具非側也吕義似長惟說校人大喪共遣車之馬及葬埋之以為嘗薦于神懼為人䙝用故殺而埋之當考不以魚臘鄭注非正牲也行器鄭注目葬行明器在道之次茵苞器序從鄭注如其陳之先後釋曰舉茵以兼抗折抗席舉苞以兼筲罋甒器謂用器以下車從鄭注次器徹者出踊如初鄭注于是庿中當行者惟柩車
