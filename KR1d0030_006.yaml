body:
  text: 儀禮集釋卷六宋李如圭撰鄉射禮賓主人大夫揖皆由其階降揖主人堂東袒決遂執弓搢三挾一個賓于堂西亦如之皆由其階階下揖升堂揖主人為下射皆當其物北面揖及物揖乃射卒南面揖皆由其階階上揖降階揖賓序西主人序東皆釋弓説決拾襲反位升及階揖升堂揖皆就席鄭注或言堂或言序亦為庠榭互言也賓主人射大夫止于堂西大夫袒決遂執弓搢三挾一個由堂西出于司射之西就其耦大夫為下射揖進耦少退揖如三耦及階耦先升卒射揖如升射耦先降降階耦少退皆釋弓于堂西襲耦遂止于堂西大夫升就席鄭注耦于庭案今注疏本作于庭下據宋本及儀禮經傳通解所引皆無下字不並行尊大夫也在堂如上射之儀近其事得申衆賓繼射釋獲皆如初司射所作惟上耦鄭注于是言惟上耦者嫌賓主人射亦作之大射三耦卒射司射請于公及賓卒射釋獲者遂以所執餘獲升自西階盡階不升堂告于賓曰左右卒射降反位坐委餘獲于中西興共而俟鄭注司射不告卒射者釋獲者于是有事宜終之也餘獲餘算也無餘算則空手耳俟俟數也司馬袒決案教繼公云禮無決而不遂者此決字當為衍文執弓升命取矢如初獲者許諾以旌負侯如初司馬降釋弓反位弟子委矢如初大夫之矢則兼束之以茅上握焉鄭注兼束大夫矢優之是以不拾也束于握上則兼取之順羽便也握謂中央也不束主人矢不可以殊于賓也言大夫之矢則矢有題識也肅愼氏貢楛矢銘其括今文上作尚司馬乘矢如初司射遂適西階西釋弓去撲襲進由中東立于中南北面視算鄭注釋弓去撲射事巳釋獲者東面于中西坐先數右獲鄭注固東面矣復言之者為其少南就右獲二算為純鄭注純猶全也耦陰陽一純以取實于左手十純則縮而委之鄭注縮從也于數者東西為從古文縮皆為蹙每委異之鄭注易挍數有餘純則橫于下鄭注又異之也自近為下一算為奇奇則又縮諸純下鄭注奇猶虧也又從之興自前適左東面鄭注起由中東就左獲少北于故東面鄉之坐兼斂算實于左手一純以委十則異之鄭注變于右其餘如右獲鄭注謂所縮所橫司射復位釋獲者遂進取賢獲執以升自西階盡階不升堂告于賓鄭注賢獲勝黨之算也齊之而取其餘若右勝則曰右賢于左若左勝則曰左賢于右以純數告若有奇者亦曰奇鄭注賢猶勝也言賢者射之以中為雋也假如右勝告曰右賢于左若干純若干奇若左右鈞則左右皆執一算以告曰左右鈞降復位坐兼斂算實八算于中委其餘于中西興共而俟司射適堂西命弟子設豐鄭注將飲不勝者設豐所以承其爵也豐形蓋似豆而卑弟子奉豐升設于西楹之西乃降勝者之弟子洗觶升酌南面坐奠于豐上降袒執弓案敖繼公云此時袒執弓于禮無所當三字疑衍文木射禮無之反位鄭注勝者之弟子其少者也耦不酌下無能也酌者不授爵略之也執弓反射位不俟其黨巳酌有事司射遂袒執弓挾一個搢撲北面于三耦之南命三耦及衆賓勝者皆袒決遂執張弓鄭注執張弓言能用之也右手執弦如卒射不勝者皆襲説決拾卻左手右加弛弓于其上遂以執弣鄭注固襲説決拾矣復言之者起勝者也執弛弓言不能用之也兩手執弣又不得執弦司射先反位鄭注居前俟所命來三耦及衆射者皆與其耦進立于射位北上司射作升飲者如作射一耦進揖如升射及階勝者先升堂少右鄭注先升尊賢也少右辟飲者也亦相飲之位不勝者進北面坐取豐上之觶興少退立卒觶進坐奠于豐下興揖鄭注立卒觶不祭不拜受罰爵不備禮也右手執觶左手執弓不勝者先降鄭注後升先降略之不由次與升飲者相左交于階前相揖出于司馬之南遂適堂西釋弓襲而俟鄭注俟復射有執爵者鄭注主人使贊者代弟子酌也于既升飲而升自西階立于序端執爵者坐取觶實之反奠于豐上升飲者如初鄭注每者輒酌以至于遍三耦卒飲賓主人大夫不勝則不執弓執爵者取觶降洗升實之以授于席前鄭注優尊也受觶以適西階上北面立飲鄭注受罰爵者不宜自尊别卒觶授執爵者反就席大夫飲則耦不升鄭注以賓主人飲耦在上嫌其升若大夫之耦不勝則亦執弛弓特升飲鄭注尊者可以孤無能案此下今注疏本衍對字據宋本刪正後注云不以巳尊孤人也孤謂簡忽之衆賓繼飲射爵者辨乃徹豐與觶鄭注徹猶除也設豐者反豐于堂西執爵者反觶于篚司馬洗爵升實之以降獻獲者于侯鄭注鄉人獲者賤明其主以侯為功得獻也薦脯醢設折俎俎與薦皆三祭鄭注皆三祭為其將祭侯也祭侯三處也獲者負侯北面拜受爵司馬西面拜送爵鄭注負侯負侯中也拜送爵不同面者辟正主也其設薦俎西面錯以南為上為受爵于侯薦之于位古文曰再拜受爵獲者執爵使人執其薦與俎從之適右個設薦俎鄭注獲者以侯為功是以獻焉人謂主人贊者上設薦俎者也為設籩在東豆在西俎當其北也言使設新之獲者南面坐左執爵祭脯醢執爵興取肺坐祭遂祭酒鄭注為侯祭也亦二手祭酒反注如大射興適左個中亦如之鄭注先祭左個後中者以外即之至中若神在中也左個之西北三步東面設薦俎獲者薦右東面立飲不拜既爵鄭注不就乏者明其享侯之餘也立餘薦右近司馬于是司馬北面司馬受爵奠于篚復位獲者執其薦使人執俎從之辟設于乏南鄭注遷設薦俎就乏明己所得禮也言辟之者不使當位辟舉旌偃旌也設于南右之也凡他薦俎皆當其位之前獲者負侯而俟司射適階西釋弓矢去撲説決拾襲適洗洗爵升實之以降獻獲者于其位少南薦脯醢折俎有祭鄭注不當其位辟中釋獲者薦右東面拜受爵司射北面拜送爵釋獲者就其薦坐左執爵祭脯醢興取肺坐祭遂祭酒興司射之西北面立飲不拜既爵司射受爵奠于篚釋獲者少西辟薦反位鄭注辟薦少西之者為復射妨司射視算也亦辟俎司射適堂西袒決遂取弓于階西挾一個搢撲以反位鄭注為將復射司射去撲倚于階西升請射于賓如初賓許司射降搢撲由司馬之南適堂西命三耦及衆賓皆袒決遂執弓就位鄭注位射位也不言射者以當序取矢司射先反位鄭注言先三耦及衆賓也既命之即反位不俟之也嚮不言先三耦未有拾取矢位無所先三耦及衆賓皆袒決遂執弓各以其耦進反于射位鄭注以猶與也今文以為與司射作拾取矢三耦拾取矢如初反位賓主人大夫降揖如初主人堂東賓堂西皆袒決遂執弓皆進階前揖鄭注南面相俟而揖行也及楅揖拾取矢如三耦鄭注及楅當楅東西也主人西面賓東面相揖拾取矢不北面揖由便也卒北面搢三挾一個鄭注亦于三耦為之位揖退鄭注皆已揖左還各由其塗反位賓堂西主人堂東皆釋弓矢襲及階揖升堂揖就席鄭注將袒先言主人將襲先言賓尊賓也大夫袒決遂執弓就其耦鄭注降袒決遂于堂西就其耦于射位與之拾取矢揖皆進如三耦耦東面大夫西面大夫進坐説矢束鄭注説矢束者下耦以將拾取興反位而后耦揖進坐兼取乘矢順羽而興反位揖鄭注兼取乘矢者尊大夫不敢與之拾也相下相尊君子之所以相接也大夫進坐亦兼取乘矢如其耦北面搢三挾一個鄭注亦于三耦為之位揖退耦反位大夫遂適序西釋弓矢襲升即席鄭注大夫不序于下尊也衆賓繼拾取矢皆如三耦以反位司射猶挾一個以進作上射如初案敖繼公云上字似衍否則其下當有耦字一耦揖升如初鄭注進前也嚮言還當上耦西面是言進終始互相明也今文或言作升射司馬升命去侯獲者許諾司馬降釋弓反位司射與司馬交于階前去撲襲升案敖繼公云司射惟去撲耳其決遂執弓挾矢自若也似不宜襲此言襲衍文請以樂樂于賓賓許諾司射降搢撲東面命樂正曰請以樂樂于賓賓許鄭注東面于西階之前也不就樂正命之者傳尊者之命于賤者遙號命之可也樂正亦許諾猶北面不還以賓在堂司射遂適階間堂下北面命曰不鼓不釋鄭注不與鼓節相應不釋算也鄉射之鼓五節歌五終所以將八矢一節之間當拾發四節四拾其一節先以聽也上射揖司射退反位樂正東面命大師曰奏騶虞間若一鄭注東面者進還鄉大師也騶虞國風召南之詩篇也射義曰騶虞者樂官備也其詩有一發五豝五豵于嗟騶虞之言樂得賢者衆多嘆思至仁之人以充其官此天子之射節也而用之者方有樂賢之志取其宜也其他賓客卿大夫則歌采蘋間若一者重節大師不興許諾樂正退反位乃奏騶虞以射三耦卒射賓主人大夫衆賓繼射釋獲如初卒射降鄭注皆應鼓與歌之節乃釋算降者衆賓釋獲者執餘獲升告左右卒射如初鄭注辛巳也今文曰告于賓司馬升命取矢獲者許諾司馬降釋弓反位弟子委矢司馬乘之皆如初司射釋弓視算如初鄭注算獲算也今文曰視數也釋獲者以賢獲與鈞告如初降復位司射命設豐設豐實觶如初遂命勝者執張弓不勝者執弛弓升飲如初案敖繼公云大射儀此下云卒退豐與觶如初此脫一句也司射猶袒決遂左執弓右執一個兼諸弦面鏃適堂西以命拾取矢如初鄭注側持弦矢曰執面猶尚也并矢于弦尚其鏃將止變于射也司射反位三耦及賓主人大夫衆賓皆袒決遂拾矢如初矢不挾兼諸弦弣以退不反位遂授有司于堂西鄭注不挾亦謂執之如司射也不以反射位授有司者射禮畢辨拾取矢揖皆升就席鄭注謂賓大夫及衆賓也相俟堂西進立于西階之前主人以賓揖升大夫及衆賓從升立時少退于大夫三耦及弟子自若留下司射乃適堂西釋弓去撲説決拾襲反位司馬命弟子説侯之左下綱而釋之鄭注説解也釋之不復射掩束之命獲者以旌退命弟子退楅司射命釋獲者退中與算而俟鄭注諸所退皆俟堂西備復射也旌言以者旌恆執也獲者釋獲者亦退其薦俎司馬反為司正退復觶南而立鄭注當監旅酬樂正命弟子贊工即位弟子相工如其降也升自西階反坐鄭注贊工遷樂也降時如初入樂正反自西階東北面賓北面坐取俎西之觶興阼階上北面酬主人主人降席立于賓東賓坐奠觶拜執觶興主人答拜賓不祭卒觶不拜不洗實之進東南面鄭注所不者酬而禮殺也賓立飲主人阼階上北面拜賓少退鄭注少退少逡遁也主人進受觶賓主人之西北面拜送鄭注旅酬而同階禮殺也賓揖就席主人以觶適西階上酬大夫大夫降席立于主人之西如賓酬主人之禮鄭注其既實觶進西南面立鄉所酬主人揖就席若無大夫則長受酬亦如之鄭注長謂以長幼之次酬衆賓司正升自西階相旅作受酬者曰某酬某子鄭注某者字也某子者氏也稱酬者之字受酬者曰某子旅酬下為上尊之也春秋傳曰字不若子此言某酬某子者射禮略于飲酒飲酒言某子受酬以飲酒為主受酬者降席司正退立于西序端東面鄭注退立俟後酬者也始升相立階西北面衆受酬者拜興飲皆如賓酬主人之禮辨遂酬在下者皆升受酬于西階上鄭注在下謂賓黨也鄉飲酒記曰主人之贊者西面北上不與無算爵然後與此異于賓卒受者以觶降奠于篚司正降復位使二人舉觶于賓與大夫鄭注二人主人之贊者舉觶者皆洗觶升實之西階上北面皆坐奠觶拜執觶興賓與大夫皆席末答拜舉觶者皆坐祭遂飲卒觶興坐奠觶拜執觶興賓與大夫皆答拜舉觶者逆降洗升實觶皆立于西階上北面東上賓與大夫拜舉觶者皆進坐奠于薦右鄭注坐奠之不敢授賓與大夫辭坐受觶以興鄭注辭辭其坐奠觶舉觶者退反位皆拜送乃降賓與大夫坐案今注疏本脫坐字據唐石經補反奠于其所興鄭注不舉者盛禮巳崇古文曰反坐若無大夫則惟賓鄭注長一人舉觶如燕禮媵爵之為司正升自西階阼階上受命于主人適西階上北面請坐于賓鄭注請坐欲與賓燕盡殷勤也至此盛禮已成酒清肴乾強有力者猶倦焉賓辭以俎鄭注俎者肴之貴者也辭之者不敢以燕坐褻貴肴反命于主人主人曰請徹俎賓許司正降自西階階前命弟子俟徹俎鄭注弟子賓黨也俎者主人贊者設之今賓辭之使其黨俟徹順賓意也上言請坐于賓此言主人曰互相備耳司正升立于序端賓降席北面主人降席自南方阼階上北面大夫降席席東南面鄭注俟弟子升受俎賓取俎還授司正司正以降自西階賓從之降遂立于階西東面司正以俎出授從者鄭注授賓家從來者也古者與人飲食必歸其盛者所以厚禮之主人取俎還授弟子弟子受俎降自西階以東主人降自阼階西面立鄭注以東授主人侍者大夫取俎還授弟子弟子以降自西階遂出授從者大夫從之降立于賓南鄭注凡言還者明取俎各自鄉其席衆賓皆降立于大夫之南少退北上鄭注從降亦為將燕主人以賓揖讓説屨乃升大夫及衆賓皆説屨升坐鄭注説屨者將坐空屨褻賤不宜在堂也説屨則摳衣為其被地乃羞鄭注羞進也所進者狗胾醢也燕設啖具所以案酒無算爵使二人舉觶賓與大夫不興取奠觶飲卒觶不拜鄭注二人謂嚮者二人也使之升立于西階上賓與大夫將旅當執觶也卒觶者固不拜矣著之者嫌坐卒爵者拜既爵此坐于席禮既殺不復崇執觶者受觶遂實之賓觶以之主人大夫之觶長受鄭注長衆賓長而錯皆不拜鄭注錯者實主人之觶以之次賓也實賓長之觶以之次大夫其或多者迭飲于坐而巳皆不拜受禮又殺也辨卒受者興以旅在下者于西階上鄭注衆賓之末飲而酬主人之贊者大夫之末飲而酬賓黨亦錯焉不使執觶者酌以其將旅酬不以巳尊孤人也案孤今注疏本訛作於據宋本改正其末若皆衆賓則先酬主人之贊者若皆大夫則先酬賓黨而已執觶者酌在上辨降復位長受酬酬者不拜乃飲卒觶以實之鄭注言酬者不拜者旅酬堂下異位當拜也古文曰受酬者不拜受酬者不拜受鄭注禮殺雖受尊者之酬猶不拜辨旅皆不拜鄭注主人之贊者于此始旅嫌有拜執觶者皆與旅鄭注嫌已飲不復飲也上使之勸人耳非逮下之惠也亦自以齒與于旅也卒受者以虛觶降奠于篚執觶者洗升實觶反奠于賓與大夫鄭注復奠之者燕以飲酒為歡醉乃止主人之意也今文無執觶及賓觶大夫之觶皆為爵實觶觶為之案此總上文執觶及賓觶大夫之觶數觶字今文皆作爵惟實觶之觶今文作觶其曰今文無執觶者衍一無字無算樂鄭注合鄉樂無次數賓興樂正命奏陔鄭注陔陔夏其詩亡周禮賓醉而出奏陔夏陔夏者天子諸侯以鐘鼓大夫士鼓而已賓降及階陔作賓出衆賓皆出主人送于門外再拜鄭注拜送賓于門東西面賓不答拜禮有終明日賓朝服以拜賜于門外鄭注拜賜謝恩惠也主人不見如賓服遂從之拜辱于門外乃退鄭注不見不褻禮也拜辱謝其自屈辱主人釋服乃息司正鄭注釋服説朝服服玄端也息猶勞也勞司正謂賓之與之飲酒以其昨日尤勞倦也月令曰勞農以休息之無介鄭注勞禮略貶于飲酒也此已下皆記禮之異者不殺鄭注無俎故也使人速鄭注速召賓迎于門外不拜入升不拜至不拜洗薦脯醢無俎賓酢主人主人不崇酒不拜衆賓既獻衆賓一人舉觶遂無算爵鄭注言遂者明其間闕也賓坐奠觶于其所擯者遂受命于主人請坐于賓賓降説屨升坐矣不言遂請坐者請坐主于無算爵無司正鄭注使擯者而已不立之賓不與鄭注昨日至尊不可褻也古文與作豫徵惟所欲鄭注徴召也謂所欲請呼以告于鄉先生君子可也鄭注告請也鄉先生鄉大夫致仕者也君子有大德行不仕者羞惟所有鄭注用時見物鄉樂惟欲鄭注不歌雅頌取周召之詩在所好記大夫與則公士為賓鄭注不敢使鄉人加尊于大夫也公士在官之士鄉賓主用處士使能不宿戒鄭注能者敏于事不待宿戒而習之其牲狗也鄭注狗取擇人亨于堂東北鄭注鄉飲酒義曰祖陽氣之所發也尊綌幂賓至徹之鄭注以綌為幂取其堅潔蒲筵緇布純鄭注筵席也純緣西序之席北上鄭注衆賓統于賓獻用爵案獻字上朱子儀禮經傳通解本有凡字其他用觶鄭注爵尊不可褻也以爵拜者不徒作鄭注以爵拜謂拜既爵徒猶空也作起也不空起言起必酢主人薦脯用籩五膱祭半膱橫于上醢以豆出自東房膱長尺二寸鄭注脯用籩籩宜乾物也醢以豆豆宜濡物也膱猶脡也為記者異耳祭橫于上殊之也于人為縮膱廣狹未聞也古文膱為胾今文或作植俎由東壁自西階升鄭注狗既亨載于東方賓俎脊脅肩肺主人俎脊脅臂肺肺皆離皆右體也進腠鄭注以骨名肉貴骨也賓俎用肩主人用臂尊賓也離猶刲也腠膚理也進理謂前其本右體周所貴也若有尊者則俎其餘體也凡舉爵三作而不徒爵鄭注謂獻賓獻大夫獻工皆有薦凡奠者于左鄭注不飲不欲其妨將舉者于右鄭注便其舉也衆賓之長一人辭洗如賓禮鄭注尊之于其黨若有諸公則如賓禮大夫如介禮無諸公則大夫如賓禮鄭注尊卑之差諸公大國之孤也樂作大夫不入鄭注後樂賢也樂正與立者齒鄭注謂其飲之次也尊樂正同于賓黨鄉飲酒記曰與立者皆薦以齒三笙一和而成聲鄭注三人吹笙一人吹和凡四人也爾雅曰笙小者謂之和獻工與笙取爵于上篚既獻奠于下篚其笙則獻諸西階上鄭注尊爵于下篚不復用也今文無與笙立者東面北上鄭注賓黨司正既舉觶而薦諸其位鄭注薦于觶南三耦者使弟子司射前戒之鄭注弟子賓黨之少者也前戒謂先射請戒之司射之弓矢與撲倚于西階之西鄭注便其事也司射既袒決遂而升司馬階前命張侯遂命倚旌鄭注著並行事案事今注疏本訛作也據宋本改正疏內舉注文亦作事古文曰遂命獲者倚旌凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕鄭注此所謂獸侯也燕射則張之鄉射及賓射當張采侯二正而記此者天子諸侯之燕射各以其鄉射之禮而張此侯案此下今注疏本有則經獸侯是也六字於疏舉注文亦增此六字文義不貫據宋本刪由是云焉白質赤質皆謂采其地其地不采者白布也熊麋虎豹鹿豕皆正面畫其頭象于正鵠之處耳君畫一臣畫二陽奇陰耦之數也燕射射熊虎豹不忘上不相犯射麋鹿豕志在君臣相養也案今注疏本脫也字據宋本補其畫之皆毛物之凡畫者丹質鄭注賓射之侯燕射之侯皆畫雲氣于側以為飾必先以丹采其地丹淺于赤射自楹間物長如笴其間容弓距隨長武鄭注自楹間者謂射于庠也楹間中央東西之節也物謂射時所立處也謂之物者物猶事也君子所有事也長如笴者謂從畫之長短也笴矢幹也長三尺與跬相應射者進退之節也間容弓者上下射相去六尺也距隨者物橫畫也始前足至東頭為距後足來合而南面為隨武迹也尺二寸序則物當棟堂則物當􅎝鄭注是制五架之屋也正中曰棟次曰􅎝前曰庪命負侯者由其位鄭注于賤者禮略凡適堂西皆出入于司馬之南惟賓與大夫降階遂西取弓矢鄭注尊者宜逸由便也旌各以其物鄭注旌總名也雜帛為物大夫士之所建也言各者鄉射或于庠或于榭無物則以白羽與朱羽糅杠長三仞以鴻脰韜上二尋鄭注無物者謂小國之州長也其鄉大夫一命其州長士不命不命者無物此翿旌也翿亦所以進退衆者糅者雜也杠橦也七尺曰仞鴻鳥之長脰者也八尺曰尋今文糅為縮韜為翿凡挾矢于二指之間橫之鄭注二指謂左右手之第二指此以食指將指挾之司射在司馬之北司馬無事不執弓鄭注以不主射故也始射獲而未釋獲復釋獲復用樂行之鄭注君子取人以漸上射于右鄭注于物右射案物右今注疏本訛作右物據宋本改正楅長如笴博三寸厚寸有半龍首其中蛇交韋當鄭注博廣也兩端為龍首中央為蛇身相交也蛇龍君子之類也交者象君子取矢于楅上也直心背之衣曰當以丹韋為之司馬左右撫矢而乘之分委于當楅髤橫而拳之案拳釋文音權唐石經亦作拳朱子儀禮經傳通解云拳當作奉字之誤也南面坐而奠之南北當洗鄭注髤赤黑漆也射者有過則撻之鄭注過謂矢揚中人凡射時矢中人當刑之今鄉會衆賢以禮樂勸民而射者中人本意在侯去傷害之心逺是以輕之以撲撻于中庭而巳書曰撲作教刑衆賓不與射者不降鄭注不以無事亂有事古文與為豫取誘射之矢者既拾取矢而后兼誘射之乘矢而取之鄭注謂反位巳禮成乃更進取之不相因也賓主人射則司射擯升降卒射即席而反位卒事鄭注擯賓主人升降者皆尊之也不使司馬擯其升降主于射鹿中髤前足跪鑿背容八算釋獲者奉之先首鄭注前足跪者象教擾之獸受負也大夫降立于堂西以俟射鄭注尊大夫不使久列于射位大夫與士射袒薰襦案薰今注疏本作纁唐石經及宋本並作薰儀禮圖集説亦作薰古字通用鄭注不肉袒殊于耦耦少退于物鄭注下大夫也既發則然司射釋弓矢視算與獻釋獲者釋弓矢鄭注惟此二事休武主文釋弓矢耳然則擯升降不釋禮射不主皮主皮之射者勝者又射不勝者降鄭注禮射謂以禮樂射也大射賓射燕射是矣不主皮者貴其容體比于禮其節比于樂不待中為雋也言不勝者降則不復升射也主皮者無侯張獸皮而射之主于獲也尚書傳曰戰鬭不可不習故于搜狩以間之也間之者貫之也貫之者習之也凡祭取餘獲陳于澤然後卿大夫相與射也中者雖不中也取不中者雖中也不取何以然所以貴揖讓之取也而賤勇力之取嚮之取也于囿中勇力之取也案今注疏本脫也字據宋本改今之取也于澤宫揖讓之取也澤習禮之處非所于行禮其射又主中此主皮之射與天子大射張皮侯賓射張五采之侯燕射張獸侯主人亦飲于西階上鄭注就射爵而飲也己無俊才不可以辭罰獲者之俎折脊脅肺臑案大射注引此文無臑字臑及膞胳觳皆折也故注云臑若膞胳觳之折當是因注而衍鄭注臑若膞胳觳之折以大夫之餘體東方謂之右個鄭注侯以鄉堂為面也釋獲者之俎折脊脅肺皆有祭鄭注皆皆獲者也祭祭肺也以言肺謂刌肺不離嫌無祭肺大夫説矢束坐説之鄭注明不自尊别也歌騶虞若采蘋皆五終射無算鄭注謂衆賓繼射者衆賓無數也每一耦射歌五終也古者于旅也語鄭注禮成樂備乃可以言語先王禮樂之道也疾今人慢于禮樂之盛言語無節故追道古也凡旅不洗鄭注敬殺不洗者不祭鄭注不盛既旅士不入鄭注後正禮也案後今注疏本訛作從據宋本改正既旅則將燕矣士入齒于鄉人大夫後出鄭注下鄉人不干其賓主之禮主人送于門外再拜鄭注拜送大夫尊之也主人送賓還入門揖大夫乃出送拜之案今注疏本訛作拜送之據宋本改正鄉侯上個五尋鄭注上個謂最上幅也八尺曰尋上幅用布四丈中十尺鄭注方者也用布五丈今官布幅廣二尺二寸旁削一寸考工記曰梓人為侯廣與崇方謂中也侯道五十弓弓二寸以為侯中鄭注言侯中所取數也量侯道以貍步而云弓者侯之所取數宜于射器也案于今注疏本訛作用據宋本改正正二寸案此下今注疏本衍者字據宋本刪骹中之博也今文改弓為肱也倍中以為躬鄭注躬身也謂中之上下幅也用布各二丈倍躬以為左右舌鄭注謂上個也居兩旁謂之個左右出謂之舌下舌半上舌鄭注半者半其出于躬者也用布三丈所以半上舌者侯人之形類也上個象臂下個象足中人張臂八尺張足六尺五八四十五六三十以此為衰也凡鄉侯用布十六丈數起侯道五十弓以計道七十弓之侯用布二十五丈二尺道九十弓之侯用布三十六丈箭籌八十鄭注箭篠也籌算也籌八十者略以十耦為正貴全數其時衆寡從賓案寡今注疏本訛作賓據宋本改正長尺有握握素鄭注握本所持處也素謂刋之也刋本一膚楚撲長如笴刋本尺鄭注刋其可持處君射則為下射上射退于物一笴既發則答君而俟鄭注答對也此以下雜記也今文君射則為下君樂作而后就物君袒朱襦以射鄭注君尊小臣以巾執矢以授鄭注君尊不搢矢不挾矢授之稍屬若飲君如燕則夾爵鄭注謂君在不勝之黨也賓飲君如燕賓媵觚于公之禮則夾爵夾爵者君既卒爵復自飲君國中射則皮樹中以翿旌獲白羽與朱羽糅鄭注國中城中也謂燕射也皮樹獸名以翿旌獲尚文德也今文皮樹為繁豎糅為縚古文無以于郊則閭中以旌獲鄭注于郊謂大射也大射于大學王制曰小學在公宫南之左案今注疏本脫南字據禮記文補大學在郊閭獸名如驢一角或曰如驢歧蹄周書曰北唐以閭析羽為旌于竟則虎中龍旜鄭注于竟謂與鄰國君射也畫龍于旜尚文章也通帛為旜大夫兕中各以其物獲鄭注兕獸名似牛一角士鹿中翿旌以獲鄭注謂小國之州長也用翿為旌以獲無物也古文無以獲惟君有射于國中其餘否鄭注臣不習武事于君側也古文有作又今文無其餘否君在大夫射則肉袒鄭注不袒纁襦厭于君也今文無射
