body:
  text: 儀禮集釋卷十七宋李如圭撰喪服第十一子夏傳鄭目録云天子以下死而相喪衣服年月親疏隆殺之禮不忍言死而言喪喪者棄亡之辭若全存居于彼焉己亡之耳大戴第十七小戴第九劉向别録第十一釋曰凡十有一章大傳曰服術有六一曰親親二曰尊尊三曰名四曰出入五曰長幼六曰從服喪服小記曰親親尊尊長長男女之有别人道之大者也此服之義也喪服斬衰裳苴絰杖絞帶冠繩纓菅屨者鄭注者者明為下出也凡服上曰衰下曰裳麻在首在要皆曰絰絰之言實也明孝子有忠實之心故為制此服焉案今注疏本脫此六字首絰象緇布冠之缺項要絰象大帶又有絞帶象革帶齊衰以下用布釋曰凡服上曰衣下曰裳喪服以布為衰綴之於衣因統名此衣為衰先言斬者斬之而後成衰裳也不言裁割而曰斬者取痛甚之意雜記曰三年之喪若斬春秋傳曰孤斬焉在衰絰之中苴絰杖絞帶一苴冒三者謂以苴色之麻為首絰要絰苴色之竹為杖絞帶與要絰同在於要蓋亦以苴麻為之間傳曰斬衰何以服苴苴惡貌也所以苴其內而見諸外也喪服四制乂曰苴衰不補則衰裳亦苴色矣冠繩纓者以布為冠牡麻繩為其纓也冠纓不蒙苴文故退次帶下杖齊其心故序帶上也檀弓曰絰也者實也喪服皆因吉服舊名絰以明忠實之心衰以表哀摧之義惟此二者别制名耳春秋傳齊晏桓子卒晏嬰粗縗斬苴絰帶杖菅屨即此服不言三年者下齊衰云三年此三年可知傳曰斬者何不緝也苴絰者麻之有蕡者也苴絰大搹左本在下去五分一以為帶齊衰之絰斬衰之帶也去五分一以為帶大功之絰齊衰之帶也去五分一以為帶小功之絰大功之帶也去五分一以為帶緦麻之絰小功之帶也去五分一以為帶苴杖竹也削杖桐也杖各齊其心皆下本杖者何爵也無爵而杖者何擔主也非主而杖者何輔病也童子何以不杖不能病也婦人何以不杖亦不能病也絞帶者繩帶也冠繩纓條屬右縫冠六升外畢鍛而勿灰衰三升菅屨者菅菲也外納居倚廬寢苫枕塊哭晝夜無時啜粥朝一溢米夕一溢米寢不脫絰帶既虞翦屏柱􅎝案柱唐石經與此同今注疏本訛作拄寢有席食疏食水飲朝一哭夕一哭而已既練舍外寢始食菜果飯素食哭無時鄭注盈手曰搹搹扼也中人之扼圍九寸以五分一為殺者象五服之數也爵謂天子諸侯卿大夫士也無爵謂庶人也擔猶假也無爵者假之以杖尊其為主也非主謂衆子也屬猶著也通屈一條繩為武垂下為纓著之冠也布八十縷為升升字當為登登成也今之禮皆以登為升俗誤已行久矣雜記曰喪冠條屬以别吉凶三年之練冠亦條屬右縫小功以下左縫外畢者冠前後屈而出縫于武也二十兩曰溢為米一升二十四分升之一􅎝謂之梁柱􅎝所謂梁暗疏猶粗也舍外寢于中門之外屋下纍墼為之案纍即纍今注疏本訛作壘不塗塈所謂堊室也素猶故也謂復平生時食也斬衰不書受月者天子諸侯卿大夫士虞卒哭異數釋曰不緝者不緶衰裳之邊側也蕡麻子也爾雅曰蕡枲實麻之有子者其色惡以實言之謂之蕡以色言之謂之苴本麻根也大功以上絰有本左本在下者麻根居左其末自右來加其上也經文一絰包二者别而言之則首絰曰絰要絰曰帶士喪禮曰苴絰大鬲下本在左要絰小焉杖下本者竹桐之根在下順其性也小記曰絰殺五分而去一杖大如絰謂如要絰也童子不杖未成人不能備禮也雜記曰童子不杖不菲婦人亦謂童子婦人小功章為姪庶孫丈夫婦人之長殤亦謂未成人者為婦人也其成人者皆杖喪服四制曰杖者何爵也或曰擔主或曰輔病婦人童子不杖不能病也繩帶者絞麻為繩作帶也五服之絰皆絞麻兩股相交繩帶則不但兩股矣絞帶輕于要絰故加細而為飾也間傳曰既虞卒哭葛帶三重三重者四股糾之要絰輕于首絰既虞不但為兩股義與繩帶同絞帶大小王肅以為如要絰雷次宗以為五分要絰而去一條屬者喪冠之制也條謂冠之纓武共材以一條繩若布圍之兩相交過綴之以為武垂其餘者以為纓屬謂著冠于武冠與武相連屬也吉冠纓武異材冠與武各為一物冠時乃合之惟燕居之冠少威儀冠武相屬玉藻所謂居冠屬武是也喪冠則又因武之材以為纓謂之條屬喪事質略故也齊衰之冠纓用布則繩纓蓋用牡麻右縫者冠之三辟積其縫皆鄉右也大功以下乃從吉冠左縫外畢者冠之前後皆從武下出鄉外而反縫之也喪冠皆然是謂厭冠言冠厭伏于武下也既夕禮記曰冠六升外縪纓條屬厭冠尊在首升數常細于衣其布鍛治之不加灰耳間傳曰斬衰三升菲草屨也茅已漚為菅外納者以屨之餘末向外編納之皆取醜惡不事飾也居倚廬以下傳因博記居喪之禮虞謂已葬而虞祭練謂期而練祭也倚廬之制于中門外東壁之西橫一木著地以為􅎝立細木其上倚就東壁以草屏覆之開户北鄉既虞而施柱柱起􅎝翦正草而西其户是為柱􅎝翦屏既練又别為兩下之屋不復偏倚東壁謂之堊室哭無時者謂十日五日哀至則哭也凡喪皆既虞卒哭變而受以輕服以初喪冠之布為衰冠降其衰一等受麻絰以葛絰其殺五分而去一間傳曰斬衰三升既虞卒哭受以成布六升冠七升去麻服葛葛帶三重又曰斬衰之葛與齊衰之麻同絞帶與冠纓齊衰用布則斬衰宜受以布帶布纓傳曰帶視其冠則宜以七升布為之十三月而練又以七升之冠為衰冠又降一等以八升布為之帶亦然七升者始入大功之布而以練衰謂之功衰服問曰三年之喪既練服其功衰雜記曰三年之喪雖功衰不弔是也間傳曰期而小祥練冠縓緣要絰不除男子除乎首婦人除乎帶檀弓曰練葛要絰繩屨無絇既虞卒哭之履無文以既練用大功繩履差之其用齊衰藨蒯之履乎大率斬衰既葬如齊衰之服既練如大功之服斬衰既虞卒哭遭齊衰之喪既練遭大功之喪乃為之變服義由于此二十五月大祥除衰去杖縞冠素紕布純深衣間傳曰又期而大祥素縞麻衣檀弓曰祥而縞玉藻曰縞冠素紕既祥之冠也二十七月而禫冠朝服間傳曰中月而禫禫而纖無所不佩禫之履無文先儒以為大祥白麻履禫履無絇禫逾月即吉此章不言受服之月者雜記曰士三月而葬是月也卒哭大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭又虞大夫五諸侯七以次差之天子七月葬九虞九月而卒哭矣大夫以上既虞而卒哭受服故不得定言其月數溢一斛之米百升其重一石石九案此二字有脫誤當云石百二十斤名斛為石本此暗鄭讀高宗諒暗為梁暗謂施梁案此下原本空一字應是也字故引以釋柱􅎝之義父傳曰為父何以斬衰也父至尊也釋曰嫡孫為祖亦然下傳曰父卒然後為祖後者服斬為此也諸侯為天子傳曰天子至尊也釋曰諸侯為天子斬衰為王后齊衰昏義曰斬衰服父之義也為王后齊衰服母之義以為君之妻故服期也諸侯之夫人為天子婦人為夫之君齊衰不杖期服問曰君為天子三年夫人如外宗之為君也外宗為君亦期也服問又曰世子不為天子服大夫之適子為君夫人世子如士服諸侯世子世國卿大夫不世爵故其服異也君傳曰君至尊也鄭注天子諸侯及卿大夫有地者皆曰君釋曰喪服四制曰其恩厚者其服重故為父斬衰三年以恩制者也門內之治恩掩義門外之治義斷恩案原本脫義斷二字今補資於事父以事君而敬同貴貴尊尊義之大者也故為君亦斬衰三年以義制者也尊尊謂天子諸侯貴貴謂卿大夫君也下傳曰卿大夫君謂有地者士卑無臣士虞禮賓執事者如弔服祝澡葛絰帶則士之官屬為其長弔服而加麻耳凡與國君為族親者不敢以輕服服君小記曰與諸侯為兄弟者服斬父為長子鄭注不言適子案適今注疏本作嫡下同通上下也亦言立適以長釋曰天子諸侯曰世子大夫以下曰適子天子諸侯亦為世子三年故通上下而言長子也公羊傳曰立適以長不以賢言長者又以見斯義傳曰何以三年也正體于上又乃將所傳重也庶子不得為長子三年不繼祖也鄭注此言為父後者然後為長子三年重其當先祖之正體又以其將代己為宗廟主也庶子者為父後者之弟也言庶者逺别之也小記曰不繼祖與禰此但言祖不言禰容祖禰共庿釋曰長子與所後父皆恩服本輕故更發問也父子一體也而長適獨正故曰正體長子正體先祖又將代己主宗廟所傳者重故為之三年小記曰庶子不為長子斬不繼祖禰故也必己身繼祖繼禰自祖而下適適相承者乃為長子三年蓋自義言之則祖為重己承二重故以重服服長子也父在則否周之道有適子者無適孫父在己為適則己之子未成適故必為父後而後為長子三年凡言為後者謂所後者沒而己當其世也若適子有廢疾若他故不立則否小記曰適婦不為舅後者則姑為之小功適婦不為後者服之與庶婦同則適子不為後者服之與衆子同耳凡將傳重而不為之重服者有三一則體而不正庶子是也二則正而不體適孫是也三則傳重而非正體庶孫是也與適子正體而不傳重者服之皆期庶子者妾子之號雖適妻第二子欲逺别之故亦謂之庶子為人後者傳曰何以三年也受重者必以尊服服之何如而可為之後同宗則可為之後何如而可以為人後支子可也為所後者之祖父母妻妻之父母昆弟昆弟之子若子鄭注若子者為所為後之親如親子釋曰同宗同大宗也支子適妻次子以下及妾子也禮大宗無子則同宗以支子後之所後者之祖父母妻于為後者為曽祖父母母妻之父母昆弟昆弟之子則為後者之外祖父母舅舅之子也傳舉正尊以見旁親舉外親以明本族餘有服者服之一如親子故經于斬衰章舉為人後之目空其文以包見之後不重出也若宗子為殤而死則宗人來後者惟後死者之父以昆弟之服服殤死者曽子問曰宗子為殤而死庶子弗為後小記曰為殤後者以其服服之妻為夫傳曰夫至尊也釋曰父者子之天君者臣之天夫者妻之天三者皆至尊故以斬服服之妾為君傳曰君至尊也鄭注妾謂夫為君者不得體之加尊之也雖士亦然釋曰士無臣不得君稱而妾之尊夫與臣不異故雖士妾亦名夫為君女子子在室為父鄭注女子子者女子也案女子各本訛作子女杜佑通典兩引鄭注女子子者女子也今據以訂正别于男子也言在室者關已許嫁釋曰上父條女子子在其中矣嫌許嫁即從降服故重出此文布總箭笄髽衰三年鄭注此妻妾女子子喪服之異于男子者總束髮謂之總者既束其本又總其末箭笄篠竹也案注疏本脫竹字髽露紒也猶男子之括髮斬衰括髮以麻則髽亦用麻案此下今注疏本有也蓋二字以麻者案今注疏本脫者字自項而前交于額上卻繞紒如著幓頭焉小記曰男子冠而婦人笄男子免而婦人髽凡服上曰衣案各本衣訛作衰據上云凡服則通吉服之上衣下裳言之今改正下曰裳此但言衰不言裳婦人不殊裳衰如男子衰下如深衣深衣則衰無帶下案衰原本訛作裳據今注疏本改正又無袵釋曰絰杖帶履婦人同於男子其異者總笄髽以易男子之冠纓衰則連裳為之故别見此四者也髽者去纚而露其紒也其别有二婦人吉時以纚縚髮以笄固之謂之纚笄遭喪去笄而纚至小斂後復去纚而露其紒謂之髽至成服而加以箭笄此著笄之髽也所謂男子冠而婦人笄也其未成服之時與既啓殯之後當男子括髮之節則婦人髽亦用麻當免之節則髽亦用布用麻之時如著幓頭無笄此麻布之髽也所謂男子免而婦人髽也經蓋指著笄之髽鄭兼未成服之髽明之三年者因箭笄而言箭笄有除無變小記曰箭笄終喪三年傳曰總六升長六寸箭笄長尺吉笄尺二寸鄭注總六升首飾象冠數長六寸謂出紒後所垂為飾也釋曰斬衰冠六升亦以為總檀弓曰南宫縚之妻之姑之喪蓋榛以為笄長尺而總八寸為姑齊衰期而笄亦長尺則五服之笄皆長尺也大功以下總之長短無文大功當與齊衰同八寸小功緦同一尺吉總當尺二寸與吉笄之長同下記有用吉笄折首之制故于此併傳之子嫁反在父之室為父三年鄭注謂遭喪後而出者始服齊衰期出而虞則受以三年之喪受既虞而出則小祥亦如之既除喪而出則巳凡女行于大夫以上曰嫁行于士庶人曰適人釋曰出則為父三年者已絶夫族于本親還服其本服也喪之變服必因虞祥之節故變而重服者亦因其節乃變小記曰婦為父母喪未練而出則三年既練而出則巳未練而反則期既練而反則遂之反謂還歸夫家也遂之遂其三年公士大夫之衆臣為其君布帶繩屨鄭注士卿士也公卿大夫厭于天子諸侯故降其衆臣布帶繩屨貴臣得伸不奪其正釋曰布帶齊之帶繩屨大功之屨其貴臣自若絞帶菅屨傳曰公卿大夫室老士貴臣其餘皆衆臣也君謂有地者也衆臣杖不以即位近臣君服斯服矣繩屨者繩菲也鄭注室老家相也士邑宰也近臣閽寺之屬君嗣君也斯此也近臣從君喪服無所降也繩菲今時不借也釋曰公卿大夫有采地者有家相有邑宰仲弓為季氏宰家相也子羔為費宰邑宰也無地者惟家相而巳孔子為魯大夫而原思為宰是也言君謂有地者則無地者無斬服矣即位即朝夕哭位也衆臣杖不以即位下于貴臣猶庶子不以杖即位下於適子然也近臣從君亦絞帶菅屨不借漢時菲名疏衰裳齊牡麻絰冠布纓削杖布帶疏屨三年者鄭注疏猶粗也釋曰疏衰裳以疏布為之斬衰斬而後為衰裳故先言斬疏衰衰裳已制而後齊故後言齊也斬衰固粗矣而粗不足以言之故以斬名衰見其痛甚之意至齊衰而始有粗稱箭笄不曰惡笄而齊衰櫛笄曰惡笄亦是意也削杖言削殺于父也疏屨草屨也讀如周禮聚斂疏材之疏傳曰齊者何緝也牡麻者枲麻也牡麻絰右本在上冠者沽功也疏屨者藨蒯之菲也鄭注沽猶粗也冠尊加其粗粗功大功也齊衰不書受月者亦天子諸侯卿大夫士虞卒哭異數釋曰牡麻麻之無子者枲其名也間傳曰斬衰貌若苴齊衰貌若枲服以稱其貌故斬衰之絰用苴麻齊衰用枲麻也右本在上麻本從左來加右之上也沽功謂人功粗大也下記曰齊衰四升冠七升七升者大功之布故曰冠者沽功也藨蒯皆草名玉藻曰履蒯席間傳曰為母疏衰四升既虞卒哭受以成布七升冠八升又曰齊衰之葛與大功之麻同練而衰八升冠九升其他變除如斬衰之禮練而亦用大功繩屨則既虞卒哭或者用不杖期麻屨乎父卒則為母鄭注尊得伸也釋曰小記曰祖父卒而后為祖母後者三年父卒君母存為其母當何服按小記曰庶子在父之室則為其母不禫則父在為妾母亦杖期同宮者惟不禫耳父殁君母存得伸三年可知其屈厭之節未聞繼母如母傳曰繼母何以如母繼母之配父與因母同故孝子不敢殊也鄭注因猶親也釋曰緣父之意視繼母與因母不殊故也慈母如母傳曰慈母者何也傳曰妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母若是則生養之終其身如母死則喪之三年如母貴父之命也鄭注此主謂大夫士之妾案今注疏本脫主字又此句之下有也字妾子之無母父命為母子者其使養之案今注疏本脫此十五字不命為母子案今注疏本脫此三字則亦服庶母慈己之服可也大夫之妾子父在為母大功則士之妾子為母期矣父卒則皆得伸也釋曰傳曰者引舊傳也小記曰為慈母後者為庶母可也為祖庶母可也言妾子亦可命之與庶祖母為後也公子為其母父卒乃大功無命為母子服三年之禮終其身者終慈母之身而巳小記曰慈母與妾母不世祭又曰為慈母之父母無服先儒謂婦不服慈姑孫不服慈祖母義本于此養羊亮反母為長子傳曰何以三年也父之所不降母亦不敢降也鄭注不敢降者不敢以已尊降祖禰之正體釋曰夫妻一體故也子為母齊衰故母亦為之齊衰父在子為母期而母仍為之三年者自為服祖禰之正體無厭屈之義也小記曰母為長子削杖為父母長子稽顙婦人為夫與長子稽顙其餘則否又曰妾為君之長子與女君同疏衰裳齊牡麻絰冠布纓削杖布帶疏屨期者傳曰問者曰何冠也曰齊衰大功冠其受也緦麻小功冠其衰也帶緣各視其冠鄭注問之者見斬衰有二案今注疏本脫見字其冠同今齊衰有四章不知其冠之異同耳緣如深衣之緣今文無冠布纓釋曰此服與前章不殊以一期與三年懸隔嫌其服有異故重列之間傳曰齊衰四升五升六升四升者三年齊衰也舊説杖期之衰五升不杖者五升六升下惟記斬衰與三年齊衰之冠杖期以下無文故傳發何冠之問冠其受者以受衰之布為冠也冠其衰者冠與衰同也大功以上有受故冠其受小功以下無受故冠其衰率七升以上之衰受衰降三等此衰五升則冠八升也帶布帶也緣喪中衣之緣也吉時中衣用素若布緣之以采喪中衣則緣以布故特著之中衣之布亦當視其冠也檀弓曰練練衣黃裏縓緣謂三年既練之中衣也練而練冠亦練中衣哀殺稍飾故縓緣也此章本三年之喪屈而服期其與餘期異者服而加杖雖一期而練祥禫具有雜記曰期之喪十一月而練十三月而祥十五月而禫謂此章也疏衰不廬而父在為母為妻居廬期三月不御于內而父在為母為妻終喪不御于內期三月既葬食肉飲酒而父在為母為妻終喪不食肉飲酒皆其異者杖期既虞卒哭受以衰裳八升冠九升練衰冠又各降一等其他變除先儒以為如三年齊衰之禮父在為母傳曰何以期也屈也至尊在不敢仲其私尊也父必三年然後娶達子之志也釋曰喪服四制曰資于事父以事母而愛同天無二日土無二王國無二君家無二尊以一治之也故父在為母齊衰期者見無二尊也此以權制者也猶心喪三年故父必三年然後娶士妾之子為其母亦然惟不禫耳小記曰庶子在父之室為其母不禫謂士之庶子也大夫以上妾子父在降其母無期服鄭氏以父在為母衰五升按間傳止言為母疏衰四升無父卒父在之文當考妻傳曰為妻何以期也妻至親也鄭注適子父在則為妻不杖以父為之主也服問曰君所主夫人妻大子適婦父在子為妻以杖即位謂庶子釋曰夫妻一體故曰至親周穆后崩王太子夀卒叔向以為王一歲而有三年之喪二則妻本亦三年之喪也雜記曰為妻父母在不杖不稽顙母在不稽顙稽顙者其贈也拜小記曰父在庶子為妻以杖即位可也則適子父在為妻不以杖即位也父母在為妻亦不禫小記曰宗子母在為妻禫宗子之妻尊故也父在為母期杖而禫為妻父母在不禫適子父為之主則又不杖此其異也出妻之子為母鄭注出猶去也釋曰妻有出義而母無絶道故不曰出母而曰出妻之子為母傳曰出妻之子為母期則為外祖父母無服傳曰絶族無施服親者屬出妻之子為父後者則為出母無服傳曰與尊者為一體不敢服其私親也鄭注在旁而及曰施親者屬母子至親無絶道釋曰施讀如詩葛藟施于條枚之施妻出則與夫族絶惟母子自以至親而相為服不施出于餘親也服問曰母死則為其母之黨服母出則為繼母之黨服小記曰為父後者為出母無服無服也者喪者不祭故也為後者傳重主祭不敢以己私喪廢祖禰之祭故為出母無服宋桓夫人生襄公而出歸于衛襄公請于桓公使目夷立曰臣之舅在衛愛臣若終立則不可以往以為父後者不敢私出母故也母雖出自為其子期小記曰妾從女君而出則不為女君之子服妾不服則女君固自服之也父卒母嫁其服無文韋玄成蕭望之鄭玄皆謂當服杖期為父後者則不服以嫁母與出母俱是絶族故約此經為服譙周袁準吳商以為嫁母非父所絶為父後者亦當服期或以為子無絶母之義為嫁母應服三年父卒繼母嫁從為之服報傳曰何以期也貴終也鄭注嘗為母子貴終其恩釋曰從者從乎繼母而寄育也即下傳所為夫死妻稚子幼與之適人者也如此則為之服然繼母配父之尊已絶故還以此服報之王肅曰從乎繼母而寄育則服不從則不服服也則報不服則不報馬融鄭玄以繼母已服父喪貴終母子之恩故隨為之服王順經文鄭附傳説諸儒多從王義皇密曰婦無再醮之義禮許其嫁者以身稚子幼不能自存攜其孤幼與之適人使無窮屈之難故曰貴終也若偏喪之日志存爽二棄己如遺何貴終之有不杖麻屨者鄭注此亦齊衰言其異于上釋曰自此已下哀殺病輕故不杖也斬衰菅屨齊衰藨蒯之屨不杖者麻屨輕重之節也春秋傳曰雖有絲麻無棄菅蒯此章之衰裳五升六升冠八升九升五升者正服也六升者義服也凡名從服君服為義服既虞卒哭各以其冠為受受冠降衰一等服終而除凡婦人之笄與要絰齊衰之上皆有除無變小記曰齊衰帶惡笄以終喪又曰箭笄終喪三年祖父母傳曰何以期也至尊也世父母叔父母傳曰世父叔父何以期也與尊者一體也然則昆弟之子何以亦期也旁尊也不足以加尊焉故報之也父子一體也夫妻一體也昆弟一體也故父子首足也夫妻牉合也昆弟四體也故昆弟之義無分然而有分者則辟子之私也子不私其父則不成為子故有東宫有西宫有南宫有北宫異居而同財有餘則歸之宗不足則資之宗世母叔母何以亦期也以名服也鄭注宗者世父為小宗典宗事者案此下今注疏本有也字資取也為姑在室亦如之案為姑下原本衍姊妹二字今注疏本無之據後昆弟下注云為姊妹在室亦如之則此不兼姊妹言明矣釋曰伯父有繼世為小宗故謂之世父五屬之服同父者期同祖者大功同曽祖者小功同高祖者緦世父叔父與已同出于祖應服大功以其與父為一體故進服期也世母叔母與世父叔父一體而生母名故同乎世父叔父之服大傳曰同姓從宗合族屬異姓主名治際會名著而男女有别其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也此名服之義也雖以名服其情則輕喪大記曰叔母世母故主宗子飲酒食肉異于他期喪之未葬不飲酒食肉也姑與世父叔父之親等故在室者亦期案姑下原本亦衍姊妹二字據經世父母叔父母與昆弟分見姑與世父叔父之親等姊妹與昆弟之親等此因姑連及姊妹訛衍甚明今刪正凡女子子適人者皆降本服一等經惟見其降服者以其未成人則為殤已成人則當嫁故沒其本服欲明嫁當及時之義大夫之適子為妻傳曰何以期也父之所不降子亦不敢降也何以不杖也父在則為妻不杖鄭注大夫不以尊降適婦者重適也凡不降者謂如其親服服之降有四品君大夫以尊降公子大夫之子以厭降公之昆弟以旁尊降為人後者女子子嫁者以出降釋曰凡言子者父在之稱夫人不以尊降適婦故適子亦不以厭降其妻以父為之主辟尊者而不敢杖耳杖者所以扶病也服問曰父在不敢杖尊者在故也雜記曰為長子杖則其子不以杖即位小記曰父不主庶子之喪則孫以杖即位可也父在庶子為妻以杖即位可也則凡父在適子為妻亦不以杖即位矣大夫之適子為妻雖得伸服猶厭于其父直去其杖故在此章尊厭降者禮始于周檀弓曰古者不降上下各以其親滕伯文為孟虎齊衰其叔父也為孟皮齊衰其叔父也至周而大夫以上始以尊降其親惟正統不降天子諸侯服高曽祖父母祖父母父母妻長子適婦旁期以下尊不同者皆絶服大夫于天子諸侯所絶者降一等緦則不服司服職曰凡凶事服辨服卿大夫加以大功小功是也服辨服謂斬衰齊衰也其尊同者皆不降大夫以上其子厭于其父降與不降服與不服一視其父也公之昆弟其尊視大夫大功以下以旁尊降其尊不同者一等期以上則厭于先君餘尊先君所不服者服之不過大功又大夫以尊厭其子而公之昆弟無厭此其異也其為人後者及女子子嫁者則通乎上下皆以出降其親一等大夫以上于其尊不同者則又以已尊纍降之此四品降服不盡見于經參互出之小記曰世子為妻與大夫之適子同則凡大夫大夫之子不降者達于天子皆然以大夫為尊降之始其子為厭降之始舉以例其餘昆弟鄭注昆兄也為姊妹在室亦如之為衆子鄭注衆子者長子之弟及妾子女子子亦如之案今注疏本脫一子字原本女子子下有在室二字據疏云上姑姊妹云在室此不云在室可知故略不言也可證在室二字乃後人所加今刪正士謂之衆子未能逺别也大夫則謂之庶子降之為大功天子國君不服之內則曰冢子未食而見必執其右手適子庶子已食而見必循其首釋曰喪服平文皆據士此云衆子則士之稱也經每云大夫之庶子則大夫乃謂之庶子內則所云適子者止謂適妻之子其云冢子則此所謂長子昆弟之子傳曰何以期也報之也鄭注檀弓曰喪服兄弟之子猶子也蓋引而進之大夫之庶子為適昆弟鄭注兩言之者適子或為兄或為弟傳曰何以期也父之所不降子亦不敢降也鄭注大夫雖尊不敢降其適重之也適子為庶昆弟庶昆弟相為亦如大夫為之適孫傳曰何以期也不敢降其適也有適子者無適孫孫婦亦如之鄭注周之道適子死則立適孫是嫡孫將上為祖後者也長子在皆為庶孫耳孫婦亦如之適婦在亦為庶孫之婦凡父于將為後者非長子皆期也釋曰孫為祖期祖案此下原本缺為人後者為其父母報傳曰何以期也不二斬也何以不二斬也持重于大宗者降其小宗也為人後者孰後後大宗也曷為後大宗大宗者尊之統也禽獸知母而不知父野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其大祖天子及其始祖之所自出尊者尊統上卑者尊統下大宗者尊之統也大宗者收族者也不可以絶故族人以支子後大宗也適子不得後大宗鄭注都邑之士則知尊禰近政化也大祖始封之君始祖者感神靈而生若稷契也自由也及始祖之所由出謂祭天也上猶逺也下猶近也收族者謂别親疏序昭穆大傳曰繫之以姓而弗别綴之以食而弗殊雖百世昏姻不通者周道然也釋曰其者其私親也凡為其私親者皆其以别之凡服旁尊則皆報正尊則降之既持重大宗案持原本訛作特今改正則其本生不足以加尊于此子故報之也降其小宗者下記為人後者于兄弟降一等是也禮公子不得禰先君又不敢宗君謂之别子而自為其後世為祖其自他國而始來此國者亦然别子而下適適相承出于别子者皆來宗之齊衰雖百世不遷是謂大宗小宗則惟統其五屬之內亦以其適長為宗繼禰者其弟宗之繼祖者從父昆弟宗之繼曽祖者從祖昆弟宗之繼高祖者族昆弟宗之自如其本服親盡宗易五世而遷是謂小宗吕大臨曰國君之次適為别子立以為先君一族大宗之祖子孫世繼之為大宗每一君一大宗故曰宗其繼别子之所自出所自出則先君也國君主先君之祀上及先君之大祖而下為先君子孫之宗故曰尊者尊統上别子為先君百世大宗之祖而不禰先君故曰卑者尊統下大宗者所以統先君之子孫故曰大宗尊之統也適子不得後大宗者以其自為小宗故也何休曰小宗無後當絶或曰適子不後大宗則無後亦有立後之義女子子適人者為其父母昆弟之為父後者傳曰為父何以期也婦人不二斬也婦人不二斬者何也婦人有三從之義無專用之道故未嫁從父既嫁從夫夫死從子故父者子之天也夫者妻之天也婦人不二斬者猶曰不二天也婦人不能二尊也為昆弟之為父後者何以亦期也婦人雖在外必有歸宗曰小宗故服期也鄭注從者從其教令歸宗者父雖卒猶自歸宗其為父後持重者案持今注疏本訛作服不自絶于其族類也曰小宗者言是乃小宗也小宗明非一也小宗有四丈夫婦人之為小宗各如其親之服避大宗釋曰女子子適人為昆弟為父後期者雖外成猶重本統也檀弓曰妻之昆弟為父後者死哭之適室子為主父在哭于妻之室非為父後者哭諸異室上傳止言不二斬此言婦人不二斬者彼謂不兩統二父耳為君為長子猶有斬服婦人則惟于所天服斬故傳每連言婦人不二斬以别之或曰鄭氏謂內宗外宗為君服斬何言乎婦人不二斬也曰非也服問曰君為天子三年夫人猶內宗之為宗也夫人為天子期則內宗為君亦期矣雜記曰外宗為君夫人猶內宗也是內宗外宗之服不異也所謂與諸侯為兄弟服斬者自為男子生文婦人不二斬何義而以斬服服君乎周禮曰內宗外宗內女外女之有爵者謂嫁于卿大夫士者也為夫之君自應服期其異者并服夫人猶之仕焉而已者并服小君耳遂以為服斬則誤矣繼父同居者傳曰何以期也傳曰夫死妻稚子幼子無大功之親與之適人而所適者亦無大功之親所適者以其貨財為之築宫庿歲時使之祀焉妻不敢與焉若是則繼父之道也同居則服齊衰期異居則服齊衰三月案此下唐石經有也字必嘗同居然後為異居未嘗同居則不為異居鄭注妻稚謂年未滿五十子幼謂年十五以下子無大功之親謂同財者也為之築宫庿于家門之外神不歆非族妻不敢與焉恩雖至親族已絶矣夫不可二此以恩服耳未嘗同居則不服之釋曰小記曰繼父不同居也者必嘗同居皆無主後同財而祭其祖禰為同居有主後者為異居與傳義同其或同居而異財或繼父與己更自有子或昔同居今異則皆為異居繼父服此子無文如圭以繼母嫁報服推之或者亦報服乎同母異父之昆弟之服經亦無文檀弓曰公叔木有同母異父之昆弟死問于子遊子遊曰其大功乎狄儀有同母異父之昆弟死問于子夏子夏曰我未之前聞也魯人則為之齊衰狄儀行齊衰今之齊衰狄儀之問也鄭氏謂服大功者是同父服期同母故降一等服大功或曰母屬之親不過小功而已為夫之君傳曰何以期也從服也釋曰從乎夫而服之也凡從服降所從一等大傳曰有屬從有􅑫從屬從者所為服者于己有血屬之親也徒從者與彼非親空從而服之耳子為母之黨妻為夫之黨屬從也臣為君之黨妾子為君母之黨妾為女君之黨子為母之君母妻為夫之君徒從也小記曰從服者所從亡則己屬從者所從雖殁也服從服謂徒從也姑姊妹女子子適人無主者姑姊妹報傳曰無主者謂其無祭主者也何以期也為其無祭主故也鄭注無主後者人之所哀憐不忍降之釋曰檀弓曰喪服姑姊妹之薄也蓋有受我而厚之者也今無夫無子則無厚之者矣故為之服其本服女子子不二斬雖無主後仍為其父母期故惟姑姊妹報為君之父母妻長子祖父母傳曰何以期也從服也父母長子君服斬妻則小君也父卒然後為祖後者服斬鄭注此為君矣而有父若祖之喪者謂始封之君也若是繼體則其父若祖有廢疾不立父卒者父為君之孫宜嗣位而早卒今君受國于曽祖釋曰父母長子君服三年故臣從服期也為母齊衰而言君服斬者連文而言耳案文原本訛作父今改正妻則小君者為小君齊衰自其本服故傳别見其義父卒為祖後者服斬者言君為之服斬者乃從服期也非服之常故經文次長子之下君之父祖若為君而卒則羣臣固自服斬矣以其不立故止從君而服期也凡此服雖重而恩則輕雜記曰親喪外除兄弟之喪內除視君之母與妻比之兄弟檀弓曰居君之母與妻之喪居處言語飲食衎爾小記曰為君之父母妻長子君巳除喪而后聞喪則不稅其禮若小功以下耳君之適殤適婦從服無文案下記君之所為兄弟服室老降一等則君為之服者臣皆從服也庾蔚之以為經惟見重服之從則輕服不從可知未知然否服問曰大夫之適子為君夫人大子如士服君之母非夫人則羣臣無服惟近臣及驂乘從服惟君所服服也小記曰近臣君服斯服矣其餘從而服不從而稅君雖未知喪臣服己惟君所服者其服視君無所降也稅謂于喪服年月己過乃追服之妾為女君傳曰何以期也妾之事女君與婦之事舅姑等鄭注女君君適妻也女君于妾無服報之則重降之則嫌釋曰妾為女君之黨雖為從服然猶之近臣君服斯服故其服悉與女君同不從降一等之例且雖徒從而女君死猶服其黨所以防覬覦也雜記曰女君死則妾為女君之黨服攝女君則不為先女君之黨服攝女君差尊故自從徒從之例婦為舅姑傳曰何以期也從服也釋曰夫為父母三年故婦從服期小記曰婦當喪而出則除之夫之昆弟之子鄭注男女皆是傳曰何以期也報之也釋曰從乎夫而服則當大功報之故期也凡為夫之黨尊者皆從服卑者皆報之從服故降其夫一等卑者以名服己與夫同故己報之亦與夫同也此報服之重者故著之餘皆例此公妾大夫之妾為其子傳曰何以期也妾不得體君為其子得遂也鄭注此言二妾不得從于女君尊降其子也女君與君一體惟為長子三年其餘以尊降之與妾子同也釋曰妾無尊君又不厭妾故自為其子伸其本服女子子為祖父母傳曰何以期也不敢降其祖也鄭注經似在室傳似已嫁明雖有出道猶不降釋曰章首已著祖父母今重出之明為己嫁者生文下章女子子嫁者未嫁者為曽祖父母之服同知此雖己嫁者亦不降也女子子適人者為昆弟之為父後者期為祖父母曽祖父母皆與在室者同然則女子子于正統之親雖出猶不降其為父母期者屈于不二斬耳鄭氏以為女子子成人者有出道不敢降其祖則得降其旁親大夫之子為世父母叔父母子昆弟昆弟之子姑姊妹女子子無主者為大夫命婦者惟子不報傳曰大夫者其男子之為大夫者也命婦者其婦人之為大夫妻者也無主者命婦之無祭主者也何以言惟子不報也女子子適人者為其父母期故言不報也言其餘皆報也何以期也父之所不降子亦不敢降也大夫曷為不降命婦也夫尊于朝妻貴于室矣鄭注命者加爵服之名自士至上公凡九等君命其夫則后夫人亦命其妻矣此所為者凡六命夫六命婦案以上注文今注疏本在經之下傳曰之上無主者命婦之無祭主謂姑姊妹女子子也其有祭主者如衆人惟子不報男女同不報耳傳以為據謂女子子案據原本訛作主今注疏本作傳惟據女子子似失之矣大夫曷為不降命婦據大夫于姑姊妹女子子既以出降案此下今注疏本有大功二字其適士者又以尊降在小功也夫尊于朝與己同妻貴于室從夫爵也釋曰六命夫者世父一叔父二子三昆四弟五昆弟之子六六命婦者世母一叔母二姑三姊四妹五女子子六大夫為命夫命婦以尊同不降故其子亦不敢以厭降之案下章大夫為世父母叔父母子昆弟昆弟之子為士者大功則其為大夫者期矣大夫為姑姊妹女子子嫁于大夫者大功則其無主者亦期也此惟見大夫之子者嫌此命夫命婦猶以尊降大夫之子不報故特著之惟子不報者子為父斬女子子適人者為父期自其本服非報服也傳止言女子子不報者女子子適人者為父期與為女子子無主者期其服適同嫌是報服故别其非報上經姑姊妹女子子適人無祭主者言姑姊妹報而不及于女子子意與此同大夫為祖父母適孫為士者傳曰何以期也大夫不敢降其祖與適也鄭注不敢降其祖與適則可降其旁親也釋曰三年之喪達乎天子祖與適則稍殺矣嫌得以尊降故舉大夫以明之案雜記曰大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母兄弟之為大夫者之喪服如士服大夫之適子服大夫之服大夫之庶子為大夫則為其父母服大夫服案原本脫其字今補春秋傳晏桓子卒晏嬰粗縗斬寢苫枕草其老曰非大夫之禮也曰惟卿為大夫則大夫喪服與士服有異也故鄭氏以為士為父服縷如三升半而三升為母蓋五升縷而四升為兄弟六升縷而五升大夫以上乃備儀盡飾大功以下大夫士服則同然案經斬衰章不見大夫士服之異孟子亦云三年之喪齊疏之服飦粥之食自天子達記傳所言蓋周衰禮壞或自為服制以相别異記者因雜記之非舊典也公妾以及士妾為其父母傳曰何以期也妾不得體君得為其父母遂也鄭注然則女君有以尊降其父母者與春秋之義雖為天王后猶曰吾季薑是言子尊不加于父母此傳似誤矣禮妾從女君而服其黨服是嫌不自服其父母故以明之釋曰經嫌妾以厭降其私親故明之下記曰凡妾為私兄弟如邦人
