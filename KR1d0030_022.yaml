body:
  text: 儀禮集釋卷二十二宋李如圭撰士喪禮婦人尸西東面主人及親者升自西階出于足西面袒鄭注袒大斂變也不言髽免髺髮小斂以來自若矣釋曰至成服乃變士盥位如初鄭注亦既盥並立西階下布席如初鄭注亦下莞上簟鋪于阼階上于楹間為少南商祝布絞襟衾衣美者在外君襚不倒鄭注至此乃用君襚主人先自盡釋曰襲以明衣裳親身則祭服當居外小斂衣美者在中大斂衣美者在外三相變喪大記曰大斂祭服不倒皆左衽結絞不紐有大夫則告鄭注後來者則告以方斂非斂時則當降拜之士舉遷尸復位主人踊無算卒斂徹帷主人馮如初主婦亦如之釋曰喪大記曰君將大斂子辨絰即位于序端卿大夫即位于堂廉楹西北面東上父兄堂下北面夫人命婦尸西東面外宗房中南面小臣鋪席商祝鋪絞襟衾衣士盥于盤上士舉遷尸于斂上卒斂宰告子馮之踊夫人東面亦如之大夫之喪將大斂既鋪絞襟衾衣君至主人迎先入門右巫止于門外君釋菜祝先入升堂君即位于序端卿大夫即位于堂廉楹西北面東上主人房外南面主婦尸西南東面遷尸卒斂宰告主人降北面于堂下君撫之主人拜稽顙君降升主人馮之命主婦馮之士之喪將大斂君不在其餘禮猶大夫也案此禮率與喪大記禮同惟君不在而主人西而為異爾下記云大夫升自西階階東北面東上即喪大記卿大夫堂廉楹西視斂之位主人奉尸斂于棺踊如初乃蓋鄭注棺在肂中斂尸焉所謂殯也檀弓曰殯于客位釋曰王制曰天子七日而殯諸侯五日大夫士庶人三日大夫士三日雖同而士則通死日數之故喪大記又謂大夫之喪三日之朝既殯士之喪二日而殯二日者自死之明日數也問喪曰死三日而後斂者所以待其生也三日而不生亦不生矣孝子之心亦益衰矣室家之計衣服之具亦可以成矣親戚之逺者亦可以至矣是故聖人為之斷決以三日為之禮制也主人降拜大夫之後至者北面視肂鄭注北面于西階東釋曰雜記曰當袒大夫至雖當踊絶踊而拜之反改成踊乃襲于士既事成踊襲而後拜之絶踊止踊大夫尊斂竟雖當踊亦絶踊而拜士則卒塗主人既襲乃拜之衆主人復位婦人東復位鄭注阼階上下之位設熬旁一筐案敖繼公云喪大記引此云旁各一筐則是此經脫一各字也各一黍稷也黍當在南乃塗踊無算鄭注以木覆棺上而塗之為火備卒塗祝取銘置于肂主人復位踊襲鄭注為銘設柎樹之肂東釋曰小祝大喪贊設熬置銘乃奠燭升自阼階祝執巾席從設于奧東面鄭注執燭者先升堂照室自是不復奠于尸祝執巾與執席者從入為安神位室中西南隅謂之奧執燭南面巾委于席右祝反降及執事執饌鄭注東方之饌士盥舉鼎入西面北上如初載魚左首進鬐三列臘進柢鄭注如初如小斂舉鼎執匕俎扃冪朼載之儀魚左首設而在南鬐脊也左首進鬐亦未異于生也凡未異于生者不致死也古文首為手鬐為耆釋曰左首據執者言之西面設于奧于席前則右首也公食大夫禮右首進鬐祝執醴如初酒豆籩俎從升自阼階丈夫踊甸人徹鼎鄭注如初祝先升奠由楹內入于室醴酒北面鄭注亦如初設豆右菹菹南栗栗東脯豚當豆魚次臘特于俎北醴酒在籩南巾如初鄭注右菹菹在醴南也此左右異于魚者載者統于執設者統于席醴當栗南酒當脯南既錯者出立于户西西上祝後闔户先由楹西降自西階婦人踊奠者由重南東丈夫踊鄭注為神馮依之也賔出婦人踊主人拜送于門外入及兄弟北面哭殯兄弟出主人拜送于門外鄭注小功以下至此可以歸異門大功亦存焉衆主人出門哭止皆西面于東方闔門主人揖就次鄭注次謂斬衰倚廬齊衰堊室也大功有帷帳小功緦麻有牀笫可也君若有賜焉則視斂既布衣君至鄭注賜恩惠也斂大斂君視大斂皮辨服襲裘主人成服之後往則錫衰釋曰喪大記曰君于大夫世婦大斂焉為之賜則小斂焉于外命婦既加蓋而君至于士既殯而往為之賜大斂焉諸侯弔異國之臣皮辨錫衰弔士宜如之以未成服故皮辨服襲裘雜記曰公視大斂公辨商祝鋪席乃斂既布衣矣又鋪席者榮君之來為之改始且示若事由君然主人出迎于外門外見馬首不哭還入門右北面及衆主人袒鄭注不哭厭于君不敢伸其私恩巫止于庿門外祝代之小臣二人執戈先二人後鄭注巫掌招弭以除疾病案弭今注疏本訛作彌據周禮改正小臣掌正君之法儀者案原本小臣上有周禮二字今注疏本移在下男巫上並屬衍文男巫王弔則與祝前案此下今注疏本有喪祝王弔則與巫前八字蓋疏內所引後人誤加入注耳檀弓曰君臨臣喪以巫祝桃茢執戈以惡之所以異于生也皆天子之禮諸侯臨臣之喪則使祝代巫執茢居前下天子也小臣君行則在前後君升則俠阼階北面凡宫有鬼神曰庿釋曰此殯宫而曰廟門外神之書顧命成王崩于翼室而曰諸侯出廟門俟是也巫祝皆接神者春秋傳曰楚康王卒楚人使魯公親襚公患之乃使巫祝以桃茢先祓殯檀弓亦云桃茢執戈惡之案此禮及喪大記皆不云桃茢桃茢其周之末造與又傳説公子圍設君衛曰二執戈者前矣則二人執戈疑亦君之常衛君釋采入門主人辟鄭注釋采者祝為君禮門神也必禮門神者明君無故不來也禮運曰諸侯非問疾弔喪而入諸臣之家是謂君臣為謔君升自阼階西鄉祝負墉南面主人中庭釋曰郊特牲曰君適其臣升自阼階不敢有其室也祝負墉南面主人中庭鄭注祝南面房中東鄉君牆謂之墉主人中庭進益北釋曰中庭庭南北之中君哭主人哭拜稽顙成踊出鄭注出不敢必君之卒斂事君命反行事主人復位鄭注大斂事君升主人主人西楹東北面鄭注命主人使之升升公卿大夫繼主人東上乃斂鄭注公大國之孤四命也春秋傳曰鄭伯有嗜酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在其人曰案今注疏本脫此二十八字吾公在壑谷伯有者公子子良之孫良霄案今注疏本脫此十一字卒公卿大夫逆降復位主人降出鄭注逆降者後升者先降位如朝夕哭弔之位釋曰主人降出不敢久留君君反主人主人中庭君坐撫當心主人拜稽顙成踊出鄭注撫手案之凡馮尸興必踊今文無成釋曰撫撫尸也喪大記曰君于臣撫之子于父母馮之君反之復初位衆主人辟于東壁南面鄭注以君將降也南面則當坫之東釋曰初位中庭位也燕禮小臣師在東堂下南面則此亦南面辟于坫東東堂下君降西鄉命主人馮尸主人升自西階由足西面馮尸不當君所踊主婦東面馮亦如之鄭注君必降者欲孝子盡其情釋曰馮尸不當君所不敢與君所撫同處也奉尸斂于棺乃蓋主人降出君反之入門左視塗鄭注肂在西階上入門左由便趨疾不敢久留君君升即位衆主人復位卒塗主人出君命之反奠入門右鄭注亦復中庭位乃奠升自西階鄭注以君在阼君要節而踊主人從踊鄭注節謂執奠始升階及既奠由重南東時也釋曰喪大記曰君弔見尸柩而后踊然則塗之後雖往不踊卒奠主人出哭者止鄭注以君將出不敢歡囂聒尊者也君出門庿中哭主人不哭辟君式之鄭注辟逡遁辟位也古者立乘式謂小俯以禮主人也曲禮曰立視五巂式視馬尾二車畢乘主人哭拜送鄭注二車副車也其數各視其命之等君出使異姓之士乘之在後君弔蓋乘象路案路今注疏本作輅曲禮曰乘君之乘車不敢曠左左必式釋曰周禮大行人上公二車九乘侯伯七乘子男五乘案此禮君視斂亦與喪大記君視大夫斂之禮同彼主人房外南面而此西楹東北面為異爾喪大記又曰大夫士既殯而君往焉使人戒之主人具殷奠之禮俟于門外見馬首先入門右巫止于門外祝代之先君釋菜于門內祝先升自阼階負墉南面君即位于阼小臣二人執戈立于前二人立于後擯者進主人拜稽顙君稱言視祝而踊主人踊大夫則奠可也士則出俟于門外命之反奠乃反奠卒奠主人先俟于門外君退主人送于門外拜稽顙亦與此禮同襲入即位衆主人襲拜大夫之後至者成踊鄭注後至布衣而後來者賔出主人拜送鄭注自賔出以下如君不在之儀三日成服杖拜君命及衆賔不拜棺中之賜鄭注既殯之明日全三日始啜粥矣禮尊者加惠明日必往拜謝之棺中之賜不施己也曲禮曰生與來日釋曰三日成服者除死日數之也孝經曰三日而食喪大記云三日不食者通死曰數之成服除死日數生與來日也殯斂以死日數死與往日也此士禮貶于大夫大夫以上皆以來日數喪大記曰君之喪三日子夫人杖五日既殯授大夫世婦杖大夫之喪三日之朝既殯主人主婦室老皆杖士之喪二日而三日之朝主人杖婦人皆杖檀弓曰天子崩三日祝先服五日官長服服謂杖也子亦三日而杖七日國中男子服七日而殯殯後乃皆成服朝夕哭不辟子卯鄭注既殯之後朝夕及哀至乃哭不代哭也子卯桀紂亡日凶事不辟吉事闕焉釋曰檀弓曰子卯不樂雜記曰國禁哭則止朝夕之奠即位自因也自因謂因其故惟止哭耳婦人即位于堂南上哭丈夫即位于門外西面北上外兄弟在其南南上賔繼之北上門東北面西上門西北面東上西方東面北上主人即位辟門鄭注外兄弟異姓有服者也辟開也凡庿門有事則開無事則閉釋曰婦人哭則門外亦哭矣喪大記曰祥而外無哭者則外位有哭也賔弔賔也少儀曰喪俟事不犆弔故以朝夕哭時而弔喪服小記曰無事不辟廟門哭皆于其次堂上之帷亦㧁之雜記曰朝夕哭不帷無柩者不帷自敬薑哭穆伯始帷殯非古也婦人拊心不哭鄭注方有事止歡囂主人拜賔旁三右還入門哭婦人踊鄭注先西面拜乃南面拜東面拜也釋曰每面三拜檀弓記君之喪士備入而後朝夕踊主人堂下直東序西面兄弟皆即位如外位卿大夫在主人之南諸公門東少進他國之異爵者門西少進敵則先拜他國之賔凡異爵者拜諸其位鄭注賔皆即此位乃哭盡哀止主人乃右還拜之如外位矣兄弟齊衰大功者主人哭則哭小功緦麻亦即位乃哭上言賔此言卿大夫明其亦賔爾少進前于列異爵卿大夫也他國卿大夫亦前于列尊之拜諸其位就其位特拜釋曰內位外兄弟亦在主人之南以其少退于主人故卿大夫繼主人言之敵謂其爵等也先拜他國之賔優逺客也賔非異爵者皆士也主人為之旁三拜喪大記曰拜卿大夫于位于士旁三拜春秋傳衛穆公卒晉大夫自役弔焉哭于大門之外衛人逆之婦人哭于門內異此者晉大夫未復命不敢成弔禮衛人于門外設喪位逆之故婦人亦自堂移位于門內徹者盥于門外燭先入升自阼階丈夫踊鄭注徹者徹大斂之宿奠祝取醴北面取酒立于其東取豆籩俎南面西上祝先出酒豆籩俎序從降自西階婦人踊鄭注序次也設于序西南直西榮醴酒北面西上豆西面錯立于豆北南面籩俎既錯立于執豆之西東上酒錯復位醴錯于西遂先由主人之北適饌鄭注遂先者明祝不復位也適饌適新饌將復奠乃奠醴酒脯醢升丈夫踊入如初設不巾鄭注入入于室也如初設者豆先次籩次酒次醴也不巾無菹無栗也菹栗具則有俎有俎乃巾之釋曰初設謂大斂奠時無俎爾檀弓曰朝奠日出夕奠逮日雜記曰喪奠脯醢而已錯者出立于户西西上滅燭出祝闔户先降自西階婦人踊奠者由重南東丈夫踊賔出婦人踊主人拜送鄭注哭止乃奠奠則禮畢矣今文無拜衆主人出婦人踊出門哭止皆復位釋曰位東方西面位闔門主人卒拜送賔揖衆主人乃就次朔月奠用特豚魚臘陳三鼎如初東方之饌亦如之鄭注朔月月朔日也自大夫以上月半又奠如初者謂大斂時無籩有黍稷有瓦敦有蓋當籩位鄭注黍稷併于甒北也于是始有黍稷死者之于朔月月半猶平常之朝夕大祥之後則四時祭焉主人拜賔如朝夕哭卒徹鄭注徹宿奠也舉鼎入升皆如初奠之儀卒朼釋匕于鼎俎行朼者逆出甸人徹鼎其序醴酒菹醢黍稷俎鄭注俎行者俎後執執俎者行鼎可以出其序升入之次其設于室豆錯俎錯臘特黍稷當籩位敦啓會卻諸其南醴酒位如初鄭注當籩位俎南黍黍南稷會蓋也今文無敦祝與執豆者巾乃出鄭注共為之也主人要節而踊皆如朝夕哭之儀月半不殷奠鄭注殷盛也士月半不復如朔盛奠下尊者釋曰士言不者大夫以上則有之有薦新如朔奠鄭注薦五榖若時果物新出者徹朔奠先取醴酒其餘取先設者敦啓會面足序出如入鄭注啓會徹時不復蓋也面足執之令足間鄉前也敦有足則敦之形如今酒敦其設于外如于室鄭注外序西南筮宅冡人營之鄭注宅葬居也冡人有司掌墓地兆域者營猶度也詩云經之營之釋曰周禮大喪既有日冡人請度甫竁遂為之尸甫竁謂始穿地祭告后土則為之尸或曰謂成葬祭墓時荀子曰經纊聽息之時則夫忠臣孝子亦知其閔已然而殯斂之具未有求也垂涕恐懼然而幸生之心未已持生之事未輟也卒矣然後作具之故雖備家必踰日然後殯三日而成服然後告逺者出矣備物者作矣故殯久不過七十日速不損五十日是何也曰逺者可以至矣百求可以得矣百事可以成矣其忠至矣其節大矣其文備矣然後月朝卜日月夕卜宅然後葬也卜宅大夫禮云月朝卜日月夕卜宅未詳掘四隅外其壤掘中南其壤鄭注為葬將北首故也釋曰壤柔土也九章曰穿地四為壤五檀弓曰葬于北方北首既朝哭主人皆往兆南北面免絰鄭注兆域也所營之處案所今注疏本訛作新免絰者求吉不敢純凶釋曰免絰去絰也命筮者在主人之右鄭注命尊者宜由右出也少儀曰贊幣自左詔辭自右筮者東面抽上韇兼執之南面受命鄭注韇藏策之器也兼與策執之今文無兼命曰哀子某為其父某甫筮宅度兹幽宅兆基無有後艱鄭注某甫且字也若言山甫孔甫矣宅居也度謀也兹此也基始也言為其父筮葬居今謀此以為幽冥居兆域之始得無後將有艱難乎艱難謂有非常若崩壞也孝經曰卜其宅兆而安厝之古文無兆基作期釋曰哀子喪稱也雜記曰祭稱孝子孝孫喪案此下原本缺筮人許諾不述命右還北面指中封而筮卦者在左鄭注述循也既受命而申言之曰述不述者士禮略凡筮因會命筮為述命中封中央壤也卦者識爻卦畫地者古文述皆作術釋曰凡筮因述命以命筮士禮則否卒筮執卦以示命筮者命筮者受視反之東面旅占卒進告于命筮者與主人占之曰從鄭注卒筮卦者寫卦示主人乃受而執之旅衆也反與其屬共占之謂掌連山歸藏周易者從猶吉也釋曰冠禮筮者主人受視知此亦然主人絰哭不踊若不從筮擇如初儀鄭注更擇地而筮之釋曰不踊者得吉變也雜記曰大夫卜宅與葬日有司麻衣布衰布帶因喪屨緇布冠不㽔占者皮辨如筮則史練冠長衣以筮占者朝服亦不純凶也喪服小記曰祔葬者不筮宅歸殯前北面哭不踊鄭注易位而哭明非常釋曰易位易阼階下西面位既井椁主人西面拜工左還椁反位哭不踊婦人哭于堂鄭注既巳也匠人為椁刋治其材以井構于殯門外也反位拜位也既哭之則往施之竁中矣主人還椁亦以既朝哭矣釋曰檀弓曰天子柏椁以端長六尺喪大記曰君松椁大夫柏椁士雜木椁其施之竁中也積疊赤上四周于棺故椁材之陳亦井構之獻材于殯門外西面北上綪主人遍視之如哭椁獻素獻成亦如之鄭注材明器之材視之亦拜工左還形法定為素飾治畢為成釋曰檀弓曰既殯旬而布材與明器周禮王崩大宗伯及執事視葬獻器遂哭之卜葬兆甫竁亦如之卜日既朝哭皆復外位卜人先奠龜于西孰上南首有席楚焞置于燋在龜東鄭注楚荆也荆焞所以鑽灼龜者燋炬也所以燃火者也周禮菙氏掌共燋挈以待卜事凡卜以明火爇燋遂吹其焌契以授卜師遂役之族長涖卜及宗人吉服立于門西東面南上占者三人在其南北上卜人及執燋席者在孰西鄭注族長有司掌族人親疏者也涖臨也吉服服玄端也占者三人掌玉兆瓦兆原兆者也在孰西者南面東上闔東扉主婦立于其內鄭注扉門扉也席于闑西閾外鄭注為卜者也古文闑作𣙗閾作蹙宗人告事具主人北面免絰左擁之涖卜即位于門東西面鄭注涖卜族長也更西面當代主人命卜卜人抱龜燋先奠龜西首燋在北鄭注既奠燋又執龜以待之宗人受卜人龜示髙鄭注以龜腹甲髙起所當灼處示涖卜也涖卜受視反之宗人還少退受命鄭注受涖卜命授龜宜近受命宜卻也命曰哀子某來日卜葬其父某甫考降無有近悔鄭注考登也降下也言卜此日葬魂神上下得無近于咎悔者乎釋曰王制曰天子七月而葬諸侯五月大夫士庶人三月士之三月亦通死月數故春秋傳又謂大夫三月士踰月也曲禮曰凡卜筮日喪事先逺日雜記曰祝稱卜葬虞子孫曰哀夫曰乃兄弟曰某卜葬其兄弟曰伯子某春秋傳卜有令龜者涖卜其令龜者乎近附近之近許諾不述命還即席西面坐命龜興授卜人龜負東扉鄭注宗人不述命亦士禮略凡卜述命命龜異龜重威儀多也負東扉俟龜之兆也釋曰周禮大卜大祭祀則㫝髙命龜凡喪事命龜卜人坐作龜興鄭注作猶灼也周禮卜師凡卜事眂髙揚火以作龜致其墨興起也宗人受龜示涖卜涖卜受視反之宗人退東面乃旅占卒不釋龜告于涖卜與主人占曰某日從鄭注不釋龜復執之也古文曰為日授卜人龜告于主婦主婦哭鄭注不執龜者下主人也告于異爵者使人告于衆賓鄭注衆賔僚友不來者也卜人徹龜宗人告事畢主人絰入哭如筮宅賔出拜送若不從卜擇如初儀
