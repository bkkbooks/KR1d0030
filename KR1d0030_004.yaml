body:
  text: 儀禮集釋卷四宋李如圭撰鄉飲酒禮第四鄭目錄云諸侯之鄉大夫三年大比獻賢者能者于其君以禮賓之與之飲酒于五禮屬嘉禮大戴此乃第十小戴及别錄此皆第四鄉飲酒之禮主人就先生而謀賓介鄭注主人謂諸侯之鄉大夫也先生鄉中致仕者賓介處士賢者周禮大司徒之職以鄉三物教萬民而賓興之一曰六德智仁聖義中和二曰六行孝友睦婣任恤三曰六藝禮樂射御書數鄉大夫以正月之吉受灋于司徒退而頒之于其鄉吏使各以教其所治以考其德行察其道藝及三年大比而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之厥明獻賢能之書于王是禮乃三年正月而一行也諸侯之鄉大夫貢士于其君葢如此云古者年七十而致仕老于鄉里大夫名曰父師士名曰少師而教學焉恒知鄉人之賢者是以大夫就而謀之賢者為賓其次為介又其次為衆賓而與之飲酒是亦將獻之以禮禮賓之也今郡國十月行此飲酒禮以黨正每歲邦索鬼神而祭祀則以禮屬民而飲酒于序以正齒位之說然此篇無正齒位之事焉凡鄉黨飲酒必于民聚之時欲其見化知尚賢尊長也孟子曰天下有達尊三爵也德也齒也釋曰周禮小胥正樂縣之位卿大夫判縣士特縣凡縣鍾磬半爲堵全爲肆判縣者縣東西兩面特縣者止縣一面也鍾磬編縣之二八十六枚而在一簴鍾一堵磬一堵謂之肆每面一肆諸侯之卿大夫半天子之卿大夫取一肆分縣之西縣鍾東縣磬士亦半天子之士縣磬而已此第從士禮惟縣磬而無鍾知主人者諸侯之鄉大夫也處士處而未仕者主人戒賓賓拜辱主人荅拜乃請賓賓禮辭許主人再拜賓荅拜鄭注戒警也告也拜辱出拜其自屈辱至己門也請告以其所爲來之事不固辭者素所有志釋曰鄉射禮曰賓出迎再拜主人退賓拜辱鄭注退猶去也去又拜辱者以送謝之介亦如之鄭注如戒賓也乃席賓主人介鄭注席敷席也夙興往戒歸而敷席賓席牖前南面主人席阼階上西面介席西階上東面釋曰鄉飲酒義曰四面之坐象四時也天地嚴凝之氣始于西南而盛于西北此天地之尊嚴氣也此天地之義氣也天地溫厚之氣始于東北而盛于東南此天地之盛德氣也此天地之仁氣也主人者尊賓故坐賓于西北而坐介于西南以輔賓賓者接人以義者也故坐于西北主人者接人以仁以德厚者也故坐于東南而坐僎于東北以輔主人也又曰賓必南鄉介必東鄉主人必居東方衆賓之席皆不屬焉鄭注席衆賓于賓席之西不屬者不相續也皆獨坐明其德各特釋曰衆賓衆賓之長三人也尊兩壺于房户間斯禁有𤣥酒在西設篚于禁南東肆加二勺于兩壺鄭注斯禁禁切地無足者𤣥酒在西上也肆陳也釋曰玉藻曰凡尊必上𤣥酒大夫尊用棜士用禁斯禁即棜也無足似棜故謂之棜士禁有足少儀曰酌者之左為上尊尊南鄉酌者北面故西為上也東肆者篚首在西向東陳之設洗于阼階東南南北以堂深東西當東榮水在洗東篚在洗西南肆鄭注榮屋翼釋曰鄉飲酒義曰鄉人士君子尊于房户之間賓主共之也尊有𤣥酒貴其質也羞出自東房主人共之也洗當東榮主人之所以自絜而以事賓也又曰洗之在阼其水在洗東祖天地之左海也尊有𤣥酒教民不忘本也羮定鄭注肉謂之羮定猶孰也釋曰肉孰即定止不敢預勞賓故以羮定為速賓節也春秋傳鄭莊公賜潁考叔食食舍肉請以遺母曰小人有母未嘗君之羮羮即肉也主人速賓賓拜辱主人荅拜還賓拜辱鄭注速召也還猶退釋曰主人尊故賓拜送公食大夫使大夫戒賓賓遂從之不拜送介亦如之鄭注如賓速也按今注疏本作如速賓也賓及衆賓皆從之鄭注從猶隨也言及衆賓介亦在其中矣釋曰鄉飲酒義曰主人親速賓及介而衆賓自從之則衆賓主人不親速主人一相迎于門外再拜賓賓荅拜拜介介荅拜鄭注相主人之吏擯贊傳命者釋曰主人立相乃出迎也門外庠門外鄉學曰庠庠惟一門耳揖衆賓鄭注差益卑也拜介揖衆賓皆西南面釋曰賓介衆賓門外入門及堂位皆東面北上主人揖先入鄭注揖揖賓也先入門而西面賓厭介入門左介厭衆賓入衆賓皆入門左北上鄭注皆入門西東面賓之屬相厭變于主人也推手曰揖引手曰厭今文皆作揖又曰衆賓皆入左無門主人與賓三揖至于階三讓主人升賓升主人阼階上當􅎝北面再拜賓西階上當􅎝北面荅拜鄭注三揖者將進揖當陳揖當碑揖􅎝前梁也復拜拜賓至此堂尊之釋曰主人升賓升者主人尊升一等賓乃升也賓主敵者則俱升既洗禮殺雖不敵者亦俱升主人與賓揖至于階介及衆賓亦隨賓至西階下而序立堂塗謂之陳主人坐取爵于篚降洗鄭注將獻賓也賓降鄭注從主人也主人坐奠爵于階前辭鄭注重以己事煩賓也事同曰讓事異曰辭賓對鄭注對荅也賓主之辭未聞主人坐取爵興適洗南面坐奠爵于篚下盥洗鄭注已盥乃洗爵致絜敬也今文無奠釋曰盥盥手也洗洗爵也少儀曰凡洗必盥篚下篚南也未洗奠爵于篚下已洗奠爵于篚賓進東北面辭洗鄭注必進東行示情主人坐奠爵于篚興對賓復位當西序東面鄭注言復位者明始降時位在此主人坐取爵沃洗者西北面鄭注沃洗者主人之羣吏釋曰沃洗沃水以洗爵者卒洗主人壹揖壹讓升鄭注俱升古文壹作一賓拜洗主人坐奠爵遂拜降盥鄭注復盥爲手坋汙釋曰以將獻賓拜手坋塵不可酌酒也賓降主人辭賓對復位當西序卒盥揖讓升賓西階上疑立鄭注疑讀爲疑然從于趙盾之疑按疑然之疑今注疏本皆作仡因公羊傳作仡然從乎趙盾而入改此注耳鄭康成所據之公羊傳葢作疑不作仡也疑正立自定之貌按正明監本訛作然主人坐取爵實之賓之席前西北面獻賓鄭注獻進也進酒于賓釋曰西北面邪向席賓西階上拜主人少退鄭注少退小辟按小各本作少張淳兼引鄉射注少退猶小辟也及少退小逡遁也釋文皆作小又辟今注疏本作避據釋文云小辟音避則古本不作避明矣賓進受爵以復位主人阼階上拜送爵賓少退鄭注復位復西階上位薦脯醢鄭注薦進也進之者主人有司賓升席自西方鄭注升由下也升必中席釋曰凡升席由下降由上賓席東上統于主人乃設折俎鄭注牲體枝解節折在俎主人阼階東疑立賓坐左執爵祭脯醢鄭注坐坐于席祭脯醢者以右手奠爵于薦西興右手取肺卻左手執本坐弗繚右絶末以祭尚左手嚌之興加于俎鄭注興起也肺離之本端厚大者繚猶紾也大夫巳上威儀多紾絶之尚左手者明垂紾之乃絶其末嚌嘗也釋曰薦西薦右也凡奠者將舉于右少儀曰其有折俎者取祭反之不坐反之加于俎也卻仰也繚繚祭也絶絶祭也繚祭以手從肺本循之至末乃絶以祭絶祭不循其本直絶以祭此賓用士禮故弗繚主人亦從士禮故下祭如賓禮也祭俎于俎内少儀曰凡羞有俎者則于俎内祭坐挩手遂祭酒鄭注挩拭也古文挩作說釋曰挩手爲絶肺染汚也挩手以所佩帨巾刌肺不挩手興席末坐啐酒鄭注啐亦嘗也降席坐奠爵拜告旨執爵興主人阼階上荅拜鄭注降席席西也旨美也釋曰席末啐酒因降席便故賓主人升降皆由下賓西階上北面坐卒爵興坐奠爵遂拜執爵興主人阼階上荅拜鄭注卒盡也于此盡酒者明此席非專為飲食起釋曰鄉飲酒義曰祭薦祭酒敬禮也嚌肺嘗禮也啐酒成禮也于席末言是席之正非專爲飲食也爲行禮也此所以貴禮而賤財也卒觶致實于西階上言是席之上非専為飲食也此先禮而後財之義也先禮而後財則民作敬讓而不爭矣又曰鄉飲酒之義主人拜迎賓于庠門之外入三揖而后至階三讓而后升所以致尊讓也盥洗揚觶所以致絜也拜至拜洗拜受拜送拜既所以致敬也尊讓絜敬也者君子之所以相接也君子尊讓則不爭絜敬則不慢不慢不爭則遠於鬭辯矣不鬭辯則無暴亂之禍矣斯君子所以免于人禍也故聖人制之以道賓降洗鄭注將酢主人主人降鄭注亦從賓也降降立阼階東西面賓坐奠爵興辭鄭注西階前也主人對賓坐取爵適洗南北面主人阼階東南面辭洗賓坐奠爵于篚興對主人復阼階東西面賓東北面盥坐取爵卒洗揖讓如初升釋曰凡洗必盥辭洗必既洗而後辭爵已洗則奠之不于篚下此經主人辭洗賓奠爵于篚對則既盥洗矣盥又當如鄉射禮繫于適洗南之下互之于後耳主人拜洗賓荅拜興降盥如主人禮賓實爵主人之席前東南面酢主人主人阼階上拜賓少退主人進受爵復位賓西階上拜送爵薦脯醢主人升席自北方設折俎祭如賓禮鄭注祭者祭薦俎及酒亦嚌啐不告旨鄭注酒己物也自席前適阼階上北面坐卒爵興坐奠爵遂拜執爵興賓西階上荅拜鄭注自席前者啐酒席末因從北方降由便也主人坐奠爵于序端阼階上北面再拜崇酒賓西階上荅拜鄭注東西牆謂之序崇充也言酒惡相充實釋曰主人崇酒當賓告旨也奠爵東序端以當獻介主人坐取觶于篚降洗賓降主人辭降賓不辭洗立當西序東面鄭注不辭洗者以其將自飲釋曰自飲而洗者禮貴絜卒洗揖讓升賓西階上疑立主人實觶酬賓阼階上北面坐奠觶遂拜執觶興賓西階上荅拜鄭注酬勸酒也酬之言周忠信爲周坐祭遂飲卒觶興坐奠觶遂拜執觶興賓西階上荅拜主人降洗賓降辭如獻禮升不拜洗鄭注不拜洗殺于獻賓西階上立主人實觶賓之席前北面賓西階上拜主人少退卒拜進坐奠觶于薦西鄭注賓巳拜主人奠其觶賓辭坐取觶復位主人阼階上拜送賓北面坐奠觶于薦東復位鄭注酬酒不舉君子不盡人之歡不竭人之忠以全交也主人揖降賓降立于階西當序東面鄭注主人將與介爲禮賓謙不敢居堂上主人以介揖讓升拜如賓禮主人坐取爵于東序端降洗介降主人辭降介辭洗如賓禮升不拜洗鄭注介禮殺也介西階上立鄭注不言疑者省文釋曰凡事未至者皆疑立主人實爵介之席前西南面獻介介西階上北面拜主人少退介進北面受爵復位主人介右北面拜送爵介少退鄭注主人拜于介右降尊以就卑也今文無北面釋曰凡禮殺者皆同主人立于西階東薦脯醢介升席自北方設折俎祭如賓禮不嚌肺不啐酒不告旨自南方降席北面坐卒爵興坐奠爵遂拜執爵興主人介右荅拜鄭注不嚌啐下賓介降洗主人復阼階降辭如初鄭注如賓酢之時卒洗主人盥鄭注盥者當爲介酌介揖讓升授主人爵于兩楹之間鄭注就尊南授之介不自酌下賓酒者賓主共之釋曰賓主共之故尊當在兩楹間介卑故不敢自酌介西階上立主人實爵酢于西階上介右坐奠爵遂拜執爵興介荅拜主人坐祭遂飲卒爵興坐奠爵遂拜執爵興介荅拜主人坐奠爵于西楹南介右再拜崇酒介荅拜鄭注奠爵西楹南以當獻衆賓主人復阼階揖降介降立于賓南主人西南面三拜衆賓衆賓皆荅壹拜鄭注三拜壹拜案壹今注疏本作一示徧不備禮也不升拜賤也主人揖升坐取爵于西楹下降洗升實爵于西階上獻衆賓衆賓之長升拜受者三人鄭注長其老者言三人則衆賓多矣釋曰賓介以賢舉衆賓以年序衆賓之長三人是爲三賓鄉飲酒義曰立賓以象天立主以象地設介僎以象日月立三賓以象三光主人拜送鄭注於衆賓右坐祭立飲不拜既爵授主人爵降復位鄭注既卒也卒爵不拜立飲立授賤者禮簡釋曰少儀曰小子舉爵則坐祭立飲下記曰立卒爵者不拜既爵衆賓獻則不拜受爵坐祭立飲鄭注次三人以下也不拜禮彌簡每一人獻則薦諸其席鄭注謂三人也衆賓辯有脯醢鄭注亦每獻薦于其位位在下今文辯皆作徧釋曰衆賓于堂下立侍主人以爵降奠于篚鄭注不復用也揖讓升賓厭介升介厭衆賓升衆賓序升即席鄭注序次也即就也今文厭皆爲揖一人洗升舉觶于賓鄭注一人主人之吏發酒端曰舉釋曰舉此觶爲旅酬之始實觶西階上坐奠觶遂拜執觶興賓席末荅拜坐祭遂飲卒觶興坐奠觶遂拜執觶興賓荅拜降洗升實觶立于西階上賓拜鄭注賓拜拜將受觶進坐奠觶于薦西賓辭坐受以興鄭注舉觶不授主下人也言坐受者明行事相接若親受謙也舉觶者西階上拜送賓坐奠觶于其所鄭注所薦西也釋曰後賓以酬主人故奠于右舉觶者降鄭注事已設席于堂廉東上鄭注爲工布席也側邊曰廉燕禮曰席工于西階上少東樂正先升北面此言樂正先升立于西階東則工席在階東工四人二瑟瑟先相者二人皆左何瑟後首挎越内弦右手相鄭注四人大夫制也二瑟二人鼓瑟則二人歌也瑟先者將入序在前也相扶工也衆賓之少者爲之每工一人鄉射禮曰弟子相工如初入天子相工使眡瞭者凡工瞽矇也故有扶之者師冕見及階子曰階也及席子曰席也固相師之道也案今注疏本脫也字後首者變于君也挎持也相瑟者則爲之持瑟其相歌者徒相也越瑟下孔也内弦側擔之者釋曰後首瑟之首可鼓者何之在後也樂正先升立于西階東鄭注正長也工入升自西階北面坐相者東面坐遂授瑟乃降鄭注降立于西方近其事釋曰樂記曰樂師辨乎聲詩故北面而弦鄉射禮樂正適西方命弟子贊工遷樂知相者降立西方工歌鹿鳴四牡皇皇者華鄭注三者皆小雅篇也鹿鳴君與臣下及四方之賓燕講道脩政之樂歌也此采其已有旨酒以召嘉賓嘉賓既來示我以善道又樂嘉賓有孔昭之明德可則詨也案詨各本作傚據釋文載古本作詨四牡君勞使臣之來樂歌也此采其勤苦王事及念將父母懐歸傷悲忠孝之至以勞賓也皇皇者華君遣使臣之樂歌也此采其更是勞苦自以為不及欲諮謀于賢知而以自光明也釋曰學記言宵雅肄三亦謂此三詩則此三詩葢上下通用之樂卒歌主人獻工工左瑟一人拜不興受爵主人阼階上拜送爵鄭注一人工之長也凡工賤不爲之洗釋曰左瑟辟主人授爵也不興者無目不可責其備禮薦脯醢使人相祭鄭注使人相者相其祭酒祭薦工飲不拜既爵授主人爵鄭注坐授之衆工則不拜受爵祭飲辯有脯醢不祭鄭注祭飲獻酒重無不祭也今文辯爲徧大師則爲之洗賓介降主人辭降工不辭洗鄭注大夫若君賜之樂謂之大師則爲之洗尊之也賓介降從主人也工大師也上既言獻工矣乃言大師者大師或瑟或歌也其獻之瑟則先歌則後釋曰天子諸侯有大師常官大夫君賜之樂與工亦謂之大師不辭洗賤不備禮笙入堂下磬南北面立樂南陔白華華黍鄭注笙吹笙者也以笙吹此詩以爲樂也南陔白華華黍小雅篇也今亡其義未聞昔周之興也周公制禮作樂采時世之詩以為樂歌所以通情相風切也其有此篇明矣後世衰微幽厲尤甚禮樂之書稍稍廢棄孔子曰吾自衞反魯然後樂正雅頌各得其所謂當時在者而復重雜亂者也惡能存其亡者乎且正考父校商之名頌十二篇于周大師歸以祀其先王至孔子二百年之間五篇而巳此其信也釋曰磬在階間郊特牲曰歌者在上匏竹在下貴人聲也鹿鳴曰我有嘉賓鼓瑟吹笙南陔白華華黍與由庚崇丘由儀皆以笙奏故後遂亡其辭主人獻之于西階上一人拜盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵鄭注一人笙之長者也笙三人和一人凡四人鄉射禮曰笙一人拜于下衆笙則不拜受爵坐祭立飲辯有脯醢不祭鄭注亦受爵于西階上薦之皆于其位磬南今文辯為徧乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀鄭注間代也謂一歌則一吹六者皆小雅篇也魚麗言大平年豐物多也此采其物多酒旨所以優賓也南有嘉魚言大平君子有酒樂與賢者共之也此采其能以禮下賢者賢者纍蔓而歸之與之宴燕樂也南山有臺言大平之治以賢者爲本此采其愛友賢者爲邦家之基民之父母既欲其身之壽考又欲其名德之長也由庚崇丘由儀今亡其義未聞釋曰由庚巳下五篇相次與六月詩序之次同古篇次如此乃合樂周南關雎葛蕈案蕈各本作覃下同張淳云釋文葛蕈大南反今不作蕈非古也卷耳召南鵲巢采蘩采蘋鄭注合樂謂歌樂與衆聲俱作周南召南國風篇也王后國君夫人房中之樂歌也關雎言后妃之德葛蕈言后妃之職卷耳言后妃之志鵲巢言國君夫人之德采蘩言國君夫人不失職采蘋言卿大夫之妻能循其法度昔大王王季居于岐山之陽躬行召南之教以興王業及文王而行周南之教以受命大雅云刑于寡妻至于兄弟以御于家邦謂此也其始一國耳文王作邑于豐以故地爲卿士之采地乃分爲二國周周公所食召召公所食于時文王三分天下有其二德化被于南土是以其詩有仁賢之風者屬之召南焉有聖人之風者屬之周南焉夫婦之道生民之本王政之端此六篇者其教之原也故國君與其臣下及四方之賓燕用之合樂也鄉樂者風也小雅爲諸侯之樂大雅頌爲天子之樂鄉飲酒升歌小雅禮盛者可以進取也燕合鄉樂禮輕者可以逮下也春秋傳曰肆夏蘩遏渠天子所以享元侯也文王大明緜兩君相見之樂也然則諸侯相與燕升歌大雅合小雅天子與次國小國之君燕亦如之與大國之君燕升歌頌合大雅其笙間之篇未聞釋曰合樂謂堂上歌瑟堂下鍾磬合奏此詩也燕禮曰歌鄉樂周南召南關雎序曰用之鄉人用之邦國用之鄉人此禮是也用之邦國燕禮是也鄉飲酒義曰工人升歌三終笙入三終間歌三終合樂三終歌與笙每篇爲一終間歌每間爲一終合樂鵲巢合關雎采蘩合葛蕈采蘋合卷耳每合爲一終肆夏遏渠頌之族𩔖工告于樂正曰正歌備樂正告于賓乃降鄭注樂正降者以正歌備無事也降立西階東北面釋曰告于賓者作樂主爲樂賓樂正降在笙磬西如其堂上立位主人降席自南方鄭注不由北方由便側降鄭注賓介不從作相爲司正司正禮辭許諾主人拜司正荅拜鄭注作使也禮樂之正既成將留賓爲有解惰立司正以監之拜拜其許釋曰相一相擯贊者主人升復席司正洗觶升自西階阼階上北面受命于主人主人曰請安于賓司正告于賓賓禮辭許鄭注爲賓欲去留之告賓于西階司正告于主人主人阼階上再拜賓西階上荅拜司正立于楹間以相拜皆揖復席鄭注再拜拜賓許也司正既以賓許告主人遂立楹間以相拜賓主人既拜揖就席司正實觶降自西階階間北面坐奠觶退共少立鄭注階間北面東西節也其南北當中庭共拱手也少立自正愼其位也己帥而正孰敢不正燕禮曰右還北面釋曰奠觶者以顯其事表其位也坐取觶不祭遂飲卒觶興坐奠觶遂拜執觶興案此下原本衍盥字唐石經同疏云鄉射大射禮皆直云取觶洗南面反奠于其所不云盥此俗本有盥者誤葢賈氏既訂正經文又于疏内辨之後人或因石經仍加盥字故永樂大典所載儀禮有之今從疏刪去洗北面坐奠觶于其所退立于觶南鄭注洗觶奠之示絜敬立于其南以察衆賓北面坐取俎西之觶阼階上北面酬主人主人降席立于賓東鄭注初起旅酬也凡旅酬者少長以齒終于沃盥者皆弟長而無遺矣賓坐奠觶遂拜執觶興主人荅拜不祭立飲不拜卒觶不洗實觶東南面授主人鄭注賓立飲卒觶因更酌以鄉主人將授主人阼階上拜賓少退主人受觶賓拜送于主人之西鄭注旅酬同階禮殺釋曰鄉射禮拜皆北面賓揖復席鄭注酬主人訖主人西階上酬介介降席自南方立于主人之西如賓酬主人之禮主人揖復席鄭注其酌實觶西南授介自此巳下旅酬酌者亦如之司正升相旅曰某子受酬受酬者降席鄭注旅序也於是介酬衆賓衆賓又以次序相酬某者衆賓姓也同姓則以伯仲别之又同則以某字别之案某今注疏本訛作其據疏云同姓之中有伯仲同者則以某甫且字别之可證古本作某司正退立于序端東面鄭注辟受酬者又便其贊上贊下也始升相西階西北面釋曰衆賓席在賓西南面司正始升賓命之故西階西北面衆受酬者受自左故司正退辟之受酬者自介右鄭注由介東也尊介使不失故位衆受酬者受自左鄭注後將受酬者皆由西變于介也今文無衆酬也案也原本訛作者今從注疏本改正拜興飲皆如賓酬主人之禮鄭注嫌賓已下異也辯卒受者以觶降坐奠于篚鄭注辯辯衆賓之在下者鄉射禮曰辯遂酬在下者皆升受酬于西階上司正降復位鄭注觶南之位使二人舉觶于賓介洗升實觶于西階上皆坐奠觶遂拜執觶興賓介席末荅拜皆坐祭遂飲卒觶興坐奠觶遂拜執觶興賓介席末荅拜鄭注二人亦主人之吏若有大夫則舉觶于賓與大夫燕禮曰媵爵者立于洗南西面北上序進盥洗釋曰二人舉觶爲無筭爵之始逆降洗升實觶皆立于西階上賓介皆拜鄭注于席末拜釋曰逆降後升者先降皆進薦西奠之賓辭坐取觶以興介則薦南奠之介坐受以興退皆拜送降賓介奠于其所鄭注賓言取介言受尊卑異文今文曰賓受司正升自西階受命于主人主人曰請坐于賓賓辭以俎鄭注至此盛禮俱成酒清肴乾賓主百拜強有力者猶倦焉案今注疏本脫者字張而不弛弛而不張非文武之道請坐者將以賓燕也俎者肴之貴者辭之者不敢以禮殺當貴者釋曰骨體貴而肉賤少儀曰飲酒者有折俎不坐主人請徹俎賓許鄭注亦司正傳請告之司正降階前命弟子俟徹俎鄭注西階前也弟子賓之少者俎者主人之吏設之使弟子俟徹者明徹俎賓之義釋曰徹俎者敬主人之禮司正升立于序端案序原本訛作席從唐石經改正鄭注待事賓降席北面主人降席阼階上北面介降席西階上北面遵者降席席東南面鄭注皆立相須徹俎也遵者謂此鄉之人仕至大夫者也今來助主人樂賓主人所榮而遵法者也因以爲名或有無來不來用時事耳今文遵爲僎或爲全賓取俎還授司正司正以降賓從之主人取俎還授弟子弟子以降自西階主人降自阼階介取俎還授弟子弟子以降介從之若有諸公大夫則使人受俎案受原本訛作授唐石經同據今注疏本改正如賓禮衆賓皆降鄭注取俎者皆鄉其席既授弟子皆降復初入之位說屨揖讓如初升坐鄭注說屨者爲安燕當坐也必說于下者屨賤不空居堂說屨主人先左賓先右今文說爲稅釋曰少儀曰堂上無跣燕則有之乃羞鄭注羞進也所進者狗胾醢也鄉設骨體所以致敬也今進羞所以盡愛也敬之愛之所以厚賢也釋曰胾切肉也薦羞不踰牲此牲狗則羞者狗胾也醢則雜餘牲兼作之無筭爵案筭今注疏本作算下同唐石經亦作筭鄭注筭數也賓主燕飲爵行無數醉而止也鄉射禮曰使二人舉觶于賓與大夫又曰執觶者洗升實觶反奠于賓與大夫皆是釋曰曏二人所舉觶者至此二觶竝行交錯以酬辯旅在下者主人之贊者亦與焉復實二觶反奠之其爵無筭詳見鄉射禮無筭樂鄭注燕樂亦無數或間或合盡歡而止也春秋襄公二十九年吳公子札來聘請觀于周樂此國君之無筭賓出奏陔鄭注陔陔夏也陔之言戒也終日燕飲酒罷以陔爲節明無失禮也周禮鍾師以鍾鼓奏九夏是奏陔夏則有鍾鼓矣鍾鼓者天子諸侯備用之大夫士鼓而已蓋建于阼階之西南鼓鄉射禮曰賓興樂正命奏陔賓降及階陔作賓出衆賓皆出釋曰詩亡篇六序皆以篇名釋其義南陔曰孝子相戒以養與鄭氏陔之言戒義協大射禮鍾鼔備有鄉射曰不鼓不釋知有鼓而已主人送于門外再拜鄭注門東西面拜也賓介不荅拜禮有終也釋曰鄉飲酒義曰孔子曰吾觀于鄉而知王道之易易也主人親速賓及介而衆賓自從之至于門外主人拜賓及介而衆賓自入貴賤之義别矣三揖至于階三讓以賓升拜至獻酬辭讓之節繁及介省矣至于衆賓升受坐祭立飲不酢而降隆殺之義辨矣工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂備遂出一人揚觶乃立司正焉知其能和樂而不流也賓酬主人主人酬介介酬衆賓少長以齒終于沃洗者焉知其能弟長而無遺矣降說屨升坐脩爵無數飲酒之節朝不廢朝莫不廢夕賓出主人拜送節文終遂焉知其能安燕而不亂也貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五行者足以正身安國矣彼國安而天下安故曰吾觀于鄉而知王道之易易也賓若有遵者諸公大夫則既一人舉觶乃入鄭注不干主人正禮也遵者諸公大夫也謂之賓者同從外來耳大國有孤四命謂之公釋曰賓主獻酬爲正禮遵者無常或來或否故于此乃言之孤謂之公者若天子之有三公然席子賓東公三重大夫再重鄭注席此二者于賓東尊之不與鄉人齒也天子之國三命者不齒于諸侯之國爵爲大夫則不齒矣不言遵者遵者亦卿大夫釋曰賓在户牗間尊在户東席遵者又于尊東曰賓東者繼賓而言耳其席南面西上統于尊士來觀禮者齒于堂下鄉飲酒之禮所尚三謀賓介尚徳也旅酬以齒尚年也大夫重席坐于賓東尚爵也三者天下之達尊也又按周官黨正職云國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位一命齒于鄉里再命齒于父族三命而不齒鄉飲酒義又曰鄉飲酒之禮六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也此蓋黨正飲酒正齒位之禮公如大夫入主人降賓介降衆賓皆降復初位主人迎揖讓升公升如賓禮辭一席使一人去之鄭注如讀若今之若主人迎之于門内也辭一席謙自同于大夫釋曰不言出知迎于門内大夫則如介禮有諸公則辭加席委于席端主人不徹無諸公則大夫辭加席主人對不去加席鄭注加席上席也大夫席再重明日賓鄉服以拜賜案賓下原本有服字唐石經同據注言今文曰賓服鄉服是注從古文無服字明矣鄭注拜賜謝恩惠鄉服昨日與鄉大夫飲酒之朝服也不言朝服未服以朝也今文曰賓服鄉服主人如賓服以拜辱鄭注拜賓復自屈辱也案復原本訛作服釋文云復自扶又反今注疏本亦作復鄉射禮曰賓朝服以拜賜于門外主人不見如賓服遂從之拜辱于門外乃退主人釋服鄭注釋朝服更服𤣥端也古文釋作舍釋曰服𤣥端燕私輕也乃息司正鄭注息勞也勞賜昨日贊執事者獨云司正司正庭長也無介鄭注勞禮略也司正爲賓不殺鄭注市買若因所有可也不殺則無俎薦脯醢鄭注羞同也羞惟所有鄭注在有何物徵惟所欲鄭注徵召也以告于先生君子可也鄭注告請也先生不以筋力爲禮于是可以來君子國中有盛德者可者召不召惟所欲賓介不與鄭注禮瀆則䙝古文與爲豫鄉樂惟欲鄭注鄉樂周南召南六篇之中惟所欲作不從次也不歌鹿鳴魚麗者辟國君也記鄉朝服而謀賓介皆使能不㝛戒鄭注鄉鄉人謂大夫也朝服冠𤣥端緇帶素鞸白屨今郡國行鄉飲酒之禮𤣥冠而衣皮弁服與禮異再戒爲㝛戒禮將有事先戒而復㝛戒案復各本作又釋文于復字云下而復同指此也今從釋文改正釋曰冠𤣥端𤣥冠𤣥端也冠與衣帶同色屨與裳鞸同色蒲筵緇布純鄭注筵席也純縁也尊綌幂賓至徹之鄭注綌葛也幂覆尊巾其牲狗也鄭注狗取擇人亨于堂東北鄭注祖陽氣之所始也陽氣主養易曰天地養萬物聖人養賢以及萬民釋曰鄉飲酒義曰亨狗于東方祖陽氣之發于東方也祖猶法也獻用爵其他用觶鄭注爵尊不䙝用之薦脯五挺横祭于其上出自左房鄭注挺猶膱也鄉射禮曰祭半膱膱長尺有二寸左在東案明監本脫左字陽也陽主養房饌陳處也冠禮之饌脯醢南上曲禮曰以脯脩置者左朐右末釋曰脯横于人前其末居右祭横其上于人則爲從也脯五挺通祭而六挺俎由東壁案壁唐石經訛作璧自西階升鄭注亨狗既孰載之俎饌于東方賓俎脊脅肩肺主人俎脊脅臂肺介俎脊脅肫胳肺案今注疏本無肫字唐石經有據疏云賓用肩主人用臂介用胳其間有臑肫在而介不用者葢以大夫俎故此闕焉是賈疏之本無肫字也疏又云或有介俎肫胳竝言者是賈氏所見别本有肫字也然注内作膞釋文云劉音純而絶不涉及于肫是注及釋文皆不知經有肫字使肫胳兩見康成必解釋其意古本無肫字明矣李如圭獨取疏之發明肫胳兩見者葢用賈氏所見别本肺皆離皆右體進腠鄭注凡牲前脛骨三肩臂臑也後脛骨二膞胳也尊者俎尊骨卑者俎卑骨祭統曰凡爲俎者以骨爲主案主今注疏本訛作上骨有貴賤凡前貴後賤離猶㨒也腠理也進理謂前本也案前下今注疏本有其字今文胳爲骼案今注疏本云作骼釋曰周人貴肩賓俎用肩主人用臂尊賓也大夫雖尊不奪賓主正禮其俎用臑肫卑于主人而尊于介介用胳若大夫一人則介得用肫故介俎肫胳兩見右體者周所貴也以爵拜者不徒作鄭注作起也言拜既爵者不徒起起必酢主人坐卒爵者拜既爵立卒爵者不拜既爵鄭注降殺各從其宜不使相錯惟工不從此禮釋曰工賤不拜既爵無目不使立卒爵耳凡奠者于左鄭注不飲者不欲其妨釋曰不妨後奠爵將舉于右鄭注便也釋曰以右手舉之便少儀曰客爵居左其飲居右介爵酢爵僎爵皆居右客爵主人酬賓之爵也衆賓之長一人辭洗如賓禮鄭注于三人之中復差有尊者餘二人雖爲之洗不敢辭其下不洗立者東面北上若有北面者則東上案敖繼公集說云北面者與東面者相繼當西上云東者字誤也鄭注賢者衆寡無常也或統于堂或統于門釋曰立堂下者東面立門西者北面樂正與立者皆薦以齒鄭注謂其飲之次也尊樂正同于賓黨不言飲而言薦以薦明飲也既飲皆薦于其位樂正位西階東北面凡舉爵三作而不徒爵鄭注謂獻賓獻大夫獻工皆有薦樂作大夫不入鄭注後樂賢者釋曰大夫之來助主人樂賢故既樂作不入後户豆反下後正禮同獻工與笙取爵于上篚既獻奠于下篚鄭注明其異器敬也如是則獻大夫亦然上篚三爵釋曰三爵獻賓介衆賓一獻工與笙二獻大夫三也其笙則獻諸西階上鄭注謂主人拜送爵也于工拜于阼階上者以其坐于西階東也古文無上釋曰獻笙固于西階上矣復記之者嫌亦于阼階上拜送磬階間縮􅋼北面鼓之鄭注縮從也􅋼以東西爲從鼓猶擊也大夫而特縣方賓鄉人之賢者從士禮也射則磬在東古文縮爲蹙釋曰磬階間者在堂下兩階之間東西節也縮􅋼者上當堂之南􅋼南北節也凡東西爲横南北爲從南􅋼則以東西爲從謂之縮􅋼主人介凡升席自北方降自南方鄭注席南上升由下降由上由便司正既舉觶而薦諸其位鄭注司正主人之屬也無獻因其舉觶而薦之凡旅不洗鄭注敬禮殺也不洗者不祭鄭注不甚絜也釋曰一人二人舉觶洗且祭者言旅始不可不自絜既旅士不入鄭注後正禮也既旅則將燕矣徹俎賓介遵者之俎受者以降遂出授從者鄭注以送之案今注疏本脫以字主人之俎以東鄭注藏于東方樂正命奏陔賓出至于階陔作若有諸公則大夫于主人之北西面鄭注其西面者北上統于公主人之贊者西面北上不與鄭注贊佐也謂主人之屬佐助主人禮事徹鼏沃盥設薦俎者西面北上統于堂也與及也不及謂不獻酒無筭爵然後與鄭注燕乃及之
