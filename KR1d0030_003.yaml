body:
  text: 儀禮集釋卷三宋李如圭撰士相見禮第三鄭目録云士以職位相親始承摯相見禮雜記㑹葬禮曰相見也反哭而退朋友虞祔而退士相見於五禮屬賓禮大小戴及别録皆第三士相見之禮摯冬用雉夏用腒左頭奉之曰某也願見無由逹某子以命命某見鄭注摯所執以至者君子見所尊敬案見下今注疏本衍於字必執摯以將其厚意案此下今注疏本衍也字士摯用雉者取其耿介交有時别有倫也雉必用死者為其不可生服也夏用腒備腐臭也左頭頭陽也無由逹言久無因緣以自逹也某子今所因緣之姓名也以命者稱述主人之意今文頭為脰釋曰雉春交秋别既别不雜不可案此下原本缺主人對曰某子命某見吾子有辱請吾子之就家也某將走見鄭注有乂也某子命某往見今吾子又自辱來序其意也走猶往也今文無走賓對曰某不足以辱命請終賜見鄭注命謂請吾子之就家主人對曰某不敢為儀固請吾子之就家也某將走見鄭注不敢為儀言不敢外貌為威儀忠誠欲往也固如故也今文不為非古文云固以請賓對曰某不敢為儀固以請鄭注言如故請終賜見也今文不為非主人對曰某也固辭不得命將走見聞吾子稱摯敢辭摯鄭注不得命者不得見許之命也走猶出也稱舉也辭其摯為其大崇也古文曰某將走見釋曰凡始相見及新升為臣者則有摯其餘會聚則執笏又卑見尊及敵案此下原本缺賓對曰某不以摯不敢見鄭注見于所尊敬而無摯嫌大簡主人對曰某不足以習禮敢固辭鄭注言不足習禮者不敢當其崇禮來見己賓對曰某也不依于摯不敢見固以請鄭注言依于摯謙自卑也今文無也案今注疏本脫此四字主人對曰某也固辭不得命敢不敬從出迎于門外再拜賓答再拜主人揖入門右賓奉摯入門左主人再拜受賓再拜送摯出鄭注右就右也左就左也受摯于庭既拜送則出矣案既拜下各本衍受字據疏舉注文無之今刪正不受摯于堂下人君也今文無也釋曰下記云君在堂升見此無升文則在庭也士相見之禮必依于介紹不茍合也必依于摯以道親也賓至門主人三辭見賓稱摯主人三辭摯所以致尊嚴也人茍以說而相親若者末必爭茍以簡而相親若者末必怨士相見者所以使人重其身而無邇于辱慎其交而無邇于禍也主人請見賓反見退主人送于門外再拜鄭注請見者為賓崇禮來相接以矜莊歡心未交也賓反見則燕矣下云凡燕見于君至凡侍坐于君子博記反見之燕義臣初見于君再拜奠摯而出釋曰請見如字反見復見同主人復見之以其摯曰嚮者吾子辱使某見請還摯于將命者鄭注復見之者禮尚往來也以其摯謂嚮時所執來者也嚮曩也𫝊命者謂擯相者案者今注疏本作也主人對曰某也既得見矣敢辭鄭注讓其來答已也賓對曰某也非敢求見請還摯于將命者鄭注言不敢求見嫌䙝主人不敢當也今文無也案今注疏本脫此四字主人對曰某也既得見矣敢固辭鄭注固如故也賓對曰某不敢以聞固以請于將命者鄭注言不敢以聞又益不敢當主人對曰某也固辭不得命敢不從鄭注許受之也異日則出迎同日則否釋曰此不言主人出迎蓋同日也鄉射禮眀日息司正主人猶出迎賓奉摯入主人再拜受賓再拜送摯出主人送于門外再拜士見于大夫終辭其摯于其入也一拜其辱也賓退送再拜鄭注終辭其摯以將不親答也凡不答而受其摯惟君于臣耳大夫于士不出迎入一拜正禮也送再拜尊賓釋曰見如字下相見同若嘗為臣者案嘗唐石經作嘗即嘗之俗體各本竝訛作常今據石經訂正則禮辭其摯曰某也辭不得命不敢固辭鄭注禮辭一辭其摯而許也將不答而聽其以摯入有臣道也賓入奠摯再拜主人答一拜鄭注奠摯尊卑異不親授也古文一為一賓出使擯者還其摯于門外曰某也使某還摯鄭注還其摯者辟正君也賓對曰某也既得見矣敢辭鄭注辭君還其摯也今文無也擯者對曰某也命某某非敢為儀也敢以請鄭注還摯者請使受之賓對曰某也夫子之賤私不足以踐禮敢固辭鄭注家臣稱私踐行也言某臣也不足以行賓客禮賓客所不答者不受摯擯者對曰某也使某不敢為儀也固以請鄭注言使某尊君也或言命某𫝊言耳賓對曰某固辭不得命敢不從再拜受鄭注受其摯而去之下大夫相見以鴈飾之以布維之以索如執雉鄭注鴈取知時翔有行列也飾之以布謂裁縫衣其身也維之以索案各本脫此三字張淳引釋文以索悉各反注同注謂此也上舉經飾之以布全句此亦舉全句明矣謂繫聨其足釋曰如執雉亦左頭奉之曲禮曰飾羔鴈者以繢蓋于布上乂畫之上大夫相見以羔飾之以布四維之結于面左頭如麛執之鄭注上大夫卿也羔取其從帥羣而不黨也面前也繫聨四足交出背上于胸前結之也如麛執之者秋獻麛有成禮如之或曰麛孤之摯也其禮蓋謂左執前足右執後足今文頭為脰釋曰帥所類反如士相見之禮鄭注大夫雖摯異其儀猶如士始見于君執摯至下容彌蹙鄭注下謂君所也蹙猶促也促恭慤貌也其為恭士大夫一也釋曰臣視君夾已下故謂君所為下庶人見于君不為容進退走鄭注容謂趨翔士大夫則奠摯再拜稽首君答一拜鄭注言君答士大夫一拜則于庶人不答之庶人之摯鶩古文一作一釋曰稽首拜頭至地拜之重者也一拜周禮所謂竒拜拜頭至手者亦謂之拜手曲禮君于士不答拜此答拜者新升為士也若他邦之人則使擯者還其摯曰寡君使某還摯賓對曰君不有其外臣臣不敢辭再拜稽首受凡燕見于君必辨君之南面若不得則正方不疑君鄭注辨猶正也君南面則臣見正北面君或時不然當正東面若正西面不得疑君所處邪鄉之此謂特見圗事非立賓主之燕也疑度之釋曰曲禮曰立必正方君在堂升見無方階辨君所在鄭注升見升堂見于君也君近東則升東階君近西則升西階凡言非對也妥而後𫝊言鄭注凡言謂己為君言事也妥安坐也𫝊言猶出言也若君問可對則對不待安坐也古文妥為綏與君言言使臣與大人言言事君與老者言言使弟子與幼者言言孝弟于父兄與衆言言忠信慈祥與居官者言言忠信鄭注博陳燕見言語之儀也言使臣者使臣之禮也大人卿大夫也言事君者臣事君以忠也祥善也居官謂士已下凡與大人言始視面中視抱卒視面毋改衆皆若是鄭注始視面謂觀其顏色可𫝊言未也中視抱容其思之且為敬也卒視面察其納己言否也毋改謂𫝊言見答應之間當正容體以待之毋自變動為嫌解惰不虛心也衆謂諸卿大夫同在此者皆若是其視之儀無異也古文毋作無今文衆為終釋曰此大人謂君也曲禮天子視不上于夾國君妥視大夫衡視視謂其臣視之夾交領也妥視上于夾衡視視面此視君得視面者據與君言時抱即夾或曰大人亦謂大夫若父則遊目毋上于面毋下于帶鄭注子于父主孝不主敬所視廣也因觀安否何如也今文父為甫古文毋作無案今注疏本云為無釋曰事親主愛故異于君也曲禮曰士視五步凡視上于面則敖下于帶則憂五步謂旁遊目五步也若不言立則視足坐則視膝鄭注不言則伺其行起而已釋曰荀子云坐視膝立視足應對言語視面凡侍坐于君子君子缺伸問日之早晏以食具告改居則請退可也鄭注君子謂卿大夫及國中之賢者也案今注疏本脫之字志倦則缺體倦則伸問日晏近于久也具猶辨也改居謂自變動也古文伸作信早作蚤釋曰曲禮曰侍坐于君子君子缺伸撰杖屨問日蚤莫侍坐者請出矣夜侍坐問夜膳葷請退可也鄭注問夜問其時數也膳葷謂食之葷辛物蔥薤之屬食之可以止卧案今注疏本脫可字古文葷作薰若君賜之食則君祭先飯遍嘗膳飲而俟君命之食然後食鄭注君祭先飯于其祭食案于各本訛作食據文義改正臣先飯示為君嘗食也此謂君與臣之禮食膳謂進庶羞既嘗庶羞則俟君之遍嘗也今云呫嘗膳釋曰孔子侍食于君君祭先飯玉藻曰侍食于先生異爵者後祭先飯若有將食者則俟君之食然後食鄭注將食猶進食謂膳宰也膳宰進食則臣不嘗食周禮膳夫案此下今注疏本有授祭二字品嘗食王乃食釋曰玉藻曰若賜之食而君客之則命之祭然後祭先飯辨嘗羞飲而俟若有嘗羞者則俟君之食然後食飯飲而俟若君賜之爵則下席再拜稽首受爵升席祭卒爵而俟君卒爵然後授虛爵鄭注受爵者于尊所至于授爵坐授人耳必俟君卒爵者若欲其釂然也今文曰若賜之爵無君也釋曰玉藻曰君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後授虛爵曲禮曰侍飲于長者酒進則起拜受于尊所長者舉未釂少者不敢飲釂盡爵也燕禮曰公卒爵然後飲退坐取屨隱辟而后屨君為之興則曰君無為興臣不敢辭君若降送之則不敢顧辭遂出鄭注謂君若食之飲之而退也隱辟俯而逡遁興起也辭君興而不敢辭其降于己大崇不敢當也大夫則辭退下比及門三辭鄭注下亦降也釋曰大夫尊得辭降若先生異爵者請見之則辭辭不得命則曰某無以見辭不得命將走見先見之鄭注先生致仕者也異爵謂卿大夫也辭辭其自降而來走猶出也先見之者出先拜也曲禮曰主人敬賓則先拜賓非以君命使則不稱寡大夫士則曰寡君之老案玉藻篇上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫大夫私事使私人擯則稱名公士擯則曰寡大夫寡君之老是上大夫自稱下臣下大夫自名擯者稱上大夫曰寡君之老稱下大夫曰寡大夫然必公士擯乃得稱之此文當云非以君命使則不稱寡大夫寡君之老正與玉藻公士擯則曰寡大夫寡君之老互相為義衍士則曰三字耳疏內言經直云大夫鄭兼云士者經本文是士則云非以君命使可以兼士也疏據本文是士相見禮解注之士字似作疏時經猶未有士字又疏辨别經云大夫鄭兼云士不一語及卿而今各本注稱大夫卿士足證卿字亦訛舛衍文鄭注謂擯贊者辭也不稱寡者案者今注疏本訛作君不言寡君之某言姓名而已大夫士案大夫下各本衍卿字今據疏删正其使則皆曰寡君之某檀弓曰仕而未有祿者君有饋焉曰獻使焉曰寡君案此下各本衍之老二字今據禮記剛正釋曰玉藻曰大夫私事使私人擯則稱名公士擯則曰寡大夫寡君之老公士為擯謂聘也上大夫曰寡君之老下大夫曰寡大夫凡執幣者不趨容彌蹙以為儀鄭注不趨主慎也以進而益恭為威儀耳今文無容執玉者則惟舒武舉前曳踵鄭注惟舒武者案各本脫武字據經文補重玉器尤慎也武迹也舉前曳踵備􅠶跲也今文無者古文曳作抴釋曰踵足後跟也曳行不離地玉藻曰執龜玉舉前曳踵蹜蹜如也凡自稱于君上大夫則曰下臣案上字唐石經摩滅各本訛作士今考疏云玉藻上大夫曰下臣與此同也經文作上大夫明矣宅者在邦則曰市井之臣在野則曰草茅之臣庶人則曰刺草之臣他國之人則曰外臣案前云非以君命使則不稱寡大夫寡君之老當在此下錯簡已久鄭注宅者謂致仕者也致仕者案今注疏本脫此四字去官而居宅或在國中或在野周禮載師之職以宅田任近郊之地刺猶剗除也案此五字今注疏本在下古文茅作苗之下今文宅為託案宅下今注疏本衍或字古文茅作苗釋曰孟子曰在國曰市井之臣在野曰草莽之臣皆謂庶人與此異
