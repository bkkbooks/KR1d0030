body:
  text: 儀禮集釋卷十一宋李如圭撰聘禮第八鄭目録云大問曰聘諸侯相於久無事使卿相問之禮也案今注疏本脫也字小聘使大夫周禮曰凡諸侯之邦交嵗相問也殷相聘也世相朝也聘於五禮屬賓禮案今注疏本脱聘字大戴第十四小戴第十五别録第八聘禮君與卿圖事鄭注圖謀也謀聘故及可使者謀事者必因朝其位君南面卿西面大夫北面士東面釋曰此朝位路寢門外正朝之面位也諸侯三朝燕朝見燕禮射朝見大射儀正朝面位當與燕射同遂命使者鄭注遂猶因也既謀其人因命之也聘使卿使者再拜稽首辭鄭注辭以不敏君不許乃退鄭注退反位也受命者必進釋曰進違其位近君既圖事戒上介亦如之鄭注既已也戒猶命也已謀事乃命上介難于使者易于介釋曰介副也上介使大夫宰命司馬戒衆介衆介皆逆命不辭鄭注宰上卿貳君事者也諸侯謂司徒為大宰案今注疏本脱大字衆介者士也士屬司馬周禮司馬之屬司士掌作士適四方使為介逆猶受也釋曰不辭者賤不敢辭天子有六卿諸侯兼官并六卿為三司徒兼宰司馬兼宗伯司空兼司冦春秋傳季孫為司徒叔孫為司馬仲孫為司空是其事宰書幣鄭注書聘所用幣多少也宰又掌制國之用命宰夫官具鄭注宰夫大宰之屬也案各本脱大字據釋文補正命之使衆官具幣及所宜齎及期夕幣鄭注及猶至也夕幣先行之日夕陳幣而視之重聘也使者朝服帥衆介夕鄭注視其事也古文帥皆作率管人布幕于寢門外鄭注管猶館也館人謂掌次舍帷幕者也布幕以承幣寢門外朝也古文管作官今文布作敷釋曰布幕于地陳幣于上官陳幣皮北首西上加其奉于左皮上馬則北面奠幣于其前鄭注奉所奉以致命謂束帛及𤣥纁也馬言則者此享主用皮或時用馬馬入則在幕南皮馬皆乗古文奉為卷今文無則釋曰官陳幣者官具之官也左皮西上者也物四曰乗賓覿用乗馬禮玉用乗皮知享亦用乗使者北面衆介立于其左東上鄭注既受行同位也位在幕南釋曰在幕南北面視幣也未受命之時卿大夫士面位各異東上統于君卿大夫在幕東西面北上鄭注大夫西面辟使者宰入告具于君君朝服出門左南鄉鄭注入告入路門而告釋曰出門而左君位在東也史讀書展幣鄭注展猶校録也史幕東西面讀書賈人坐撫其幣每者曰在必西面者欲君與使者俱見之也宰執書告備具于君授使者使者受書授上介鄭注史展幣畢以書還授宰宰既告備以授使者其受授皆北面釋曰下文宰授使者圭授受同面公揖入鄭注揖禮羣臣官載其幣舍于朝鄭注待旦行也釋曰官從行之官入竟展幣之有司是也上介視載者鄭注監其安處之畢乃出所受書以行鄭注為當復展厥明賓朝服釋幣于禰鄭注告為君使也賓使者謂之賓尊之也天子諸侯將出告羣庿大夫告禰而已凡釋幣設洗盥如祭有司筵几于室中祝先入主人從入主人在右再拜祝告又再拜鄭注更云主人者庿中之稱也祝告告以主人將行也釋幣制𤣥纁束奠于几下出鄭注祝視之也凡物十曰束𤣥纁之率𤣥居三纁居二朝貢禮云純四只制丈八尺主人立于户東祝立于牖西鄭注少頃之間示有俟于神又入取幣降卷幣實于笲埋于西階東鄭注又入者祝也埋幣必盛以器若藏之然釋曰笲竹器又釋幣于行鄭注告將行也行者之先其古人之名未聞天子諸侯有常祀在冬大夫三祀曰門曰行曰厲喪禮有毁宗躐行出于大門則行神之位在庿門外西方不言埋幣可知也今時民春秋祭祀有行神古之遺禮乎遂受命鄭注賓須介來乃受命也言遂者明自是出不復入上介釋幣亦如之鄭注如其于禰與行上介及衆介俟于使者之門外鄭注俟待也待于門外東面北上使者載旜帥以受命于朝鄭注旜旌旗屬也載之者所以表識其事也周禮曰通帛為旜又曰孤卿建旜至于朝門使者北面東上古文旜皆為膳釋曰旜通以絳帛為之無他色之飾所謂周之大赤也北面東上展幣之位君朝服南鄉卿大夫西面北上君使卿進使者鄭注進之者使者謙不敢必君之終使已使者入及衆介隨入北面東上君揖使者進之上介立于其左接聞命鄭注進之者有命宜相近也接猶續也釋曰近附近之近後猶近近君相近同賈人西面坐啟櫝取圭垂繅不起而授宰鄭注賈人在官知物賈者繅所以藉圭也其或拜則奠于其上今文繅作璪釋曰櫝函也論語曰龜玉毁于櫝中繅者以韋衣木畫以雜采以之薦玉廣袤各如其玉之大小又以五綵組繋焉有事則組或垂或屈之垂者垂之向下屈者屈之于手凡言屈垂者皆據組而言宰執圭屈繅自公左授使者鄭注屈繅者斂之禮以相變為敬也自公左贊幣之義使者受圭同面垂繅以受命鄭注同面者宰就使者北面竝授之既授之而君出命矣凡授受者授由其右受由其左既述命同面授上介鄭注述命者循君之言重失誤上介受圭屈繅出授賈人衆介不從鄭注賈人將行者在門外北面釋曰如使者門外之位也出玉命賈人之留者受享束帛加璧受夫人之聘璋享𤣥纁束帛加琮皆如初鄭注享獻也既聘又獻所以厚恩惠也帛今之璧色繒也夫人亦有聘享者以其與已同體為國小君也其聘用璋取其半圭也君享用璧夫人用琮天地妃合之道也圭璋特達瑞也璧琮有加往徳也周禮曰瑑圭璋璧琮以頫聘釋曰琮半璧也前夕幣時束帛𤣥纁已陳矣至此乃受所加之璧琮者以其與圭璋同𩔖尊之也圭璋不用束帛特達也璧琮則加束帛乃達君子于玉比徳故聘享以玉致之所謂往徳也周禮幣放其器之色此束帛當如其璧之色未知璧用何色耳凡聘享之圭璋璧琮皆降于君所執朝享者一等其文瑑之而已遂行舎于郊鄭注于此脱舎衣服乃即道也曲禮曰凡為君使已受命君言不宿于家斂旜鄭注此行道耳未有事也斂藏也若過邦至于竟使次介假道束帛將命于朝曰請帥奠幣鄭注至竟而假道諸侯以國為家不敢直徑也將猶奉也帥猶道也請道己道路所當由釋曰春秋𫝊楚子使申舟聘于齊曰無假道于宋宋殺申舟下大夫取以入告出許遂受幣鄭注言遂者明受其幣非為許故也容其辭讓不得命也釋曰言遂者容其中有辭讓之節非為許之而受其幣餼之以其禮上賓大牢積惟芻禾介皆有餼鄭注凡賜人以牲生曰餼餼猶稟也給也以其禮者尊卑有常差也常差者上賓上介牲用大牢羣介用少牢米皆百筥牲陳于門内之西北面米設于中庭上賓上介致之以束帛羣介則牽羊焉上賓有禾十車芻二十車禾以秣馬釋曰鄭所云者雜約主國致饔餼上賓上介羣介米皆百筥上賓上介牲陳于門内之西北面米設于中庭用束帛致之大夫餼賓羣介則牽羊以致之凡禾牢十車此餼一牢故禾十車芻倍禾故芻二十車也言積惟芻禾則無車米與薪且獨上賓有之耳士帥沒其竟鄭注沒盡誓于其竟賓南面上介西面衆介北面東上史讀書司馬執筴立于其後鄭注此使次介假道止而誓也賓南面專威信也史于衆介之前北面讀書以勅告士衆為其犯禮暴掠也禮君行師從卿行旅從司馬主軍法者執筴示罰未入竟一肄案一今注疏本作壹鄭注謂于所聘之國竟也肄習也習聘之威儀重失誤為壝壇畫階帷其北無宫鄭注壝土象壇也帷其北宜有所鄉依也不宫不壝土畫外垣也朝服無主無執也鄭注不立主人主人尊也不執玉不敢䙝也徒習其威儀而已介皆與北面西上鄭注入門左之位也古文與作豫釋曰賓行聘時介止于門左北面西上然則所習者習庿門内之禮習享士執庭實鄭注士士介也庭實必執之者皮則有攝張之節習夫人之聘享亦如之習公事不習私事鄭注公事致命者也釋曰聘享夫人之聘享問卿公事也私覿私面私事也及竟張旜誓鄭注及至也張旜明事在此國也張旜謂使人維之釋曰維持其旒也乃謁闗人鄭注謁告也古者竟上為闗以幾異服識異言釋曰國語曰周之秩官有之敵國賓至闗尹以告行理以節逆之闗人問從者幾人鄭注欲知聘問且為有司當共委積之具以介對鄭注以所與受命者對謙也聘禮上公之使者七介侯伯之使者五介子男之使者三介以其代君交于列國是以貴之周禮曰凡諸侯之卿其禮各下其君二等釋曰大行人職上公介九人侯伯七人子男五人君使士請事遂以入竟鄭注請猶問也問所為來之故也遂以入因道之釋曰春秋傳晉韓宣子聘于周王使請事對曰晉士起將歸時事於宰旅無他事矣此其對辭入竟斂旜乃展鄭注復校録幣重其事斂旜變于始入布幕賓朝服立于幕東西面介皆北面東上賈人北面坐拭圭鄭注拭清也側幕而坐乃開櫝釋曰賓誓則南面專衆也展幣則西面將命也遂執展之鄭注持之而立告在上介北面視之退復位鄭注言退復位則視圭進違位退圭鄭注圭璋尊不陳之陳皮北首西上又拭璧展之㑹諸其幣加于左皮上上介視之退鄭注㑹合也諸於也古文曰陳幣北首釋曰幣束帛也享用束帛加璧故今亦合而陳之小行人職合六幣璧以帛琮以錦馬則幕南北面奠幣于其前鄭注前當前幕上展夫人之聘享亦如之賈人告于上介上介告于賓鄭注展夫人聘享上介不視貶于君也賈人既拭璋琮南面告于上介上介于是乃東面以告賓亦所謂放而文之𩔖有司展羣幣以告鄭注羣幣私覿及大夫者有司載幣者自展自告及郊又展如初鄭注郊逺郊也周制天子畿内千里逺郊百里以此差之逺郊上公五十里侯伯三十里子男十里案此下今注疏本有也字近郊各半之釋曰各以其國封疆十之一差去國之數為逺郊也周禮諸公封疆方五百里諸侯方四百里伯三百里子二百里男百里周東郊成周去王城五十里則天子近郊也及館展幣于賈人之館如初鄭注館舎也逺郊之内有侯館可以小休止沐浴展幣不于賓館者為主國之人有勞問已者就焉便疾也賓至于近郊張旜君使下大夫請行反君使卿朝服用束帛勞鄭注請行問所之也雖知之謙不必也士請事大夫請行卿勞彌尊賓也其服皆朝服上介出請入告賓禮辭迎于舍門之外再拜鄭注出請出門西面請所以來事也入告入北面告賓也每所及至皆有舎其有來者與案原本脱與字據今注疏本補釋文云者與音餘可證當有與字皆出請入告于此言之者賓彌尊事彌録釋曰春秋傳魯叔弓聘於晉晉侯使郊勞辭曰寡君使弓來繼舊好固曰女無敢為賓敢辱郊使致館辭曰敢辱大館勞者不荅拜鄭注凡為人使不當其禮賓揖先入受于舎門内鄭注不受于堂此主于侯伯之臣也公之臣受勞于堂釋曰案司儀職云諸公之臣相為國客大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受儐使者如初之儀及退拜送言登聽命則公之臣受勞于堂也侯伯之使者五介此禮有上介及士介四人知主于侯伯之臣勞者奉幣入東面致命鄭注東面鄉賓賓北面聽命還少退再拜稽首受幣勞者出鄭注北面聽命若君南面然少退象降拜釋曰勞者授幣當南面賓北面訝受之凡卑者訝受敵者竝受授老幣鄭注老賓之臣出迎勞者鄭注欲儐之也案今注疏本脱也字釋曰儐以禮報賓也勞者禮辭賓揖先入勞者從之乗皮設鄭注設于門内也物四曰乗皮麋鹿皮也賓用束錦儐勞者鄭注言儐者賓在公館如家之義亦以來者為賓勞者再拜稽首受鄭注稽首尊國賓也釋曰稽首拜之重者賓再拜稽首送幣鄭注受送拜皆北面象階上釋曰若鄉飲酒賓受爵主人送爵各拜于其階上北面也勞者揖皮出乃退賓送再拜鄭注揖皮出東面揖執皮者而出釋曰揖執皮者若親受之然執皮者從之出勞者之從者訝受之夫人使下大夫勞以二竹簋方案簋今注疏本從釋文改作簠唐石經作簋據注當以作簋為正𤣥被纁裏有葢鄭注竹簋方者器名也以竹為之狀如簋而方如今寒具筥筥者圜此方耳釋曰大夫對卿為下大夫夫人使下大夫勞降于君也被表也𤣥被纁裏竹簋方之衣也簋或作簠其實棗蒸栗擇兼執之以進鄭注兼猶兩也右手執棗左手執栗釋曰考工記案十有二寸棗栗十有二列諸侯純九大夫純五夫人以勞諸侯賓受棗大夫二手授栗鄭注受授不游手慎之也賓之受如初禮鄭注如卿勞之儀儐之如初下大夫勞者遂以賓入鄭注出以束錦授從者因東面釋辭請導之以入然則賓送不拜至于朝主人曰不腆先君之祧既拚以俟矣鄭注賓至外門下大夫入告出釋此辭主人者公也不言公而言主人主人接賔之辭明至欲受之不敢稽賓也腆猶善也遷主所在曰祧周禮天子七庿文武為祧諸侯五庿則祧始祖也是亦庿也言祧者祧尊而庿親待賓客者上尊者釋曰至于朝者大門外之朝也國君三門臯應路内朝在路寢正朝在路門外外朝當在臯門外此朝則臯門外之外朝也拚洒掃也于太祖庿受聘享于禰庿饗食賓燕又在寢彌相親賓曰俟閒鄭注賓之意不欲奄卒主人也且以道路悠逺欲沐浴齊戒俟閒未敢聞命大夫帥至于館卿致館鄭注致至也賓至此館主人以上卿禮致之所以安之也釋曰致館則以束帛致之可知賓迎再拜卿致命賓再拜稽首卿退賓送再拜鄭注卿不俟設飧之畢以不用束帛致故也不用束帛致之者明為新至非大禮也宰夫朝服設飧鄭注食不備禮曰飧詩云不素飱兮春秋傳曰方食魚飧皆謂是飪一牢在西鼎九羞鼎三腥一牢在東鼎七鄭注中庭之饌也飪熟也熟在西腥在東象春秋也鼎西九東七凡其鼎實與其陳如陳饔餼羞鼎則陪鼎也以其實言之則曰羞以其陳言之則曰陪釋曰鼎九者牛羊豕魚腊腸胃膚鮮魚鮮腊也鼎七者無鮮魚鮮腊羞鼎三膷臐膮也以其列於庶羞故謂之羞鼎掌客職曰饔餼死牢如飧之陳饔飧之陳見下春秋傳曰宴有好貨飧有陪鼎堂上之饌八西夾六鄭注八六者豆數也凡饌以豆為本堂上八豆八簋六鉶兩簠八壺西夾六豆六簋四鉶兩簠六壺其實與其陳亦如饔餼釋曰凡饌皆先設豆故舉豆數以見其餘也此堂上及西夾之饌皆與饔餼同門外米禾皆二十車案二十唐石經作廿鄭注禾稾實并刈者也諸侯之禮車米視生牢禾視死牢牢十車大夫之禮皆視死牢而已雖有生牢不取數焉米陳門東禾陳門西釋曰周禮大夫之車米禾無文此飧禮死牢二而米禾皆二十車饔餼生牢二死牢三而米禾皆三十車知惟視死牢不取于牢之數稾古老反刈魚廢反薪芻倍禾鄭注各四十車凡此之陳亦如饔餼上介飪一牢在西鼎七羞鼎三堂上之饌六門外米禾皆十車薪芻倍禾鄭注西鼎七無鮮魚鮮腊釋曰鼎七者賓腥鼎之數堂上之饌亦與賓西夾同西夾無饌衆介皆少牢鄭注亦飪在西鼎五羊豕腸胃魚腊新至尚熟堂上之饌四豆四簋兩鉶四壺無簠釋曰承上文飪知衆介亦飪也歸餼則衆介無飪少牢饋食禮五鼎此少牢故亦五鼎彼有膚無腸胃此有腸胃無膚生人食與祭異也凡降殺以兩簠盛稻粱大夫常食故上介亦有之至士介而無簠厥明訝賓于館鄭注此訝下大夫也以君命迎賓謂之訝訝迎也亦皮弁賓皮弁聘至于朝賓入于次鄭注服皮弁者朝聘主相尊敬也諸侯視朔皮弁服入于次者俟辨也次在大門外之西以帷為之乃陳幣鄭注有司入于主國庿門外以布幕陳幣如展幣焉圭璋賈人執櫝而俟卿為上擯大夫為承擯士為紹擯擯者出請事鄭注擯謂主國之君所使出接賓者也案謂今注疏本訛作為紹繼也其位相承繼而出也主君公也則擯者五人侯伯也則擯者四人子男也則擯者三人聘義曰介紹而傳命君子於其所尊不敢質敬之至也既知其所為來之事復請之者賓來當與主君為禮為其謙不敢斥尊者啟發以進之於是時賓出次直闑西北面上擯在闑東閾外西面其相去也公之使者七十步侯伯之使者五十步子男之使者三十步此旅擯耳不傳命上介在賓西北東面承擯在上擯東南西面各自次序而下末介末擯旁相去三丈六尺上擯之請事進南面揖賓俱前賓至末介上擯至末擯亦相去三丈六尺止揖而請事還入告于公天子諸侯朝覲乃命介紹傳命耳其儀各鄉本受命反面傳而下及末則鄉受之案鄉今注疏本訛作卿反面傳而上又受命傳而下亦如之此三丈六尺者門容二徹參个旁加各一步也今文無擯釋曰案大行人上公之禮朝位賓主之間九十步侯伯七十步子男五十步卿禮各下其君二等上公擯者五人侯伯四人子男三人諸侯自相待擯數無文鄭據天子待己擯數以為己國待賓之擯數也其四四人五人者皆取士以足之傳命者上擯入受命出傳之承擯承擯傳之末擯末介於末擯受命傳之次介次介傳之上介上介傳于賓又發賓傳于主君是之謂交擯傳命旅擯者旅陳也不傳辭陳擯介耳時主君在門内南面上擯入北鄉受命出南面遥揖賓使前擯者南行至末擯南西面賓北行至末介北東面相去三丈六尺乃請所為來之事二徹參个者二徹之内八尺也參个二丈四尺傳丈專反所為為其于偽反下為其為温賓為同公皮弁迎賓于大門内大夫納賓鄭注公不出大門降于待其君也大夫上擯也謂之大夫者上序可知從大夫總無所别也于是賓主人皆裼釋曰皮弁服十五升布衣而素裳白舄臣用白屨案司儀職云諸侯相為賓及將幣交擯三辭車逆拜辱賓車進荅拜三揖三讓而入門聘禮迎賓于大門内而已納大夫者實卿而曰大夫者卿總言之則亦曰大夫也賓主人皆裼未執玉尚文飾也袒上服見裏衣曰裼賓入門左鄭注由賓位也衆介隨入北面西上少退擯者亦入門而右北面東上上擯進相君釋曰擯介面位與下入庿門之位同相息亮反後擯相相公相幣相拜相者相贊同公再拜鄭注南面拜迎賓辟不荅拜鄭注辟位逡遁不敢當其禮釋曰辟者主國君尊也司儀職曰諸臣將幣旅擯三辭拜迎客辟公揖入每門每曲揖鄭注每門輒揖者以相人偶為敬也凡君與賓入門賓必後君介及擯者隨之竝而鴈行既入則或左或右相去如初玉藻曰君入門介拂闑大夫中棖與闑之間士介拂棖賓入不中門不履閾此賓謂聘卿大夫也門中門之正也不敢與君竝由之敬也介與擯者鴈行卑不踰尊者之迹亦敬也賓之介猶主人之擯及庿門案庿各本竝作廟據唐石經及繹文訂正公揖入立于中庭鄭注公揖先入省内事也既則立于中庭以俟賓不復出如此得君行一臣行二于禮可矣公迎賓于大門内卿大夫以下入庿門即位而俟之釋曰諸侯三門應門為中門應門之外左宗庿右社稷入大門東行即至庿門而其間有每門者庿前之兩旁隔牆門也諸侯五庿太祖之庿居中二昭居東二穆居西庿之兩旁皆有隔牆牆皆通門自大門内至太祖庿經三隔牆之門乃至故曰每門也凡門之中央所豎短木謂之闑門之兩旁長木謂之棖棖闑之間謂之中門兩君相見主東賓西各由中門而入擯介隨之鴈行參差于其後上擯近西上介近東而拂闑大夫直君之後士介拂棖聘賓入門還依為君介時近東而拂闑不敢中門也既入則擯者右賓介左相去亦三丈六尺賓立接西塾鄭注接猶近也門側之堂謂之塾立近塾者已與主君交禮將有出命俟之于此介在幣南北面西上上擯亦隨公入門東東上少進于士釋曰曲禮曰客至於寢門則主人請入為席然後出迎客卿大夫先即位者于外無事几筵既設擯者出請命鄭注有几筵者以其庿受宜依神也賓至庿門司宫乃于依前設之神尊不豫事也席西上上擯待而出請受賓所以來之命重停賓也至此言命事彌至言彌信也周禮諸侯祭祀席蒲筵繢純右彫几釋曰士入竟展幣時賓西面介北面東上統于賓此陳幣時賓在門西東面明介統于賓西上也下文介入門左北面西上知上擯之入當門東東上公食大夫禮士立于門東北面西上卿尊于士故少進也賈人東面坐啟櫝取圭垂繅不起而授上介鄭注賈人曏入陳幣東面俟案曏原本作鄉據今注疏本改正釋文曏許亮反張淳儀禮識誤云對鄉之鄉從鄉曩曏之曏加曰此曩曏之曏也宜加日于此言之就有事也授圭不起賤不與為禮也不言裼襲者賤不裼也繅有組繫也上介不襲執圭屈繅授賓鄭注上介北面受圭進西面授賓不襲者以盛禮不在于己也屈繅并持之也曲禮曰執玉其有藉者則裼無藉者則襲釋曰藉者薦也圭璋特達無藉也璧琮加于束帛有藉也襲者禮至敬尚質裼者禮差輕尚文賓執玉公受玉皆襲所謂無藉者則襲賓出公裼降立賓裼奉束帛加璧享所謂有藉者則裼若據繅藉而言則垂繅為有藉屈繅為無藉上介受賈人圭垂繅而不襲亦謂之有藉則裼賓受上介圭公受賓圭皆屈繅亦謂之無藉則襲凡享玉既藉以束帛不復用繅藉也賓襲執圭鄭注執圭盛禮而又盡飾為其相蔽敬也玉藻曰服之襲也充美也是故尸襲執玉龜襲也擯者入告出辭玉鄭注擯者上擯也入告公以賓執圭將致其聘命圭贄之重者辭之亦所以致尊讓也納賓賓入門左鄭注公事自闑西介皆入門左北面西上鄭注隨賓入也介無事止于此今文無門三揖鄭注君與賓也入門將曲揖既曲北面又揖當碑揖釋曰公在中庭參分庭一在南南面再揖賓乃東鄉堂塗北行當碑又揖至于階三讓鄭注讓升公升二等鄭注先賓升二等亦欲君行一臣行二釋曰春秋傳衞孫文子來聘公登亦登叔孫穆子相趨進曰諸侯之㑹寡君未嘗後衞君今吾子不後寡君寡君未知所過吾子其少安此文子之悖禮賓升西楹西東面鄭注與主君相鄉擯者退中庭鄭注曏公所立處案曏各本作鄉今從釋文及張淳儀禮識誤訂正退者以公宜親受賓命不用擯相也釋曰中庭即公揖入所立之處賓致命鄭注致其君之命也公左還北鄉鄭注當拜擯者進鄭注進阼階西釋辭于賓相公拜也公當􅎝再拜鄭注拜貺也貺惠賜也􅎝謂之梁釋曰拜拜受玉聘義曰聘禮上公七介侯伯五介子男三介所以明貴賤也介紹而傳命君子於其所尊弗敢質敬之至也三讓而后傳命三讓而后入廟門三揖而后至階三讓而後升所以致尊讓也君使士迎于竟大夫郊勞君親拜迎于大門之内而廟受北面拜貺拜君命之辱所以致敬也敬讓也者君子之所以相接也故諸侯相接以敬讓則不相侵陵賓三退負序鄭注三退三逡遁也不言辟者以執圭將進授之釋曰序西序司儀職曰拜客三辟凡為人使者不荅拜公側襲受玉于中堂與東楹之間鄭注側猶獨也言獨見其尊賓也佗日公有事必有贊為之者凡襲于隱者公序坫之間可知也中堂南北之中也入堂深尊賓事也東楹之間亦以君行一臣行二釋曰受玉于中堂東楹二者之間也中堂堂東西之中也是為兩楹間凡敵者受玉于兩楹間聘賓與主君非敵故進東近主君受玉于中堂與東楹之間也下賓覿受幣當東楹覿私事賓又宜近東而當東楹則此受玉在東楹之西明矣賈氏据鄭以中堂為南北之中意以東楹間為東楹之東若然則賓覿受幣不得反當東楹也又凡升堂皆當􅎝昬禮成當阿當南北之中在楣與阿之間亦非例也大射儀小臣正贊公襲士喪禮主人襲于序東擯者退負東塾而立鄭注反其等位無事釋曰等位承擯以下門東之位賓降介逆出鄭注逆出由便釋曰賓不拜送玉者為君使也逆出後入者先出賓出鄭注聘事畢公側授宰玉鄭注使藏之授于序端裼降立鄭注裼者免上衣見裼衣凡當盛禮者以充美為敬非盛禮者以見美為敬禮尚相變也玉藻曰裘之裼也見美也又曰麛裘青豻褎絞衣以裼之論語曰素衣麛裘皮弁時或素衣其裘同可知也裘者為温表之為其䙝也寒暑之服冬則裘夏則葛凡襢裼者左降立俟享也亦于中庭古文裼皆作賜釋曰凡裘䙝必有衣以覆之使之可裼也裼衣皆象其上服與裘之色冬裘上有裼衣夏衣絺綌春秋衣祫褶袷褶上有中衣裼衣中衣之上有上服凡以禮事者袒左士喪禮主人亦左袒惟覲禮侯氏右肉袒聽刑故也擯者出請鄭注不必賓事之有無賓裼奉束帛加璧享擯者入告出許鄭注許受之庭實皮則攝之毛在内内攝之入設也鄭注皮虎豹之皮攝之者右手并執前足左手并執後足毛在内不欲文之豫見也内攝之者兩手相鄉也入設亦參分庭一在南言則者或以馬也案今注疏本脱也字凡君于臣臣于君麋鹿皮可也釋曰皮右首言也者節賓入也賓入門左揖讓如初升致命張皮鄭注張者釋外足見文也公再拜受幣士受皮者自後右客鄭注自由也從東方來由客後西居其左受皮也執皮者既授亦自前西而出賓出當之坐攝之鄭注象受于賓釋曰司儀職曰客授幣下出公側授宰幣皮如入右首而東鄭注如入左在前皮右首者變于生也釋曰下記曰凡庭實隨入左先皮在庭西上居左首先入也曲禮曰執禽者左首昬禮記納徵執皮攝之内文兼執足左首隨入西上參分庭一在南賓致命釋外足見文主人受幣士受皮者自東出于後自左受遂坐攝皮逆退適東壁與此禮同惟左首逆退為異耳聘于夫人用璋享用琮如初禮鄭注如公立于中庭以下若有言則以束帛如享禮鄭注有言有所告請若有所問也記曰有故則束帛加書以將命春秋臧孫辰告糴于齊公子遂如楚乞師晉侯使韓穿來言汶陽之田皆是也無庭實也釋曰司儀職云每事如初之儀
