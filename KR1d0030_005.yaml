body:
  text: 儀禮集釋卷五宋李如圭撰鄉射禮第五鄭目録云州長春秋以禮㑹民而射于州序之禮謂之鄉者州鄉之屬鄉大夫或在焉不改其禮射禮于五禮屬嘉禮大戴十一小戴及别録皆第五鄉射之禮主人戒賓賓出迎再拜主人答再拜乃請鄭注主人州長也鄉大夫若左焉則稱鄉大夫也戒猶警也語也出迎出門也請告也告賓以射事不言拜辱者案今注疏本脫者字據宋本補此為習民以禮樂不主為賓已也不謀賓者時不獻賢能事輕也今郡國行此禮以季春周禮鄉老及鄉大夫三年正月獻賢能之書于王退而以鄉射之禮五物詢衆庶諸侯之鄉大夫既貢士于其君亦用此禮射而詢衆庶乎賓禮辭許主人再拜賓答再拜主人退賓送再拜鄭注退還射宫省録射事無介鄭注雖先飲酒主于射也其序賓之禮略乃席賓南面東上鄭注不言于户牖之間者此射于序衆賓之席繼而西鄭注言繼者甫欲習衆庶未有所殊别席主人于阼階上西面鄭注阼階東階尊于賓席之東兩壺斯禁左𤣥酒皆加勺篚在其南東肆鄭注斯禁禁切地無足者也設尊者北面西曰左尚之也肆陳也設洗于阼階東南南北以堂深東西當東榮水在洗東篚在洗西南肆鄭注榮屋翼也縣于洗東北西面鄭注此縣謂磬也縣于東方辟射位也但縣磬者半天子之士無鍾乃張侯下綱不及地武鄭注侯謂所射布也綱持舌繩也武迹也中人之迹尺二寸侯𧰼人綱即其足也是以取數焉不繫左下綱中掩束之鄭注事未至也乏參侯道居侯黨之一西五步鄭注容謂之乏所以為獲者御矢也侯道五十步此乏去侯北十丈西三丈羮定鄭注肉謂之羮定猶孰也案孰從宋本今注疏本作熟下同謂狗孰可食主人朝服乃速賓賓朝服出迎再拜主人答再拜退賓送再拜鄭注速召也射賓輕也戒時𤣥端今郡國行此鄉射禮皮辨服與禮為異賓及衆賓遂從之及門主人一相出迎于門外再拜賓答再拜鄭注相主人家臣擯贊傳命者揖衆賓鄭注差卑禮宜異主人以賓揖先入鄭注以猶與也先入入門右西面賓厭衆賓衆賓皆入門左東面北上賓少進鄭注引手曰厭少進差在前也今文皆曰揖衆賓主人以賓三揖皆行及階三讓主人升一等賓升鄭注三讓而主人先升者是主人先讓于賓不俱升者賓客之道進宜難也主人阼階上當􅎝北面再拜賓西階上當􅎝北面答再拜鄭注主人拜賓至此堂主人坐取爵于上篚以降鄭注將獻賓也賓降鄭注從主人也主人阼階前西面坐奠爵興辭降鄭注重以主人事煩賓也今文無阼階賓對鄭注對答主人坐取爵興適洗南面坐奠爵于篚下盥洗鄭注盥手乃洗爵案乃今注疏本訛作又從宋本改致潔敬也古文盥皆作浣賓進東北面辭洗鄭注必進者方辭洗宜違其位也案今注疏本脫其字據宋本補又鄉飲酒禮疏引此注亦有其字言東北面則位南于洗矣主人坐奠爵于篚興對賓反位鄭注反從降之位也鄉飲酒曰當西序東面主人卒洗一揖一讓以賓升賓西階上北面拜洗主人阼階上北面奠爵遂答拜乃降鄭注乃降將更盥也古文一皆作一賓降主人辭降賓對主人卒盥一揖一讓升賓升西階上疑立鄭注疑止也有矜莊之色主人坐取爵實之賓之席前案唐石經作賓席之前據鄉飲酒禮亦言實之賓之席前其餘經文稱某之席前者甚多絶不云席之前當是石經誤倒西北面獻賓鄭注進酒于賓也案今注疏本脫酒字據宋本補凡進物曰獻賓西階上北面拜主人少退鄭注少退猶少辟也賓進受爵于席前復位鄭注復位西階上位主人阼階上拜送爵賓少退薦脯醢鄭注薦進賓升席自西方鄭注賓升降由下也乃設折俎鄭注牲體枝解節折以實俎也主人阼階東疑立賓坐左執爵右祭脯醢奠爵于薦西興取肺坐絶祭鄭注卻左手執本右手絶末以祭也肺離上為本下為末尚左手嚌之興加于俎坐捝手執爵遂祭酒興席末坐啐酒鄭注捝拭也啐嘗也古文捝作帨案帨今注疏本訛作說據宋本改降席坐奠爵拜告旨鄭注降席席西也旨美也執爵興主人阼階上答拜賓西階上北面坐卒爵興坐奠爵遂拜執爵興鄭注卒盡主人阼階上答拜賓以虛爵降鄭注將洗以酢主人主人降鄭注從賓也降立阼階東西面當東序賓西階前東面坐奠爵興辭降主人對賓坐取爵適洗北面坐奠爵于篚下興盥洗鄭注賓北面盥洗自外來主人阼階之東南面辭洗賓坐奠爵于篚興對主人反位鄭注反位從降之位也主人辭洗進案此下今注疏本衍也字據宋本刪賓卒洗揖讓如初升主人拜洗賓答拜興降盥如主人之禮賓升實爵主人之席前東南面酢主人鄭注酢報主人阼階上拜賓少退主人進受爵復位賓西階上拜送爵薦脯醢主人升席自北方乃設折俎祭如賓禮鄭注祭薦俎及酒亦嚌啐不告旨鄭注酒已物自席前適阼階上北面坐卒爵興坐奠爵遂拜執爵興賓西階上北面答拜鄭注自由也啐酒于席末由前降便也主人坐奠爵于序端阼階上再拜崇酒賓西階上答再拜鄭注序端東序頭也崇充也謝酒惡相充滿也主人坐取觶于篚以降鄭注將酬賓賓降主人奠觶辭降賓對東面立主人坐取觶洗賓不辭洗鄭注不辭洗以其將自飲卒洗揖讓升賓西階上疑立主人實觶酬之阼階上北面坐奠觶遂拜執觶興鄭注酬勸酒賓西階上北面答拜主人坐祭遂飲卒觶興坐奠觶遂拜執觶興賓西階上北面答拜主人降洗賓降辭如獻禮鄭注以將酌己升不拜洗鄭注酬禮殺也賓西階上立主人實觶賓之席前北面鄭注酬賓賓西階上拜主人坐奠觶于薦西賓辭坐取觶以興反位鄭注賓辭辭主人復親酌己主人阼階上拜送賓北面坐奠觶于薦東反位鄭注酬酒不舉主人揖降賓降東面立于西階西當西序鄭注主人將與衆賓為禮賓謙不敢獨居堂主人西南面三拜衆賓衆賓皆答一拜鄭注三拜示遍也一拜不備禮也獻賓畢乃與衆賓拜敬不能竝主人揖升坐取爵于序端降洗升實爵西階上獻衆賓衆賓之長升拜受者三人鄭注長其老者言三人則衆賓多矣國以多德行道藝為榮何常數之有乎主人拜送鄭注拜送爵于衆賓右坐祭立飲不拜既爵授主人爵降復位鄭注既盡衆賓皆不拜受爵坐祭立飲鄭注自第四以下又不拜受爵禮彌略每一人獻則薦諸其席鄭注諸於衆賓辨有脯醢鄭注薦于其位主人以虛爵降奠于篚鄭注不復用揖讓升賓厭衆賓升衆賓皆升就席一人洗舉觶于賓鄭注一人主人之吏升實觶西階上坐奠觶拜執觶興賓席末答拜舉觶者坐祭遂飲卒觶興坐奠觶拜執觶興賓答拜降洗升實之西階上北面鄭注將進奠觶賓拜鄭注拜受觶舉觶者進坐奠觶于薦西鄭注不授賤不敢也賓辭坐取以興鄭注若親受然舉觶者西階上拜送賓反奠于其所舉觶者降大夫若有遵者則入門左鄭注謂此鄉之人為大夫者也謂之遵者方以禮樂化民欲其遵法之也其士也于旅乃入卿大夫士非鄉人禮亦然主于鄉人耳今文遵為僎主人降鄭注迎大夫于門內也不出門别于賓賓及衆賓皆降復初位鄭注不敢居堂俟大夫入也初位門內東面主人揖讓以大夫升拜至大夫答拜主人以爵降大夫降主人辭降大夫辭洗如賓禮席于尊東鄭注尊東明與賓夾尊也不言東上統于尊也升不拜洗主人實爵席前獻于大夫大夫西階上拜進受爵反位主人大夫之右拜送大夫辭加席主人對不去加席鄭注辭之者謙不敢以已尊加賢者也案今注疏本脫敢字據宋本補考疏內引注文亦有敢字不去者大夫再重席正也賓一重席乃薦脯醢大夫升席設折俎祭如賓禮不嚌肺不啐酒不告旨西階上卒爵拜主人答拜鄭注凡所不者殺于賓也大夫升席由東方大夫降洗鄭注將酢主人也大夫若衆則辨獻長乃酢主人復阼階降辭如初卒洗主人盥鄭注盥者雖將酌自飲尊大夫不敢䙝揖讓升大夫授主人爵于兩楹間復位主人實爵以酢于西階上坐奠爵拜大夫答拜坐祭卒爵拜大夫答拜主人坐奠爵于西楹南再拜崇酒大夫答拜主人復阼階揖降鄭注將升賓大夫降立于賓南鄭注雖尊不奪人之正禮主人揖讓以賓升大夫及衆賓皆升就席席工于西階上少東樂正先升北面立于其西鄭注言少東者明樂正西側階不欲大東辟射位工四人二瑟瑟先相者皆左何瑟面鼓執越內弦右手相入升自西階北面東上工坐相者坐授瑟乃降鄭注瑟先賤者先就事也相扶工也面前也鼓在前變于君也執越內弦右手相由便也越瑟下孔所以發越其聲者也案今注疏本脫者字從宋本補前越言執者內有弦結手入之淺也相者降立西方笙入立于縣中西面鄭注堂下樂相從也縣中磬東立西面乃合樂周南關雎葛菌卷耳召南鵲巢采蘩采蘋案蘩從唐石經今注疏本作繁鄭注不歌不笙不間志在射略于樂也不略合樂者周南召南之風鄉樂也不可略其正也昔太王王季文王始居岐山之陽躬行召南之教以成王業案今注疏本脫召南之教四字據宋本補至三分天下而有其二案今注疏本脫而有其二四字據宋本補乃宣周南之化案周南下今注疏本衍召南二字據宋本刪本其德之初刑于寡妻至于兄弟以御于家邦故謂之鄉樂用之房中以及朝廷饗燕鄉射飲酒此六篇其風化之原也是以合金石絲竹而歌之工不興告于樂正曰正歌備鄭注不興者瞽矇禮略也樂正告于賓乃降鄭注樂正降者堂上正樂畢也降立西階東北面主人取爵于上篚獻工大師則為之洗鄭注尊之也君賜大夫樂又從之以其人謂之大師案此下今注疏本衍也字據宋本刪賓降主人辭降鄭注大夫不降尊也工不辭洗卒洗升實爵工不興左瑟一人拜受爵鄭注左瑟辟主人授爵也一人無大師則工之長者主人阼階上拜送爵薦脯醢使人相祭鄭注人相者工飲不拜既爵授主人爵衆工不拜受爵祭飲辨有脯醢不祭鄭注祭飲不興受爵坐祭坐飲不洗遂獻笙于西階上鄭注不洗者賤也衆工而不洗矣而著笙不洗者案著今注疏本訛作衆據宋本改笙賤于衆工正君賜之猶不洗也笙一人拜于下盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵衆笙不拜受爵坐祭立飲辨有脯醢不祭主人以爵降奠于篚反升就席鄭注亦揖讓以賓升衆賓皆升主人降席自南方鄭注禮殺由便側降鄭注賓不從降作相為司正司正禮辭許諾主人再拜司正答拜鄭注爵備樂畢將留賓以事為有懈倦失禮立司正以監之察儀法也詩云既立之監或佐之史主人升就席司正洗觶升自西階由楹內適阼階上北面受命于主人鄭注洗觶者當酌以表其位顯其事也楹內楹北西階上北面請安于賓鄭注傳主人之命賓禮辭許司正告于主人遂立于楹間以相拜鄭注相謂贊主人及賓相拜之辭主人阼階上再拜賓西階上答再拜皆揖就席鄭注為己安也今文揖為升司正實觶降自西階中庭北面坐奠觶興退少立鄭注奠觶表其位也少立自修正愼其位也古文曰少退立進坐取觶興反坐不祭遂卒觶興坐奠觶拜執觶興洗北面坐奠于其所鄭注今文坐取觶無進又曰坐奠之拜興少退北面立于觶南鄭注立觶南亦其故擯位未旅鄭注旅序也未以次序相酬以將射也旅則禮終也三耦俟于堂西南面東上鄭注司正既立司射選弟子之中德行道藝之高者以為三耦使俟事于此司射適堂西袒決遂取弓于階西兼挾乘矢升自西階階上北面告于賓曰弓矢既具有司請射鄭注司射主人之吏也于堂西袒決遂者主人無次隱蔽而已袒左免衣也決猶闓也以𧰼骨為之著右大臂指以鉤弦闓體也遂射韝也以韋為之所以遂弦者也其非射時則謂之拾拾斂也所以蔽膚斂衣也方持弦矢曰挾乘矢四矢也大射曰挾乘矢于弓外見鏃于弣右巨指鉤弦古文挾皆作接賓對曰某不能為二三子許諾鄭注言某不能謙也二三子謂衆賓巳下司射適阼階上東北面案敖繼公云阼階上告主人當北面東似衍文告于主人曰請射于賓賓許司射降自西階階前西面命弟子納射器鄭注弟子賓黨之年少者也納內也射器弓矢決拾旌中籌楅豐也賓黨東面主人之吏西面乃納射器皆在堂西賓與大夫之弓倚于西序矢在弓下北括衆弓倚于堂西矢在其上鄭注上堂西亷矢亦北括主人之弓矢在東序東鄭注亦倚于東序也矢在其下北括司射不釋弓矢遂以比三耦于堂西三耦之南北面命上射曰某御于子命下射曰子與某子射鄭注比選次其才相近者也古文曰某從于子司正為司馬鄭注兼官由便也立司正為涖酒爾今射司正無事司馬命張侯弟子說束遂繫左下綱鄭注事至也今文說皆作稅司馬又命獲者倚旌于侯中鄭注為當負侯也獲者亦弟子也謂之獲者以事名之獲者由西方坐取旌倚于侯中乃退樂正適西方命弟子贊工遷樂于下鄭注當辟射也贊佐也遷徙也弟子相工如初入降自西階阼階下之東南堂前三笴西面北上坐鄭注笴矢幹也今文無南樂正北面立于其南鄭注北面鄉堂不與工序也司射猶挾乘矢以命三耦各與其耦讓取弓矢拾鄭注猶有故之辭拾更也三耦皆袒決遂有司左執弣右執弦而授弓鄭注有司弟子納射器者也凡納射器者皆執以俟事遂授矢鄭注受于納矢而授之三耦皆執弓搢三而挾一個鄭注未違俟處也搢插也插于帶右司射先立于所設中之西南東面三耦皆進由司射之西立于其西南東面北上而俟司射東面立于三耦之北搢三而挾一個鄭注為當誘射也固東面矣復言之者明卻時還揖進當階北面揖及階揖升堂揖豫則鉤楹內堂則由楹外當左物北面揖鄭注鉤楹繞楹而東也序無室可以深也周立四代之學于國而又以有虞氏之庠為鄉學鄉飲酒義曰主人迎賓于庠門外是也庠之制有堂有室也今言豫者謂州學也讀如成周宣榭災之榭周禮作序凡屋無室曰榭宜從榭州立榭者下鄉也左物下物也今文豫為序序乃夏后氏之學亦非也及物揖左足履物不方足還視侯中俯正足鄭注方猶併也志在于射左足至右足還併足則是立也南面視侯之中乃俯視併正其足不去旌鄭注以其不獲誘射鄭注誘猶教也將乘矢鄭注將行也行四矢象有事于四方執弓不挾右執弦鄭注不挾矢盡南面揖揖如升射降出于其位南適堂西改取一個挾之鄭注改更也不射而挾之示有事也今文曰適序西遂適階西取撲搢之以反位鄭注撲所以撻犯教者書云撲作教刑司馬命獲者執旌以負侯鄭注欲令射者見侯與旌深有志于中獲者適侯執旌負侯而俟鄭注俟待也今文俟為立司射還當上耦西面作上耦射鄭注還左還也作使也司射反位上耦揖進上射在左竝行當階北面揖及階揖上射先升三等下射從之中等鄭注中猶間也上射升堂少左下射升上射揖竝行鄭注竝併也併東行皆當其物北面揖及物揖皆左足履物還視侯中合足而俟司馬適堂西不決遂袒執弓鄭注不決遂因不射不備出于司射之南升自西階鉤楹由上射之後西南面立于物間右執簫南揚弓命去侯鄭注鉤楹以當由上射者之後也簫弓末也大射曰左執弣揚猶舉也獲者執旌許諾聲不絶以至于乏坐東面偃旌興而俟鄭注聲不絶不以宮商不絶而已鄉射威儀省偃猶仆也司馬出于下射之南還其後降自西階反由司射之南適堂西釋弓襲反位立于司射之南鄭注圍下射者明為二人命去侯司射進與司馬交于階前相左由堂下西階之東北面視上射命曰無射獲無獵獲上射揖司射退反位鄭注射獲謂矢中人也獵矢從傍乃射上射既發挾弓矢而后下射射拾發以將乘矢鄭注古文而后作後非也孝經說然后曰案今注疏本脫此十四字據宋本補考疏內云引孝經說取孝經緯援神契文彼說孝經云然後能保其社稷之等皆作后后者後也今注文蓋後人妄刪后者後也案今注疏本脫者字據宋本補當從后獲者坐而獲鄭注射者中則大言獲獲得也射講武師田之類案今注疏本脫師字據宋本補是以中為獲也舉旌以宮偃旌以商鄭注宮為君商為臣聲和律呂相生獲而未釋獲鄭注但大言獲未釋其算卒射皆執弓不挾南面揖揖如升射鄭注不挾亦右執弦如司射上射降三等下射少右從之中等竝行上射于左鄭注降下與升射者相左交于階前相揖由司馬之南適堂西釋弓說決拾襲而俟于堂西南面東上三耦卒射亦如之案三耦誤敖繼公云三當作二二耦謂次耦下耦也司射去撲倚于西階之西升堂北面告于賓曰三耦卒射鄭注去撲乃升不敢佩刑器即尊者之側賓揖鄭注以揖然之司射降搢撲反位司馬適堂西袒執弓由其位南進與司射交于階前相左升自西階鉤楹自右物之後立于物閒西南面揖弓命取矢鄭注揖推之也獲者執旌許諾聲不絶以旌負侯而俟鄭注俟弟子取矢以旌指教之司馬出于左物之南還其後降自西階遂適堂前北面立于所設楅之南命弟子設楅鄭注楅猶幅也所以承笴齊矢者乃設楅于中庭南當洗東肆鄭注東肆統于賓司馬由司射之南退釋弓于堂西襲反位弟子取矢北面坐委于楅北括乃退司馬襲進當楅南北面坐左右撫矢而乘之鄭注撫拊之也就委矢左右手撫而四四數分之也上既言襲矣復言之者嫌有事即袒也凡事升堂乃袒若矢不備則司馬又袒執弓如初升命曰取矢不索鄭注索猶盡也弟子自西方應曰諾乃復求矢加于楅鄭注增故曰加嚮獲者許諾至此弟子曰諾事同互相明司射倚撲于階西升請射于賓如初賓許諾賓主人大夫若皆與射則遂告于賓適阼階上告于主人主人與賓為耦鄭注言若者或射或否在時欲耳射者繹己之志君子務焉大夫遵者也告賓曰主人御于子告主人曰子與賓射遂告于大夫大夫雖衆皆與士為耦以耦告于大夫曰案今注疏本脫以耦二字據唐石經補某御于子鄭注大夫皆與士為耦謙也來觀禮同爵自相與耦則嫌自尊别也大夫為下射而云御于子尊大夫也士謂衆賓之在下者及羣士來觀禮者也禮一命已下齒于鄉里西階上北面作衆賓射鄭注作使司射降搢撲由司馬之南適堂西立比衆耦鄭注衆耦大夫耦及衆賓也命大夫之耦曰子與某子射其命衆耦如三耦衆賓將與射者皆降由司馬之南適堂西繼三耦而立東上大夫之耦為上若有東面者則北上鄭注言若有者大夫士來觀禮及衆賓多無數也賓主人與大夫皆未降鄭注言未降者見其志在射司射乃比衆耦辨鄭注衆賓射者降比之耦乃遍遂命三耦拾取矢司射反位鄭注反位者俟其袒決遂來三耦拾取矢皆袒決遂案下乃云司射作上耦取矢因序上射下射取矢之儀繼云三耦拾取矢亦如之則此惟袒決遂未拾取矢明矣此句拾取矢三字當是因上文遂命三耦拾取矢衍此三字耳執弓進立于司馬之西南鄭注必袒決遂者明將有射事司射作上耦取矢鄭注作之者還當上耦如作射司射反位上耦揖進當楅北面揖及楅揖鄭注當楅楅正南之東西上射東面下射西面上射揖進坐橫弓卻手自弓下取一個兼諸弣順羽且興執弦而左還退反位東面揖鄭注橫弓者南踣弓也卻手由弓下取矢者以左手在弓表右手從裏取之便也兼并矢于弣當順羽既又當執弦也順羽者手放而下備不整理也不言毋周在阼非君周可也下射進坐橫弓覆手自弓上取一個興其他如上射鄭注覆手由弓上取矢者以左手在弓裏右手從表取之亦便既拾取乘矢揖皆左還南面揖皆少進當楅南皆左還北面搢三挾一個鄭注楅南鄉當楅之位揖皆左還上射于右鄭注上射轉居右便其反位也下射左還少南行乃西面與進者相左相揖退反位案今注疏本脫退字據唐石經補鄭注相左皆由進者之北三耦拾取矢亦如之案上耦已取矢此仍作三耦誤也敖繼公曰三亦當作二大射云二耦是也後者遂取誘射之矢兼乘矢而取之以授有司于西方而后反位鄭注取誘射之矢挾五個弟子逆受于東面位之後衆賓未拾取矢皆袒決遂執弓搢三挾一個由堂西進繼三耦之南而立東面北上大夫之耦為上鄭注未猶不也衆賓不拾者未射無楅上矢也言此者嫌衆賓三耦同倫初時有射者後乃射有拾取矢禮也司射作射如初一偶揖升如初司馬命去侯獲者許諾司馬降釋弓反位司射猶挾一個去撲與司馬交于階前升請釋獲于賓鄭注猶有故之辭司射既誘射恆執弓挾矢以掌射事備尚未知當教之也今三耦卒射衆足以知之矣猶挾之者君子不必也賓許降搢撲西面立于所設中之東北面命釋獲者設中遂視之鄭注視之當教之釋獲者執鹿中一人執算以從之鄭注鹿中謂射于榭也于庠當兕中釋獲者坐設中南當楅西當西序東面興受算坐實八算于中橫委其餘于中西南末興共而俟鄭注興還北面受算反東面實之司射遂進由堂下北面命曰不貫不釋鄭注貫猶中也不中正不釋算也古文貫作關上射揖司射退反位釋獲者坐取中之八算改實八算于中興執而俟鄭注執所取算乃射若中則釋獲者坐而釋獲每一個釋一算上射于右下射于左若有餘算則反委之鄭注委餘算禮尚異也委之合于中西又取中之八算改實八算于中興執而俟三耦卒射
