body:
  text: 儀禮集釋卷二十八宋李如圭撰少牢饋食禮第十六鄭目録云諸侯之卿大夫祭其祖禰于庿之禮羊豕曰少牢少牢于五禮屬吉禮大戴第八小戴第十一别録第十六少牢饋食之禮鄭注禮將祭祀必先擇牲繫于牢而芻之羊豕曰少牢諸侯之卿大夫祭宗廟之牲日用丁巳鄭注內事用柔日必丁巳者取其令名自丁寧自變改皆為謹敬必先諏此日明日乃筮筮旬有一日鄭注旬十日也以先月下旬之己筮來月上旬之巳筮于庿門之外主人朝服西面于門東史朝服左執筮右抽上韇兼與筮執之東面受命于主人鄭注史家臣主筮事者釋曰主人朝服者服祭服以筮也特牲筮日主人亦服祭時𤣥端司服職曰享先王則衮冕祭義曰易抱龜南面天子衮冕北面則天子卜祭亦服其祭服雜記大夫士筮宅史練冠長衣以筮筮蓍也主人曰孝孫某來日丁亥用薦嵗事于皇祖伯某以某妃配某氏尚饗鄭注丁未必亥也直舉一日以言之耳禘于大庿禮曰日用丁亥不得丁亥則己亥辛亥亦用之無則苟有亥焉可也薦進也進嵗時之祭事也皇君也伯某其字也大夫或因字為諡春秋傳曰魯無駭卒請諡與族公命以字為展氏是也其仲叔季亦曰仲某叔某季某也某妃某妻也合食曰配某氏若言姜氏子氏也尚庶幾饗歆也釋曰夏小正曰丁亥萬用入學案原本訛作萬入大學據大戴禮記改正丁亥者吉日也筮不同士禮贊命者蓋辟君史曰諾西面于門西抽下韇左執筮右兼執韇以擊筮鄭注將問吉凶焉故擊之以動其神易曰蓍之德圜而神遂述命曰假爾大筮有常孝孫某來日丁亥用薦嵗事于皇祖伯某以某妃配某氏尚饗鄭注述循也重以主人辭告筮也假借也言因蓍之靈以問之常吉凶之占繇乃釋韇立筮鄭注卿大夫之蓍長五尺立筮由便卦者在左坐卦以木卒筮乃書卦于木示主人乃退占鄭注卦者史之屬也卦以木者每一爻畫地以識之六爻備書于板史受以示主人退占東面旅占之釋曰示主人石本上有以字吉則史韇筮史兼執筮與卦以告于主人占曰從鄭注從者求吉得吉之言乃官戒宗人命滌宰命為酒乃退鄭注官戒戒諸官也當共祭祀事者使之具其物且齊也滌溉濯祭器掃除宗庿若不吉則及逺日又筮日如初鄭注及至也逺日後丁若後己宿鄭注宿讀為肅肅進也大夫尊儀益多筮日既戒諸官以齊戒矣案矣今注疏本訛作也至前祭一日又戒以進之使知祭日當來古文宿皆作羞釋曰申戒為宿宿諸官宜在宿尸之後宿尸之夕為期則宿前于祭一日前宿一日宿戒尸鄭注皆肅諸官之日又先肅尸者重所用為尸者又為將筮明日朝筮尸如筮日之儀案儀唐石經及原本皆作禮從今注疏本命曰孝孫某來日丁亥用薦嵗事于皇祖伯某以某妃配某氏以某之某為尸尚饗筮卦占如初鄭注某之某者字尸父而名尸也字尸父尊鬼神也不前期三日筮尸者大夫下人君祭之朝乃視濯與士異釋曰周禮大宰享先王則掌百官之誓戒前期十日帥執事而卜日遂戒祭統曰𣪚齊三日以定之致齊三日以齊之先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日則天子諸侯前祭十日卜日而戒諸官散齊前期三日致齊士卑亦前期三日筮尸不嫌與人君同惟不得散齊七日耳大夫不敢同君散齊九日前祭一日乃筮尸而致齊吉則乃遂宿尸祝擯鄭注筮吉又遂肅尸重尸也既肅尸乃肅諸官及執事者祝為擯者尸神象主人再拜稽首祝告曰孝孫某來日丁亥用薦嵗事于皇祖伯某以某妃配某氏敢宿鄭注告尸以主人為此事來肅案今注疏本脫肅字尸拜許諾主人又再拜稽首主人退尸送揖不拜鄭注尸不拜者尸尊釋曰祝釋辭尸乃拜異于士若不吉則遂改筮尸鄭注即改筮之不及逺日既宿尸反為期于庿門之外鄭注為期肅諸官而皆至定祭早晏之期為期亦夕時也言既肅尸反為期明大夫尊肅尸而已其為賔及執事者使人肅之釋曰特牲饋食禮親宿賓主人門東南面宗人朝服北面曰請祭期主人曰比于子鄭注比次早晏在于子也主人不西面者大夫尊于諸官有君道也為期亦惟尸不來也宗人曰旦明行事主人曰諾乃退鄭注旦明旦日質明釋曰周禮雞人凡國事為期則告之時時謂此旦明之時明日主人朝服即位于庿門之外東方南面宰宗人西面北上牲北首東上司馬刲羊司士擊豕宗人告備乃退鄭注刲擊皆謂殺之此實既省告備乃殺之文互者省也案今注疏本作省文也尚書傳曰案今注疏本脫曰字羊屬火豕屬水雍人溉鼎匕俎于雍爨雍爨在門東南北上鄭注雍人掌割烹之事者爨竈也在門東南統于主人北上羊豕魚臘皆有竈竈西有鑊凡溉者皆陳之而後告潔廩人溉甑甗匕與敦于廩爨廩爨在雍爨之北鄭注廩人掌米入之藏者甗如甑一孔匕所以匕黍稷者也古文甑為蒸釋曰甗無底甑也司宫溉豆籩勺爵觚觶几洗篚于東堂下勺爵觚觶實于篚卒溉饌豆籩與篚于房中放于西方設洗于阼階東南當東榮鄭注放猶依也大夫攝官司宫兼掌祭器者也羮定雍人陳鼎五三鼎在羊鑊之西二鼎在豕鑊之西鄭注魚臘從羊膚從豕統于牲司馬升羊右胖髀不升肩臂臑膞胳正脊一脡脊一橫脊一短脅一正脅一代脅一皆二骨以並腸三胃三舉肺一祭肺三實于一鼎鄭注升猶上也上右胖周所貴也髀不升近竅賤也肩臂臑肱骨膊胳股骨脊從前為正脅旁中為正脊先前脅先後屈而反猶器之䋫也並併也脊脅骨多六體各取二骨併之以多為貴舉肺一尸食所先舉也祭肺三為尸主人主婦古文胖皆作辨髀皆作脾今文並皆為併釋曰肩至代脅凡十一體脊脅言一見其體言二以竝見其骨腸胃各三蓋取脊脅之數尸主人主婦各取神案此下原本缺司士升豕右胖髀不升肩臂臑膊胳正脊一脡脊一橫脊一短脅一正脅一代脅一皆二骨以竝舉肺一祭肺三實於一鼎鄭注豕無腸胃君子不食圂腴釋曰養牛羊曰芻犬豕曰豢豢亦作溷犬豕食米穀腸胃有似人穢雍人倫膚九實於一鼎鄭注倫擇也膚脅革肉擇之取美者釋曰膚豕肉也司士又升魚臘魚十有五而鼎臘一純而鼎臘用麋鄭注司士又升副倅者合升左右胖曰純純猶全也釋曰升鼎同時下經云司士三人升魚臘膚卒脀皆設扃冪乃舉陳鼎于庿門之外東方北面北上鄭注北面北上鄉內相隨古文冪皆為密司宫尊兩甒于房户之間同棜皆有幂案幂各本訛作冪據唐石經改正甒有𤣥酒鄭注房户之間房西室户東也棜無足禁者酒戒也大夫去足改名優尊者若不為之戒然古文甒皆作廡今文幂作冪司宫設罍水于洗東有枓設篚于洗西南肆鄭注枓㪺水器也凡設水用罍沃盥用枓禮在此也改饌豆籩于房中南面如饋之設實豆籩之實鄭注改更也為實之更之威儀多也如饋之設如其陳之左右也饋設東面釋曰如設于奧時小祝設槃匜與簞巾於西階東鄭注為尸將盥主人朝服即位于阼階東西面鄭注為將祭也司宫筵于奧祝設几于筵上右之鄭注布陳神坐也室中西南隅謂之奧席東面近南為右主人出迎鼎除冪士盥舉鼎主人先入鄭注道之也主人不盥不舉司宫取二勺于篚洗之兼執以升乃啓二尊之蓋幂奠于棜上加二勺于二尊覆之南柄鄭注二尊兩甒也今文啓為開古文柄皆為枋案今注疏本脫啓為開古文皆共六字釋曰𤣥酒亦有勺重古如酌者然鼎序入雍正執一匕以從雍府執四匕以從司士合執二俎以從司士贊者二人皆合執二俎以相從入鄭注相助釋曰雍正雍官之長府其屬也鼎一匕二俎正俎五與肵俎而六陳鼎于東方當序南于洗西皆西面北上膚為下匕皆加于鼎東枋鄭注膚為下以其加也南于洗西陳于洗西南釋曰榮在序外鼎當序洗當榮膚升鼎先魚臘從其牲陳之在下如其次俎皆設于鼎西西肆肵俎在羊俎之北亦西肆鄭注肵俎在北將先載也異其設文不當鼎釋曰肵俎不言在羊鼎西知不當鼎宗人遣賓就主人皆盥于洗長朼鄭注長朼者長賓先次賓後也主人不朼言就主人者明親臨之古文朼作匕釋曰此臣也而曰賓者祭以得賓客之助為榮也禮運曰仲尼與於蠟賓佐食上利升牢心舌載于肵俎心皆安下切上午割勿沒其載于肵俎末在上舌皆切本末亦午割勿沒其載于肵橫之皆如初為之于爨也鄭注牢羊豕也安平也平割其下于載便也凡割本末食必正也午割使可絶也案今注疏本脫也字勿沒為其分散也肵之為言敬也所以敬尸也周禮祭尚肺事尸尚心舌心舌知滋味今文切皆為刌釋曰凡言牢者羊豕具有也午割從橫割之勿沒不絶其中央少許在爨制之已然特牲饋食禮曰肵俎心舌皆去本末午割之實于牲鼎載心立舌縮俎論語曰割不正不食佐食遷肵俎於阼階西西縮乃反佐食二人上利升羊載右胖髀不升肩臂臑膊骼正脊一脡脊一橫脊一短脅一正脅一代脅一皆二骨以竝腸三胃三長皆及俎拒舉肺一長終肺祭肺三皆切肩臂臑膊骼在兩端脊脅肺肩在上鄭注升之以尊卑載之以體次各有宜也拒讀為介距之距俎距脛中當橫節也凡牲體之數及載備于此釋曰俎距謂中俎足為橫距猶雞距也凡牲體前脛骨三肩臂臑也後脛骨三膊骼觳也脊骨三正脊脡脊橫脊也脅骨三代脅長脅短脅也膊之案此下原夲缺下利升豕其載如羊無腸胃體其載于俎皆進下鄭注進下變于食生也所以交于神明不敢以食道敬之至也鄉飲酒禮進腠羊次其體豕言進下互相見釋曰骨有本末進腠進本也進下進末也司士三人升魚臘膚魚用鮒十有五而俎縮載右首進腴鄭注右首進腴亦變于食生也有司載魚橫之少儀曰羞濡魚者進尾釋曰凡載魚皆右首食生則寢右而進鬐下篇賓尸魚橫于人為縮蓋進其尾也又與此正祭異臘一純而俎亦進下肩在上鄭注如羊豕凡臘之體載禮在此膚九而俎亦橫載革順鄭注列載于俎令其皮相順亦者亦其骨體釋曰牲體進下則俎亦橫載于此互見之卒脀祝盥于洗升自西階主人盥升自阼階祝先入南面主人從户內西面鄭注將納祭也主婦被錫衣侈袂薦自東房韭菹醓醢坐奠于筵前婦贊者一人亦被錫衣侈袂執葵菹螺醢以授主婦主婦不興遂受陪設于東韭菹在南葵菹在北主婦興入于房鄭注被錫讀為髲鬄古者或剔賤者刑者之髮以被婦人之紒為飾因名髲鬄焉此周禮所謂次也不纚笄者大夫妻尊亦衣綃衣而侈其袂耳侈者蓋半士妻之袂以益之衣三尺三寸袪尺八寸韭菹醓醢朝事之豆也而饋食用之豐大夫禮葵菹在此䋫今文錫為緆螺為蝸釋曰追師有次次第髮之長短為之亦見士昏禮婦贊者一人亦被錫衣侈袂則其餘如士之妻纚笄宵衣耳士妻與助祭婦人同宵衣無異服者禮窮則同故也袂袖也袪袂口也士妻之袂二尺二寸袪尺二寸朝事薦血腥之事也周禮醢人朝事八豆有韭菹醓醢饋食八豆有葵菹螺醢士饋食禮惟取葵菹螺醢豐大夫禮故兼取朝事二豆豆皆右菹左醢而此葵菹在北者與韭菹䋫設之采蘋詩曰于以奠之宗室牖下王肅以為大夫妻助祭采蘋藻以為菹設之于奧奧即牖下朝士當作朝事佐食上利執羊俎下利執豕俎司士三人執魚臘膚俎序升自西階相從入設俎羊在豆東豕亞其北魚在羊東臘在豕東特膚當俎北端鄭注相助也主婦自東房執一金敦黍有蓋坐設于羊俎之南婦贊者執敦稷以授主婦主婦興受坐設于魚俎南又興受贊者敦黍坐設于稷南又興受贊者敦稷坐設于黍南敦皆南首主婦興入于房鄭注敦有首者尊者器飾也飾蓋象龜周之禮飾器各以其類龜有上下甲今文曰主婦入于房祝酌奠遂命佐食啓㑹佐食啓㑹蓋二以重設于敦南鄭注酌奠酌酒為神奠之後酌者酒尊要成也特牲饋食禮曰祝洗酌奠奠于鉶南重纍之釋曰饌由尊者而成故酒後設之下經鉶設于韭菹之南此時鉶未設故奠處亦空其文主人西面祝在左主人再拜稽首祝祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦歲事于皇祖伯某以某妃配某氏尚饗主人又再拜稽首鄭注羊曰柔毛豕曰剛鬛嘉薦菹醢也普淖黍稷也普大也淖和也德能大和乃有黍稷春秋傳曰奉粢以告曰潔粢豐盛謂其三時不害而民和年豐也釋曰曽子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭于宗子之家祝曰孝子某為介子某薦其常事若宗子有罪居于他國庶子為大夫其祭也祝曰孝子某使介子某執其常事羊肥則毛柔豕肥則鬛剛盛音成祝出迎尸于庿門之外主人降立于阼階東西面祝先入門右尸入門左鄭注主人不出迎尸伸尊也特牲饋食禮曰尸入主人及賓皆辟位出亦如之祝入門右者辟尸盥也既則後尸釋曰不迎尸伸尸之尊宗人奉槃東面于庭南一宗人奉匜水西面于槃東一宗人奉簞巾南面于槃北乃沃尸盥于槃上卒盥坐奠簞取巾興振之三以授尸坐取簞興以受尸巾鄭注庭南沒霤釋曰尸盥設于西階東尸入門左至門內霤侍盥者奉器就之門內霤在庭之南特牲饋食禮曰尸入門左北面盥亦繼門言之祝延尸尸升自西階入祝從鄭注由後詔相之曰延延進也周禮曰大祝相尸禮祝從從尸升自西階主人升自阼階祝先入主人從鄭注祝接神先入宜也尸升筵祝主人西面立于戶內祝在左鄭注主人由祝後而居右尊也祝從尸尸即席乃卻居主人左祝主人皆拜妥尸尸不言尸答拜遂坐鄭注拜妥尸拜之使安坐也尸自此答拜遂坐而卒食其間有不啐奠不嘗鉶不告旨大夫之禮尸彌尊也不告旨者為初亦不饗所謂曲而殺釋曰不嘗鉶不嘗豕鉶也不饗祝不釋勸强之辭蓋辟人君祝反南面鄭注未有事也隋祭爾敦案隋各本訛作墮下同據釋文改正官各肅其職不命尸取韭菹辨㨎于三豆祭于豆間上佐食取黍稷于四敦下佐食取牢一切肺于俎以授上佐食上佐食兼與黍以授尸尸受同祭于豆祭鄭注牢羊豕也同合也合祭于俎豆之祭也黍稷之祭為隋祭將食神餘尊之而祭之今文辨為遍釋曰切肺祭肺也神俎祭肺二取其一也言牢者羊豕兼取之俎豆當作菹豆上佐食舉尸牢肺正脊以授尸上佐食爾上敦黍于筵上右之鄭注爾近也或曰移也右之便尸食也重言上佐食明更起不相因釋曰牢肺離肺也授尸下賈氏有尸受祭肺四字不設大羮者大羮為尸不為神賓尸乃有之主人羞肵俎升自阼階直于膚北案直各本訛作置據釋文改正鄭注羞進也肵敬也親進之主人敬尸之加上佐食羞兩鉶取一羊鉶于房中坐設于韭菹之南下佐食又取一豕鉶于房中以從上佐食受坐設于羊鉶之南皆芼皆有柶尸扱以柶祭羊鉶遂以祭豕鉶嘗羊鉶鄭注芼菜也羊用苦豕用薇皆有滑釋曰苦薇滑見公食記食舉鄭注舉牢肺正脊也先食啖之以為道也三飯鄭注食以黍釋曰飯扶晚切下同上佐食舉尸牢幹尸受振祭嚌之佐食受加于肵鄭注幹正脅也古文幹為肝上佐食羞胾兩瓦豆有醢亦用瓦豆設于薦豆之北鄭注設于薦豆之北以其加也四豆亦䋫羊胾在南豕胾在北無臐膮者尚牲不尚味釋曰䋫者羊胾北醢醢東豕胾胾南醢尸又食食胾上佐食舉尸一魚尸受振祭嚌之佐食受加于肵橫之鄭注又復也或言食或言飯食大名小數曰飯魚橫之者異于肉釋曰魚縮俎今則橫之牲橫載加于肵其縮之與又食上佐食舉尸臘肩尸受振祭嚌之上佐食受加于肵鄭注臘魚皆一舉者少牢二牲略之臘必舉肩以肩為終也别舉魚臘崇威儀釋曰特牲魚臘皆竝時三舉肩尊牲體亦後舉之又食上佐食舉尸牢骼如初鄭注如舉幹也又食鄭注不舉者卿大夫之禮不過五舉須侑尸尸告飽祝西面于主人之南獨侑不拜侑曰皇尸未實侑鄭注侑勸也祝獨勸者更則尸飽實猶飽也祝既侑復反南面尸又食上佐食舉尸牢肩尸受振祭嚌之佐食受加于肵鄭注四舉牢體始于正脊終于肩尊于終始尸不飯告飽祝西面于主人之南鄭注祝當贊主人辭主人不言拜侑鄭注祝言而不拜主人不言而拜親疏之宜釋曰周禮大祝辨九拜以享侑祭祀尸又三飯鄭注為祝一飯為主人三飯尊卑之差凡十一飯案凡今注疏本訛作尸下人君也釋曰下户稼切上佐食受尸牢肺正脊加于肵鄭注言受者尸授之也尸受牢幹而實舉于菹豆食畢操以授佐食焉釋曰菹豆韭菹之豆主人降洗爵升北面酌酒乃酳尸尸拜受主人拜送鄭注酳猶羡也既食之而又飲之所以樂之古文酳作酌尸祭酒啐酒賓長羞牢肝用俎縮執俎肝亦縮進末鹽在右鄭注羞進也縮從也鹽在肝右便尸㨎之古文縮為蹙釋曰鹽在右據賓長西面設者而言于尸為鹽在左右取肝鄉左㨎之尸左執爵右兼取肝㨎于俎鹽振祭嚌之加于菹豆卒爵主人拜祝受尸爵尸答拜鄭注兼兼羊豕釋曰少儀曰其有折俎者取祭反之不坐燔亦如之尸則坐祝酌授尸尸酢主人主人拜受爵尸答拜主人西面奠爵又拜鄭注主人受酢酒俠爵拜彌尊尸上佐食取四敦黍稷下佐食取牢一切肺以授上佐食上佐食以綏祭鄭注綏或作挼挼讀為墮將受嘏亦尊尸餘而祭之古文綏為肵案綏各本訛作墮據經云以綏祭又後注云綏亦當作挼古文為肵可證此墮字乃綏之訛主人左執爵右受佐食坐祭之又祭酒不興遂啐酒鄭注右受佐食右手受墮于佐食也至此言坐祭之者明尸與主人為禮也尸恆坐有事則起主人恆立有事則坐祝與二佐食皆出盥于洗入二佐食各取黍于一敦上佐食兼受搏之以授尸尸執以命祝鄭注命祝以嘏辭卒命祝祝受以東北面于户西以嘏于主人曰皇尸命工祝承致多福無疆于汝孝孫來汝孝孫使女受祿于天宜稼于田睂壽萬年勿替引之鄭注嘏大也豫主人以大福工官也承猶𫝊也來讀曰釐釐賜也耕種曰稼勿猶無也替廢也引長也言無廢止時長如是也古文嘏為格祿為福睂為微替為袂袂或為臷臷替聲相近釋曰詩天保曰吉蠲為饎是用孝享禴祠蒸嘗于公先王君曰卜爾萬壽無疆楚茨曰工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如幾如式既齊既稷既匡既勑永錫爾極時萬時億卜豫也此皆序嘏主人之辭主人坐奠爵興再拜稽首興受黍坐振祭嚌之詩懷之實于左袂挂于季指執爵以興坐卒爵執爵以興坐奠爵拜尸答拜執爵以興出宰夫以籩受嗇黍主人嘗之納諸內鄭注詩猶承也實于左袂便右手也季猶小也出出户也宰夫掌飲食之事者收斂曰嗇明豐年乃有黍稷也復嘗之者重之至也納猶入也古文挂作卦主人獻祝設席南面祝拜于席上坐受鄭注室中迫狹釋曰亦變于尸主人西面答拜鄭注不言拜送下尸釋曰下户稼切後下尸同薦兩豆菹醢鄭注葵菹螺醢佐食設俎牢髀橫脊一短脅一腸一胃一膚三魚一橫之臘兩髀屬于尻鄭注皆升下體祝賤也魚橫者四物共俎殊之也臘兩髀屬于尻尤賤不殊釋曰髀橫脊短脅皆下體也四物羊豕魚臘臘升左右胖故尻在兩髀中連屬之祝取菹㨎于醢祭于豆間祝祭俎鄭注大夫祝俎無肺祭用膚逺下尸不嚌之膚不盛釋曰大夫尸尊祝無祭肺又無離肺其祭用膚與餕者同耳祭酒啐酒肝牢從祝取肝㨎于鹽振祭嚌之不興加于俎卒爵興鄭注亦如佐食授爵乃興不拜既爵大夫祝賤也主人酌獻上佐食上佐食户內牖東北面拜坐受爵主人西面答拜佐食祭酒卒爵拜坐授爵興鄭注不啐而卒爵者大夫之佐食賤禮略釋曰授石本作受俎設于兩階之間其俎折一膚鄭注佐食不得成禮于室中折者擇取牢正體餘骨折分用之有脀而無薦亦逺下尸釋曰無肺又無菹醢主人又獻下佐食亦如之其脀亦設于階間西上亦折一膚鄭注上佐食既獻則出就其俎特牲記曰佐食無事則中庭北面謂此時有司贊者取爵于篚以升授主婦贊者于房户鄭注男女不相因特牲饋食禮曰佐食卒角主人受角降反于篚婦贊者受以授主婦主婦洗于房中出酌入户西面拜獻尸鄭注入户西面拜由便也不北面者辟人君夫人也拜而後獻者當俠拜也昏禮曰婦洗在北堂直室東隅釋曰特牲主婦北面拜凡大夫所辟者士多得與君同卑不嫌也尸拜受主婦主人之北西面拜送爵鄭注拜于主人之北西面婦人位在內此拜于北則上拜于南矣案此今注疏本訛作也脫矣字由便也尸祭酒卒爵主婦拜祝受尸爵尸答拜易爵洗酌授尸鄭注祝出易爵男女不同爵主婦拜受爵尸答拜上佐食綏祭主婦西面于主人之北受祭祭之其綏祭如主人之禮不嘏卒爵拜尸答拜鄭注不嘏夫婦一體綏亦當作挼古文為肵主婦以爵出贊者受易爵于篚以授主婦于房中鄭注贊者有司贊者也易爵亦以授婦贊者婦贊者受房戶外入授主婦主婦洗酌獻祝祝拜坐受爵主婦答拜于主人之北卒爵不興坐授主婦鄭注不俠拜下尸也今文曰祝拜受主婦受酌獻上佐食于户內佐食北面拜坐受爵主婦西面答拜祭酒卒爵坐授主婦主婦獻下佐食亦如之主婦受爵以入于房鄭注不言拜于主人之北可知也爵奠于內篚賓長洗爵獻于尸尸拜受爵賓户西北面拜送爵尸祭酒卒爵賓拜祝受尸爵尸答拜祝酌授尸賓拜受爵尸拜送爵賓坐奠爵遂拜執爵以興坐祭遂飲卒爵執爵以興坐奠爵拜尸答拜賓酌獻祝祝拜坐受爵賓北面答拜祝祭酒啐酒奠爵于其筵前鄭注啐酒而不啐爵祭事畢示醉也不獻佐食將儐尸禮殺釋曰啐爵當作卒爵主人出立于阼階上西面祝出立于西階上東面祝告曰利成鄭注利猶養也成畢也孝子之養禮畢釋曰特牲饋食禮戶外告利成此禮于階上尊者彌逺于尸祝入尸謖主人降立于阼階東西面鄭注謖起也謖或作休祝先尸從遂出于庿門鄭注事尸之禮訖于庿門外釋曰尸在庿門外則疑于臣故送逆尸皆以庿門為斷祝反復位于室中主人亦入于室復位祝命佐食徹肵俎降設于堂下阼階南鄭注徹肵俎不出門將儐尸也肵俎而以儐尸者其本為不反魚肉耳不云尸俎未歸尸釋曰特牲饋食禮佐食徹尸俎出于庿門即此肵俎司宫設對席乃四人𧃊鄭注大夫禮四人餕案餕今注疏本作𧃊明惠大也上佐食盥升下佐食對之賓長二人備鄭注備四人餕也三餕亦盥升釋曰上佐食坐尸之處司士進一敦黍于上佐食又進一敦黍于下佐食皆右之于席上鄭注右之者東面在南西面在北資黍于羊俎兩端兩下是餕鄭注資猶減也減置于羊俎兩端則一賓長在上佐食之北一賓長在下佐食之南今文資作齎釋曰餕當如上下文作𧃊司士乃辨舉𧃊者皆祭黍祭舉鄭注舉舉膚今文辨為遍主人西面三拜𧃊者𧃊者奠舉于俎皆答拜皆反取舉鄭注三拜旅之示遍也言反者拜時或去其席在東面席者東面拜在西面席者皆南面拜釋曰在西面者與主人同面故南面拜司士進一鉶于上𧃊又進一鉶于次𧃊又進二豆湇于兩下乃皆食食舉鄭注湇肉汁也釋曰神坐止有羊豕二鉶故兩下進湇也皆食食黍也食舉食膚卒食主人洗一爵升酌以授上𧃊贊者洗三爵酌主人受于户內以授次𧃊若是以辨皆不拜受爵主人西面三拜𧃊者𧃊者奠爵皆答拜皆祭酒卒爵奠爵皆拜主人答一拜案一今注疏本訛作一鄭注不拜受爵者大夫餕者賤也答一拜略也古文一為一也釋曰周禮九拜有奇拜謂一拜也答臣下之拜𧃊者三人興出鄭注出降實爵于篚反賓位上𧃊止主人受上𧃊爵酌以醋于戶內西面坐奠爵拜上𧃊答拜坐祭酒啐酒鄭注主人自醋者上𧃊獨止當尸位尊不酌也上𧃊親嘏曰主人受祭之福胡壽保建家室鄭注親嘏不使祝授之亦以黍主人興坐奠爵拜執爵以興坐卒爵拜上𧃊答拜上𧃊興出主人送乃退鄭注送佐食不拜賤
