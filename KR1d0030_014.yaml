body:
  text: 儀禮集釋卷十四宋李如圭撰聘禮聘遭喪入竟則遂也鄭注遭喪主國君薨也入竟則遂國君以國為體士既請事已入竟矣關人未告則反釋曰春秋傳季文子將聘于晉使求遭喪之禮以行謂此禮不郊勞鄭注子未君也釋曰無使臣義春秋武氏子來求􅉠不稱使天子當喪未君不筵几鄭注致命不于庿就尸柩于殯宫又不神之釋曰凡殯宫不筵几者未忍異于生不禮賓案禮當作醴鄭注喪降事也主人畢歸禮鄭注賓于飲食案于今注疏本作所不可廢也禮謂饔餼饗食賓惟饔餼之受鄭注受正不受加也釋曰掌客職曰遭主國之喪不受饗食受牲禮不賄不禮玉不贈鄭注喪殺禮為之不備釋曰為于僞反下為鄰為之為致同遭夫人世子之喪君不受使大夫受于庿其他如遭君喪鄭注夫人世子死君為喪主使大夫受聘禮不以凶接吉也其他謂禮所降釋曰服問云君所主夫人妻大子適婦衰麻非所以接辨冕也遭喪將命于大夫主人長衣練冠以受鄭注遭喪謂主國君薨夫人世子死也此三者皆大夫攝主人長衣素純布衣也去衰易冠不以純凶接純吉也吉時在裏為中衣中衣長衣繼皆掩尺表之曰深衣純袂寸半耳君喪不言使大夫受子未君無使臣義也釋曰更自遭喪不蒙上夫人世子之文知主國君薨亦使大夫受也長衣制如深衣皆用布連衣裳為之深衣緣以采長衣緣以素且繼袂一尺為異耳練冠練布為冠也雜記大夫筮宅史練冠長衣以筮則長衣練冠以凶接吉之服也臣為君斬為夫人世子期今權制此服略為一等耳聘君若薨于後入竟則遂鄭注既接于主國君也赴者未至則哭于巷衰于館鄭注未至謂赴告主國君者也哭于巷者哭于巷門未可為位也衰于館未可以凶服出見人其聘享之事自若吉也今文赴作訃釋曰君訃未至主國不敢專館為位而哭故哭于巷也曽子與客立于門側其徒之父死將出哭于巷受禮鄭注受饔餼也不受饗食鄭注亦不受加赴者至則衰而出鄭注禮為鄰國闕于是可以凶服將事也惟稍受之鄭注稍稟食也釋曰掌客職曰賓客有喪惟芻稍之受歸執圭復命于殯升自西階不升堂鄭注復命于殯者臣子之于君父存亡同釋曰春秋傳吳子僚使季子聘于上國公子光弒僚季子至復命哭墓復命皆如字子即位不哭鄭注將有告請之事宜清靜也不言世子者君薨也諸臣待之亦皆如朝夕哭位辨復命如聘鄭注自陳幣至于上介以公賜告無勞子臣皆哭鄭注使者既復命子與羣臣皆哭與介入北鄉哭鄭注北鄉哭新至别于朝夕出袒括髮鄭注悲哀變于外臣也入門右即位踊鄭注從臣位自哭至踊如奔喪禮釋曰奔喪曰至于家入門左升自西階殯東西面坐哭盡哀括髮袒降堂東即位西鄉哭成踊春秋傳魯公孫歸父聘于晉還至笙聞君薨家遣壇帷復命于介既復命袒括髮即位哭三踊而出遂奔齊君子善之若有私喪則哭于館衰而居不饗食鄭注私喪謂其父母也案今注疏本脫也字哭于館衰而居不敢以私喪自聞于主國凶服干君之吉使案于今注疏本訛作于春秋傳曰大夫以君命出聞喪徐行而不反釋曰使所吏反歸使衆介先衰而從之鄭注已有齊斬之服不忍顯然趨于往來其在道路使介居前歸又請反命己猶徐行隨之君納之乃朝服既反命出公門釋服哭而歸其他如奔喪之禮吉時道路深衣賓入竟而死遂也主人為之具而殯鄭注具謂始死至殯所當用介攝其命鄭注為致聘享之禮也初時上介接聞命君弔介為主人鄭注雖有臣子親姻猶不為主人以介與賓竝命于君尊也主人歸禮幣必以用鄭注當中奠贈諸喪具之用不必如賓禮釋曰周禮掌客凡賓客死致禮以喪用介受賓禮無辭也鄭注介受主國賓己之禮無所辭也以其當陳之以反命也有賓喪嫌其辭之不饗食歸介復命柩止于門外鄭注門外大門外也必以柩造朝達其忠心介卒復命出奉柩送之君弔卒殯鄭注卒殯成節乃至若大夫介卒亦如之鄭注不言上介者小聘上介士也士介死為之棺斂之鄭注不具他衣物也自以時服也君不弔焉鄭注主國君使人弔不親往釋曰士喪禮君有賜則視斂常禮君不親弔士若賓死未將命則既斂于棺造于朝介將命鄭注未將命謂俟閒之後也案謂今注疏本訛作請以柩造朝以已至朝志在達君命釋曰春秋傳楚伐吳陳侯使公孫貞子弔焉及良而卒將以尸入吳子使大宰嚭勞且辭上介對曰君曰無以尸造于門是我寡君之命委于草莽也且臣聞之事死如事生禮也于是有朝聘而終以尸將事之禮又有朝聘而遭喪之禮若不以尸將事是遭喪而還也無乃不可乎吳人內之据此傳則賓入竟而死者皆以柩造朝若介死歸復命惟上介造于朝若介死雖士介賓既復命往卒殯乃歸鄭注往謂送柩小聘曰問不享有獻不及夫人主人不筵几不禮面不升不郊勞鄭注記貶于聘所以為小也獻私獻也面猶覿也今文禮作醴案各本脫此五字據集說正誤補釋曰周禮曰諸侯之邦交歲相問殷相聘殷中也聘義曰比年小聘五年大聘不禮者不禮賓面不升者私覿庭中受之不升堂其禮如為介三介鄭注如為介如為大聘上介釋曰其禮謂得主國之禮也三介者大夫降于卿二等然則公之卿聘七介者小聘使大夫五介子男之卿聘三介者小聘使大夫一介記久無事則聘焉鄭注事謂盟㑹之屬若有故則卒聘束帛加書將命百名以上書于策不及百名書于方鄭注故謂災患及時事相告請也將猶致也名書文也今謂之字策簡也方板也主人使人與客讀諸門外鄭注受其意既聘享賓出則讀之讀之不于內者案今注疏本不重讀之二字係訛脫人稠處嚴不得審悉主人國君也人內史也書必璽之釋曰周禮凡四方之事書內案此下原本缺客將歸使大夫以其束帛反命于館鄭注為書報也明日君館之鄭注既報館之書問尚疾也既受行出遂見宰問幾月之資鄭注資行用也古者君臣謀密草創未知所之逺近問行用當知多少而已古文資作齎使者受行日案使者下原本及今注疏本皆有既字據唐石經剛正朝同位鄭注謂前夕幣之間同位者使者北面介立于左少退别處臣也案原本作别其處臣也今注疏本作别于其處臣也據釋文舉别處二字張淳儀禮識誤辨證甚明今剛正出祖釋軷祭酒脯乃飲酒于其側鄭注祖始也既受聘享之禮出行國門止陳車騎釋酒脯之奠于軷為行始也詩傳曰軷道祭也謂祭道路之神春秋傳曰軷涉山川然則軷山行之名也道路以險阻為難是以委土為山或伏牲其上案今注疏本脫或字使者為軷祭酒脯祈告也卿大夫處者于是餞之飲酒于其側禮畢乘車轢之而遂行舍于近郊矣其牲犬羊可也古文軷作祓所以朝天子圭與繅皆九寸剡上寸半厚半寸博三寸繅三采六等朱白倉案今注疏本作蒼唐石經亦作倉古通用鄭注圭所執以為瑞節也剡上象天圓地方也雜采曰繅以韋衣木板飾以三色再就所以薦玉重愼也九寸上公之圭也案上今注疏本訛作三古文繅或作藻今文作璪釋曰剡鋭也等猶行也每采畫之再行三采故六等一等為一就是為三采三就此注云再就者一行為一就每色再就也雜記曰圭公九寸侯伯七寸博三寸厚半寸剡上左右各寸半玉也藻三就六等子男則璧徑五寸繅二采四等繅文象水草故字或作藻孔穎達雜記正義引此記文朱白倉下重有朱白倉三字問諸侯朱緑繅八寸鄭注二采再就降于天子也于天子曰朝于諸侯曰問記之于聘文互相備釋曰于朝舉天子則自相朝亦然于聘舉諸侯則聘天子亦如之此聘圭之繅采為一行二采共為再行與朝圭繅異周禮典瑞曰王晉大圭執鎮圭繅藉五采五就以朝日公執桓圭侯執信圭伯執躬圭繅皆三采三就子執穀璧男執蒲璧繅皆二采再就以朝覲宗遇㑹同于王諸侯相見亦如之瑑圭璋璧琮繅皆二采一就以俯聘八寸亦謂上公之聘圭也考工記曰瑑圭璋八寸璧琮八寸以俯聘侯伯聘圭當六寸子男則四寸各降其君之瑞一等考工記又曰璧琮九寸諸侯以享天子瑑琮八寸諸侯以享夫人亦據上公禮互言之則五等侯享天子及后之璧琮大小各如其瑞諸侯自相享見降其瑞一等皆𤣥纁繫長尺絢組鄭注采成文曰絢繫無事則以繫玉因以為飾皆用五采組上以𤣥下以絳為地今文絢作釋曰纁淺絳也曰𤣥纁矣而又曰絢知以𤣥纁為地而加五采組也下謂垂之在下者問大夫之幣俟于郊為肆又齎皮馬鄭注肆猶陳列也齎猶付也使者既受命宰夫載問大夫之禮待于郊陳之為行列至則以付之也使者初行舍于近郊幣云肆馬云齎因其宜亦互文也不於朝付之者辟君禮也必陳列之者不夕也古文肆為肄釋曰不言賓介私覿之幣則私覿幣賓介自齎以行也辭無常孫而說鄭注孫順也大夫使受命不受辭辭必順且說釋曰春秋公羊傳曰聘禮大夫受命不受辭辭多則史少則不達鄭注史謂策祝釋曰論語曰辭達而已矣辭苟足以達義之至也鄭注至極也今文至為砥辭曰非禮也敢對曰非禮也敢鄭注辭辭不受也對答問也二者皆卒曰敢言不敢釋曰此皆贊賓辭卿館于大夫大夫館于士士館于工商鄭注館者必于庿不館于敵者之庿為大尊也自官師以上有庿有寢工商則寢而已管人為客三日具沐五日具浴鄭注管人掌客舍者也客謂使者下及士介也飧不致鄭注不以束帛致命草次饌飧具輕賓不拜鄭注以不致命釋曰明日不拜賜于朝沐浴而食之鄭注自潔清尊主國君賜也記此重者沐浴可知卿大夫訝大夫士訝士皆有訝鄭注卿使者大夫上介也士衆介也訝主國君所使迎待賓者如今使者護客賓即館訝將公命鄭注使己迎待之命又見之以其摯鄭注又復也復以私禮見者訝將舍于賓館之外宜相親也大夫訝者執鴈士訝者執雉賓既將公事復見之案之今注疏本作訝唐石經及敖繼公本亦作之以其摯鄭注既已也公事聘享問大夫復報也使者及上介執鴈羣介執雉各以見其訝釋曰周禮掌訝中士為之與士迎賓于疆至于國賓入館次于舍門外待事于客又曰凡賓客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝彼天子之禮掌訝與訝賓異人此諸侯禮無掌訝通以訝賓為之賓即館訝始將公命明非與士逆于竟者復如字下復故同凡四器者惟其所寶以聘可也鄭注言國獨以此為寶也四器謂圭璋璧琮宗人授次次以帷少退于君之次鄭注主國之門外諸侯及卿大夫之所使者次位皆有常處上介執圭如重授賓鄭注慎之也曲禮曰凡執主器執輕如不克賓入門皇升堂讓將授志趨鄭注皇自莊盛也讓謂舉手平衡也志猶念也念趨謂審行步也孔子之執圭鞠窮如也案窮各本訛作躬釋文云鞠窮劉音弓張淳儀禮識誤云爾雅鞠究窮也鞠窮蓋復語自論語作鞠躬學者遂不復致思於其間安知非鞠窮若踧踖之謂者乎如是則劉音亦誤矣如不勝上如揖下如授勃如戰色足蹜蹜如有循古文皇皆作王授如爭承下如送君還而后退鄭注重失隊也案此句上今注疏本有爭爭闕之爭五字乃釋文訛入注內而后猶然後也釋曰授如爭承授玉時下階發氣怡焉再三舉足又趨鄭注發氣舍息也再三舉足自安定乃復趨也此云舉足案此云上今注疏本有至字則志趨卷豚而行也孔子之升堂鞠窮如也案窮各本亦訛作躬據釋文訂正屏氣似不息者出降一等逞顔色怡怡如也沒皆趨進翼如也及門正焉鄭注容色復故此皆心變見于威儀執圭入門鞠窮焉如恐失之案此窮字各本亦訛作躬據釋文訂正魏氏儀禮要義云溫本作鞠窮焉鄭注記異說也及享發氣焉盈容鄭注發氣舍氣也孔子之于享禮有容色衆介北面蹌焉鄭注容貌舒揚私覿愈愈焉鄭注容貌和敬出如舒鴈鄭注威儀自然而行列舒鴈鵝也釋曰聘時戰色及享舒緩發氣盈容私覿愈愈出如舒鴈又舒緩于愈愈矣皇且行入門主敬升堂主慎鄭注復記執玉異說凡庭實隨入左先皮馬相閒可也鄭注隨入不竝行也閒猶代也土物有宜君子不以所無為禮畜獸同類可以相代古文閒作干釋曰皮北面西上故左先賓之幣惟馬出其餘皆東鄭注馬出當從廏也餘物皆東藏之內府多貨則傷于德鄭注貨天地所化生謂玉也君子于玉比德焉朝聘之禮以為瑞節重禮也多之則是主于貨傷其為德案傷下今注疏本有敗字幣美則沒禮鄭注幣人所造成以自覆幣謂束帛也愛之斯欲衣食之君子之情也是以享用幣所以副忠信美之則是主于幣而禮之本意不見也釋曰荀子曰聘禮志曰聘厚則傷德財侈則殄禮禮云禮云玉帛云乎哉賄在聘于賄鄭注賄財也于讀曰為言主國禮賓當視賓之聘禮而為之財也賓客者主人所欲豐也若茍豐之是又傷財也周禮曰凡諸侯之交各稱其邦而為之幣以其幣為之禮古文賄皆作悔凡執玉無藉者襲鄭注藉謂繅也繅所以縕藉玉禮不拜至鄭注以賓不于是始至今文禮為醴釋曰諸侯以國為家賓入竟則既至矣醴尊于東箱案箱各本作廂唐石經作箱古字通用瓦大一有豐鄭注瓦大瓦尊豐承尊器如豆而卑薦脯五膱祭半膱橫之鄭注膱脯如版然者或謂之脡皆取直貌焉祭醴再扱始扱一祭卒再祭鄭注卒謂後扱主人之庭實則主人遂以出賓之士訝受之鄭注此謂餘三馬也左馬賓執以出矣士士介從者既覿賓若私獻奉獻將命鄭注時有珍異之物或賓奉之所以自序尊敬也猶以君命致之擯者入告出禮辭鄭注辭其獻也賓東面坐奠獻再拜稽首鄭注送獻不入者奉物禮輕釋曰司儀職云及禮私面私獻皆再拜稽首君答拜擯者東面坐取獻舉以入告出禮請受鄭注東面坐取獻者以宜竝受也其取之由賓南而自後右客也釋曰擯者自門東適賓南由賓後于賓北取幣賓固辭公答再拜鄭注拜受于賓也固亦衍字擯者立于閾外以相拜賓辟鄭注相贊也古文閾為蹙擯者授宰夫于中庭鄭注東藏之既乃介覿若兄弟之國則問夫人鄭注兄弟謂同姓若㛰姻甥舅有親者問猶遺也謂獻也不言獻者變于君也非兄弟獻不及夫人若君不見鄭注君有疾若他故不見使者使大夫受鄭注受聘享也大夫上卿也自下聽命自西階升受負右房而立賓降亦降鄭注此儀如還圭然而賓大夫易處耳今文無而釋曰易處大夫自賓左受之不禮鄭注辟正主也古文禮作醴案今注疏本脫此五字幣之所及皆勞不釋服鄭注以與賓接于君所賓又請有事于己不可以不速也所不及者下大夫未嘗使者也不勞者以先是賓請有事于已同類既聞彼為禮所及則己往有嫌也所以知及不及者賓請有事固曰某子某子賜饔惟羮飪筮一尸若昭若穆鄭注羮飪謂飪一牢也肉謂之羮惟是祭其先大禮之盛者也筮尸若昭若穆容父在父在則祭祖父卒則祭禰腥餼不祭則士介不祭也士之初行不釋幣于禰不祭可也古文羮為羔飪作腍僕為祝祝曰孝孫某孝子某薦嘉禮于皇祖某甫皇考某子鄭注僕為祝者大夫之臣攝官也如饋食之禮鄭注如少牢饋食之禮不言少牢今以大牢也今文無之假器于大夫鄭注不敢以君之器為祭器朌肉及廋車鄭注朌猶賦也廋廋人也車巾車也二人掌視車馬之官也賦及之明辨也古文朌作紛聘日致饔鄭注急歸大禮案今注疏本脫此注四字明日問大夫鄭注不以殘日問人崇敬也古文曰問夫人也案今注疏本訛作問大夫也夕夫人歸禮鄭注與君異日下之也今文歸作饋既致饔旬而稍宰夫始歸乘禽日如其饔餼之數鄭注稍稟食也乘禽案禽今注疏本訛作謂乘行之禽也謂鴈鶩之屬其歸之以雙為數其賓與上介也古文既為餼釋曰賓饔餼五牢故聘義云乘禽日五雙上介三牢則三雙致饔十日之後賓不得時反始有致稍歸禽之禮士中日則二雙鄭注中猶間也不一日一雙大寡不敬也釋曰士介一牢宜日一雙凡獻執一雙委其餘于面鄭注執一雙以將命也面前也其受之也案也今注疏本訛作則上介受以入告之士舉其餘從之賓不辭拜受于庭上介執之以相拜于門中乃入授人上介授亦如之士介拜授于門外釋曰少儀曰禽加于一雙則執一雙以將命委其餘云凡獻知受之如受賓私獻之禮也不辭者歸禽禮輕上介受如賓士介受于門外皆放受饔餼禮禽羞俶獻比鄭注比放也其致之禮如乘禽也禽羞謂成熟有齊和者俶獻四時珍美新物也俶始也言其始可獻也聘義謂之時賜歸大禮之日既受饔餼請觀鄭注聘于是國欲見其宗庿之好百官之富若尤尊大之焉釋曰吳季札聘魯請觀于周樂晉韓起聘魯觀書于大史氏皆其事訝帥之自下門入鄭注帥猶道也從下門外入游觀非正也各以其爵朝服鄭注此句似非其次案今注疏本脫似非其次四字宜在凡致禮下絶爛在此案今注疏本脫絶爛在此四字士無饔無饔者無擯鄭注謂歸餼也釋曰擯當為儐大夫不敢辭君初為之辭矣鄭注此句亦非其次案今注疏本脫亦非其次四字宜在明日問大夫之下凡致禮皆用其饗之加籩豆鄭注凡致禮謂君不親饗賓及上介以酬幣致其禮也其其賓與上介也加籩豆謂其實也亦實于罋筐饗禮今亡釋曰醯醢豆實也歸饔餼有醯醢百罋無饔者無饗禮鄭注士介無饗禮凡餼大夫黍粱稷筐五斛鄭注謂大夫餼賓上介也器寡而大略釋曰君餼以多為榮故米筥器小而數多也既將公事賓請歸鄭注謂已問大夫事畢請歸不敢自專謙也主國留之饗食燕獻無日數盡殷勤也凡賓拜于朝訝聽之鄭注拜拜賜也惟稍不拜釋曰稍米稟芻薪燕則上介為賓賓為茍敬鄭注饗食君親為主尊賓也燕私樂之禮崇恩殺敬也賓不欲主君復舉禮事禮己于是辭為賓君聽之從諸公之席命為茍敬茍敬者所以小敬也更降迎其介以為賓介大夫也雖為賓猶卑于君君則不與亢禮也主人所以致敬者自敵以上釋曰燕禮記曰若與四方之賓燕則公迎之于大門外揖讓升賓為茍敬席于阼階之西北面有脀不嚌肺不啐酒其介為賓無膳尊無膳爵宰夫獻鄭注為主人代公獻無行則重賄反幣鄭注無行謂獨來復無所之也必重其賄與反幣者使者歸以得禮多為榮所以盈聘君之意也反幣謂禮玉束帛乘皮所以報聘君之享禮也昔秦康公使西乞術聘于魯辭孫而說襄仲曰不有君子其能國乎厚賄之此謂厚賄反幣者也今文曰賄反幣曰子以君命在寡君寡君拜君命之辱鄭注此贊君拜聘享辭也在存也釋曰公館賓所拜者四事此其贊辭君以社稷故在寡小君拜鄭注此贊拜夫人聘享辭也言君以社稷故者夫人與君體敵不敢當其惠也其卒亦曰寡君拜命之辱君貺寡君延及二三老拜鄭注此贊拜問大夫之辭貺賜也大夫曰老又拜送案此經文及注今注疏本在君貺寡君之前唐石經亦在此鄭注拜送賓也其辭蓋云子將有行寡君敢拜送自拜聘享至此亦非其次案今注疏本脫自拜聘享至五字及亦非其次四字蓋後人所妄刪宜承上君館之下釋曰謂宜在上文明日君館之下也然愚案君館之自終上有故加書之文此贊拜辭在重賄反幣下釋皮帛謝主人上與公館賓之節正相當其次宜在此賓于館堂楹間釋四皮束帛賓不致主人不拜鄭注賓將遂去是館留禮以禮主人所以謝之也案今注疏本脫也字不致不拜不以將别崇新敬也大夫來使無罪饗之鄭注樂與嘉賓為禮過則餼之鄭注餼之生致其牢禮也其致之辭不云君之有故耳聘義曰使者聘而誤主君不親饗食所以愧厲之也不言罪者罪將執之釋曰春秋時有執行人疑非古禮其介為介鄭注饗賓有介者賓尊行敵禮也釋曰春秋傳宋公兼饗晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也叔向蓋為趙孟介而從饗者食禮介雖從入不從食也有大客後至則先客不饗食致之鄭注卑不與尊者齊禮案今注疏本脫者字惟大聘有几筵鄭注謂受聘享時也小聘輕雖受于庿不為神位十斗曰斛十六斗曰籔十籔曰秉鄭注秉十六斛今江淮之間量名有為籔者今文籔為逾案文今注疏本訛作八二百四十斗鄭注謂一車之米秉有五籔四秉曰筥鄭注此秉謂刈禾盈手之秉也筥穧名也若今萊陽之間刈稻聚把有名為筥者詩云彼有遺秉又云此有不斂穧釋曰米禾皆有秉筥字同數異十筥曰稯十稯曰秅四百秉為一秅鄭注一車之禾三秅為千二百秉三百筥三十稯也古文稯作緵
