body:
  text: 儀禮集釋卷八宋李如圭撰燕禮席工于西階上少東樂正先升北面立于其西鄭注工瞽矇歌諷誦詩者也凡執技藝者稱工少牢饋食禮曰皇尸命工祝樂記師乙曰乙賤工也樂正于天子樂師也凡樂掌其序事樂成則告備釋曰此樂正告樂備知當天子之樂師周禮樂師下大夫四人上士八人下士十六人樂師多矣故諸侯亦有大樂正小樂正也小臣納工工四人二瑟小臣左何瑟面鼓執越內弦右手相入升自西階北面東上坐小臣坐授瑟乃降鄭注工四人者燕禮輕從大夫制也面鼓者燕尚樂可鼓者在前也越瑟下孔也內弦弦為主也相扶工也後二人徒相天子大僕二人也小臣四人祭僕六人御僕十二人皆同官釋曰大射儀工六人僕人正僕人師僕人士相工歌鹿鳴四牡皇皇者華鄭注三者皆小雅篇也鹿鳴君與臣下及四方之賓宴講道修政之樂歌也此采其已有旨酒以召嘉賓嘉賓既來示我以善道又樂嘉賓有孔昭之明德可則效也案效今注疏本訛作效四牡君勞使臣之來樂歌也此采其勤苦王事念將父母懷歸傷悲忠孝之至以勞賓也皇皇者華君遣使臣之樂歌也此采其更是勞苦自以為不及欲咨謀于賢知而以自光明也卒歌主人洗升獻工工不興左瑟一人拜受爵主人西階上拜送爵鄭注工歌乃獻之賤者先就事也左瑟便其右一人工之長者也工拜于席釋曰王制曰八十拜君命一坐再至瞽亦如之一坐再至者一坐于地而首再至地也工北面酒從東來故空其右以受獻詩簡兮曰左手執籥右手秉翟赫如渥赭公言錫爵錫爵謂此獻工之爵薦脯醢鄭注輒薦之變于大夫也釋曰禮尚異非謂貴工使人相祭鄭注使扶工者相其祭薦祭酒釋曰相祭文承薦下則長一人祭薦卒爵不拜鄭注賤不備禮主人受爵鄭注將復獻衆工也衆工不拜受爵坐祭遂卒爵辨有脯醢不祭主人受爵降奠于篚鄭注遂猶因也古文曰卒爵不拜公又舉奠觶惟公所賜以旅于西階上如初鄭注言賜者君又彌尊賓長彌卑釋曰此為大夫舉旅也卒鄭注旅畢也笙入立于縣中奏南陔白華華黍鄭注以笙播此三篇之詩縣中縣中央也鄉飲酒禮曰磬南北面奏南陔白華華黍皆小雅篇也今亡其義未聞昔周之興也周公制禮作樂采時世之詩以為樂歌所以通情相風切也其有此篇明矣後世衰微幽厲尤甚禮樂之書稍稍廢棄孔子曰吾自衛反魯然後樂正雅頌各得其所謂當時在者而復重雜亂者也惡能存其亡者乎且正考父校商之名頌十二篇于周大師案且今注疏本訛作宋歸以祀其先王至孔子二百年之間五篇而已此其信也主人洗升獻笙于西階上一人拜盡階不升堂受爵降主人拜送爵階前坐祭立卒爵不拜既爵升授主人案敖繼公云句下當有爵字如鄉飲酒鄉射禮之所云此文脫耳鄭注一人笙之長者也鄉射禮曰笙一人辨于下衆笙不拜受爵降坐祭立卒爵辨有脯醢不祭乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀鄭注間代也謂一歌則一吹也六者皆小雅篇也魚麗言大平年豐物多也此采其物多酒旨所以優賓也南有嘉魚言大平君子有酒樂與賢者共之也此采其能以禮下賢者賢者纍蔓而歸之與之宴樂也南山有臺言大平之治以賢者為本也此采其愛友賢者為邦家之基民之父母既欲其身壽考又欲其名德之長也由庚崇丘由儀今亡其義未聞遂歌鄉樂周南關雎葛菌卷耳召南鵲巢采蘩采蘋鄭注周南召南國風篇也王后國君夫人房中之樂歌也關雎言后妃之德葛菌言后妃之職卷耳言后妃之志鵲巢言國君夫人之德采蘩言國君夫人不失職也采蘋言卿大夫之妻能修其法度也昔太王王季居于岐山之陽躬行召南之教以興王業及文王而行周南之教以受命大雅云刑于寡妻至于兄弟以御於家邦謂此也其始一國耳文王作邑于豐以故地為卿士之采地乃分為二國周周公所食也召召公所食也于時文王三分天下有其二德化被于南土案南今注疏本訛作西是以其詩有仁賢之風者屬之召南焉有聖人之風者屬之周南焉夫婦之道案此下今注疏本衍者字生民之本王政之端此六篇者其教之原也故國君與其臣下及四方之賓燕用之合樂也鄉樂者風也小雅為諸侯之樂大雅頌為天子之樂鄉飲酒升歌小雅禮盛者可以進取燕合鄉樂者禮輕者可以逮下也春秋傳曰肆夏繁遏渠天子所以享元侯也文王大明綿兩君相見之樂也然則諸侯相與燕案諸侯下今注疏本衍之字升歌大雅合小雅也天子與次國小國之君燕亦如之與大國之君燕升歌頌合大雅其笙間之篇未聞釋曰歌者亦與衆聲俱作而歌之鄉飲酒自歌其樂故不言鄉樂也大師告于樂正曰案今注疏本脫于字正歌備鄭注大師上工也掌合隂陽之聲教六詩以六律為之音者也子貢問師乙曰吾聞聲歌各有宜也如賜者宜何歌也是明其掌而知之也正歌者升歌及笙各三終聞歌三終合樂三終為一備備亦成也樂正由楹內東楹之東告于公乃降復位鄭注言由楹內者以其立于堂廉也復位位在東縣之北釋曰工席在樂正東故樂正由楹內以適東楹之東也位見下左右正注射人自阼階下請立司正公許射人遂為司正鄭注君許其請因命用為司正君三舉爵樂備作矣將留賓飲酒更立司正以監之察儀法也射人俱相禮其事同釋曰三舉爵者為賓為卿為大夫舉旅也晉語曰獻公飲大夫酒令司正實爵與史蘇曰飲而無肴司正洗角觶南面坐奠于中庭升東楹之東受命西階上北面命卿大夫君曰以我安卿大夫皆對曰諾敢不安鄭注洗奠角觶于中庭明其事以自表威儀多也君意殷勤欲留賓飲酒命卿大夫以我故安或亦其實不主意于賓案此下今注疏本有也字釋曰鄉飲酒禮司正洗觶升不奠司正降自西階南面坐取觶升酌散降南面坐奠觶右還北面少立坐取觶興坐不祭卒觶奠之興再拜稽首鄭注右還將適觶南先西面也必從觶西為君之在東也少立者自嚴正慎其位案此下今注疏本有也字左還南面坐取觶洗南面反奠于其所鄭注反奠虗觶不空位也升自西階東楹之東請徹俎降案敖繼公云降衍文大射儀無之公許告于賓賓北面取俎以出膳宰徹公俎降自阼階以東鄭注膳宰降自阼階以賓親徹若君親徹然釋曰鄉飲酒主人取俎還授弟子弟子以降自西階主人降自阼階燕禮公不降故膳宰降自阼階也卿大夫皆降東面北上鄭注以將坐降待賓反也釋曰降立西階下賓反入及卿大夫皆説屨升就席公以賓及卿大夫皆坐乃安鄭注凡燕坐必説屨屨賤不在堂也禮者尚敬敬多則不親燕安坐相親之心案此下今注疏本有也字釋曰不言公降説舄則公説舄于堂上席側也凡坐于堂者説屨于堂下于室者説屨于户外少儀曰説屨於戶內者一人而巳矣謂尊者也此君尊在堂上説舄于席側可知春秋傳衛侯與諸大夫飲酒褚師聲子襪而登席公怒蓋古者見君以解襪為敬也羞庶羞鄭注謂􅍧肝膋狗胾醢也骨體所致敬也庶羞所以盡愛也敬之愛之厚賢之道釋曰案內則肝膋取狗肝一蒙之以其膋燕禮牲用狗知有肝膋狗胾醢也以經云庶羞知不但胾醢而巳大夫祭薦鄭注燕乃祭薦不敢于盛成禮也釋曰受獻禮成於祭薦五行禮為盛司正升受命皆命君曰無不醉賓及卿大夫皆興對曰諾敢不醉皆反坐鄭注皆命者命賓命卿大夫也起對必降席司正退立西序端釋曰湛露天子燕諸侯之詩曰不醉無歸鄉飲酒禮司正升相旅退立于序端東面主人洗升獻士于西階上士長升拜受觶主人拜送觶鄭注獻士用觶士賤也今文觶作觚釋曰士堂上無位故燕坐乃獻之士坐祭立飲不拜既爵其他不拜坐祭立飲鄭注他謂衆士也亦升受爵不拜釋曰笙長受爵于階上知士亦升受爵乃薦司正與射人一人司士一人執幂二人立于觶南東上鄭注大子射人司士皆下大夫二人諸侯則上士其人數亦如之司正為上釋曰司正在上庭長也此皆有事者故别在觶南北面而先薦司士士中之尊者辨獻士士既獻者立于東方西面北上乃薦士鄭注每巳獻而即位于東方蓋尊之畢獻薦于其位釋曰庭中之位東方為尊卿大夫己獻升堂故士變即卿位祝史小臣師亦就其位而薦之鄭注次士獻之已不變位位自在東方主人就旅食之尊而獻之旅食不拜受爵坐祭立飲鄭注北面酌南鄉獻之于尊南不洗者以其賤略之也亦畢獻乃薦之主人執虗爵奠于篚復位釋曰旅食之尊北面酌者尊後北面酌向君也若射則大射正為司射如鄉射之禮鄭注大射正射人之長者也如鄉射之禮者燕為樂卿大夫宜從其禮也如者如其告弓矢既具至退中與算也納射器而張侯其告請先于君乃以命賓及卿大夫其為司正者亦為司馬君與賓為耦鄉射記案此下原本有云字今注疏本作曰並衍文自君射至龍旜亦其異者也薦旅食乃射者是燕射主于飲酒釋曰大射主于射大夫未舉旅則射行葦之詩曰或肆之筵或授之几肆筵設席授几有緝御或獻或酢洗爵奠斚醓醢以薦或燔或炙嘉殽脾臄或歌或咢敦弓既堅四鍭既鈞舍矢既均序賓以賢敦弓既句既挾四鍭四鍭如樹序賓以不侮王肅以為燕射于燕旅酬後為之春秋傳襄二十九年普范獻子來聘公享之射者三耦亦燕射也賓降洗升媵觚于公酌散下拜公降一等小臣辭賓升再拜稽首公答再拜鄭注此當言媵觶酬之禮皆用觶言觚者字之誤也古者觶字或作角旁氏由此誤耳釋曰考工記云獻以爵而酬以觚馬季長云觚當為觶誤同此賓受公賜多矣禮將終故媵觶以序厚意賓坐祭卒爵再拜稽首公答再拜賓降洗象觶升酌膳坐奠于薦南降拜小臣辭賓升成拜公答再拜賓反位鄭注反位反席也今文曰洗象觚公坐取賓所媵觶興惟公所賜鄭注至此又言興者明公崇禮不倦也今文觶又為觚釋曰此為士舉旅也既燕坐而又言興明不倦矣受者如初受酬之禮降更爵洗升酌膳下拜小臣辭升成拜公答拜乃就席坐行之鄭注坐行之若今坐相勸酒有執爵者鄭注士有盥升主酌授之者釋曰前舉旅皆酬者自酌至此有士執爵行之惟受于公者拜鄭注公所賜者也其餘則否司正命執爵者爵辨卒受者興以酬士鄭注欲令惠均大夫卒受者以爵興西階上酬士士升大夫奠爵拜士答拜鄭注興酬士者士立堂下無坐位大夫立卒爵不拜實之士拜受大夫拜送士旅于西階上辨鄭注祝史小臣旅食皆及焉釋曰庶子以下未獻故亦未酬無算爵乃及之士旅酌鄭注旅序也士以次序自酌相酬無執爵者卒主人洗升自西階獻庶子于阼階上如獻士之禮辨降洗遂獻左右正與內小臣皆于阼階上如獻庶子之禮鄭注庶子掌正六牲之體及舞位使國子修德學道世子之官也而與膳宰樂正聫事樂正亦教國子以以舞左右正謂樂正僕人正也小樂正立于西縣之北僕人正僕人師僕人士立于其北北上大樂正立于東縣之北若射則僕人正僕人士陪于工後內小臣奄人掌君陰事陰令后夫人之官也皆獻于阼階上别于外內臣也獻正下及內小臣則磬人鍾人鑮人鼓人僕人之屬盡獻可知也凡獻皆薦也釋曰云左右正則二樂正分居東西各監一縣也僕人亦相工者工席在西階上僕人宜近其事故立于西縣北北統于堂案鄉射禮射時遷樂于下工降阼階下之東南西面北上坐樂正北面立于其南燕禮若射則是時僕人陪于工後亦在樂正之北也燕義曰席小卿次上卿大夫次小卿士庶子以次就位于下獻君君舉旅行酬而后獻卿卿舉旅行酬而后獻大夫大夫舉旅行酬而后獻士士舉旅行酬而后獻庶子爼豆牲體薦羞皆有等差所以明貴賤也無算爵鄭注算數也爵行無次無數惟意所勸醉而止士也有執膳爵者有執散爵者執膳爵者酌以進公公不拜受執散爵者酌以之公命所賜所賜者興受爵降席下奠爵再拜稽首公答拜鄭注席下席西也古文曰公答再拜釋曰前受公爵者皆降拜升成拜至此拜席下而已席以東為上統于君受賜爵者以爵就席坐公卒爵然後飲鄭注不敢先虗爵明此勸惠從尊者來也執膳爵者受公爵酌反奠之鄭注宴歡在于飲酒成其意受賜爵者興授執散爵者案各本脫此者字大射儀亦有此文今據以訂輔執散爵者乃酌行之鄭注豫其所勸者惟受爵于公者拜卒受爵者興以酬士于西階上士升大夫不拜乃飲實爵鄭注乃猶而也釋曰卒受爵者自酌酬士不使執爵者不以己尊孤人也前為士舉旅時大夫猶拜至此不拜禮又殺士不拜受爵大夫就席士旅酌亦如之公有命徹幂則卿大夫皆降西階下北面東上再拜稽首公命小臣辭公答再拜大夫皆辟鄭注命徹幂者公意殷勤必盡酒也小臣辭不升成拜明雖醉正臣禮也不言賓賓彌臣也君答拜于上示不虗受也釋曰鄉飲酒賓至則徹幂者酒賓主共之君専大惠其尊恐塵加之故有命乃徹遂升反坐士終旅于上如初鄭注卿大夫降而爵止于其反席卒之無算樂鄭注升歌間合無數也取歡而已其樂章亦然宵則庶子執燭于阼階上司宫執燭于西階上甸人執大燭于庭閽人為大燭于門外鄭注宵夜也燭燋也甸人掌共薪蒸者庭大燭為位廣也閽人門人也為作也作大燭以俟賓客出釋曰燋在地曰燎執之曰燭以荆為之燕禮輕無庭燎設大燭而已賓醉北面坐取其薦脯以降鄭注取脯重得君賜奏陔鄭注陔陔夏樂章也賓出奏陔夏以為行節也凡夏以鍾鼓奏之賓所執脯以賜鍾人于門內霤遂出鄭注必賜鍾人鍾人掌以鍾鼓奏九夏今奏陔以節巳用賜脯以報之明雖醉不忘禮古文賜作錫卿大夫皆出鄭注隨賓出也公不送鄭注賓禮訖是臣也公與客燕鄭注謂四方之使者曰寡君有不腆之酒以請吾子之與寡君須臾焉使某也以請鄭注君使人戒客辭也禮使人各以其爵寡鮮也猶言少德謙也腆善也上介出請入告古文腆皆作殄今文皆曰不腆酒無之對曰寡君君之私也君無所辱賜于使臣臣敢辭鄭注上介出答主國使者辭也私謂獨有恩厚也君無所為辱賜于使臣謙不敢當也敢者怖懼用勢決之辭寡君固曰不腆使某固以請寡君君之私也君無所辱賜于使臣臣敢固辭鄭注重傳命固如故寡君固曰不腆使某固以請某固辭不得命敢不從鄭注許之也于是出見主國使者辭以見許為得命今文無使某釋曰公食大夫賓三辭燕禮輕故再辭而許致命曰寡君使某有不腆之酒以請吾子之與寡君須臾焉鄭注親相見致君命辭也君貺寡君多矣又辱賜于使臣臣敢拜賜命鄭注貺賜也猶愛也敢拜賜命從使者拜君之賜命猶謙不必辭也釋曰客從使者來就燕而云拜賜命謙不敢必有燕事記燕朝服于寢鄭注朝服者諸侯與其羣臣日視朝之服也謂冠玄端緇帶素韠白屨也燕于路寢相親昵也今辟雍十月行此燕禮玄冠而衣皮辨服與禮異也釋曰檀弓曰平公飲酒師曠李調侍鼓鍾杜蕢自外來聞鍾聲曰安在曰在寢飲酒者燕也在寢燕于寢也侍者與君飲也下記云請旅侍臣鼓鍾謂樂作奏肆夏履復底曰舄襌底曰屨朝服之履諸侯則白舄其牲狗也案今注疏本脫此四字鄭注狗取擇人也明非其人不與為禮也案今注疏本脫注文十四字亨于門外東方鄭注亨于門外臣所掌也若與四方之賓燕則公迎之于大門內揖讓升鄭注四方之賓謂來聘者也自戒至于拜至皆如公食亦告饌具而後公即席小臣請執幂請羞者乃迎賓也賓為茍敬席于阼階之西北面有脀不嚌肺不啐酒其介為賓鄭注茍且也假也主國君饗時親進醴于賓今燕又宜獻焉人臣不敢褻煩尊者至此升堂而辭讓欲以臣禮燕為恭敬也于是席之如獻諸公之位言茍敬者賓實主國所宜敬也脀折爼也不嚌啐似若尊者然也介門西北面西上公降迎上介以為賓揖讓升如初禮主人獻賓獻公既獻茍敬乃媵觚羣臣即位如燕也釋曰饗食在庿燕在寢饗重而燕輕饗既親獻也故燕以介為賓而席賓于諸公之坐以介為賓而後公可以無親獻也茍敬之席在公之左春秋傳宋公與魯叔孫昭子宴飲酒樂宋公使昭子右坐右坐者居公之右改禮坐也不嚌啐如卿之禮茍者聊且粗略之意茍敬猶曰殺敬也無膳尊無膳爵鄭注降尊以就卑也釋曰不自尊别于外臣與卿燕則大夫為賓與大夫燕亦大夫為賓鄭注不以所與燕者為賓者燕為序歡心賓主敬也公父文伯飲南宫敬叔酒以路堵父為客此之謂也君恆以大夫為賓者案恆今注疏本訛作但大夫卑雖尊之猶逺于君今文無則下無燕釋曰與四方之賓燕則其介為賓亦事之宜羞膳者與執幂者皆士也鄭注尊君也膳宰卑于士羞卿者小膳宰也鄭注膳宰之佐也若以樂納賓則賓及庭奏肆夏賓拜酒主人答拜而樂闋公拜受爵而奏肆夏公卒爵主人升受爵以下而樂闋鄭注肆夏樂章也今亡以鍾鑮播之鼓磬應之所謂金奏也記曰入門而縣興示易以敬也卿大夫有王事之勞則奏此樂焉釋曰樂闋樂止也郊特牲曰大夫之奏肆夏由趙文子始也升歌鹿鳴下管新宫笙入三成鄭注新宫小雅逸篇也管之入三成謂三終也釋曰宋公享叔孫昭子賦新宫與此所笙奏或謂即斯干之詩遂合鄉樂鄭注鄉樂周南召南六篇言遂者不間也釋曰不間歌若舞則勺鄭注勺頌篇告成大武之樂歌也其詩曰於鑠王師遵養時晦又曰實維爾公允師既合鄉樂萬舞而奏之所以美王侯勸有功也惟公與賓有俎鄭注主于燕其餘可以無俎釋曰大射公卿皆有俎獻公曰臣敢奏爵以聽命鄭注授公釋此辭不敢必受之凡公所辭皆栗階鄭注栗蹙也謂越等急趨君命也凡栗階不過二等鄭注其始升猶聚足連步越二等左右足各一發而升堂釋曰二等上二等也連步者謂前足躡一等後足從之并足相隨不相過曲禮所謂拾級聚足連步以上也栗階者至其上二等左右各足一發而升堂其始升猶連步凡公所酬既拜請旅侍臣鄭注既拜謂自酌升拜時也擯者阼階下告于公還西階下告公許旅行也請行酒于羣臣必請者不専惠也凡薦與羞者小膳宰也鄭注謂于卿大夫以下也上特言羞卿者小膳宰者案今注疏本脫者字欲絶于賓羞賓者亦士有內羞鄭注謂羞豆之實酏食糝食羞籩之實糗餌粉餈釋曰內羞房中之羞也以榖物為之君與射則為下射袒朱襦樂作而后就物鄭注君尊小臣以巾授矢稍屬鄭注君尊不搢矢釋曰屬續授之不以樂志鄭注辟不敏也既發則小臣受弓以授弓人鄭注俟復發也不使大射正燕射輕上射退于物一笴既發則答君而俟鄭注答對若飲君燕則夾爵鄭注謂君在不勝之黨賓飲之如燕媵觚則又夾爵釋曰將飲君先自飲君既飲又自飲君在大夫射則肉袒鄭注不纁襦厭于君若與四方之賓燕媵爵曰臣受賜矣臣請贊執爵者鄭注受賜謂公鄉者酬之案酬今注疏本訛作酌至燕主人事賓之禮殺賓降洗升媵觶于公答恩惠也相者對曰吾子無自辱焉鄭注辭之也對答也亦告公以公命答之也有房中之樂鄭注絃歌周南召南之詩而不用鍾磬之節也謂之房中者后夫人之所諷誦以事其君子釋曰與四方賓燕有之
