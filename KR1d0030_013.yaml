body:
  text: 儀禮集釋卷十三宋李如圭撰聘禮賓朝服問卿鄭注不皮辨别于主君卿每國三人卿受于祖庿鄭注重賓禮也祖王父也下大夫擯鄭注無士擯者既接于君所急見之釋曰不必備士擯擯者出請事大夫朝服迎于外門外再拜賓不答拜揖大夫先入每門每曲揖及庿門大夫揖入鄭注入者省內事也既而俟于寧也釋曰爾雅曰門屏之間謂之寧郭氏曰人君視朝所寧立處李巡曰正門內兩孰間曰寧孫炎曰門內屏外人君所寧立處也案人君路門外有正朝故視朝則寧立于門內兩孰間門屏之間者謂門內屏外据諸侯內屏而言也此經言大夫揖入則既入門內矣下云三揖竝行凡至門內霤為三揖之始則省內事之後出俟于內霤南兩孰之間也擯者請命鄭注亦從入而出請不几筵辟君也庭實設四皮鄭注麋鹿皮也賓奉束帛入三揖皆行至于階讓鄭注皆猶竝也古文曰三讓賓升一等大夫從升堂北面聽命鄭注賓先升使者尊釋曰尊聘君之命賓東面致命鄭注致其君命大夫降階西再拜稽首賓辭升成拜受幣堂中西北面鄭注于堂中央之西受幣趨聘君之命賓降出大夫降授老幣無擯案擯今注疏本作儐據前無擯下集釋云當作儐下經記無擯及注不擯賓同則其訛己久鄭注不擯賓辟君也釋曰案卿受問之儀與賓受饔餼禮同惟在君側不擯賓為異耳擯者出請事賓面如覿幣鄭注面亦見也其謂之面威儀質也釋曰如覿幣亦束錦乘馬春秋傳楚公子棄疾聘于晉過鄭鄭罕虎公孫僑游吉從鄭伯勞諸柤辭不敢見固請見之以其乘馬八匹私面見子皮以馬六匹見子産以馬四匹見子大叔以馬二匹非常禮故見鄭伯亦曰私面賓奉幣庭實從鄭注庭實四馬入門右大夫辭鄭注大夫于賓入自階下辭迎之賓遂左鄭注見私事也雖敵賓猶謙入門右為若降等然曲禮曰客若降等則就主人之階主人固辭于客然後客復就西階釋曰復音服庭實設揖讓如初鄭注大夫至庭中旋竝行大夫升一等賓從之鄭注大夫先升道賓大夫西面賓稱面鄭注稱舉也舉相見之辭以相接大夫對北面當􅎝再拜受幣于楹間南面退西面立鄭注受幣楹間敵也賓亦振幣進北面授賓當􅎝再拜送幣降出大夫降授老幣擯者出請事上介特面幣如覿介奉幣鄭注特面者異于主君士介不從而入也君尊衆介始覿不自别也上賓則衆介皆從之釋曰上賓面卿亦從介如覿介統于賓也衆介不統于上介上介面卿雖不自同于衆介亦不敢從衆介皮二人贊鄭注亦儷皮也入門右奠幣再拜鄭注降等也大夫辭鄭注于辭上介則出擯者反幣鄭注出還于上介也釋曰亦反皮庭實設介奉幣入大夫揖讓如初鄭注大夫亦先升一等今文曰入設介升大夫再拜受鄭注亦于楹間南面而受介降拜大夫降辭介升再拜送幣鄭注介既送幣降出也大夫亦受老幣擯者出請衆介面如覿幣入門右奠幣皆再拜大夫辭介逆出擯者執上幣出禮請受賓辭鄭注賓亦為士介辭大夫答再拜擯者執上幣立于門中以相拜士介皆辟老受擯者幣于中庭士三人坐取羣幣以從之擯者出請事賓出大夫送于外門外再拜賓不顧鄭注不顧言去擯者退大夫拜辱鄭注拜送也下大夫嘗使至者幣及之鄭注嘗使至己國則以幣問之也君子不忘舊釋曰使所吏反下夫使同上介朝服三介問下大夫下大夫如卿受幣之禮鄭注上介三介下大夫使之禮也釋曰小聘使下大夫降于卿二等三介問下大夫使上介者同班敵也其面如賓面于卿之禮大夫若不見鄭注有故也君使大夫各以其爵為之受如主人受幣禮不拜鄭注各以其爵主人卿也則使卿大夫也則使大夫不拜代受之耳不當主人禮也釋曰不拜猶奉使者不答拜也夕夫人使下大夫韋辨歸禮鄭注夕問卿之夕也使下大夫下君也君使之云夫人者以致辭當稱寡小君堂上籩豆六設于户東西上二以竝東陳鄭注籩豆六者下君禮也設于户東又辟饌位也其設脯其南醢屈六籩六豆釋曰致饔餼堂上之饌八設于户西壺設于東序北上二以竝南陳醙黍清皆兩壺鄭注醙白酒也凡酒稻為上黍次之粱次之皆有清白以黍間清白者互相備明三酒六壺也先言醙白酒尊先設之釋曰上介四豆四籩四壺知此六豆六籩六壺大夫以束帛致之鄭注致夫人命也此禮無牢下朝君也賓如受饔之禮儐之乘馬束錦上介四豆四籩四壺受之如賓禮鄭注四壺無稻酒也不致牢下于君也釋曰饔餼有牢儐之兩馬束錦明日賓拜禮于朝鄭注于是乃言賓拜明介從拜也今文禮為醴釋曰夫人禮不及士介亦下于君大夫餼賓大牢米八筐鄭注其陳于門外黍粱各二筐稷四筐二以竝南陳無稻牲陳于後東上不饌于堂庭辟君也釋曰君餼賓亦牲在米南東上賓迎再拜老牽牛以致之賓再拜稽首受老退賓再拜送鄭注老室老大夫之貴臣上介亦如之衆介皆少牢米六筐皆士牽羊以致之鄭注米六筐者又無粱也士亦大夫之貴臣公于賓一食再饗鄭注饗謂亨大牢以飲賓也公食大夫禮曰設洗如饗則饗與食互相先後也古文一皆為一今文饗皆為鄉燕與羞俶獻無常數鄭注羞謂禽羞鴈鶩之屬成熟煎和也俶始也始獻四時新物聘義所謂時賜無常數由恩意也古文俶作淑釋曰曰羞則若內羞庶羞知成熟煎和者聘義曰主國待客出入三積餼客于舍五牢之具陳于內米三十車禾三十車芻薪倍禾皆陳于外乘禽日五雙羣介皆有餼牢一食再饗燕與時賜無數所以厚重禮也賓介皆明日拜于朝上介一食一饗鄭注饗食賓介為介從饗獻矣復特饗之客之也若不親食使大夫各以其爵朝服致之以侑幣如致饔無儐鄭注君不親食謂有疾及他故也必致之不廢其禮也致之必使同班敵者易以相親敬也致禮于卿使卿致禮于大夫使大夫非必命數也無儐以己本宜往古文侑皆作宥致饗以酬幣亦如之鄭注酬幣饗禮酬賓勸酒之幣也所用未聞也禮幣束帛乘馬亦不是過也禮器曰琥璜爵蓋天子酬諸侯釋曰琥璜爵者用琥若璜以將酬幣也春秋傳秦后子享晉侯有酬幣聘義曰卿為上擯大夫為承擯士為紹擯君親禮賓賓私面私覿致饔餼還圭璋賄贈饗食燕所以明賓客君臣之義也夫夫于賓一饗一食上介若食若饗若不親饗則公作大夫致之以酬幣致食以侑幣鄭注作使也大夫有故君必使其同爵者為之致之列國之賓來榮辱之事君臣同之釋曰燕不致者燕無幣故也春秋傳韓宣子來聘宴于季氏則大夫亦有燕賓之禮君使卿皮辨還玉于館鄭注玉圭也君子于玉比德焉以之聘重禮也還之者德不可取于人相切厲之義也皮辨者始以此服受之不敢不終也釋曰聘義曰以圭璋聘重禮也己聘而還圭璋此輕財而重禮之義也諸侯相厲以輕財重禮則民作讓矣賓皮辨襲迎于外門外不拜帥大夫以入鄭注迎之不拜示將去不純為主也帥道也今文曰迎于門外古文帥為率大夫升自西階鉤楹鄭注鉤楹由楹內將南面致命致命不東面以賓在下也必言鉤楹者賓在下嫌楹外也賓自碑內聽命升自西階自左南面受圭退負右房而立鄭注聽命于下敬也自左南面右大夫且竝受也必竝受者若嚮君前耳案嚮各本作鄉今從釋文及張淳儀禮識誤訂正退為大夫降逡遁今文或曰由自西階無南面釋曰竝受者若在主國君前受也賓介初受圭于君前亦同面先儒說大夫士直有東房天子諸侯乃有左右房此大夫之庿而有右房或曰此公館也故有右房當考大夫降中庭賓降自碑內東面授上介于阼階東鄭注大夫降出言中庭者為賓降節也授于阼階東者欲親見賈人藏之也賓還阼階下西面立上介出請賓迎大夫還璋如初入鄭注出請請事于外以入告也賓雖將去出入猶東惟升堂由西階凡介之位未有改也賓裼迎大夫賄用束紡鄭注賄子人財之言也紡紡絲為之今之縳也所以遺聘君可以為衣服相厚之至釋曰還圭以報聘禮玉束帛乘皮以報享復加此束紡以厚聘君也禮玉束帛乘皮鄭注禮禮聘君也所以報享也亦言玉璧可知也今文禮皆作醴釋曰圭璋言還禮玉言禮則主國自以璧琮報享也卿不報聘君之幣者尊卑不敵皆如還玉禮大夫出賓送不拜公館賓鄭注為賓將去親存送之厚殷勤且謝聘君之意也公朝服賓辟鄭注不敢受主國君見己于此館也案今注疏本脫主字此亦不見言辟者君在庿門敬也凡君有事于諸臣之家車造庿門乃下上介聽命鄭注聽命于庿門中西面如相拜然也擯者每贊君辭則曰敢不承命告于寡君之老聘享夫人之聘享問大夫送賓公皆再拜鄭注拜此四事公東面拜擯者北面釋曰孔子問人于他邦再拜而送之公退賓從請命于朝鄭注賓從者實為拜主君之館己也言請命者以己不見不敢斥尊者之意公辭賓退鄭注辭其拜也退還館裝駕為旦將發也周禮曰賓從拜辱于朝明日客拜禮賜遂行賓三拜乘禽于朝訝聽之鄭注發去乃拜乘禽明己受賜大小無不識釋曰乘禽所謂禮賜遂行舍于郊鄭注始發且宿近郊自展軨公使卿贈如覿幣鄭注贈送也所以好送之也言如覿幣見為反報也今文公為君釋曰贈贈賄也布帛曰賄賄用束紡是也春秋傳曰入有郊勞出有贈賄齊國莊子來聘自郊勞至于贈賄禮成而加之以敏魯昭公如晉自郊勞至于贈賄無失禮則諸侯相朝郊勞贈賄之節亦同也贈之多少視覿幣秦西乞術來聘魯以為君子厚賄之厚賄之則所贈加于覿幣受于舍門外如受勞禮無儐鄭注不入無儐明去而宜有己也如受勞禮以贈勞同節使下大夫贈上介亦如之使士贈衆介如其覿幣大夫親贈如其面幣無儐贈上介亦如之使人贈衆介如其面幣士送至于竟使者歸及郊請反命鄭注郊近郊也告郊人使請反命于君也案請今注疏本訛作言必請之者以己久在外嫌有罪惡不可以入春秋時鄭惡其大夫髙克使之將兵逐而不納此蓋請而而不得入朝服載旜鄭注行時稅舍于此郊今還至此正其故行服以俟君命敬也古文旜作膳禳乃入鄭注禳祭名也為行道纍厯不祥禳之以除災凶乃入陳幣于朝西上上賓之公幣私幣皆陳上介公幣陳他介皆否鄭注皆否者公幣私幣皆不陳此幣使者及介所得于彼國君卿大夫之贈賜也其或陳或不陳詳尊而略卑也其陳之及卿大夫處者待之如夕幣其禮于君者不陳上賓使者公幣君之賜也私幣卿大夫之幣也他介士介也言他容衆從者釋曰陳幣者榮己之賜也禮于君者謂束紡束帛乘皮不陳執以反命也束帛各加其庭實皮左鄭注不加其皮上榮其多也公南鄉鄭注亦宰告于君君乃朝服出門左南鄉卿進使者使者執圭垂繅北面上介執璋屈繅立于其左鄭注此主于反命士介亦隨入竝立東上反命曰以君命聘于某君某君受幣于某宫某君再拜以享某君某君再拜鄭注君亦揖使者進之乃進反命也某君某國君也某宫若言桓宫僖宫也某君再拜謂再拜受也必言此者明彼君敬已君不辱命宰自公左受玉鄭注亦于使者之東同面竝受也不右使者由便也受上介璋致命亦如之鄭注變反言致者若云非君命也致命曰以君命聘于某君夫人某君再拜以享于某君夫人某君再拜不言受幣于某宫可知略之執賄幣以告曰某君使某子賄授宰鄭注某子若言髙子國子凡使者所當以告君者上介取以授之賄幣在外也禮玉亦如之鄭注亦執束帛加璧也告曰某君使某子禮宰受之士隨自後左士介受乘皮如初上介出取玉束帛士介從取皮也案從今注疏本訛作後釋曰士受皮者亦如受享時由執皮者後惟左士介為異耳執禮幣以盡言賜禮鄭注禮幣主國君初禮賓之幣也以盡言賜禮謂自此至于贈公曰然而不善乎鄭注善其能使于四方而猶女也釋曰使所吏反授上介幣再拜稽首公答再拜鄭注授上介幣當拜公言也不授宰者當復陳之釋曰復陳于故處私幣不告鄭注亦略卑也君勞之再拜稽首君答再拜鄭注勞之以道路勤苦若有獻則曰某君之賜也鄭注言此物某君之所賜豫為惠者也其所獻雖珍異不言某為彼君服御物謙也其大夫出反必獻忠孝也君其以賜乎鄭注不必其當君也獻不拜者為君之答己也上介徒以公賜告如上賓之禮鄭注徒謂空手不執其幣君勞之再拜稽首君答拜勞士介亦如之鄭注士介四人旅答一拜又賤也君使宰賜使者幣使者再拜稽首鄭注以所陳幣賜之也禮臣子人賜之而必獻之君父不敢自私服也君父因以豫之則拜受之如更受賜也既拜宰以上幣授之賜介介皆再拜稽首鄭注士介之幣皆載以造朝不陳之耳與上介同受賜命俱拜既拜宰亦以上幣授上介釋曰至此不别上介知與士介同拜賜乃退鄭注君揖入皆出去介皆送至于使者之門鄭注將行俟于門反又送于門與尊長出入之禮也乃退揖鄭注揖别也使者拜其辱鄭注隨謝之也再拜上介三拜士介釋曰士卑禮之各一拜釋幣于門鄭注門大門也主于闑布席于闑西閾外東面設洗于門外東方其餘如初于禰時出于行入于門不兩告告所先見也釋曰特牲饋食設筮席于門中闑西閾外西面此東面者神位在西也洗當東榮故門外設之亦于東方乃至于禰筵几于室薦脯醢鄭注告反也薦進也觴酒陳鄭注主人酌進奠一獻也言陳者將復有次也先薦後酌祭禮也行釋幣反釋奠略出謹入也釋曰燕飲先獻而後薦祭禮先薦而後奠不言奠而曰陳者陳者次第之言并後再獻俱列之席于阼鄭注為醉主人也醉主人者祝取爵酌不醉于室異于祭釋曰饋食禮祝酌酢主人于室薦脯醢鄭注成酢禮也三獻鄭注室老亞獻士三獻也每獻奠輒取爵酌主人自酢也一人舉爵鄭注三獻禮成更起酒也主人奠之未舉也獻從者鄭注從者家臣從行者也主人獻之勞之也皆升飲酒于西階上不使人獻之辟國君也行酬乃出鄭注主人舉奠酬從者下辨室老亦與焉也上介至亦如之釋曰士之初行不釋幣故反亦不告祭
