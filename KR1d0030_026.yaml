body:
  text: 儀禮集釋卷二十六特牲饋食禮第十五鄭目録云特牲饋食之禮謂諸侯之士祭祖禰非天子之士而于五禮屬吉禮案此條有脫誤釋文引鄭云諸侯之士以嵗時祭其祖庿之禮又疏云鄭知非天子之士而云諸侯之士者似釋文所引乃鄭目録本文此云非天子之士及而字皆疏內字訛入注文于五禮屬吉禮下又脫大戴第七小戴第十三别録第十五凡十四字釋曰諸侯之士祭其祖禰之禮特牲一豕也韋昭曰凡牲一為特二為牢曲禮曰凡祭大夫以索牛士以羊豕者謂天子之大夫士特牲饋食之禮不諏日鄭注祭祀自孰始曰饋食饋食者食道也諏謀也士賤職褻時至事暇可以祭則筮其日矣不如少牢大夫先與有司于庿門諏丁巳之日今文諏皆為詛案今注疏本脫此六字釋曰饋食薦孰也大夫士之祭不祼不薦血腥而自薦孰始故名其禮曰饋食天子諸侯薦孰以前有祼鬯薦血腥之禮及筮日主人冠端玄即位于門外西面鄭注冠端玄玄冠玄端下言玄者玄冠有不玄端者門謂庿門釋曰玄冠一冠冠玄端朝服二服士冠禮言筮于庿門此祭于庿筮于庿門可知筮日者孝子不知鬼神降格之期故因卜筮以請敬之至也子姓兄弟如主人之服立于主人之南西面北上鄭注所祭者之子孫言子姓者子之所生小宗祭而兄弟皆來與焉宗子祭則族人皆侍釋曰姓之言生也兄弟猶言族親也祭統曰有事于太廟則羣昭羣穆咸在而不失其倫此之謂親疏之殺有司羣執事如兄弟服東面北上鄭注士之屬吏也席于門中闑西閾外鄭注為筮人設之也古文闑作𣙗案𣙗今注疏本訛作栔閾作蹙筮人取筮于西孰執之東面受命于主人鄭注筮人官名也筮問也取其所用問神明者謂蓍也釋曰孰門側之堂士冠禮筮饌于西孰宰自主人之左贊命命曰孝孫某筮來日某諏此某事適其皇祖某子尚饗鄭注宰羣吏之長自由也贊佐也達也贊命由左者為神求變也士祭曰嵗事此言某事又不言妃者容大祥之後禫月之吉祭皇君也言君祖者尊之也某子者祖字也伯子仲子尚庶幾也釋曰郊特牲曰祭稱孝孫孝子以其義稱也禫月之吉祭猶未配喪祭又不言嵗事故空其文兼見此祭少牢饋食禮曰用薦嵗事以其妃配此下宿賓辭亦曰薦嵗事筮者許諾還即席西面坐卦者在左卒筮寫卦筮者執以示主人鄭注士之筮者坐蓍短由便卦者主畫地識爻爻備以方寫之釋曰三正記曰天子蓍長九尺諸侯七尺大夫五尺士三尺少牢禮立筮主人受視反之鄭注反還筮者還東面長占卒告于主人占曰吉鄭注長占以其屬之長幼旅占之若不吉則筮逺日如初儀鄭注逺日旬之外日釋曰曲禮云旬之內曰近某日旬之外曰逺某日上旬內筮不吉則筮中旬不吉復筮下旬復不吉則止大夫以上則前一旬筮之宗人告事畢前期三日之朝筮尸如求日之儀命筮曰孝孫某諏此某事適其皇祖某子筮某之某為尸尚饗鄭注三日者容宿賓視濯也某之某者字尸父而名尸連言其親庶幾其馮依之也大夫士以孫之倫為尸釋曰祭前二日宿賓前一日視濯曲禮曰為人子者祭祀不為尸則尸筮無父者天子諸侯之祭亦用孫之倫為尸取有爵者為之乃宿尸鄭注宿讀為肅肅進也進之者使知祭日當來古文宿皆作羞凡宿或作速記作肅周禮亦作宿釋曰速賓肅客宿視滌濯是也乃緩辭宿尸宿賓同日主人立于尸外門外子姓兄弟立于主人之後北面東上鄭注不東面者來不為賓客子姓立于主人之後上當其後釋曰祭統曰孫為王父尸所使為尸者于祭者子行也父北面而事之所以明子事父之道也尸如主人服出門左西面鄭注不敢南面當尊主人辟皆東面北上鄭注順尸主人再拜尸答拜鄭注主人先拜尊尸宗人擯辭如初卒曰筮子為某尸占曰吉敢宿鄭注宗人擯者釋主人之辭如初者如宰贊命筮尸之辭卒曰者著其辭所易也今文無敢案今注疏本脫此四字祝許諾致命鄭注受宗人辭許之傳命于尸始宗人祝北面至于傳命皆西面受命東面釋之釋曰始時宗人祝從主人北面尸許諾主人再拜稽首鄭注其許亦宗人受于祝而告主人尸入主人退鄭注相揖而去尸不拜送尸尊宿賓賓如主人服出門左西面再拜主人東面答再拜宗人擯曰某薦嵗事吾子將涖之敢宿鄭注薦進也涖臨也言吾子將臨知賓在有司中今特肅之尊賓耳釋曰賓即筮時有司知有祭事矣不筮賓者主人為獻主賓助祭而巳賓曰某敢不敬從主人再拜賓答拜主人退賓拜送厥明夕陳鼎于門外北面北上有冪鄭注厥其也宿賓之明日夕門外北面當門古文冪為密釋曰不言門之東西知當門棜在其南南順實獸于其上東首鄭注順猶從也棜之制如今大木輿矣上有四周下無足獸臘也牲在其西北首東足鄭注其西棜西也東足者尚右也牲不用棜以其生釋曰牲豕也縛其足寢左設洗于阼階東南壺禁在東序豆籩鉶在東房南上几席兩敦在西堂鄭注東房房中之東當夾北西堂西夾之前近南耳案西夾下各本衍室字據疏引注文刪正釋曰大夫士直曰房此言東房明在房中之東當東夾室之北也西堂西廂也釋宫曰室有東西廂曰廟郭曰夾室前堂主人及子姓兄弟即位于門東如初鄭注初筮位也賓及衆賓即位于門西東面北上鄭注不蒙如初者以宰在而宗人祝不在案宰今注疏本訛作賓釋曰賓及衆賓即筮時有司羣執事也筮時祝宗人在其中惟宰在門東今宰在衆賓中祝宗人别自為位與筮位異宗人祝立于賓西北東面南上鄭注事彌至位彌異宗人祝于祭宜近庿主人再拜賓答再拜三拜衆賓衆賓答再拜鄭注衆賓再拜者士賤旅之得備禮也釋曰少牢下篇大夫三拜衆賓衆賓皆答一拜不再拜者辟國君主人揖入兄弟從賓及衆賓即位于堂下如外位鄭注為視濯也宗人升自西階視壺濯及豆籩反降東北面告濯具鄭注濯溉也不言敦鉶者省文也東北面告緣賓意欲聞也言濯具不言潔以有几席釋曰几席不濯告具而已賓出主人出皆復外位鄭注為視牲也今文復為反案今注疏本脫此五字宗人視牲告充雍正作豕鄭注充猶肥也雍正官名也北面以策動作豕視聲氣釋曰周禮充人展牲則告牲牲無疾則聲氣和宗人舉獸尾告備舉鼎冪告潔鄭注備具請期曰羮飪鄭注肉謂之羮飪孰也謂明日質明時而曰肉孰重豫勞賓宗人既得期西北面告賓有司釋曰少牢饋食禮為期宗人北面告事畢賓出主人拜送夙興主人服如初立于門外東方南面視側殺鄭注夙早也興起也主人服如初則其餘有不玄端者側殺殺一牲也釋曰不記賓及兄弟服朝服惟尸祝佐食同主人服玄端側猶特也主婦視饎爨于西堂下鄭注炊黍稷曰饎宗婦為之爨竈也西堂下者堂之西下也近西壁南齊于坫古文饎作糦周禮作􅐪釋曰坫在堂角既夕記曰設棜于東堂下南順齊坫案坫上各本有于字釋文舉齊坫二字可證于字乃衍文如在東西堂下者皆齊于坫亨于門外東方西面北上鄭注亨煮也煮豕魚臘以鑊各一爨詩云誰能亨魚溉之釡鬵羮飪實鼎陳于門外如初鄭注初視濯也尊于户東玄酒在西鄭注户東室户東玄酒在西尚之凡尊酌者在左實豆籩鉶陳于房中如初鄭注如初者取而實之既而反之執事之俎陳于階間二列北上鄭注執事謂有司及兄弟二列者因其位在東西祝主人主婦之俎亦存焉不升鼎者異于神盛兩敦陳于西堂藉用雈几席陳于西堂如初鄭注盛黍稷者宗婦也雈細葦古文用為于尸盥匜水實于槃中簞巾在門內之右鄭注設盥水及巾尸尊不就洗又不揮門內之右象洗在東統于門東西上凡鄉內以入為左右鄉外以出為左右釋曰尸盥在門右據鄉內也揮振去水也春秋傳曰奉匜沃盥既而揮之祝筵几于室中東面鄭注為神敷席也至此使祝接神釋曰祭統曰鋪筵設同几為依神也筵于室中西南隅主婦纚笄宵衣立于房中南面鄭注主婦主人之妻雖姑存猶使之主祭祀纚笄首服宵綺屬也此衣染之以黑其繒本名宵詩有素衣朱宵記有玄宵衣凡婦人助祭者同服也內則曰舅沒則姑老冢婦所祭祀賓客每事必請於姑釋曰祭統曰夫祭也者必夫婦親之所以備外內之官也官備則具備主人及賓兄弟羣執事即位于門外如初宗人告有司具鄭注具猶辦也主人拜賓如初揖入即位如初鄭注初視濯也佐食北面立于中庭鄭注佐食賓佐尸食者立于宗人之西釋曰虞禮主人即位于堂如反哭東面宗人西階前北面詔主人此禮主人位堂下西面宗人當在阼階南擯主人知佐食在主人之西主人及祝升祝先入主人從西面于户內鄭注祝先入接神宜在前也少牢饋食禮曰祝盥于洗升自西階主人盥升自阼階祝先入南面主婦盥于房中薦兩豆葵菹蝸醢醢在北鄭注主婦盥盥于內洗昏禮婦洗在北堂直室東隅釋曰薦豆于奧席前宗人遣佐食及執事盥出鄭注命之盥出當助主人及賓舉鼎主人降及賓盥出主人在右及佐食舉牲鼎賓長在右及執事舉魚臘鼎除冪鄭注及與也主人在右統于東主人與佐食者賓尊不載少牢饋食禮魚用鮒臘用麋士臘用兔釋曰入以東為右賓不偶主人者左人當載載賤者之事曲禮曰兔曰明視宗人執畢先入當阼階南面鄭注畢狀如又蓋為其似畢星取名焉主人親舉宗人則執畢導之既錯又以畢臨朼載備失脫也雜記曰朼用桑長三尺畢用桑三尺案三上今注疏本有長字刋其本與末朼畢同材明矣今此朼用棘心則畢亦用棘心舊説云畢以御他神物案以今注疏本訛作似神物惡桑叉則少牢饋食及虞無又何哉此無叉者乃主人不親舉耳少牢大夫祭不親舉虞喪祭也主人未執事祔練祥執事用桑叉自此純吉用棘心叉鼎西面錯右人抽扃委于鼎北鄭注右人謂主人及二賓既錯皆西面俟也贊者錯俎加匕鄭注贊者執俎及匕從鼎入者其錯俎東縮加匕東枋案今注疏本作柄既則退而左人北面也釋曰左人北面于其南載之昏禮曰北面載少牢饋食禮俎皆設于鼎乃朼鄭注右人也尊者于事指使可也左人載之佐食升肵俎冪之設于阼階西鄭注肵俎案今注疏本脫俎字謂心舌之俎也郊特牲曰肵之為言敬也言主人之所以敬尸之俎古文冪皆作密卒載加匕于鼎鄭注卒已也已載畢亦加焉主人升入復位俎入設于豆東魚次臘特于俎北鄭注入設俎載者臘特饌要方也凡饌必方者明食味人之性所以正主婦設兩敦黍稷于俎南西上及兩鉶鉶芼設于豆南南陳案各本脫一鉶字據唐石經輔鄭注宗婦不贊敦鉶者以其少可親之芼菜也祝洗酌奠奠于鉶南遂命佐食啓會佐食啓會卻于敦南出立于户西南面案今注疏本脫戶字唐石經亦有鄭注酌奠奠其爵觶也少牢饋食禮啓會乃奠之釋曰會敦蓋也卻仰也主人再拜稽首祝在左鄭注稽首服之甚者祝在左當為主人釋辭于神也祝祝曰孝孫某敢用剛鬛嘉薦普淖用薦某事于皇祖某子尚饗卒祝主人再拜稽首祝迎尸于門外鄭注尸自外來代主人接之就其次而請不拜不敢與尊者為禮周禮掌次凡祭祀張尸次主人降立于阼階東鄭注主人不迎尸成尸尊尸所祭者之孫也祖之尸則主人乃宗子禰之尸則主人乃父道事神之禮庿中而巳出迎則為厭釋曰祭統曰君迎牲而不迎尸别嫌也尸在廟門外則疑于臣在廟中則全于君君在廟門外則疑于君入廟門則全于子尸入門左北面盥宗人授巾鄭注侍盥者執其器就之執簞者不授巾賤也宗人授巾庭長尊少牢饋食禮曰祝先入門右尸入門左釋曰尸盥在門右侍盥者執以之門左就尸尸至于階祝延尸尸升入祝先主人從鄭注延進在後詔侑曰延禮器所謂詔侑武方者也少牢饋食禮曰尸升自西階入祝從主人升自阼階祝先入主人從釋曰無方無常也尸即席坐主人拜妥尸鄭注妥安坐也釋曰郊特牲曰舉斚角詔妥尸古者尸無事則立有事而后坐也尸答拜執奠祝饗主人拜如初鄭注饗勸強之也其辭取于士虞記則宜云孝孫某圭為孝薦之饗舊説云明薦之祝命挼祭尸左執觶右取菹㨎醢案各本作㨎于醢釋文舉㨎醢二字可證于字乃衍文祭于豆間鄭注命詔尸也挼祭祭神食也士虞禮古文曰祝命佐食隋祭案隋今注疏本訛作墮下同周禮曰既祭則藏其隋隋與挼讀同耳今文改挼皆為綏古文此皆為挼祭也㨎醢者染于醢釋曰鄉者設饌厭飫神謂之陰厭案此下原本缺佐食取黍稷肺祭授尸尸祭之祭酒啐酒告旨主人拜尸奠觶答拜鄭注肺祭刌肺也旨美也祭酒穀味之芬芳者齊敬共之惟恐不美告之美案美上今注疏本有以字達其心明神享之釋曰尸俎具有離肺刌肺此所祭者刌肺郊特牲曰祭肺肝心貴氣主也明堂位曰夏后氏祭心殷祭肝周祭肺祭鉶嘗之告旨主人拜尸答再拜鄭注鉶肉味之有菜和者曲禮曰客絮羮主人辭不能亨釋曰鉶羮有菜和故告旨盛之鉶器故名鉶羮祝命爾敦佐食爾黍稷于席上鄭注爾近也近之便尸之食也設大羮湇于醢北鄭注大羮湇煮肉汁也不和貴其質設之所以敬尸也不祭不嚌大羮不為神非盛者也士虞禮曰大羮湇自門入今文湇皆為汁釋曰士虞禮記曰無尸則無大羮湇大羮在左者神禮變于食舉肺脊以授尸尸受振祭嚌之左執之鄭注肺氣之主也脊正體之貴者先食啖之所以導食通氣釋曰肺離肺也周禮九祭五曰振祭六曰擩祭擩祭者擩于醢以祭不食也振祭者將食既擩必振乃祭也黍稷牢肉魚皆擩于醢乃食食舉鄭注舉言食者明凡解體皆連肉釋曰食舉即肺脊也食必先舉之故曰舉以其可食故又曰食舉凡體皆連肉以骨為主耳主人羞肵俎于臘北鄭注肵俎主于尸主人親羞敬也神俎不親設者貴得賓客以神事其先尸三飯告飽祝侑主人拜鄭注三飯告飽禮一成也侑勸也或曰又勸之使又食少牢饋食禮侑辭曰皇尸未實侑也案今注疏本脫也字釋曰實飽也詩楚茨曰以享以祀以妥以侑佐食舉幹尸受振祭嚌之佐食受加于肵俎舉獸幹魚一亦如之鄭注幹長脅也獸臘其體數與牲同釋曰正脅曰幹此禮無正脅則幹者通謂長脅公羊傳曰搚幹而殺之尸實舉于菹豆鄭注為將食庶羞舉謂肺脊佐食羞庶羞四豆設于左南上有醢鄭注庶衆也衆羞以豕肉所以為異味四豆者膮炙胾醢南上者以膮炙為上以有醢不得䋫也釋曰王制曰庶羞不踰牲案公食大夫禮醢與胾炙䋫設此進一醢故不得䋫尸又三飯告飽祝侑之如初鄭注禮再成也舉骼及獸魚如初尸又三飯告飽祝侑之如初鄭注禮三成獸魚如初者獸骼魚一也舉肩及獸魚如初鄭注不復飯者三三者士之禮大成也舉先正脊後肩自上而卻下䋫而前終始之次也釋曰案少牢饋食禮載牲體之次肩臂臑膊胳在俎兩端脊脅肺在上其序肩脊脅骼先舉正脊自上也次舉脅卻也後舉骼下䋫也終舉肩前也尸舉牲體如䋫也佐食盛肵俎俎釋三個鄭注佐食取牲魚臘之餘盛于肵俎將以歸尸俎釋三個為改饌于西北隅遺之所釋者牲臘則正脊一骨長脅一骨及臑也魚則三頭而已個猶枚也今俗言物數有云若干個案今注疏本作有若干個者此讀然釋曰案下記尸俎右肩臂臑肫胳正脊二骨橫脊長脅二骨短脅今已舉肩胳正脊一骨長脅一骨前脛宜盛臂後脛宜盛肫脊脅宜盛橫脊短脅知所釋者正脊一骨長脅一骨及臑舉肺脊加于肵俎反黍稷于其所鄭注尸授佐食佐食受而加之反之也肺脊初在菹豆主人洗角升酌酳尸鄭注酳猶衍也是獻尸也謂之酳者案謂之二字今注疏本作云字尸既卒食又欲頤衍養樂之不用爵者下大夫也因父子之道質而用角角加人事略者案者今注疏本訛作也今文酳皆為酌釋曰凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散少牢饋食禮酳尸用爵此辟大夫不用爵次當用觚而用角者角用功少象質也尸拜受主人拜送尸祭酒啐酒賓長以肝從鄭注肝肝炙也今文曰啐之案今注疏本脫此五字古文無長釋曰羞肝亦以祭右鹽尸左執角右取肝㨎于鹽振祭嚌之加于菹豆卒角祝受尸角曰送爵皇尸卒爵主人拜尸答拜鄭注曰送爵者節主人拜祝酌授尸尸以醋主人鄭注醋報也祝酌不洗尸不親酌尊尸也尸親醋相報之義案今注疏本脫此七字古文醋作酢主人拜受角尸拜送主人退佐食授妥祭案妥各本訛作挼據注訂正鄭注退者進受爵反位妥亦當為挼案今注疏本脫此五字尸將嘏主人佐食授之挼祭亦使祭尸食也其授祭亦取黍稷肺祭今文或皆改妥作挼案今注疏本作今文妥作綏主人坐左執角受祭祭之祭酒啐酒進聽嘏鄭注聽猶待也受福曰嘏嘏長也大也待尸授之長大之福案此下今注疏本有也字佐食摶黍授祝祝授尸尸受以菹豆執以親嘏主人鄭注獨用黍者食之主其辭則少牢饋食禮有焉主人左執角再拜稽首受復位詩懷之實于左袂挂于季指卒角拜尸答拜鄭注詩猶承也謂奉納之懷中季少也實于左袂挂袪以小指者便卒角也少牢饋食禮曰興受黍坐振嚌之古文挂作卦案今注疏本脫此五字釋曰內則曰詩負之詩含神霧曰詩持也以手維持則承奉之義袂袖也袪袖口主人出寫嗇于房祝以籩受鄭注變黍言嗇案言今注疏本訛作以因事託戒欲其重稼嗇嗇者農力之成功筵祝南面鄭注主人自房還時主人酌獻祝祝拜受角主人拜送設菹醢俎鄭注行神惠也先獻祝以接神尊之菹醢皆主婦設之佐食設俎釋曰神坐及亞獻致爵之籩豆皆主婦設之少牢饋食禮主人獻祝佐食設俎祝左執角祭豆興取肺坐祭嚌之興加于俎坐祭酒啐酒以肝從祝左執角右取肝㨎于鹽振祭嚌之加于俎卒角拜主人答拜受角酌獻佐食佐食北面拜受角主人拜送佐食坐祭卒角拜主人答拜受角降反于篚升入復位釋曰下記祝俎離肺則祝絶肺以祭此不見者省文主婦洗爵于房酌亞獻尸鄭注亞次也次猶二主婦二獻不夾拜者士妻儀簡耳釋曰爵房中爵也少牢饋食禮主婦拜獻尸尸拜受主婦拜送尸拜受主婦北面拜送鄭注北面拜者辟內子也大夫之妻拜於主人之北西面宗婦執兩籩户外坐主婦受設于敦南鄭注兩籩棗栗棗在西釋曰十虞禮主婦亞獻尸自反兩籩棗栗設于會南棗在西周禮九嬪凡祭祀贊玉齍贊后薦徹豆籩祝贊籩祭尸受祭之祭酒啐酒鄭注籩祭棗栗之祭也其祭之亦于豆祭釋曰祝贊者猶前命挼祭也籩豆同祭于豆間少牢下篇曰尸取豐蕡白黑兼祭于豆祭兄弟長以燔從尸受振祭嚌之反之鄭注燔炙肉也釋曰反之反于長兄弟楚茨曰執爨踖踖為俎孔碩或燔或炙羞燔者受加于肵出鄭注出者俟後事也釋曰俟羞燔于祝也尸卒爵祝受爵命送如初鄭注送者送卒爵酢如主人儀鄭注尸酢主婦如主人儀者自祝酌至尸拜送如酢主人也不易爵辟內子釋曰上尸酢主人不易爵此如之亦不易爵也禮男女不相襲爵少牢饋食禮尸酢主婦祝易爵洗以授尸此襲爵者辟大夫之妻主婦適房南面佐食挼祭主婦左執爵右撫祭祭酒啐酒入卒爵如主人儀鄭注撫挼祭示親祭佐食不授而祭于地亦儀簡也入室卒爵于尊者前成禮明受惠也釋曰少牢禮主婦受祭祭之獻祝籩燔從如初儀及佐食如初卒以爵入于房鄭注及佐食如初如其獻佐食則拜主人之北西面也釋曰佐食北面受獻主婦不宜同面拜送言如初明同主人西面拜與內子禮同賓三獻如初燔從如初爵止鄭注初亞獻也尸止爵者三獻禮成欲神惠之均于室中是以奠而獻之
