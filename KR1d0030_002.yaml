body:
  text: 儀禮集釋卷二宋李如圭撰士昏禮第二鄭目録云士娶妻之禮以昏為期因而名焉必以昏者陽往而隂來日入三商為昏昏禮于五禮屬嘉禮大小戴及别録北皆第二昏禮下達納采用鴈鄭注達通也案通下今注疏本有達字將欲與彼合昏姻必先使媒氏下通其言女氏許之乃後使人納其采擇之禮用鴈為摯者取其順陰陽往來案此十二字今注疏本在皆所以養亷恥句下又用鴈上有納采而三字詩云取妻如之何匪媒不得昏必由媒交接設紹介皆所以養亷恥釋曰案此下原本缺主人筵于户西西上右几鄭注主人女父也筵為神布席也户西者尊處將以先祖之遺體許人故受其禮于禰庿也案今注疏本無也字席西上右設几神不統于人席有首尾釋曰席西上案此下原本缺使者𤣥端至鄭注使者夫家之屬若羣吏使往來者𤣥端士莫夕之服又服以事其庿有司緇裳釋曰屬謂君命之士吏謂府史也使者于主人庿中行事故亦服𤣥端緇裳即𤣥裳據上士而言冠禮云有司如主人服使者所吏反後使者奉使皆同擯者出請事入告鄭注擯者有司佐禮者請猶問也禮不必事雖知猶問之重慎也主人如賓服迎于門外再拜賓不答拜揖入鄭注門外大門外不答拜者奉使不敢當其盛禮釋曰聘賔不答拜言辟此不言辟者士卑無君臣禮至于庿門案此句庿字唐石經作廟應從前後作庿為正揖入三揖至于階三讓鄭注入三揖者至內霤將曲揖既曲北面揖當碑揖釋曰內霤門內霤也霤屋檐滴處主人以賓升西面賓升西階當阿東面致命主人阼階上北面再拜鄭注阿棟也入堂深示親親今文阿為庪釋曰士之庿五架中脊為棟棟北之架下當室户棟南之架為􅎝􅎝南之架為庪凡賓皆當􅎝此深入當棟示親親也􅔑居委居綺二反授于楹間南面鄭注授于楹間明為合好其節同也南面竝授也釋曰楹柱也堂上有兩楹楹間堂東西之中也凡敵者授受于楹間聘禮受玉于中堂與東楹之間中堂者堂南北之中入􅎝之北而未及棟也東楹之間君行一臣行二也此昏禮使者與主人亦非敵而授于楹間者明合好故令其逺近之節同賓主俱南面賓降出主人降授老鴈鄭注老羣吏之尊者釋曰猶公卿大夫之室老也賓出庿門主人授鴈立待後事擯者出請鄭注不必賓之事有無賓執鴈請問名主人許賓入授如初禮鄭注問名者將歸卜其吉凶古文禮為醴擯者出請賓告事畢入告出請醴賓鄭注此醴亦當為禮禮賓者欲厚之賔禮辭許鄭注禮辭一辭主人徹几改筵東上側尊甒醴于房中鄭注徹几改筵者鄉為神今為人側尊亦言無𤣥酒側尊于房中亦有篚有籩豆如冠禮之設主人迎賓于庿門外案庿字從唐石經揖讓如初升主人北面再拜賓西階上北面答拜主人拂几授校拜送賓以几辟北面設于坐左之西階上答拜鄭注拂拭也拭几者尊賓新之也校几足辟逡遁案原本訛作巡張淳云儀禮逡遁字凡十一釋文皆作遁古文校為技案今注疏本訛作枝釋曰北面拜拜賓至也以几辟者賓卑也凡受几皆橫受之及其設皆旋几縱執乃設之贊者酌醴加角柶面葉出于房贊佐也佐主人酌事也贊者亦洗酌加角柶覆之如冠禮矣出房南面待主人捂受案捂原本及今注疏本竝作迎張淳引釋文捂授吾故反又引既夕禮若無器則捂授之注曰謂對相授可證注文本捂字後人改為迎今訂正古文葉作擖主人受醴面枋筵前西北面賓拜受醴復位主人阼階上拜送鄭注主人西北面疑立待賓即筵也賓復位于西階上北面明相尊敬此筵不主為飲食起贊者薦脯醢鄭注薦進賓即筵坐左執觶祭脯醢以柶祭醴三西階上北面坐啐醴建柶興坐奠觶遂拜主人答拜鄭注即就也左執觶則祭以右手也凡祭于脯醢之豆間必所為祭者謙敬示有所先也啐嘗也嘗之者成主人意建猶扱也興起也奠停也釋曰公食大夫豆多者祭于上豆之間知凡祭皆于籩豆之間也賓即筵奠于薦左降筵北面坐取脯主人辭鄭注薦左籩豆之東降下也自取脯者尊主人之賜將歸執以反命辭者辭其親徹賓降授人脯出主人送于門外再拜鄭注人謂使者從者授于階下西面然後出去納吉用鴈如納采禮鄭注歸卜于庿得吉兆復使使者往告昏姻之事于是定納徴𤣥纁束帛儷皮如納吉禮鄭注徴成也使使者納幣以成昏禮用𤣥纁者象陰陽傋也束帛十端也周禮曰凡嫁子取妻入幣純帛無過五兩儷兩也執束帛以致命兩皮為庭實皮鹿皮今文纁皆作熏釋曰雜記曰納幣一束束五兩兩五尋兩兩端也每端二丈兩端相向卷之為一兩五兩𤣥三纁二象陽竒隂偶也諸侯加以大璋天子加以榖圭庶人則用緇帛無纁用緇者婦人隂也納徴用幣故又謂之納幣何休曰𤣥纁取其順天地儷皮者鹿皮所以重古凡陳于庭者曰庭實請期用鴈主人辭賓許告期如納徴禮鄭注主人辭者陽倡隂和期日宜由夫家來也夫家必先卜之得吉日乃使使者往辭即告之期初昏陳三鼎于寢門外東方北面北上其實特豚合升去蹄舉肺脊二祭肺二魚十有四臘一肫髀不升皆飪設扃冪鄭注期取妻之日鼎三者升豚魚臘也寢壻之室也北面鄉內也特猶一也合升案原本脫此二字據今注疏本補合左右胖升于鼎也去蹄蹄甲不用也舉肺脊者食時所先舉也肺者氣之主也周人尚焉脊者體之正也食時即祭之飯必舉之貴之也每皆二者夫婦各一耳凡魚之正十五而鼎減一為十四者欲其敵偶也臘臘也肫或作純純全也凡臘用全髀不升者近竅賤也飪孰也扃所以扛鼎冪覆之古文純為鈞髀為脾今文扃作鉉冪皆作密釋曰特牲饋食禮陳鼎當門重昏禮攝盛故如少牢禮陳鼎東方也合升者夫婦各一胖所謂共牢也去蹄謂其踐地穢惡也肺有二其一舉肺離割之使食時可祭可嚌又名離肺嚌肺其一祭肺刌切之以祭又名刌肺切肺祭時二肺俱有生人食惟有舉肺此具二肺者鬼神隂陽也祭用魚十有五此亦因之而減其一生人之魚數則異乎此凡牲止用一胖臘則左右體脅相配故得純名少牢禮臘用麋知士臘而已曲禮曰曰明視徐鉉說文曰冪以木橫貫鼎耳舉之即易玉鉉也設洗於阼階東南鄭注洗所以承盥洗之器棄水者饌于房中醯醬二豆菹醢四豆兼巾之黍稷四敦皆蓋鄭注醯醬者以醯和醬生人尚䙝味兼巾之者六豆共巾也巾為禦塵蓋為尚溫周禮曰食齊視春時釋曰醬以醯和之故名醯醬下經直言醬也惟公食大夫及此禮有醯醬大羮湇在爨鄭注大羮湇煮肉汁也大古之羮無鹽菜爨火上周禮曰羮齊視夏時今文湇皆作汁釋曰湇汁也郊特牲大羮不和後王更有鉶羮致以五味猶存大羮不忘古也羮尚熱故設時乃取之于爨大羮竝如字尊于室中北墉下有禁𤣥酒在西綌幂案幂今注疏本訛作冪考周禮幂人以疏布巾幂八尊說文作幎云周禮有幎人是幂即幎字之變體加勺皆南枋鄭注墉墻也禁所以􅔑甒者𤣥酒不忘古也綌粗葛今文枋作柄尊于房户之東無𤣥酒篚在南實四爵合卺鄭注無𤣥酒者略之也夫婦酌于內尊其餘酌于外尊合卺破匏也四爵兩卺凡六為夫婦各三酳一升曰爵釋曰外尊無幂以尊厭卑也燕禮方圜壺亦無幂郊特牲曰共牢而食同尊卑也器用陶匏尚禮然也三王作牢用陶匏大古禮器大古無共牢之禮三王作之而用大古之器重夫婦之始也主人爵辨纁裳緇袉案袉唐石經及各本竝訛作袘今據說文改正從者畢𤣥端乘墨車從車二乘執燭前馬鄭注主人壻也壻為婦主爵辨而纁裳𤣥冕之次大夫已上親迎冕服冕服迎者鬼神之鬼神之者所以重之親之纁裳者衣緇衣不言衣與帶而言袉者空其文明其與袉俱用緇袉為緣袉之言施以緇緣裳象陽氣下施從者有司也乘二車案二各本訛作二今據疏文改正從行者也畢猶皆也墨車漆車士而乘墨車攝盛也執燭前馬使徒役持炬火居前照道釋曰郊特牲曰𤣥冕齊戒鬼神陰陽也言敬此夫婦之道如事鬼神也凡昏各用其上服五冕色俱𤣥故謂之𤣥冕爵辨則士服之上也雜記曰士辨而親迎巾車職曰大夫乘墨車士乘棧車棧車漆而不革挽墨車革鞔而漆之大夫有二車士無二車此有之者亦攝盛婦車亦如之有裧鄭注亦如之者車同等士妻之車夫家共之大夫已上嫁女則自以車送之裧車裳幃周禮謂之容車有容則固有蓋釋曰春秋𫝊宣五年秋齊髙固來逆叔姬冬髙固及叔姬來反馬反馬者留其車也留車妻之道反馬壻之義此大夫已上自以其車送女也詩曰漸車帷裳至于門外鄭注婦家大門之外主人筵于户西西上右几鄭注主人女父也筵為神布席釋曰凡逆者皆受女于庿春秋𫝊楚公子圍娶于鄭公孫段氏鄭人請墠聽命圍不可鄭人曰其敢愛豐氏之祧又曰圍布几筵告于莊共之庿而來則來逆者亦告廟曲禮曰齊戒以告鬼神女次純衣纁袡立于房中南面鄭注次首飾也今時髲也周禮追師掌為副編次純衣絲衣女從者畢袗𤣥則此衣亦𤣥矣案原本脫衣字摢疏文補正袡亦緣也袡之言任也以纁緣其衣象陰氣上任也凡婦人不常施袡之衣盛昏禮為此服喪大記曰復衣不以袡明非常釋曰次次第髮長短為之少牢饋食禮所謂主婦髲鬄也女亦纚笄命婦衣褖衣者服次純衣褖衣也褖衣色黑士妻助祭之服盛昏禮故服之不言裳者婦人之服連衣裳姆纚笄宵衣在其右鄭注姆婦人年五十無子出而不復嫁能以婦道教人者若今時乳母矣案今注疏本脫矣字纚縚髮笄今時簪也纚亦廣充幅長六尺宵讀為詩素以朱綃之綃魯詩以綃為綺屬也姆亦𤣥衣以綃為領因以為名且相别耳姆在女右當詔以婦禮女從者畢袗𤣥纚笄被顈黼在其後鄭注女從者謂姪娣也詩云案今注疏本脫云字諸娣從之祁祁如雲袗同也同𤣥者上下皆𤣥案此下今注疏有也字顈襌也詩云素衣朱襮爾雅云黼領謂之襮周禮曰白與黑謂之黼天子諸侯后夫人狄衣卿大夫之妻刺黼以為領如今偃領矣士妻始嫁施襌黼于領上假盛飾耳言被明非常服主人𤣥端迎于門外西面再拜賓東面答拜鄭注賓壻主人揖入賓執鴈從至於庿門案庿各本作廟據唐石經改正揖入三揖至于階三讓主人升西面賓升北面奠鴈再拜稽首降出婦從降自西階主人不降送鄭注賓升奠鴈拜主人不答明主為授女耳主人不降送禮不參釋曰賓奠摯而拜稽首壻有子道也壻御婦車授綏姆辭不受鄭注壻御者親而下之綏所以引升車者案此下今注疏本有曲禮曰三字據疏釋下二語云曲禮文則注無曲禮曰可知僕人之禮必授人綏釋曰郊特牲曰壻親御授綏親之也親之也者親之也婦乘以几姆加景乃驅御者代鄭注乘以几者尚安舒也景之制蓋如明衣加之以為行道禦塵令衣鮮明也景亦明也驅行也行輪三周案行下今注疏本有車字御者乃代壻今文景作幜釋曰乘以几謂登車時也曲禮曰尸乘必以几詩云衣錦褧衣裳錦褧裳以錦為衣裳而上加襌縠庶人妻之嫁服也碩人詩亦云衣錦褧衣庶人卑不嫌與國君夫人同士妻純衣加明衣非為其文大著為禦風塵耳壻乘其車先俟于門外鄭注壻車在大門外乘之先者道之也男率女女從男夫婦剛柔之義自此始也俟待也門外壻家大門外婦至主人揖婦以入及寢門揖入升自西階媵席于奧案媵下各本衍布字張淳引釋文云媵席中無布字夫入于室即席婦尊西南面媵御沃盥交鄭注升自西階道婦入也媵送也謂女從者也御當為訝訝迎也謂壻從者也媵沃壻盥于南洗御沃婦盥于北洗夫婦始接情有亷耻媵御交道其志釋曰詩云好人提提宛然左辟好人為容好者左辟辟而左不敢當尊蓋壻揖婦入之時也室中西南隅謂之與壻為主先就席婦席未設也沃盥沃水以盥手也春秋外𫝊曰秦伯歸晉公子女五人公子使奉匜沃盥贊者徹尊幂舉者盥出除冪舉鼎入陳于阼階南西面北上朼俎從設案朼各本作匕下同張淳云釋文朼必履反後士喪禮乃朼載乂曰朼者特牲饋食乃朼有司朼羊朼豕魚字皆從木少牢饋食長朼古文作匕鄭氏亦改為朼鄭注執朼者執俎者從鼎而入設之朼所以别出牲體也俎所以載也北面載執而俟鄭注執俎而立俟豆先設朼者逆退復位于門東北面西上鄭注執朼者事畢逆退由便至此乃著其位略賤也釋曰逆退後入者先退也贊者設醬于席前菹醢在其北俎入設于豆東魚次臘特于俎北鄭注豆東菹醢之東釋曰醬為饌本先設之而居右以右手取之便也俎豚俎也俎以牲體為主故豚俎專得俎名魚次者次在俎東贊設黍于醬東稷在其東設湇于醬南鄭注饌要方也釋曰豆東豚魚醬東黍稷取其饌方故特臘而設湇于醬南設對醬於東鄭注對醬婦醬也設之當特俎釋曰席前醬右而臘左奧席之左當對席之右故對醬當奧臘也菹醢在其南北上設黍于臘北其西稷設湇于醬北御布對席贊啓㑹卻於敦南對敦于北鄭注啓發也今文啓作開古文卻為綌釋曰菹醢北上醢在菹南各上其右也俎亦設于豆西魚次臘特于俎南乃設黍于醬西曰臘北者以其次臘設之其實在俎北也㑹敦蓋也卻仰也仰之于地贊告具揖婦即對筵皆坐皆祭祭薦黍稷肺鄭注贊者西面告饌具也壻揖婦使即席薦菹醢釋曰肺祭肺也贊爾黍授肺脊皆食以湇醬皆祭舉食舉也鄭注爾移也移置席上便其食也皆食食黍也以用也用者謂啜湇咂醬案今注疏本作謂用口啜湇用指咂醬疏內舉注文亦有用口用指四字皆校書是者所增觀集釋復解咂字云以指咂之可證古文黍作稷釋曰肺脊舉肺脊也以其舉之以祭以食故又名此肺脊為舉咂以指咂之三飯卒食鄭注卒已也同牢示親不主為食起三飯而成禮也贊洗酌酌酳主人主人拜受贊户內北面答拜酳婦亦如之皆祭鄭注酳漱也酳之言演也安也漱所以潔口案潔今注疏本作潔古本皆作潔後同且演安其所食酳酌內尊贊以肝從皆振祭嚌肝皆實于菹豆鄭注肝肝炙也飲酒宜有肴以安之釋曰振祭以肝擩鹽中振之乃祭也士虞禮曰賓長以肝從實于俎縮右鹽言實不言加異于祭禮卒爵皆拜贊答拜受爵再酳如初無從三酳用卺亦如之鄭注亦無從也案經文卒爵皆拜下今注疏本有婦拜見上篇見母章此篇婦見奠菜一章及內則女拜尚右手凡二十四字乃後人誤以儀禮經𫝊通解之文竄入于此釋曰昏義曰昏禮納采問名納吉納徵請期皆主人筵几于庿而拜迎于門外入揖讓而升聽命于庿所以敬慎重正昏禮也父親醮子而命之迎男先于女也子承命以迎主人筵几于庿而拜迎于門外壻執鴈入揖讓升堂再拜奠鴈蓋親受之于父母也降出御婦車而壻授綏御輪三周先俟于門外婦至壻揖婦以入共牢而食合卺而酳所以合體同尊卑以親之也敬慎重正而后親之禮之大體而所以成男女之别而立夫婦之義也贊洗爵酌于外尊案于下各本衍户字據前尊于室中北墉下是為內尊尊于房户之東是為外尊注止稱為內尊外尊此處疏云乃酌外尊亦無户字今剛正入户西北面奠爵拜皆答拜坐祭卒爵拜皆答拜興鄭注贊酌者自酢也主人出婦復位鄭注復尊西南面之位乃徹于房中如設于室尊否鄭注徹室中之饌設于房中為媵御餕之徹尊不設有外尊也主人說服于房媵受婦說服于室御受姆授巾鄭注巾所以自潔清今文說皆作稅案今注疏本無皆字御衽于奧媵衽良席在東皆有枕北止鄭注衽卧席也婦人稱夫曰良孟子曰將見良人之所之案見釋文作覸云今本亦作見止足也古文止作趾主人入親說婦之纓鄭注入者從房還入室也婦人十五許嫁笄而禮之因著纓明有繫也蓋以五采為之其制未聞釋曰曲禮曰女子許嫁纓與內則未冠笄者襟纓之纓異燭出鄭注昏禮畢將臥息媵餕主人之餘御餕婦餘贊酌外尊酳之鄭注外尊房户外之東尊媵侍于户外呼則聞鄭注為尊者有所徴求今文侍作待夙興婦沐浴纚筓宵衣以俟見鄭注夙早也昏明日之晨興起也俟待也待見于舅姑寢門之外古者命士已上年十五父子異宫釋曰纚筓宵衣士妻服也特牲饋食禮主婦纚筓宵衣質明贊見婦于舅姑席于阼舅即席席于房外南面姑即席鄭注質平也房外房户外之西古文舅作咎案舅下今注疏本有皆字婦執笲棗栗自門入升自西階進拜奠于席鄭注笲竹器而衣者案而今注疏本訛作有其形蓋如今之筥蘆矣案蘆今注疏本作􅠚籚進拜者進東面乃拜奠之者舅尊不敢授也舅坐撫之興答拜婦還又拜鄭注還又拜者還於先拜處拜婦人與丈夫為禮則俠拜降階受笲腶修案腶釋文作段云本又作腶同唐石經訛作升進北面拜奠于席姑坐舉以興拜授人鄭注人有司姑執笲以起答婦拜授有司徹之舅則宰徹之釋曰姑舉之若親受之然棗栗義取早自謹敬腶修取斷斷自修正公羊𫝊曰婦見曷用棗栗云乎腶修云乎雜記曰案此下原本缺贊醴婦鄭注醴當為禮贊禮婦者以其婦道新成親厚之席于户牖間鄭注室户西牖東南面位側尊甒醴于房中婦疑立于席西鄭注疑正立自定之貌贊者酌醴加柶面枋出房席前北面婦東面拜受贊西階上北面拜送婦又拜薦脯醢鄭注婦東面拜贊北面答之變于丈夫始冠成人之禮釋曰始冠者南面受醴以向賓賓東面答拜此舅姑在東故婦東面拜受也又拜者俠拜醴贊酌贊授故面枋也婦升席左執觶右祭脯醢以柶祭醴三降席東面坐啐醴建柶興拜贊答拜婦又拜奠于薦東北面坐取脯降出授人于門外鄭注奠于薦東升席奠之取脯降出授人親徹且榮得禮人謂婦氏人舅姑入于室婦盥饋鄭注饋者婦道既成成以孝養特豚合升側載無魚臘無稷竝南上其他如取女禮鄭注側載者右胖載之舅俎左胖載之姑俎異尊卑竝南上者舅姑共席于奧其饌各以南為上其他謂醬湇菹醢女謂婦也如取婦禮同牢時今文竝當作併案今注疏本無今文二字似後人因下當字遂刪此二字耳當字應是衍文婦贊成祭卒食一酳無從鄭注贊成祭者授處之今文無成也席于北墉下鄭注墉墻也案今注疏本脫此三字室中北墻下婦徹設席前如初西上婦餕舅辭易醬鄭注婦餕者即席將餕也辭易醬者嫌淬汙釋曰案此下原本缺婦餕姑之饌御贊祭豆黍肺舉肺脊乃食卒姑酳之婦拜受姑拜送坐祭卒爵姑受奠之鄭注奠之案今注疏本脫此二字奠于篚釋曰不餕舅餘者舅尊嫌相䙝郊特牲曰舅姑卒食婦餕餘私之也婦徹于房中媵御餕姑酳之雖無娣媵先于是與始飯之錯鄭注古者嫁女必姪娣從案從下今注疏衍之字謂之媵姪兄之子娣女弟也娣尊姪卑若或無娣猶先媵客之也始飯謂舅姑錯者媵餕舅餘御餕姑餘也古文始為姑釋曰媵先先于御也舅姑共饗婦以一獻之禮舅洗于南洗姑洗于北洗奠酬鄭注以酒食勞人曰饗南洗在庭北洗在北堂設兩洗者獻酬酢以潔清為敬奠酬者明正禮成不復舉凡酬酒皆奠于薦左不舉其燕則更使人舉爵釋曰舅獻姑酬共成一獻也舅姑先降自西階婦降自阼階鄭注授之室使為主明代己釋曰昏義曰夙興婦沐浴以俟見質明贊見婦于舅姑婦執笲棗栗腶修以見贊案此下原本缺歸婦俎于婦氏人鄭注言俎則饗禮有牲矣婦氏人丈夫送婦者使有司歸以婦俎當以反命于女之父母明其得禮舅饗送者以一獻之禮酬以束錦鄭注送者女家有司也爵至酬賓又從之以束錦所以相厚古文錦皆為帛案今注疏本云皆作帛姑饗婦人送者酬以束錦鄭注婦人送者隸子弟之妻妾凡饗速之釋曰士卑無臣自以其子弟為僕隸春秋𫝊曰士有隸子弟速者就其館召之若異邦則贈丈夫送者以束錦鄭注贈送也就賓館釋曰聘賓去至郊而贈知此亦就其館也古者大夫不外娶嫌外交士卑不嫌故有異邦送者若舅姑既沒則婦入三月乃奠菜鄭注沒終也奠菜者以篚祭菜也蓋用堇釋曰三月天氣變婦道成庿見猶舅姑存時之盥饋堇蓋亦取謹敬之義內則有堇荁音謹席于庿奧東面右几席于北方南面鄭注庿考妣之庿北方墉下釋曰祭設同几精氣合庿見象生時故别席也祝盥婦盥于門外婦執笲菜祝帥婦以入祝告稱婦之姓曰某氏來婦致奠嘉菜于皇舅某子鄭注帥道也入入室也某氏者齊女則曰姜氏魯女則曰姬氏來婦案婦原本及今注疏木竝訛作歸摢宋本改正言來為婦嘉美也皇君也釋曰盥于門外猶沐浴俟見也婦拜扱地坐奠菜于几東席上還又拜如初鄭注扱地手至地也婦人扱地猶男子稽首釋曰皆拜之重者几東東字疑婦降堂取笲菜入祝曰某氏來婦敢告于皇姑某氏奠菜于席如初禮鄭注降堂階上也室事交乎户今降堂者敬也于姑言敢告舅尊于姑婦出祝闔牖戶鄭注凡庿無事則閉之老醴婦于房中南面如舅姑醴婦之禮鄭注因于庿見禮之壻饗婦送者丈夫婦人如舅姑饗禮記士昏禮凡行事必用昏昕受諸禰庿辭無不腆無辱鄭注用昕使者用昏壻也案此下今注疏本有壻悉訃反從士從胥俗作壻女之夫凡十四字乃釋文前壻之二字下音義誤入于此腆善也賓不稱幣不善主人不謝來辱釋曰案此下原本缺摯不用死皮帛必可制鄭注摯鴈也皮帛儷皮束帛也釋曰士摯用死雉故明之皮帛必可制為衣物亦告以直信之義臘必用鮮魚用鮒必殽全鄭注殽全者不餧敗案餧今注疏本作餒說文有餧無餒云餧飢也一曰魚敗曰餧張參五經文字云經典相承别作餒為飢餒字以此字為餧餉之餧字書無文可證餒字古人所無不剝傷釋曰用鮮貴新也鼎九者臘乃有鮮用鮒殽全者取相衣附全節之義女子許嫁筓而醴之稱字鄭注許嫁已受納徴禮也筓女之禮猶冠男也使主婦女賓執其禮祖庿未毁教于公宫三月若祖庿已毁則教于宗室鄭注祖庿女髙祖為君者之庿也以有緦麻之親就尊者之宫教以婦德婦言婦容婦功宗室大宗之家問名主人受鴈還西面對賓受命乃降鄭注受鴈于兩楹間南面還于阼階上對賓以女名祭醴始扱一祭案一今注疏本作一唐石經亦作一及扱再祭賓右取脯左奉之乃歸執以反命鄭注反命謂使者問名納吉納徴請期還報于壻父納徴執皮攝之內文兼執足左首隨入西上參分庭一在南鄭注攝猶辟也兼執足者左手執前兩足右手執後兩足左首象生曲禮曰執禽者左首隨入為門中厄狹西上中庭位併釋曰內文者足向上兼執之掩其文在內也隨入室中庭乃竝立北面賓致命釋外足見文主人受幣士受皮者自東出于後自左受遂坐攝皮逆退適東壁鄭注賓致命主人受幣庭實所用為節士謂若中士下士不命者以主人為官長自由也釋曰外足足之逺身者士案此下原本有缺文來出於執皮者之後由其左北面受之後者先反而東不命之士官長所自辟除府史之屬父醴女而俟迎者母南面于房外鄭注女既次純衣父醴之于房中南面蓋母薦焉重昏禮也女奠爵于薦東立于位而俟壻壻至父出使擯者請事母出南面房外示親授壻且當戒女也女出于母左父西面戒之必有正焉若衣若筓母戒諸西階上不降鄭注必有正焉者以託戒使勿忘案戒下今注疏本衍之字釋曰衣筓當在身見衣筓案此下原本缺婦乘以几從者二人坐持几相對鄭注持几者重慎之釋曰登車以几若王后之履石婦入寢門贊者徹尊幂酌𤣥酒三屬于尊棄餘水于堂下階間加勺鄭注屬注也𤣥酒涗水貴新昏禮又貴新故事至乃取之三注于尊中笲緇被纁裏加于橋舅答拜宰徹笲鄭注被表也笲有衣者婦見舅姑以飾為敬橋所以庪笲其制未聞今文橋為鎬婦席薦饌于房鄭注醴婦饗婦之席薦也饗婦姑薦焉鄭注舅姑共饗婦舅獻爵姑薦脯醢婦洗在北堂直室東隅篚在東北面盥鄭注洗在北堂所謂北洗北堂房中半以北洗南北直室東隅東西直房户與隅間釋曰案此下原本缺婦酢舅更爵自薦鄭注更爵男女不相因也不敢辭洗舅降則辟于房不敢拜洗鄭注不敢與尊者為禮凡婦人相饗無降鄭注姑饗婦人送者于房無降者以北洗篚在上婦入三月然後祭行鄭注入夫之室三月之後于祭乃行謂助祭也釋曰婦人之從君子豈以為必得當之哉見禮則進不見禮則退故嫁者三月而後庿見祭行祭行而後反馬也詩曰未見君子憂心忡忡亦既見止亦既覯止我心則降庶婦則使人醮之婦不饋鄭注庶婦庶子之婦也使人醮之不饗也酒不酬酢曰醮亦有脯醢適婦酌之以醴尊之庶婦酌之以酒卑之其儀則同不饋者共養統于適也釋曰適婦贊醴之庶婦亦使人醮之適婦饋舅姑舅姑饗婦庶婦不饋不饗昏辭曰吾子有惠貺室某也鄭注昏辭擯者請事告之辭吾子謂女父也稱有惠明下達貺賜也室猶妻也子謂公冶長可妻也某壻名某有先人之禮使某也請納采鄭注某壻父名也某也使名也對曰某之子憃愚又弗能教吾子命之某不敢辭鄭注對曰者擯出納賓之辭某女父名也吾子謂使者今文弗為不無能字案今文今注疏本作古文致命曰敢納采問名曰某既受命將加諸卜敢請女為誰氏鄭注某使者名也誰氏者謙也不必其主人之女對曰吾子有命且以傋數而擇之某不敢辭鄭注卒曰某氏不記之者明為主人之女醴曰子為事故至於某之室某有先人之禮請醴從者鄭注言從者謙不敢斥也今文於為于對曰案原本脫此二字據唐石經及今注疏本補某既得將事矣敢辭鄭注將行先人之禮敢固以請鄭注主人辭固如故某辭不得命敢不從也鄭注賓辭也不得命者不得許已之命案許今注疏本訛作辭納吉曰吾子有貺命某加諸卜占曰吉使某也敢告鄭注貺賜也賜命謂許以女名也某壻父名對曰某之子不教惟恐弗堪子有吉我與在某不敢辭鄭注與猶兼也古文與為豫納徴曰吾子有嘉命貺室某也某有先人之禮儷皮束帛使某也請納徴致命曰某敢納徴對曰吾子順先典貺某重禮某不敢辭敢不承命案原本脫此四字據唐石經及今注疏本補鄭注典常也法也請期曰吾子有賜命某既申受命矣惟是三族之不虞使某也請吉日鄭注三族謂父昆弟已昆弟子昆弟虞度也不億度謂卒有死喪此三族者己及子皆為服期期服則踰年欲及今之吉也雜記曰大功之末可以冠子嫁子對曰某既前受命矣惟命是聽鄭注前受命者申前事也曰某命某聽命于吾子鄭注曰某壻父名也對曰某固惟命是聽使者曰某使某受命吾子不許某敢不告期曰某日鄭注某吉日之甲乙對曰某敢不敬須鄭注須待案此下今注疏本有也字凡使者歸反命曰某既得將事矣敢以禮告鄭注告禮所執脯案此注今注疏本在下主人曰聞命矣之下主人曰聞命矣父醮子鄭注子壻案此下今注疏本有也字敖繼公集說又有醮之禮如冠醮與其異者于寢耳凡十三字考春秋公羊𫝊隱公元年春王正月疏引鄭注昏義醮之禮如冠醮與不引士昏禮可證儀禮中夲無此注敖氏取禮記注入于此耳釋曰醴重而醮輕女以從人為重故父醴案此下原本缺命之曰案唐石經亦作命之曰今注疏本之下衍辭字往迎爾相承我宗事鄭注相助也宗事宗庿之事勖帥以敬先妣之嗣若則有常鄭注勖勉也若猶女也勉帥道婦案各本皆訛作勉帥婦道張淳引釋文上帥道之注云下帥道同下帥道謂此句也可證古本乃勉帥道婦以敬其為先妣之嗣女之行則當有常深戒之詩云大似嗣徽音案此注今注疏本在下不敢忘命句之下釋曰易案此下原本缺子曰諾惟恐弗堪不敢忘命釋曰荀子曰親迎之禮父南鄉而立子北面而跪醮而命之往迎爾相成我宗事勖率以敬先妣之嗣若則有常子曰諾惟恐不能敢忘命矣賓至擯者請對曰吾子命某以茲初昏使某將請承命鄭注賓壻也命某某壻父名茲此也將行也使某行昏禮來迎案此注今注疏本在下某固敬具以須句之下對曰某固敬具以須父送女命之曰戒之敬之夙夜毋違命鄭注夙早也早起夜臥命舅姑之教命古文毋為無母施襟結帨曰勉之敬之夙夜無違宫事鄭注帨佩巾釋曰孟子曰女子之嫁也母命之往送之門曰往之女家必敬必戒毋違夫子坊記曰昏禮壻親迎見于舅姑舅姑承子以授壻恐事之違也以此坊民婦猶有不至者庶母及門內施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸襟鞶鄭注庶母父之妾也鞶鞶囊也男鞶革女鞶絲所以盛帨巾之屬為謹敬申重也宗尊也愆過也諸之也示之以襟鞶者案今注疏本脫者字皆託戒使識之也不示之衣筓者案衣上今注疏本衍以字尊者之戒不嫌忘之視乃正字今文作示俗誤行之壻授綏姆辭曰未教不足與為禮也案明監本注疏脫此十四字唐石經亦有鄭注姆教人者案明監本注疏脫此四字宗子無父母命之親皆沒已躬命之鄭注宗子者適長子也命之命使者母命之在春秋紀裂繻來逆女是也躬猶親也親命之則宋公使公孫夀來納幣是也言宗子無父是有有父者案原本脫一有字據今注疏本補禮七十老而𫝊八十齊喪之事不及若是者子代其父為宗子其取也父命之釋曰春秋公羊說宋公無母其來納幣也自命之紀有母其來逆女也母命之母命之而不稱使者婦人無外事支子則稱其宗鄭注支子庶昆弟也稱其宗子命使者弟稱其兄案唐石經亦作弟稱今注疏本弟下衍則字鄭注弟宗子之母弟案今注疏本脫之字若不親迎則婦入三月然後壻見曰某以得為外昏姻請覿鄭注女氏稱昏壻氏稱姻覿見也釋曰壻見見妻之父母也爾雅曰婦之黨為昏兄弟壻之黨為姻兄弟主人對曰某以得為外昏姻之數某之子未得濯溉于祭祀案溉唐石經及今注疏本竝訛作溉張淳引釋文溉古代反少牢饋食溉鼎匕俎溉甑甗匕與敦溉豆籩勺爵觚觶字皆作溉今考說文溉滌也溉灌注也二字各别是以末敢見今吾子辱請吾子之就宫某將走見鄭注主人女父也以白造緇曰辱釋曰未濯溉于祭祀謂婦未祭行對曰某以非他故不足以辱命請終賜見鄭注非他故彌親之辭命謂將走見之言今文無終賜對曰某得以為昏姻之故案得以今注疏本作以得今考上言某以得為外昏姻之數以者自以也對稱某以非他故此乃云某得以為昏姻之故以者指壻以之也唐石經亦作某得以為敖繼公疑上言之數此言之故必有一誤因云得以宜作以得不知以字在下正與故字語氣相賈又與上故字相應今注疏本從敖氏說改經耳不敢固辭敢不從鄭注不言外亦彌親之辭古文曰外昏姻案明監本脫此六字主人出門左西面壻入門東面奠摰再拜出鄭注出門出內門入門入大門出內門不出大門者異于賓客也壻見于寢奠摰者壻有子道不敢授也摰雉也釋曰凡見於尊者奠摰而不授擯者以摯出請受鄭注欲使以賓客禮相見壻禮辭許受摰入主人再拜受壻再拜送出鄭注出已見女父釋曰此禮與聘賓覿主國君之禮同見主婦主婦闔扉立于其內鄭注主婦主人之婦也見主婦者兄弟之道宜相親也闔扉者婦人無外事扉左扉釋曰左扉東扉也士喪禮卜葬日闔東扉主婦立于其內春秋𫝊曰婦人送迎不出門見兄弟不踰閾壻立于門外東面主婦一拜壻答再拜主婦又拜壻出鄭注必先一拜者婦人于丈夫必俠拜主人請醴及揖讓入醴以一獻之禮主婦薦奠酬無幣鄭注及與也無幣異于賓客壻出主人送再拜
