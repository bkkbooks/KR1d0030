body:
  text: 儀禮集釋目録禮類二儀禮之屬卷一士冠禮第一卷二士昏禮第二卷三士相見禮第三卷四鄉飲酒禮第四卷五鄉射禮第五之一卷六鄉射禮第五之二卷七燕禮第六之一卷八燕禮第六之二卷九大射儀第七之一卷十大射儀第七之二卷十一聘禮第八之一卷十二聘禮第八之二卷十三聘禮第八之三卷十四聘禮第八之四卷十五公食大夫禮第九卷十六覲禮第十卷十七喪服第十一之一卷十八喪服第十一之二卷十九喪服第十一之三卷二十士喪禮第十二之一卷二十一士喪禮第十二之二卷二十二士喪禮第十二之三卷二十三既夕第十三之一卷二十四既夕第十三之二卷二十五士虞禮第十四卷二十六特牲饋食禮第十五之一卷二十七特牲饋食禮第十五之二卷二十八少牢饋食禮第十六卷二十九有司徹第十七之一卷三十有司徹第十七之二臣等謹案儀禮集釋三十卷宋李如圭撰如圭字寶之廬陵人官至福建路撫幹案宋中興藝文志曰儀禮既廢學者不復誦習乾道間有張淳始訂其訛為儀禮識誤淳熙中李如圭為集釋出入經傳又為綱目以别章句之指為釋宫以論宫室之制朱熹嘗與之校定禮書蓋習於禮者云云則如圭當與朱子同時而陳振孫書録解題言如圭淳熙癸丑進士文獻通考引振孫語又作紹興癸丑進士考淳熙紀元凡十六年中間實無癸丑紹興癸丑為髙宗改元之三年朱子校正儀禮乃在晚嵗疑當為紹熙癸丑陳氏馬氏並訛一字也宋自熙寧中廢罷儀禮學者鮮治是經如圭乃全録鄭康成注而旁徵博引以為之釋多發賈公彥疏所未備又撰綱目釋宫各一篇世無傳本故朱彝尊經義考云俱未見今從永樂大典録出排纂成書十七篇中首尾完具尚十五篇惟鄉射大射二篇及别行之綱目一篇均在永樂大典缺卷之內無從考補姑仍其舊然已得其十之九矣儀禮一經因治之者希經文併注往往訛脫如圭生于南宋尚見古本今據以校正補注疏本經文脫字二十四改訛字十四刪衍字一百六十九併𠫭考唐石經及陸德明經典釋文張淳儀禮識誤及各本文句字體之殊各加辨證者不勝指數各附案語於下方其鄉射大射兩篇如圭之釋雖佚亦參取惠棟沈大成二家所校宋本證以唐石經本補經文脫字七改訛字四刪衍字二補注文脫字四十一改訛字三十九刪衍字十七以成儀禮之完帙如圭舊本本十七篇篇自為卷其間文句稍繁者篇頁太多難于分帙今析之得三十卷其釋宫則仍自為一書别著于録焉乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀儀禮集釋序古者禮儀三百威儀三千其節備矣漢興髙堂生傳士禮止十七篇魯徐生善為頌為禮官大夫顔師古曰頌與容同而瑕丘蕭奮以禮至淮陽太守東海孟卿事蕭奮以授后倉倉説禮數萬言號曰后氏曲臺記授戴德戴聖鄭康成云五傳弟子則髙堂生蕭奮后倉二戴凡五人所傳即儀禮之書也漢舊儀有二郎為此頌貌威儀事天下郡國有頌史皆詣魯學之蓋周旋曲折必習而後能其善盤辟為頌而不知經者有矣未有不習于儀而能通其意者也自漢以來禮日益壞其大經大本固已晦蝕不明所謂頌貌威儀之事僅存此書世亦莫有知者此學士大夫之責也然其節目之繁文義之密驟而讀之未易曉解甚或不能以句后倉所説泯沒無傳鄭注又時有疏略汶心竊病之近得廬陵李君如圭所著集釋窮探博采出入經傳以發明前人之未備考論宫室之制則有釋宫分别章句之指則有綱目其有志于古而用力之勤如此學者能玩而繹之則知禮與天地並其周旋揖讓登降進退莫非天理之流行人道之所以立先王之盛化行俗美與夫後世之不如古皆由於禮之與廢而不可誣也則是書于世教豈小補哉遂刻之桂林郡之學官與同志者共之陳汶撰
