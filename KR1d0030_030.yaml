body:
  text: 儀禮集釋卷三十宋李如圭撰有司徹宰夫洗觶以升主人受酌降酬長賓于西階南北面賓在左主人坐奠爵拜賓荅拜坐祭遂飲卒爵拜賓荅拜鄭注宰夫受主人觶則受其虛爵奠于篚古文酌為爵案今注疏本脫此五字釋曰上主人卒爵不言降知虛爵主人洗賓辭主人坐奠爵于篚對卒洗升酌降復位賓拜受爵主人拜送爵賓西面坐奠爵于薦左釋曰奠于左者後舉之與不儐尸之禮奠酬同神惠右不舉主人洗升酌獻兄弟于阼階上兄弟之長升拜受爵主人在其右荅拜坐祭立飲不拜旣爵皆若是以辯鄭注兄弟長㓜立飲賤不别大夫之賓尊于兄弟宰夫不贊酌者兄弟以親暱來不以官待之釋曰兄弟雖賤而親故主人親酌之士之兄弟長則賓衆兄弟如衆賓辯受爵其位在洗東西面北上升受爵其薦脀設于其位鄭注亦辯獻乃薦既云辯矣復言升受爵者為衆兄弟言也衆兄弟升不拜受爵先著其位于上乃後云薦脀設于其位明位初在是也位不繼于主人而云洗東卑不統于尊此薦脀皆使私人釋曰賓拜受受爵拜既爵衆賓及長兄弟不拜既爵衆兄弟又不拜受爵故别言升受爵也兄弟已獻不變其位特牲饋食禮兄弟位主人之南者士卑故繼主人言之士冠禮兄弟立于洗東西面北上其先生之脀折脅一膚一鄭注先生長兄弟折豕左肩之折釋曰折分侑俎豕左肩之折其衆儀也主人洗獻内賓于房中南面拜受爵主人南面于其右荅拜鄭注内賓姑姊妹及宗婦獻于主婦之席東主人不西面尊不與為賓主禮也南面于其右主人之位恒左人釋曰特牲主人西面坐祭立飲不拜既爵若是以辯亦有薦脀鄭注亦設薦脀于其位特牲饋食禮記曰内賓立于房中西墉下東面南上宗婦北堂東面北上主人降洗升獻私人于阼階上拜于下升受主人荅其長拜乃降坐祭立飲不拜既爵若是以辯宰夫贊主人酌主人于其羣私人不荅拜其位繼兄弟之南亦北上亦有薦脀鄭注私人家臣也所自謁除也大夫言私人明不純臣也士言私臣明有君之道北上不敢專其位亦有薦脀初亦北面在衆賓之後爾言繼者以爵既獻為文凡獻位定釋曰大夫曰私人辟君特牲饋食禮私臣門東北面此亦然既獻乃位兄弟之南北上繼于兄弟不敢别自為列凡專其位者雖共方皆别自為上十喪禮朝夕哭大夫即位于門外西面北上兄弟在南南上賔繼之北上是也謁除謂謁于君除其課役主人就筵鄭注古文曰升就筵尸作三獻之爵鄭注上賔所獻爵不言三獻作之者賓尸而尸益卑可以自舉司士羞湇魚縮執俎以升尸取膴祭祭之祭酒卒爵鄭注不羞魚匕湇略小味也羊有正俎羞匕湇肉湇豕無正俎魚無匕湇隆汚之殺司士縮奠俎于羊俎南横載于羊俎卒乃縮執俎以降尸奠爵拜三獻北面荅拜受爵酌獻侑侑拜受三獻北面荅拜司馬羞湇魚一如尸禮卒爵拜三獻荅拜受爵鄭注司馬羞湇魚變于尸酌致主人主人拜受爵三獻東楹東北面荅拜鄭注賔拜于東楹東以主人拜受于席就之釋曰賓之禮當于西階司士羞一湇魚如尸禮卒爵拜三獻荅拜受爵尸降筵受三獻爵案今注疏本脱爵字酌以酢之鄭注既致主人尸乃酢之遂賓意三獻西楹西北面拜受爵尸在其右以授之尸升筵南面荅拜坐祭遂飲卒爵拜尸荅拜執爵以降實于篚二人洗觶升實爵西楹西北面東上坐奠爵拜執爵以興尸侑荅拜坐祭遂飲卒爵執以興坐奠爵拜尸侑荅拜皆降鄭注三獻而禮小成使二人舉爵序殷勤于尸侑洗升酌反位尸侑皆拜受爵舉觶者皆拜送侑奠觶于右鄭注奠于右者不舉也神惠右不舉變于飲酒尸遂執觶以興北面于阼階上酬主人主人在右鄭注尸拜于阼階上酬禮殺坐奠爵拜主人主人荅拜不祭立飲卒爵不拜既爵酌就于阼階上酬主人鄭注言就者主人立待之主人拜受案此下各本有爵字據唐石經删尸拜送鄭注酬不奠者急酬侑也尸就筵主人以酬侑于西楹西侑在左坐奠爵拜執爵興侑荅拜不祭立飲卒爵不拜既爵酌復位侑拜受主人拜送鄭注言酌復位明授于西階上主人復筵乃升長賓侑酬之如主人之禮鄭注遂旅也言升長賓則有贊呼之至于衆賓遂及兄弟亦如之皆飲于上鄭注上西階上遂及私人拜受者升受下飲鄭注私人之長拜于下升受兄弟之爵下飲之卒爵升酌以之其位相酬辯鄭注其位兄弟南位亦拜受拜送升酌由西階釋曰卒爵受獻惟荅其長拜故受酬亦其長得升受羣私人以之其位相酬耳卒飲者實爵于篚鄭注末受酬者雖無所旅猶飲乃羞庶羞于賔兄弟内賔及私人鄭注無房中之羞賤也此羞同時羞則酌房中亦旅其始主婦舉觶于内賔遂及宗婦釋曰内羞賓文在私人之上私人得酬則内賓亦旅可知兄弟之後生者舉觶于其長鄭注後生年少也古文觶皆為爵延熹中詔校書定作觶洗升酌降北面立于阼階南長在左坐奠爵拜執爵以興長荅拜鄭注長在左辟主人釋曰獻酬之位主人在右坐祭遂飲卒爵執爵以興坐奠爵拜執爵以興長荅拜洗升酌降長拜受于其位舉爵者東面荅拜爵止鄭注拜受荅拜不北面者儐尸禮殺長賓言奠兄弟言止互相發明相待也釋曰爵止謂奠之此爵與前主人酬賓之觶後竝行為無算爵特牲饋食禮兄弟弟子舉觶于其長皆北面拜送賔長獻于尸如初無湇爵不止鄭注賓長者賓之長次上賓者非即上賔也如初如其獻侑酌致主人受尸酢也無湇爵不止别不如初者不使兄弟不稱加爵大夫尊也不用觚大夫尊者也釋曰賓長衆賓之長次上賔者湇湇魚也特牲饋食禮長兄弟洗觚為加爵衆賓長亦為加爵此言獻者若三獻之外更容有獻優之也用爵者爵尊于觚賓一人舉爵于尸如初亦遂之于下鄭注一人次賓長者如初如二人洗觶之為也遂之于下者遂及賓兄弟下至于私人是言亦遂之于下案今注疏本作故言亦遂之于下也上言無湇爵不止互相發明釋曰賓長獻一人舉爵皆如初無湇爵不止别其異者亦遂之于下明其同者此禮皆如上二人洗觶至卒飲者實爵于篚惟不奠爵于薦耳賓及兄弟交錯其酬皆遂及私人爵無算鄭注算數也長賓取觶酬兄弟之黨長兄弟取觶酬賓之黨惟己所欲無有次弟之數也尸出侑從主人送于庿門之外拜尸不顧鄭注拜送之拜侑與長賓亦如之衆賓從鄭注從者不拜送也司士歸尸侑之俎鄭注尸侑尊送其家主人退鄭注反于寢也有司徹鄭注徹堂上下之薦俎也外賔尸雖堂上婦人不徹若不儐尸案儐各本作賓據唐石經訂正鄭注不儐尸謂下大夫也其牲物則同不得備其禮耳舊説云謂大夫有疾病攝昆弟祭曾子問曰攝主不厭祭不旅不假不綏祭不配布奠于賓賓奠而不舉而此備有似失之矣釋曰厭祭陽厭也旅旅酬也假嘏主人也綏祭主人墮減黍稷牢肉以祭也配言某妃配也布奠謂主人酬賓奠觶于薦北賔奠謂取觶奠于薦南舉舉之以行旅酬也此不儐之禮亦具有之則祝侑亦如之鄭注謂尸七飯時尸食鄭注八飯乃盛俎臑臂肫脡脊横脊短脅代脅皆牢鄭注盛者盛于肵俎也此七體羊豕其脊脅皆取一骨也與所舉正脊幹骼凡十矣肩未舉既舉而俎猶有六體焉釋曰俎有十一體三脊三脅皆二骨既舉而三脊三脅各遺一骨魚七鄭注盛半也魚十有五而俎其一已舉必盛半者魚無足翼于牲象脊脅而已釋曰特脊脅亦各盛半腊辯無髀鄭注亦盛半也所盛者右體也脊屬焉言無髀者云一純而俎嫌有之古文髀作脾釋曰下云摭于魚腊俎則腊不盡盛亦盛半與魚同辯者葢辯盛右體也右脛骨五與脅骨三而八前已舉右肩今盡盛其餘三脊骨亦盛焉俎所存者左脛骨與脅骨八个耳上篇云腊一純而俎其兩髀左祝俎尸俎無髀自明不儐尸之禮髀之所用無文故云無髀以明之卒盛乃舉牢肩尸受振祭嚌之佐食受加于肵鄭注卒已佐食取一俎于堂下以入奠于羊俎東鄭注不言魚俎東主于尊釋曰魚在羊東此俎又奠于魚東繼羊言之耳乃摭于魚腊俎俎釋三个其餘皆取之實于一俎以出鄭注个猶枚也魚摭四枚腊摭五枚其所釋者腊則短脅正脅代脅魚三枚而已古文摭為揲釋曰祝主人之腊用脛體取于所摭則所釋者葢三脅骨祝主人之魚腊取于是鄭注祝主人主婦俎之魚腊取于此者大夫之禮文待神餘也三者各取一魚其腊主人臂主婦臑祝則骼也與此皆于鼎側更載焉不言主婦未聞釋曰特牲主人主婦祝皆無魚腊下主婦俎有腊臑此經不言主婦未聞其義或轉寫脱耳尸不飯告飽主人拜侑不言尸又三飯鄭注凡十一飯士九飯大夫十一飯其餘十有三飯十五飯佐食受牢舉如儐鄭注舉肺脊釋曰儐謂上萹及此萹有賓尸之禮者主人洗酌酳尸賓羞肝皆如儐禮卒爵主人拜祝受尸爵尸荅拜祝酌授尸尸以腊主人亦如儐其綏祭其嘏亦如儐鄭注肝牢肝也綏皆當作挼挼讀為藏其隋之隋古文為㨎其獻祝與二佐食其位其薦脀皆如儐主婦其洗獻于尸亦如儐鄭注自尸侑不飯告飽至此與儐同者在上篇主婦反取籩于房中執棗糗坐設之棗在稷南糗在棗南婦贊者執栗脯主婦不興受設之栗在糗東脯在棗東主婦興反位鄭注棗饋食之籩糗羞籩之實雜用之下賓尸也粟脯加籩之實也反位反主人之北拜送爵位案送今注疏本訛作還釋曰籩人掌饋食之籩其實棗㮚加籩之實㮚脯羞籩之實糗餌尸左執爵取棗糗祝取栗脯以授尸尸兼祭于豆祭祭酒啐酒次賓羞牢燔用俎鹽在右尸兼取燔㨎于鹽振祭嚌之祝受加于肵卒爵主婦拜祝受尸爵尸荅拜鄭注自主婦反取籩案各本脫取字據經文補至祝受加于肵此異于儐祝易爵洗酌授尸尸以醋主婦主婦主人之北拜受爵尸荅拜主婦反位又拜上佐食綏祭如儐卒爵拜尸荅拜鄭注主婦夾爵拜為不儐尸案儐今注疏本訛作賓降崇敬今文醋曰酌釋曰士妻獻尸不夾爵内子獻尸夾爵拜下大夫不儐尸雖與士同仍同内子夾爵拜主婦獻祝其酌如儐拜坐受爵主婦主人之北荅拜鄭注自尸卒爵至此亦與儐同者亦在上篇釋曰經無尸卒爵之文鄭注云尸者以經有卒爵之文多故言尸以别之也宰夫薦棗糗坐設棗于菹西糗在棗南祝左執爵取棗糗祭于豆祭祭酒啐酒次賓羞燔如尸禮卒爵鄭注内子不薦籩祝賤使官可也自宰夫薦至賓羞燔亦異于儐釋曰特牲主婦設籩主婦受爵酌獻二佐食亦如儐主婦受爵以入于房賓長洗爵獻于尸尸拜受賓户西北荅拜爵止鄭注尸止爵者以三獻禮成欲神惠之均于室中是以奠而待之主婦洗于房中酌致于主人主人拜受主婦户西北面拜送爵司宫設席鄭注拜受乃設席變于士也主婦薦韭菹醢坐設于席前菹在北方婦贊者執棗糗以從主婦不興受設棗于菹北糗在棗西佐食設俎臂脊脅皆牢膚三魚一腊臂鄭注臂左臂也特牲五體此三者以其牢與腊臂而七牢腊俱臂亦所謂腊如牲體主人左執爵右取菹㨎于醢祭于豆間遂祭籩奠爵興取牢肺坐絶祭嚌之興加于俎坐挩手祭酒執爵以興坐卒爵拜鄭注無從者變于士也亦所謂順而摭也主婦荅拜受爵酌以醋户内北面拜鄭注自酢不更爵殺主人荅拜卒爵拜主人荅拜主婦以爵入于房尸作止爵祭酒卒爵賓拜祝受爵尸荅拜鄭注作止爵乃祭酒亦變于士自爵止至作止爵亦異于儐釋曰一止爵順上大夫儐尸之禮也特牲饋食禮再止爵祝酌授尸賓拜受爵尸拜送坐祭遂飲卒爵拜尸荅拜獻祝及二佐食洗致爵于主人鄭注洗致爵者以承佐食賤新之主人席上拜受爵賓北面荅拜坐祭遂飲卒爵拜賓荅拜受爵酌致爵于主婦主婦北堂司宫設席東面鄭注北堂中房以北東面者變于士妻賓尸不變者賓尸禮異矣内子東面則宗婦南面西上内賓自若東面南上釋曰特牲饋食禮主婦房中南面宗婦北堂東面北上内賓西墉下東面南上宗婦與主婦易處宗婦統于主婦今西上主婦席北東面拜受爵賓西面荅拜鄭注席北東面者北為下婦贊者薦韭菹醢菹在南方婦人贊者執棗糗授婦贊者婦贊者不興受設棗于菹南糗在棗東鄭注婦人贊者宗婦之弟婦也今文曰婦也贊者執棗糗授婦贊者不興受案今注疏本脫此十七字佐食設俎于豆東羊臑豕折羊脊脅祭肺一膚一魚一腊臑鄭注豕折豕折骨也不言所折略之特牲主婦觳折豕無脊脅下主人羊豕四體與腊臑而五釋曰下文絶祭則離肺也曰祭主人以下肺或者因而名之乎特牲禮其用以祭皆離肺主婦升筵坐左執爵右取菹㨎于醢祭之祭籩奠爵興取肺坐絶祭嚌之興加于俎坐挩手祭酒執爵興筵北東面立卒爵拜鄭注立飲拜既爵者變于大夫賓荅拜賓受爵易爵于篚洗酌醋于主人户西北面拜主人荅拜卒爵拜主人荅拜賓以爵降奠于篚鄭注自賓獻及二佐食至此亦異于儐釋曰上篇賓長獻不及佐食此賓長獻節内有十爵獻尸一主婦致爵于主人二主人酢主婦三尸酢賓四賓獻祝五獻上佐食六下佐食七賓致爵于主人八于主婦九賓受主人酢十乃羞宰夫羞房中之羞司士羞庶羞于尸祝主人主婦内羞在右庶羞在左主人降拜衆賓洗獻衆賓其薦脀其位其酬醋皆如儐禮主人洗獻兄弟與内賓與私人皆如儐禮其位其薦脀皆如儐禮卒乃羞于賓兄弟内賓及私人辯鄭注自乃羞至私人之薦脀此亦與儐同者在此篇不儐尸則祝猶侑耳卒已也乃羞者羞庶羞釋曰儐尸之禮羞于侑不儐尸則羞于祝賓以下無内羞賔長獻于尸尸醋獻祝致醋賓以爵降實于篚鄭注致謂致爵于主人主婦不言如初者爵不止又不及佐食賔兄弟交錯其酬無算爵鄭注此亦與儐同者在此篇釋曰特牲饋食禮堂下别尊旅酬無算爵兩有之下大夫不敢同君禮闕旅酬直為無算爵而已兄弟舉觶于其長亦當如儐禮在羞于私人之後賓長加獻之前文不具耳利洗爵獻于尸尸醋獻祝祝受祭酒啐酒奠之鄭注利獻不及主人殺也此亦異于儐釋曰上篇此篇皆無佐食獻主人出立于阼階上西面祝出立于西階上東面祝告于主人曰利成祝入主人降立于阼階東西面尸謖祝前尸從遂出于庿門祝反復位于室中祝命佐食徹尸俎佐食乃出尸俎于庿門外有司受歸之徹阼薦俎鄭注自主人出至此與賓雜者也先𧃊徹主人薦俎者變于士特牲饋食禮曰徹阼俎豆籩設于東序下乃𧃊如儐鄭注謂上篇自司宫設對席至上餕興出也古文𧃊作餕卒𧃊有司官徹饋饌于室中西北隅南面如饋之設右几厞用席鄭注官徹饋者司馬司士舉俎宰夫取敦及豆此于尸謖改饌當室之白孝子不知神之所在庶其饗之于此所以為厭飫不令婦人改徹饌敦豆變于始也尚使官也佐食不舉羊豕俎親餕尊也厞隱也古文右作侑厞作茀釋曰主婦獻祝宰夫宰夫多主主婦之事故敦豆宰夫徹之特牲饋食禮佐食徹尸薦俎敦納一尊于室中鄭注陽厭殺無𤣥酒司官埽祭鄭注埽豆間之祭舊說云埋之西階東釋曰神位在西故埋近西階也曽子問凡幣帛皮圭為主命埋之階間主人出立于阼階上西面祝執其俎以出立于西階上東面司宫闔牖户鄭注閉牖與户為鬼神或者欲幽闇祝告利成乃執俎以出于庿門外有司受歸之衆賓出主人拜送于庿門外乃反鄭注拜送賓者案賓下今注疏本有也字亦拜送其長不言長賓者下大夫無尊賓也婦人乃徹鄭注徹祝之薦及房中薦俎不使有司者下上大夫之禮徹室中之饌鄭注有司饌之婦人徹之外内相兼禮殺
