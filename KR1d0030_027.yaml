body:
  text: 儀禮集釋卷二十七宋李如圭撰特牲饋食禮席于户內鄭注為主人鋪之西面席自房來主婦洗爵酌致爵于主人主人拜受爵主婦拜送爵鄭注主婦拜拜于北面也今文曰主婦洗酌爵宗婦贊豆如初主婦受設兩豆兩籩鄭注初贊亞獻也主婦薦兩籩東面也俎入設鄭注佐食設之主人左執爵祭薦宗人贊祭奠爵興取肺坐絶祭嚌之興加于俎坐挩手祭酒啐酒鄭注絶肺祭之者以離肺長也少儀曰牛羊之肺離而不提心豕亦然挩拭也挩手者為絶肺染汙也忖肺不挩手古文挩皆作説釋曰忖肺忖切之直取以祭離肺四面離割之不絶其中央少許時絶之以祭下記主人以下俎皆離肺無刌肺肝從左執爵取肝㨎于鹽坐振祭嚌之宗人受加于俎燔亦如之興席末坐卒爵拜鄭注于席末坐卒爵敬也一酌而備再從而次之示均釋曰尸再獻而具肝從主人一酌而肝燔從與尸均坐振祭重出坐字疑主婦答拜受爵酌醋左執爵拜主人答拜坐祭立飲卒爵拜主人答拜主婦出反于房釋曰主婦醋不更爵殺也主人降洗酌致爵于主婦席于房中南面主婦拜受爵主人西面答拜宗婦薦豆俎從獻皆如主人主人更爵酌醋卒爵降實爵于篚入復位鄭注主人更爵自酢男子不承婦爵也祭統曰夫婦相授受不相襲處酢必易爵明夫婦之别古文更為受案今注疏本訛作今文授為受釋曰更爵更房內之爵也庭篚惟有二爵其一獻尸爵止其一主人致爵于主婦少牢下篇賓致爵于主婦之俎亦佐食設之三獻作止爵鄭注賓也謂三獻者以事命之作起也舊説云賓入户北面曰皇尸請舉爵尸卒爵酢酌獻祝及佐食洗爵酌致于主人主婦燔從皆如初更爵酢于主人卒復位鄭注洗乃致爵為異事新之燔從皆如初者如亞獻及主人主婦致爵也凡獻佐食皆無從其薦俎獻兄弟以齒設之賓更爵自酢亦不承婦人爵今文曰洗致古文更為受案今注疏本脫此十字釋曰下記佐食旅旅齒于兄弟故其薦俎亦然賓三獻節中有十一爵獻尸一主婦致爵于主人二主婦自酢三主人致爵于主婦四主人自酢五尸卒爵酢賓六賓獻祝七獻佐食八賓致爵于主人九致爵于主婦十賓酢于主人十一主人降阼階西面拜賓如初洗鄭注拜賓而洗爵為將獻之如初如視濯時主人再拜賓答拜三拜衆賓衆賓答再拜者賓辭洗卒洗揖讓升酌西階上獻賓賓北面拜受爵主人在右答拜鄭注就賓拜者此禮不主于尊也賓卑則不專階主人在右統于其位今文無洗案今注疏本脫此四字釋曰賓有司耳不得專階故主人就而獻之主人之位在東薦脯醢設折俎鄭注凡節解者皆曰折俎不言其體略云折俎非貴體也上賓骼衆賓儀公有司設之釋曰少牢下篇曰司士設賓俎羊骼衆賓其脀體儀也儀者儀度可用者用之賓左執爵祭豆奠爵興取肺坐絶祭嚌之興加于俎坐挩手祭酒卒爵拜主人答拜受爵酌酢奠爵拜賓答拜鄭注主人酌自酢者賓不敢敵主人主人達其意主人坐祭卒爵拜賓答拜揖執祭以降西面奠于其位位如初薦俎從設鄭注位如初復其位東面少牢饋食禮宰夫執薦以從設于祭東司士執俎以從設于薦東是則皆公有司為之與釋曰祭脯肺衆賓升拜受爵坐祭立飲薦俎設于其位辨主人備答拜焉降實爵于篚鄭注衆賓立飲賤不備禮鄉飲酒記曰立卒爵者不拜既爵備盡盡人之答拜釋曰坊記曰尸飲三衆賓飲一示民有上下也因其酒肉聚其宗族以教民睦也尊兩壺于阼階東加勺南枋西方亦如之鄭注為酬賓及兄弟行神惠不酌上尊卑異之就其位尊之兩壺皆酒優之先尊東方示惠由近禮運曰澄酒在下釋曰旅酬禮褻不敢與神靈共尊故就賓及兄弟之位尊之不用玄酒澄酒在下人君禮也案司尊彞四時之祭皆有罍諸臣之所酢少牢饋食禮上下大夫堂下皆無尊者辟人君士卑不嫌與人君同主人洗觶酌于西方之尊西階前北面酬賓賓在左鄭注先酌西方者尊賓之義主人奠觶拜賓答拜主人坐祭卒觶拜賓答拜主人洗觶賓辭主人對卒洗酌西面賓北面拜鄭注西面者鄉賓位立于西階之前賓所答拜之東北主人奠觶于薦北鄭注奠酬于薦左非為其不舉行神惠不可同于飲酒釋曰鄉飲酒記云凡奠者于左將舉于右賓坐取觶還東面案此下各本衍拜字考上經賓北面拜主人奠觶于薦北下云主人答拜答賓北面之拜也賓坐取觶還東面下乃云賓奠觶于薦南賓方執觶在手不得拜明矣主人答拜賓奠觶于薦南揖復位鄭注還東面就其位薦西奠觶薦南明將舉釋曰揖復位則奠觶時少南于位主人洗爵獻長兄弟于阼階上如賓儀鄭注酬賓乃獻長兄弟者獻之禮成于酬先成賓禮此主人之義亦有薦脀設于位私人為之與釋曰下記公有司獻次衆賓私臣獻次衆兄弟賓薦俎蓋公有司設之兄弟薦俎蓋私臣設之洗獻衆兄弟如衆賓儀鄭注獻卑而必為之洗者顯神惠此言如衆賓儀則如獻衆賓洗明矣洗獻內兄弟于房中如獻衆兄弟之儀鄭注內兄弟內賓宗婦也如衆兄弟如其拜受坐祭立飲設薦俎于其位而立內賓其位在房中之尊北案今注疏本脫其字不殊其長略婦人也有司徹曰主人洗獻內賓于房中南面拜受爵釋曰下記尊兩壺于房中西墉下內賓立于其北東面南上宗婦北堂東面主人西面答拜更爵酢卒爵降實爵于篚入復位鄭注爵辨乃自酢以初不殊其長也內賓之長亦南面答拜長兄弟洗觚為加爵如初儀不及佐食洗致如初無從鄭注大夫士三獻而禮成多之為加也不及佐食無從殺也致致于主人主婦衆賓長為加爵如初爵止鄭注尸爵止者欲神惠之均于在庭嗣舉奠盥入北面再拜稽首鄭注嗣主人將為後者舉猶飲也使嗣子飲奠者將傳重纍之者大夫之嗣子不舉奠辟諸侯釋曰奠鉶南所奠觶也文王世子曰宗廟之中登餕獻受爵則以上嗣上嗣君子適長子也以此禮言之受爵謂嗣舉奠獻謂舉奠洗酌入餕謂宗人遺舉奠盥祝命之餕也大夫之嗣無此禮辟君尸執奠進受復位祭酒啐酒尸舉肝舉奠左執觶再拜稽首進受肝復位坐食肝卒觶拜尸備答拜焉鄭注食肝受尊者賜不敢餘也備猶盡也每拜答之以尊者與卑者為禮略其文耳古文備為復釋曰肝酳尸所從獻者舉奠者嗣也以事名之舉奠洗酌入尸拜受舉奠答拜尸祭酒啐酒奠之舉奠出復位鄭注啐之者答其欲酢己也奠之者復神之奠觶嗣齒于子姓凡非主人升降自西階釋曰尸復神之奠觶故惟啐之與挼祭同時兄弟弟子洗酌于東方之尊阼階前北面舉觶于長兄弟如主人酬賓儀鄭注弟子後生也宗人告祭脀鄭注脀俎也所告者衆賓衆兄弟內賓也案今注疏本兄弟上脫一衆字獻時設薦俎于其位至此禮又殺告之祭使成禮也其祭皆離肺不言登豆可知乃羞鄭注羞庶羞也下尸胾醢豆而已此所羞者自祝主人至于內賓無內羞釋曰少牢下篇乃有內羞此庶羞降于尸無膮炙少牢下篇曰羞及私人辨賓坐取觶阼階前北面酬長兄弟長兄弟在右鄭注薦南奠觶釋曰主人酬賓之觶賓奠觶拜長兄弟答拜賓立卒觶酌于其尊東面立長兄弟拜受觶賓北面答拜揖復位鄭注其尊長兄弟尊也此受酬者拜亦北面長兄弟西階前北面衆賓長自左受旅如初鄭注旅行也受行酬也初賓酬長兄弟長兄弟卒觶酌于其尊西面立受旅者拜受長兄弟北面答拜揖復位釋曰其尊西面之尊衆賓及衆兄弟交錯以辨皆如初儀鄭注交錯猶言東西釋曰楚茨曰獻酬交錯禮儀卒度笑語卒獲古者于旅也語謂此時為加爵者作止爵如長兄弟之儀鄭注于旅酬之間言作止爵明禮殺並作釋曰賓酬長兄弟長兄弟酬賓二觶繼舉至此禮殺故不俟其畢而作止爵長兄弟酬賓如賓酬兄弟之儀以辨卒受者實觶于篚鄭注長兄弟酬賓亦坐取其奠觶此不言交錯以辨賓之酬不言卒受者實觶于篚明其相報禮終于此其文省釋曰長兄弟亦取兄弟弟子所舉之觶酬賓以相報故互文以見之賓弟子及兄弟弟子洗各酌于其尊中庭北面西上舉觶于其長奠觶拜長皆答拜舉觶者祭卒觶拜長皆答拜舉觶者洗各酌于其尊復初位長皆拜舉觶者皆奠觶于薦右鄭注奠觶進奠之于薦右非神惠也今文曰奠于薦右長皆執以興舉觶者皆復位答拜長皆奠觶于其所皆揖其弟子弟子皆復其位鄭注復其位者東西面位弟子舉觶于其長所以序長幼教孝弟凡堂下拜亦皆北面爵皆無算鄭注算數也賓取觶酬兄弟之黨長兄弟取觶酬賓之黨惟己所欲亦交錯以辨無次第之數因今接會使之交恩定好優勸之利洗散獻于尸酢及祝如初儀降實散于篚鄭注利佐食也言利以今進酒也更言獻者以利待尸禮將終宜一進酒嫌于加酒亦當三也不致爵禮又殺也主人出立于户外西面鄭注事尸禮畢祝東面告利成鄭注利猶養也供養之禮成不言禮畢于尸間之嫌尸謖祝前主人降鄭注謖起也前猶導也少牢饋食禮曰祝入尸謖主人降立于阼階東西面祝先尸從遂出于庿門前尸之儀士虞之禮備矣釋曰楚茨曰孝孫徂位工祝致告神具醉止皇尸載起致告告利成也祝反及主人入復位命佐食徹尸俎俎出于庿門鄭注俎所載于肵俎少牢饋食禮曰有司受歸之徹庶羞設于西序下鄭注為將餕去之庶羞主為尸非神饌也尚書傳曰宗室有事族人皆侍終日大宗已侍于賓奠然後燕私燕私者何也祭已而與族人飲也案今注疏本脫祭字此徹庶羞置西序下者為將以燕飲與然則自尸祝至于兄弟之庶羞宗子以與族人燕飲于堂內賓宗婦之庶羞主婦以燕飲于房釋曰楚茨曰諸宰君婦廢徹不遲諸父兄弟備言燕私筵對席佐食分簋鉶鄭注為將餕分之也分簋者分敦黍于會為有對也敦有虞氏之器也周制士用之變敦言簋容同姓之士得從周制耳祭統曰餕者祭之末也不可不知也是故古之人有言曰善終者如始餕其是巳是故古之君子曰尸亦餕鬼神之餘案此下今注疏本有也字惠術也可以觀政矣宗人遣舉奠及長兄弟盥立于西階下東面北上祝命嘗食𧃊者舉奠許諾升入東面長兄弟對之皆坐佐食授舉各一膚鄭注命告也士使嗣子及兄弟𧃊其惠不過族親也案今注疏本脫也字古文𧃊皆作餕釋曰𧃊者舉膚降于尸也祭統曰尸謖君與卿四人餕君起大夫六人餕大夫起士八人餕少牢饋食禮二佐食及二賓長餕主人西面再拜祝曰𧃊有以也兩𧃊奠舉于俎許諾皆答拜鄭注以讀如何其久也必有以也之以祝曰𧃊案曰今注疏本訛作告釋辭以戒之言女𧃊乎此案今注疏本脫乎字當有所以也以先祖有德而享于此祭其坐𧃊其餘亦當以之也少牢饋食禮不戒者非親昵也舊説曰主人拜下𧃊席南若是者三鄭注丁寧戒之皆取舉祭食祭舉乃食祭鉶食舉鄭注食乃祭鉶禮殺釋曰食簋實也尸祭鉶嘗之乃爾黍卒食主人降洗爵宰贊一爵主人升酌酳上𧃊上𧃊拜受爵主人答拜酳下𧃊亦如之鄭注少牢饋食禮曰贊者洗三爵酌案今注疏本脫酌字主人受于户內以授次𧃊舊説云主人北面授下𧃊爵主人拜祝曰酳有與也如初儀鄭注主人復拜為戒也與讀如諸侯以禮相與之與言女酳此當有所與也與者與兄弟也既知似先祖之德亦當與女兄弟謂教化之兩𧃊執爵拜鄭注答主人也祭酒卒爵拜主人答拜兩𧃊皆降實爵于篚上𧃊洗爵升酌酢主人主人拜受爵鄭注下𧃊復兄弟位不復升也上𧃊即位坐答拜鄭注既授爵户內乃就坐主人坐祭卒爵拜上𧃊答拜受爵降實于篚主人出立于户外西面鄭注事餕者禮畢祝命徹阼俎豆籩設于東序下鄭注命命佐食阼俎主人之俎宗婦不徹豆籩徹禮略各有為而已設于東序下亦將燕也祝執其俎以出東面于户西鄭注俟告利成少牢下篇曰祝告利成乃執俎以出宗婦徹祝豆籩入于房徹主婦薦俎鄭注宗婦既並徹徹其卑者士虞禮曰祝薦席徹入于房佐食徹尸薦俎敦設于西北隅几在南厞用筵納一尊佐食闔牗户降鄭注厞隱也不知神之所在或諸逺人乎尸謖而改饌為幽暗庶其饗之所以為厭飫少牢饋食禮曰南面如饋之設此所謂當室之白陽厭也則尸未入之前為陰厭矣曽子問曰殤不備祭何謂陰厭陽厭也案今注疏本謂訛作為釋曰釋宫曰西南隅謂之奧西北隅謂之屋漏郭璞曰奧者室中隱奧之處孫炎曰屋漏者當室之白日光所漏入也厭者無尸直厭飫神尸未入饌于奧故曰陰厭厞謂以席為障隱也祭時厞西北隅因謂西北隅為厞喪大記曰取西北厞薪祝告利成降出主人降即位宗人告事畢賓出主人送于門外再拜鄭注拜送賓也凡去者不答拜佐食徹阼俎堂下俎畢出鄭注記俎出節兄弟及衆賓自徹而出惟賓俎有司徹歸之尊賓也案也今注疏本訛作者釋曰賓出主人拜送明賓不自徹也曲禮曰凡祭于公者必自徹其俎記特牲饋食其服皆朝服玄冠緇帶緇韠鄭注于祭服此也皆者謂賓及兄弟筮日筮尸親濯亦玄端至祭而朝服朝服者諸侯之臣與其君日視朝之服大夫以祭今賓兄弟緣孝子欲得嘉賓尊客以事其祖禰故服之緇韠者下大夫之臣夙興主人服如初則固玄端釋曰凡朝服素韠惟尸祝佐食玄端玄裳黃裳雜裳可也皆爵韠鄭注與主人同服周禮士之齊服有玄端素端然則玄裳上士也黃裳中士雜裳下士釋曰可者惟其所當服服之設洗南北以堂深東西當東榮鄭注榮屋翼也水在洗東鄭注祖天地之左海案左今注疏本訛作右篚在洗西南順實二爵二觚四觶一角一散鄭注順從也言南從統于堂也二爵者為賓獻爵止主婦當致也二觚長兄弟及衆賓長為加爵二人班同宜接並也四觶一酌奠其三長兄弟酬賓卒受者與賓弟子兄弟弟子舉觶于其長禮殺事相接禮器曰貴者獻以爵賤者獻以散尊者舉觶卑者舉角舊説云爵一升觚二升觶三升角四升散五升釋曰賓獻尸之爵止主人當致爵于主婦故爵二長兄弟與衆賓長班同接並為加爵宜各用一觚故觚二長兄弟酬賓之觶未奠于篚賓弟子及兄弟弟子已各舉觶于其長其一觶酌奠于鉶南故觶四壺棜禁饌于東序南順覆兩壺焉蓋在南明日卒奠幂用綌即位而徹之加勺鄭注覆壺者盝瀝水且為其不宜塵幂用綌以其堅潔禁言棜者祭尚厭飫得與大夫同器不為神戒也釋曰卒奠酌奠奠于鉶南時即位尸即席坐時鄉飲酒賓至徹幂禮器曰禮有以下為貴者天子諸侯之尊廢禁大夫士棜禁玉藻曰大夫側尊用棜士側尊用禁棜無足禁有足士卑故以禁戒為稱棜又曰斯禁鄉飲酒鄉射雖大夫以非祭禮猶曰斯禁至祭乃名曰棜士祭禮言棜禁得與大夫同名籩巾以綌也纁裏棗蒸栗擇鄭注籩有巾者果實之物多皮核優尊者可蒸裹之也蒸擇互文舊説云纁裏者皆玄被釋曰聘禮竹簋案此下原本缺鉶芼用苦若薇皆有滑夏葵冬荁鄭注苦苦荼也荁堇屬乾之冬滑于葵詩云周原膴膴堇荼如飴今文苦為芐芐乃地黃非也釋曰內則曰堇荁以滑之棘心匕刻鄭注刻若今龍頭釋曰詩大東曰有救棘匕牲爨在庿門外東南魚臘爨在其南皆西面饎爨在西壁鄭注饎炊也西壁堂之西牆下舊説云南北直屋梠稷在南肵俎心舌皆去本末午割之實于牲鼎載心立舌縮俎鄭注午割從橫割之亦勿沒立縮順其性心舌知食味者欲尸之饗此祭是以進之釋曰一從一橫曰午四面皆鄉中割之賓與長兄弟之薦自東房其餘在東堂鄭注東堂東夾之前近南沃尸盥者一人奉槃者東面執匜者西面淳沃執巾者在匜北鄭注匜北執匜之北亦西面每事各一人淳沃稍注之今文淳作激宗人東面取巾振之三南面授尸卒執巾者受鄭注宗人代授巾庭長尊尸入主人及賓皆辟位出亦如之鄭注辟位逡遁嗣舉奠佐食設豆鹽鄭注肝宜鹽也佐食當事則户外南面無事則中庭北面鄭注當事將有事而未至凡祝呼佐食許諾鄭注呼猶命也宗人獻與旅齒于衆賓鄭注尊庭長齒從其長幼之次佐食于旅齒于兄弟釋曰祭統曰凡賜爵昭為一穆為一昭與昭齒穆與穆齒及羣兄弟尊兩壺于房中西牗下南上鄭注為婦人旅也其尊之節亞西方釋曰尊壺于西方已乃尊于房內賓立于其北東面南上宗婦北堂東面北上鄭注二者所謂內兄弟內賓姑姊妹也宗婦族人之婦其夫屬于所祭為子孫或南上或北上宗婦宜統于主婦主婦南面北堂中房而北主婦及內賓宗婦亦旅西面鄭注西面者異于獻也男子獻于堂上旅于堂下婦人獻于南面旅于西面內賓象衆賓宗婦象兄弟其節與其儀依男子也主婦酬內賓之長酌奠于薦左內賓之長坐取奠于右宗婦之娣婦舉觶于其姒婦亦如之內賓之長坐取奠觶酬宗婦之姒交錯以辨宗婦之姒亦取奠觶酬內賓之長交錯以辨內賓之少者宗婦之娣婦各舉奠于其長並行交錯無算其拜及飲者皆西面于主婦之東南案今注疏本脫于字宗婦贊薦者執以坐于户外授主婦尸卒食而祭饎爨雍爨鄭注雍孰肉以尸享祭竈有功也舊説云宗婦祭饎爨享者祭雍爨用黍肉而已無籩豆俎禮器曰燔燎于爨夫爨者老婦之祭盛于盆尊于瓶賓從尸俎出庿門乃反位鄭注賓從尸送尸也士之助祭終其事也俎尸俎也賓既送尸復入反位者宜與主人為禮乃去之尸俎右肩臂臑肫胳正脊二骨橫脊長脅二骨短脅鄭注尸俎神俎也士之正祭禮九體貶于大夫有併骨二亦得十一之名合少牢之體數此所謂放而不致者凡俎實之數竒脊無中脅無前貶于尊者不貶正脊不奪正也正脊二骨長脅二骨者將舉于尸尸食未飽不欲空神俎釋曰尸餕鬼神之餘故謂神俎為尸俎也尸先舉正脊次舉長脅故皆二骨少牢饋食禮又有脡脊代脅為十一體膚三鄭注為𧃊用二厭飫一也離肺一鄭注離猶刲也小而長午割之亦不提心謂之舉肺刌肺三鄭注為尸主人主婦祭今文刌為切釋曰尸酢主人主人不絶祭知用尸俎之刌肺魚十有五鄭注魚水物以頭枚數陰中之物取數于月十有五日而盈少牢饋食禮亦云十有五而俎尊卑同此所謂經而等也臘如牲骨鄭注不但言體以有一骨二骨者祝俎髀脡脊二骨脅二骨鄭注凡接于神及尸者俎不過牲三體以特牲約加其可併者二亦得竒名少牢饋食禮羊豕各三體釋曰脅蓋代脅也與脡脊皆尸俎所不備者膚一離肺一阼俎臂正脊二骨橫脊長脅二骨短脅鄭注主人尊欲其體得祝之加數五體又加其可併者二亦者竒名臂左體臂膚一離肺一主婦俎觳折鄭注觳後足折分後右足以為佐食俎不分左臑折辟大夫妻古文觳皆作穀案今注疏本脫此六字其餘如阼俎鄭注餘謂脊脅膚肺佐食俎觳折脊脅鄭注三體卑者從正釋曰無加骨也脊脅不名無定體膚一離肺一賓骼長兄弟及宗人折其餘如佐食俎鄭注體左骼也賓俎全體尊賓不用尊體為其已甚卑而全之其宜可也長兄弟及宗人折不言所分略之釋曰祝佐食接神賓三獻長兄弟為加爵宗人庭長授巾皆接尸而祝為尊故祝五體而餘皆三體衆賓長亦為加爵接于尸蓋亦三體下文惟衆賓殽脀耳衆賓及衆兄弟內賓宗婦若有公有司私臣皆殽脀鄭注又略此所折骨直破折餘體可殽者升之俎一而已不備三者賤祭禮接神者貴凡骨有肉曰殽祭統曰凡為俎以骨為主貴者取貴骨賤者取賤骨貴者不重賤者不虛示均也俎者所以明惠之必均也案今注疏本脫明字善為政者如此故曰見政事之均焉公有司亦士之屬命于君者也私臣自己所辟除者釋曰禮器曰羔豚而祭百官皆足大牢而祭不必有餘此之謂稱百官謂衆助祭者膚一離肺一公有司門西北面東上獻次衆賓私臣門東北面西上獻次兄弟升受降飲鄭注獻在後者賤也祭祀有上事者貴之非執事者亦皆與旅釋曰擇公有司以為賓為衆賓位西階下執祭事其不執事者則在門西兄弟雖無上事亦在堂下西面族親故也宗人獻與旅齒于衆賓則公有司為之佐食齒于兄弟其選于私臣與公有司私臣薦俎蓋徒隸為之
